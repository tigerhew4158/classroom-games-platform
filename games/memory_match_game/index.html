<!DOCTYPE html>
<html lang="zh-CN" data-s001-version="v27-card-display-force-fix">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S001 翻翻乐｜Trilingual Memory Match</title>
  <style>
    :root{
      --bg1:#0a3db9;
      --bg2:#032c8a;
      --bg3:#0a1f6a;
      --panel:#ffffff;
      --text:#12305f;
      --deep:#0f2d62;
      --blue:#4ea9ff;
      --blue2:#66c7ff;
      --orange:#ffb134;
      --yellow:#ffd84f;
      --green:#61d871;
      --purple:#a774ff;
      --pink:#ff6fb2;
      --danger:#ff5353;
      --shadow:0 12px 32px rgba(0,20,80,.28);
      --soft-shadow:0 8px 18px rgba(0,20,80,.16);
      --radius:24px;
      --card-radius:22px;
      --outline:rgba(255,255,255,.85);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color:#fff;
      background:
        radial-gradient(circle at 10% 10%, rgba(255,220,90,.22), transparent 22%),
        radial-gradient(circle at 90% 15%, rgba(90,225,255,.16), transparent 20%),
        radial-gradient(circle at 50% 95%, rgba(97,216,113,.15), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg2) 38%, var(--bg3));
      overflow-x:hidden;
    }
    button, select, input, textarea{font:inherit}
    .app{max-width:1680px; margin:0 auto; padding:14px}

    .topbar{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:14px;
      align-items:center;
      margin-bottom:14px;
    }
    .hero{
      display:flex; align-items:center; gap:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      border:2px solid rgba(255,255,255,.18);
      border-radius:28px;
      padding:14px 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .sparkles{display:flex; gap:8px; align-items:center; font-size:26px}
    .code-badge{
      font-size: clamp(40px, 5vw, 78px);
      font-weight: 1000; letter-spacing:-.04em;
      color:#ffd63f;
      text-shadow: 0 5px 0 rgba(153,91,0,.55), 0 10px 20px rgba(0,0,0,.18);
    }
    .title-main{
      font-size: clamp(36px, 4.6vw, 80px); font-weight: 1000; letter-spacing:-.045em;
      text-shadow: 0 5px 0 rgba(17,63,141,.45), 0 10px 20px rgba(0,0,0,.18);
      line-height:.95;
    }
    .title-sub{
      margin-top:10px;
      display:inline-flex; align-items:center; gap:10px;
      padding:10px 20px;
      background:linear-gradient(180deg,#3ab1ff,#1c7cff);
      border:3px solid rgba(255,255,255,.55);
      border-radius:999px;
      font-size: clamp(16px, 1.65vw, 34px);
      font-weight: 900;
      box-shadow: var(--soft-shadow);
    }
    .top-controls{display:flex; flex-wrap:wrap; gap:12px; justify-content:flex-end}
    .pill, .action-chip{
      min-height:66px;
      padding:12px 18px;
      border-radius:22px;
      border:3px solid rgba(255,255,255,.55);
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      display:flex; align-items:center; gap:12px;
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(8px);
    }
    .pill .value{font-size: clamp(20px, 2.2vw, 44px); font-weight:1000; line-height:1}
    .pill .small{font-size:14px; font-weight:800; opacity:.95}
    .lang-wrap select, .settings-grid select, .settings-grid input, .settings-grid textarea{
      border-radius:16px; border:2px solid #d8ecff; background:#fff; color:#17396c;
      padding:12px 14px; width:100%; outline:none;
      box-shadow: inset 0 2px 0 rgba(255,255,255,.85);
    }
    .btn-top{
      min-height:66px; padding:12px 18px; border-radius:22px; border:0; cursor:pointer;
      font-weight:1000; color:#fff; box-shadow: var(--soft-shadow);
      transition:.16s transform, .16s filter;
    }
    .btn-top:hover{transform:translateY(-1px); filter:brightness(1.05)}
    .btn-top:active{transform:translateY(1px) scale(.99)}
    .btn-deep{background:linear-gradient(180deg,#315ec6,#27479a); border:3px solid rgba(255,255,255,.34)}
    .btn-yellow{background:linear-gradient(180deg,#ffd650,#ffb81f); color:#703a00; border:3px solid rgba(255,255,255,.4)}

    .layout{
      display:grid;
      grid-template-columns: 310px 1fr 310px;
      gap:16px;
      align-items:start;
    }
    .side-card, .center-card{
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.10));
      border:2px solid rgba(255,255,255,.20);
      border-radius:30px;
      padding:14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .panel-white{
      background:linear-gradient(180deg,#fafdff,#eef8ff);
      color:#16396a;
      border-radius:26px;
      border:4px solid rgba(255,255,255,.86);
      box-shadow:var(--soft-shadow);
      overflow:hidden;
    }
    .ribbon{
      background:linear-gradient(180deg,#47b2ff,#2178f6);
      color:#fff; font-weight:1000; font-size:22px;
      padding:14px 18px; text-align:center;
      position:relative;
      text-shadow:0 2px 0 rgba(0,0,0,.15);
    }
    .ribbon.orange{background:linear-gradient(180deg,#ffbd44,#ff8e1c)}
    .ribbon.purple{background:linear-gradient(180deg,#b38bff,#8f60ff)}

    .info-body{padding:18px 20px}
    .info-grid{display:grid; gap:16px}
    .info-row{display:grid; grid-template-columns:54px 1fr auto; gap:12px; align-items:center}
    .icon-ball{
      width:54px; height:54px; border-radius:50%; display:grid; place-items:center; font-size:26px; color:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,.12)
    }
    .blue-ball{background:linear-gradient(180deg,#58afff,#347bff)}
    .green-ball{background:linear-gradient(180deg,#6edc8b,#33b95c)}
    .purple-ball{background:linear-gradient(180deg,#ba90ff,#8a57ff)}
    .orange-ball{background:linear-gradient(180deg,#ffc55f,#ff9a18)}
    .info-name{font-size:20px; font-weight:900}
    .info-value{font-size:22px; font-weight:1000}
    .rule-list{margin:0; padding:18px 22px 18px 30px; list-style:none; display:grid; gap:16px}
    .rule-list li{position:relative; font-size:18px; line-height:1.45; font-weight:800; color:#16396a}
    .rule-list li::before{content:'⭐'; position:absolute; left:-24px; top:0}
    .helper-box{
      margin:0 16px 16px;
      background:#f7fbff;
      border:3px solid #d7e8ff;
      border-radius:22px;
      padding:16px 18px;
      display:flex; gap:14px; align-items:center;
      font-size:17px; font-weight:900; color:#16396a;
    }
    .helper-char{font-size:52px}

    .center-card{padding:12px}
    .board-shell{
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.08));
      border-radius:30px; padding:14px; border:2px solid rgba(255,255,255,.20);
    }
    .board{
      display:grid; gap:14px; min-height:640px;
      background:linear-gradient(180deg, rgba(12,111,98,.28), rgba(13,66,92,.18));
      border:2px solid rgba(255,255,255,.18);
      border-radius:28px; padding:18px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.05);
    }
    .board.cols-4{grid-template-columns:repeat(4, 1fr)}
    .board.cols-5{grid-template-columns:repeat(5, 1fr)}
    .board.cols-6{grid-template-columns:repeat(6, 1fr)}

    .card{position:relative; height:150px; border:0; background:none; padding:0; cursor:pointer; perspective:1000px}
    .card:disabled{cursor:default}
    .card-inner{position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .45s cubic-bezier(.2,.8,.2,1)}
    .card.flipped .card-inner, .card.matched .card-inner{transform:rotateY(180deg)}
    .card-face{position:absolute; inset:0; border-radius:var(--card-radius); backface-visibility:hidden; overflow:hidden}
    .card-front{
      background:linear-gradient(180deg,#8dd2ff,#44a8ff);
      border:4px solid rgba(255,255,255,.95);
      box-shadow: inset 0 -8px 0 rgba(0,74,180,.18), 0 10px 18px rgba(0,38,120,.18);
      display:grid; place-items:center;
    }
    .card-front::before{content:''; position:absolute; inset:12px; border-radius:18px; background:rgba(255,255,255,.12)}
    .card-front .star-mark{font-size:56px; opacity:.34}
    .card-front .star-mini{position:absolute; font-size:20px; opacity:.28}
    .card-front .star-mini.s1{top:12px; left:14px}
    .card-front .star-mini.s2{top:18px; right:18px}
    .card-front .star-mini.s3{bottom:14px; left:20px}
    .card-back{
      transform:rotateY(180deg);
      background:linear-gradient(180deg,#fff,#f5f9ff);
      border:4px solid rgba(255,255,255,.98);
      box-shadow: inset 0 -8px 0 rgba(0,0,0,.05), 0 10px 18px rgba(0,38,120,.16);
      color:#102f60; display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:8px 14px;
    }
    .card.matched .card-back{background:linear-gradient(180deg,#fffef7,#fff1b8); border-color:#ffe179}
    .card-icon{font-size:40px; line-height:1; margin-bottom:8px}
    .card-text{font-size:clamp(18px,1.6vw,34px); font-weight:1000; text-align:center; line-height:1.15; word-break:break-word}
    .card-kind{margin-top:6px; font-size:13px; font-weight:900; color:#5172a5; background:#e9f4ff; border-radius:999px; padding:4px 10px}

    .right-list{padding:14px}
    .ranking-list, .progress-panel{padding:18px}
    .rank-row{
      display:grid; grid-template-columns:44px 1fr auto; gap:10px; align-items:center;
      background:#f7fbff; border:2px solid #e1efff; border-radius:18px;
      padding:10px 12px; margin-bottom:10px; color:#16396a; font-weight:900;
    }
    .medal{width:38px; height:38px; border-radius:50%; display:grid; place-items:center; color:#fff; font-weight:1000}
    .medal.m1{background:linear-gradient(180deg,#ffd84f,#ffb021)}
    .medal.m2{background:linear-gradient(180deg,#c8d2df,#8b9bb5)}
    .medal.m3{background:linear-gradient(180deg,#ffb98d,#ef7b3a)}
    .medal.m4{background:linear-gradient(180deg,#e9eef8,#b0bfd8); color:#4b6288}
    .stage-dots{display:flex; gap:10px; flex-wrap:wrap; margin:14px 0 18px}
    .stage-dot{width:40px; height:40px; border-radius:50%; display:grid; place-items:center; font-weight:1000; border:3px solid #d6e8ff; background:#eef5ff; color:#4f6d9d}
    .stage-dot.active{background:linear-gradient(180deg,#4c9cff,#1b77ff); color:#fff; border-color:#fff; box-shadow:0 8px 18px rgba(39,104,255,.25)}
    .tip-box{background:#fffaf0; border:3px solid #ffecb2; border-radius:20px; padding:16px 16px 14px; color:#6b5214; font-weight:900}

    .bottom-actions{display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; margin-top:14px}
    .action-btn{
      border:0; cursor:pointer; border-radius:26px; min-height:108px; padding:10px 18px; color:#fff; font-weight:1000;
      box-shadow: var(--shadow); position:relative; overflow:hidden;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
      transition:.15s transform, .15s filter, .15s opacity;
      text-align:center;
    }
    .action-btn:hover{transform:translateY(-2px); filter:brightness(1.03)}
    .action-btn:active{transform:translateY(1px) scale(.99)}
    .action-btn[disabled]{opacity:.45; cursor:not-allowed; filter:none; transform:none}
    .action-btn .icon{font-size:34px}
    .action-btn .big{font-size: clamp(18px, 2vw, 34px); line-height:1; font-weight:1000}
    .action-btn .small{font-size: clamp(14px, 1vw, 20px); opacity:.96}
    .green-grad{background:linear-gradient(180deg,#75df7c,#33ba5b)}
    .yellow-grad{background:linear-gradient(180deg,#ffd54a,#ffb10b); color:#7a4300}
    .purple-grad{background:linear-gradient(180deg,#b994ff,#8e5cff)}
    .blue-grad{background:linear-gradient(180deg,#57b2ff,#1f86ff)}

    .toast{
      position:fixed; left:50%; top:24px; transform:translateX(-50%) translateY(-120%);
      background:linear-gradient(180deg,#fffef6,#fff0b3); color:#6b4c08; font-weight:1000;
      padding:16px 24px; border-radius:22px; border:4px solid #fff; box-shadow:var(--shadow); z-index:80;
      transition:.35s transform; text-align:center; min-width:min(520px, 94vw);
    }
    .toast.show{transform:translateX(-50%) translateY(0)}
    .toast .toast-big{font-size:30px}
    .toast .toast-sub{font-size:18px; margin-top:4px}

    .overlay{
      position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding:20px; z-index:90;
      background:rgba(7,25,88,.58); backdrop-filter: blur(6px);
    }
    .overlay.show{display:flex}
    .modal{
      width:min(920px, 96vw); border-radius:32px; overflow:hidden; color:#16396a;
      background:linear-gradient(180deg,#fafdff,#ebf7ff); border:4px solid rgba(255,255,255,.94); box-shadow:0 28px 80px rgba(0,0,0,.25)
    }
    .modal-header{
      padding:22px 28px; background:linear-gradient(180deg,#4fb5ff,#1a77ff); color:#fff; text-align:center;
      text-shadow:0 2px 0 rgba(0,0,0,.16)
    }
    .modal-title{font-size: clamp(32px, 4vw, 58px); font-weight:1000; margin:0}
    .modal-sub{margin-top:8px; font-size:18px; font-weight:900}
    .modal-body{padding:22px 24px}
    .winner-grid{display:grid; gap:12px; margin-bottom:18px}
    .winner-item{display:grid; grid-template-columns:50px 1fr auto; gap:12px; align-items:center; padding:16px; border:3px solid #ddecff; background:#fff; border-radius:22px; font-weight:1000}
    .modal-actions{display:flex; justify-content:center; gap:12px; flex-wrap:wrap; padding:0 0 24px}
    .modal-btn{border:0; border-radius:22px; padding:14px 22px; font-size:20px; font-weight:1000; cursor:pointer; box-shadow:var(--soft-shadow)}
    .modal-btn.primary{background:linear-gradient(180deg,#6bdd80,#37be5e); color:#fff}
    .modal-btn.secondary{background:linear-gradient(180deg,#5bb3ff,#2287ff); color:#fff}
    .modal-btn.light{background:linear-gradient(180deg,#f5f7fb,#dce7f8); color:#234171}

    .settings-overlay{position:fixed; inset:0; display:none; align-items:center; justify-content:center; padding:18px; z-index:95; background:rgba(7,25,88,.62); backdrop-filter: blur(7px)}
    .settings-overlay.show{display:flex}
    .settings-modal{width:min(980px, 96vw); max-height:92vh; overflow:auto; background:#f8fcff; color:#12305f; border-radius:30px; border:4px solid #fff; box-shadow:0 28px 80px rgba(0,0,0,.25)}
    .settings-head{padding:18px 24px; background:linear-gradient(180deg,#4fb5ff,#1a77ff); color:#fff}
    .settings-head h2{margin:0; font-size:34px}
    .settings-grid{padding:22px; display:grid; grid-template-columns:1fr 1fr; gap:16px}
    .settings-grid .full{grid-column:1 / -1}
    .settings-grid label{display:block; font-weight:1000; font-size:15px; margin-bottom:7px}
    .settings-grid textarea{min-height:200px; resize:vertical}
    .settings-row{display:grid; grid-template-columns:1fr 1fr; gap:14px}
    .setting-actions{display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; padding:0 22px 24px}
    .ghost-btn, .solid-btn{border:0; border-radius:18px; padding:13px 18px; cursor:pointer; font-weight:1000; box-shadow:var(--soft-shadow)}
    .ghost-btn{background:#eaf2ff; color:#274a86}
    .solid-btn{background:linear-gradient(180deg,#71dd80,#31b85b); color:#fff}
    .danger-btn{background:linear-gradient(180deg,#ff8a8a,#ff5a5a); color:#fff}

    .hint-glow{animation:glow 1.1s ease-in-out 3}
    @keyframes glow{0%,100%{box-shadow:0 0 0 rgba(255,216,79,0)}50%{box-shadow:0 0 0 10px rgba(255,216,79,.25)}}
    .bounce{animation:bounce .5s ease}
    @keyframes bounce{0%{transform:scale(.8)}60%{transform:scale(1.04)}100%{transform:scale(1)}}

    @media (max-width: 1280px){
      .layout{grid-template-columns:280px 1fr 280px}
      .card{height:132px}
      .board{min-height:560px}
    }
    @media (max-width: 1100px){
      .layout{grid-template-columns:1fr}
      .board{min-height:auto}
      .bottom-actions{grid-template-columns: repeat(2,1fr)}
    }
    @media (max-width: 760px){
      .topbar{grid-template-columns:1fr}
      .hero{flex-direction:column; align-items:flex-start}
      .top-controls{justify-content:flex-start}
      .board.cols-4, .board.cols-5, .board.cols-6{grid-template-columns:repeat(3,1fr)}
      .card{height:110px}
      .settings-grid, .settings-row, .bottom-actions{grid-template-columns:1fr}
      .pill{min-height:56px}
      .btn-top{min-height:56px}
    }
  

    /* === Safe full-screen stage: keep 16:9 / 4:3 visible without cropping === */
    html, body { width:100%; height:100%; overflow:hidden; }
    .app{
      position:absolute; left:0; top:0; margin:0; max-width:none; width:1600px; height:900px;
      padding:10px; transform-origin:0 0; display:grid; grid-template-rows:auto minmax(0,1fr); gap:8px;
    }
    .topbar{margin-bottom:0; min-height:0; gap:8px;}
    .hero{padding:8px 12px; min-height:88px;}
    .code-badge{font-size:52px;}
    .title-main{font-size:54px;}
    .title-sub{font-size:18px; padding:6px 14px; margin-top:4px;}
    .sparkles{font-size:20px;}
    .pill, .btn-top{min-height:50px; padding:7px 11px; border-radius:18px;}
    .pill .value{font-size:26px;}
    .pill .small{font-size:12px;}
    .layout{height:100%; min-height:0; grid-template-columns:285px minmax(0,1fr) 285px; gap:10px; overflow:hidden;}
    .side-card, .center-card{height:100%; min-height:0; overflow:hidden; padding:8px; border-radius:24px;}
    .center-card{display:grid; grid-template-rows:minmax(0,1fr) auto; gap:8px;}
    .panel-white{border-radius:20px;}
    .ribbon{font-size:18px; padding:9px 12px;}
    .info-body{padding:10px 12px;}
    .info-grid{gap:8px;}
    .info-row{grid-template-columns:38px 1fr auto; gap:7px;}
    .icon-ball{width:38px; height:38px; font-size:18px;}
    .info-name{font-size:16px;}
    .info-value{font-size:17px;}
    .rule-list{padding:10px 14px 10px 28px; gap:8px;}
    .rule-list li{font-size:14px; line-height:1.25;}
    .helper-box{margin:0 8px 8px; padding:8px 10px; font-size:13px; border-radius:16px; gap:8px;}
    .helper-char{font-size:34px;}
    .ranking-list, .progress-panel{padding:10px;}
    .rank-row{grid-template-columns:32px 1fr auto; gap:7px; padding:7px 8px; border-radius:14px; margin-bottom:6px;}
    .rank-row .medal{width:28px; height:28px; font-size:13px;}
    .rank-row div[style*="font-size:20px"]{font-size:15px !important;}
    .rank-row div[style*="font-size:18px"]{font-size:14px !important;}
    .stage-dots{gap:6px; margin:8px 0 10px;}
    .stage-dot{width:28px; height:28px; font-size:13px; border-width:2px;}
    .tip-box{padding:10px; border-radius:16px; font-size:13px;}
    .board-shell{height:100%; min-height:0; padding:8px; border-radius:24px;}
    .board{height:100%; min-height:0; padding:10px; gap:9px; grid-auto-rows:minmax(0,1fr); border-radius:22px;}
    .card{height:100%; min-height:0;}
    .card-face{border-radius:18px;}
    .card-front .star-mark{font-size:40px;}
    .card-icon{font-size:28px; margin-bottom:4px;}
    .card-text{font-size:clamp(16px, 1.35vw, 24px);}
    .card-kind{font-size:11px; padding:2px 7px;}
    .bottom-actions{margin-top:0; gap:8px;}
    .action-btn{min-height:70px; padding:5px 8px; border-radius:20px;}
    .action-btn .icon{font-size:24px;}
    .action-btn .big{font-size:20px;}
    .action-btn .small{font-size:13px;}
    .settings-modal{max-height:86vh;}

    body.ratio-43 .app{width:1200px; height:900px;}
    body.ratio-43 .topbar{grid-template-columns:1fr; gap:6px;}
    body.ratio-43 .top-controls{gap:6px;}
    body.ratio-43 .hero{min-height:64px; padding:7px 10px;}
    body.ratio-43 .code-badge{font-size:40px;}
    body.ratio-43 .title-main{font-size:42px;}
    body.ratio-43 .title-sub{font-size:14px; padding:5px 10px;}
    body.ratio-43 .pill, body.ratio-43 .btn-top{min-height:42px; padding:5px 8px; border-radius:14px;}
    body.ratio-43 .pill .value{font-size:20px;}
    body.ratio-43 .layout{grid-template-columns:235px minmax(0,1fr) 235px; gap:7px;}
    body.ratio-43 .side-card, body.ratio-43 .center-card{padding:6px; border-radius:20px;}
    body.ratio-43 .ribbon{font-size:15px; padding:7px 8px;}
    body.ratio-43 .info-body{padding:8px;}
    body.ratio-43 .info-row{grid-template-columns:30px 1fr auto; gap:5px;}
    body.ratio-43 .icon-ball{width:30px; height:30px; font-size:15px;}
    body.ratio-43 .info-name{font-size:13px;}
    body.ratio-43 .info-value{font-size:14px;}
    body.ratio-43 .rule-list{gap:6px; padding:8px 9px 8px 24px;}
    body.ratio-43 .rule-list li{font-size:12px;}
    body.ratio-43 .helper-box{font-size:11px; padding:6px 8px;}
    body.ratio-43 .helper-char{font-size:28px;}

function saveLocal(){
  const data = {
    lang: state.lang,
    ratio: state.ratio,
    stageCount: state.stageCount,
    teamCount: state.teamCount,
    timerLimit: state.timerLimit,
    totalPairs: state.totalPairs,
    correctTurn: state.correctTurn,
    wrongTurn: state.wrongTurn,
    teamNames: state.teamNames,
    bankText: state.bankText
  };
  localStorage.setItem('s001_memory_match_v2', JSON.stringify(data));
}

function loadLocal(){
  const raw = localStorage.getItem('s001_memory_match_v2');
  if(raw){
    try{
      const d = JSON.parse(raw);
      state.lang = d.lang || 'zh';
      state.ratio = d.ratio || '16:9';
      state.stageCount = Number(d.stageCount || 5);
      state.teamCount = Number(d.teamCount || 2);
      state.timerLimit = Number(d.timerLimit ?? 300);
      state.totalPairs = Number(d.totalPairs || 8);
      state.correctTurn = d.correctTurn || 'stay';
      state.wrongTurn = d.wrongTurn || 'next';
      state.teamNames = (d.teamNames && String(d.teamNames).trim()) ? String(d.teamNames).trim() : I18N[state.lang].teamDefaults;
      state.bankText = d.bankText || I18N[state.lang].sampleBank;
      return;
    }catch(e){}
  }
  state.teamNames = I18N[state.lang].teamDefaults;
  state.bankText = I18N[state.lang].sampleBank;
}

function populateOptionSelect(select, items, values){
  select.innerHTML = '';
  items.forEach((txt,i)=>{
    const op = document.createElement('option');
    if(Array.isArray(txt)){
      op.value = txt[0]; op.textContent = txt[1];
    } else {
      op.value = values ? values[i] : (i+2).toString();
      op.textContent = txt;
    }
    select.appendChild(op);
  });
}


function ensureRecommendedSettingsDefaults(){
  const opts = t('options');
  const fallback = {
    zh:{
      teamCount:[['2','2组'],['3','3组'],['4','4组']],
      stageCount:[['3','3关'],['4','4关'],['5','5关'],['6','6关']],
      timeLimit:[['0','不限时'],['180','3分钟'],['300','5分钟'],['480','8分钟'],['600','10分钟']],
      pairCount:[['6','6组 / 12张'],['8','8组 / 16张'],['10','10组 / 20张'],['12','12组 / 24张']],
      afterCorrect:[['stay','继续作答'],['next','换下一组']],
      afterWrong:[['next','换下一组'],['stay','继续作答']]
    },
    en:{
      teamCount:[['2','2 Teams'],['3','3 Teams'],['4','4 Teams']],
      stageCount:[['3','3 Stages'],['4','4 Stages'],['5','5 Stages'],['6','6 Stages']],
      timeLimit:[['0','No limit'],['180','3 min'],['300','5 min'],['480','8 min'],['600','10 min']],
      pairCount:[['6','6 pairs / 12 cards'],['8','8 pairs / 16 cards'],['10','10 pairs / 20 cards'],['12','12 pairs / 24 cards']],
      afterCorrect:[['stay','Same team continues'],['next','Next team']],
      afterWrong:[['next','Next team'],['stay','Same team continues']]
    },
    ms:{
      teamCount:[['2','2 Kumpulan'],['3','3 Kumpulan'],['4','4 Kumpulan']],
      stageCount:[['3','3 Peringkat'],['4','4 Peringkat'],['5','5 Peringkat'],['6','6 Peringkat']],
      timeLimit:[['0','Tiada had'],['180','3 minit'],['300','5 minit'],['480','8 minit'],['600','10 minit']],
      pairCount:[['6','6 pasangan / 12 kad'],['8','8 pasangan / 16 kad'],['10','10 pasangan / 20 kad'],['12','12 pasangan / 24 kad']],
      afterCorrect:[['stay','Kumpulan sama teruskan'],['next','Kumpulan seterusnya']],
      afterWrong:[['next','Kumpulan seterusnya'],['stay','Kumpulan sama teruskan']]
    }
  };
  const langSet = fallback[state.lang] || fallback.zh;
  function pairsFrom(maybeList, fallbackPairs, values){
    if(!Array.isArray(maybeList)) return fallbackPairs;
    return maybeList.map((item,i)=>Array.isArray(item) ? item : [values ? values[i] : String(i), item]);
  }
  const lists = {
    teamCount: pairsFrom(opts && opts.teamCount, langSet.teamCount, ['2','3','4']),
    stageCount: pairsFrom(opts && opts.stageCount, langSet.stageCount, ['3','4','5','6']),
    timeLimit: pairsFrom(opts && opts.timeLimit, langSet.timeLimit),
    pairCount: pairsFrom(opts && opts.pairCount, langSet.pairCount),
    correctTurn: pairsFrom(opts && opts.afterCorrect, langSet.afterCorrect),
    wrongTurn: pairsFrom(opts && opts.afterWrong, langSet.afterWrong)
  };
  function fill(id, pairs, value){
    const sel = $(id);
    if(!sel) return;
    const current = String(value);
    sel.innerHTML = pairs.map(([v,txt])=>`<option value="${String(v).replace(/"/g,'&quot;')}">${String(txt)}</option>`).join('');
    sel.value = current;
    if(sel.selectedIndex < 0 && sel.options.length){
      sel.selectedIndex = 0;
    }
  }

  state.teamCount = [2,3,4].includes(Number(state.teamCount)) ? Number(state.teamCount) : 2;
  state.stageCount = [3,4,5,6].includes(Number(state.stageCount)) ? Number(state.stageCount) : 5;
  state.timerLimit = [0,180,300,480,600].includes(Number(state.timerLimit)) ? Number(state.timerLimit) : 300;
  state.totalPairs = [6,8,10,12].includes(Number(state.totalPairs)) ? Number(state.totalPairs) : 8;
  state.correctTurn = ['stay','next'].includes(state.correctTurn) ? state.correctTurn : 'stay';
  state.wrongTurn = ['next','stay'].includes(state.wrongTurn) ? state.wrongTurn : 'next';
  state.teamNames = (state.teamNames && state.teamNames.trim()) ? state.teamNames : t('teamDefaults');
  state.bankText = (state.bankText && state.bankText.trim()) ? state.bankText : t('sampleBank');

  fill('teamCountInput', lists.teamCount, state.teamCount);
  fill('stageCountInput', lists.stageCount, state.stageCount);
  fill('timeLimitInput', lists.timeLimit, state.timerLimit);
  fill('pairCountInput', lists.pairCount, state.totalPairs);
  fill('correctTurnInput', lists.correctTurn, state.correctTurn);
  fill('wrongTurnInput', lists.wrongTurn, state.wrongTurn);

  if($('teamNamesInput') && !$('teamNamesInput').value.trim()) $('teamNamesInput').value = (state.teamNames && String(state.teamNames).trim()) ? state.teamNames : t('teamDefaults');
  if($('bankInput') && !$('bankInput').value.trim()) $('bankInput').value = state.bankText;
}

}

function parseBank(text){
  return text.split(/\r?\n/).map(x=>x.trim()).filter(Boolean).map(line=>{
    let parts = line.split(/[,|\t]/).map(s=>s.trim());
    const left = parts[0] || ''; const right = parts.slice(1).join(',').trim();
    return {left,right};
  }).filter(x=>x.left && x.right);
}

function prepareTeams(){
  const rawNames = (state.teamNames || t('teamDefaults')).split(',').map(s=>s.trim()).filter(Boolean);
  const defaults = t('teamDefaults').split(',');
  state.teams = Array.from({length:state.teamCount}, (_,i)=>(
    {
      name: rawNames[i] || defaults[i] || `${t('teamType')} ${i+1}`,
      emoji: t('teamEmoji')[i] || '👥',
      score: 0,
      matches: 0,
      attempts: 0
    }
  ));
  state.currentTeam = 0;
}

function resetHelpUses(){ state.helpUses = { reveal:3, hint:2, reshuffle:1, skip:1 }; }

function iconForText(text){
  const key = String(text || '').trim().toLowerCase();
  return ICON_MAP[key] || '';
}

function choosePairsForStage(){
  const pool = parseBank(state.bankText);
  if(pool.length < 6) return null;
  const shuffled = shuffle(pool);
  return shuffled.slice(0, Math.min(state.totalPairs, pool.length));
}

function buildStageCards(){
  const pairs = choosePairsForStage();
  if(!pairs) return false;
  state.stagePairPool = pairs;
  const cards = [];
  pairs.forEach((pair, idx)=>{
    cards.push({ uid:`${idx}-a`, matchId:`m-${idx}`, text:pair.left, kindKey:'kindA', matched:false, icon:iconForText(pair.left)});
    cards.push({ uid:`${idx}-b`, matchId:`m-${idx}`, text:pair.right, kindKey:'kindB', matched:false, icon:iconForText(pair.right)});
  });
  state.cards = shuffle(cards);
  state.matchedPairs = 0;
  state.openedCount = 0;
  state.flipped = [];
  state.locked = false;
  return true;
}

function getCols(){
  const n = state.cards.length;
  if(n <= 16) return 4;
  if(n <= 20) return 5;
  return 6;
}

function renderBoard(){
  const board = $('board');
  board.className = `board cols-${getCols()}`;
  board.innerHTML = '';
  state.cards.forEach(card=>{
    const btn = document.createElement('button');
    btn.className = `card ${card.matched ? 'matched':''}`;
    if(card.flipped) btn.classList.add('flipped');
    btn.dataset.uid = card.uid;
    btn.disabled = !state.running || card.matched;
    btn.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="star-mini s1">⭐</div>
          <div class="star-mini s2">⭐</div>
          <div class="star-mini s3">⭐</div>
          <div class="star-mark">★</div>
        </div>
        <div class="card-face card-back">
          <div class="card-icon">${card.icon || '📘'}</div>
          <div class="card-text">${escapeHtml(card.text)}</div>
          <div class="card-kind">${escapeHtml(t(card.kindKey || "kindA"))}</div>
        </div>
      </div>`;
    btn.addEventListener('click', ()=>flipCard(card.uid));
    board.appendChild(btn);
  });
}

function updateInfoPanel(){
  $('stageValue').textContent = `${state.stage} / ${state.stageCount}`;
  $('currentTeamName').textContent = state.teams[state.currentTeam] ? `${state.teams[state.currentTeam].emoji} ${state.teams[state.currentTeam].name}` : '--';
  $('openedValue').textContent = state.openedCount;
  $('matchedValue').textContent = `${state.matchedPairs} / ${state.totalPairs}`;
  const totalScore = state.teams.reduce((sum, t)=> sum + t.score, 0);
  $('scoreText').textContent = totalScore;
  $('currentStageText').textContent = format(t('currentStageText'), {current: state.stage, total: state.stageCount});
  $('tipText').textContent = t('tips')[(state.stage-1) % t('tips').length];
}

function renderRanking(){
  const sorted = [...state.teams].sort((a,b)=> b.score-a.score || a.attempts-b.attempts);
  $('rankingList').innerHTML = sorted.map((team, idx)=>{
    const medalClass = ['m1','m2','m3','m4'][idx] || 'm4';
    return `<div class="rank-row">
      <div class="medal ${medalClass}">${idx+1}</div>
      <div>
        <div style="font-size:20px">${team.emoji} ${escapeHtml(team.name)}</div>
        <div style="font-size:13px; color:#5271a4; margin-top:2px">${t('matchCount')}: ${team.matches} · ${t('attempts')}: ${team.attempts}</div>
      </div>
      <div style="font-size:18px">${team.score} ${t('rankScore')}</div>
    </div>`;
  }).join('');
}

function updateProgressPanel(){
  $('stageDots').innerHTML = Array.from({length: state.stageCount}, (_,i)=>{
    const n = i+1;
    return `<div class="stage-dot ${n===state.stage?'active':''}">${n}</div>`;
  }).join('');
}

function updateActionButtons(){
  $('revealBtnTitle').textContent = t('revealBtnTitle');
  $('revealBtnCount').textContent = format(t('revealBtnCount'), {count: state.helpUses.reveal});
  $('hintBtnTitle').textContent = t('hintBtnTitle');
  $('hintBtnCount').textContent = format(t('hintBtnCount'), {count: state.helpUses.hint});
  $('reshuffleBtnTitle').textContent = t('reshuffleBtnTitle');
  $('reshuffleBtnCount').textContent = format(t('reshuffleBtnCount'), {count: state.helpUses.reshuffle});
  $('skipBtnTitle').textContent = t('skipBtnTitle');
  $('skipBtnCount').textContent = format(t('skipBtnCount'), {count: state.helpUses.skip});
  $('revealBtn').disabled = state.helpUses.reveal <= 0 || !state.running || state.locked;
  $('hintBtn').disabled = state.helpUses.hint <= 0 || !state.running || state.locked;
  $('reshuffleBtn').disabled = state.helpUses.reshuffle <= 0 || !state.running || state.locked;
  $('skipBtn').disabled = state.helpUses.skip <= 0 || !state.running || state.locked;
}

function startTimer(){
  stopTimer();
  state.secondsLeft = state.timerLimit;
  updateTimerText();
  if(state.timerLimit === 0) return;
  state.timerId = setInterval(()=>{
    state.secondsLeft--;
    updateTimerText();
    if(state.secondsLeft <= 0){
      stopTimer();
      finishStage(false, 'time');
    }
  }, 1000);
}

function stopTimer(){ if(state.timerId){ clearInterval(state.timerId); state.timerId = null; } }
function updateTimerText(){
  if(state.timerLimit === 0){ $('timerText').textContent = '∞'; return; }
  const sec = Math.max(state.secondsLeft, 0);
  const m = String(Math.floor(sec/60)).padStart(2,'0');
  const s = String(sec%60).padStart(2,'0');
  $('timerText').textContent = `${m}:${s}`;
}

function startGame(resetTeams=true){
  if(resetTeams) prepareTeams();
  if(!buildStageCards()){
    alert(t('needPairs')); return;
  }
  state.running = true;
  state.flipped = [];
  state.locked = false;
  resetHelpUses();
  startTimer();
  renderBoard();
  renderRanking();
  updateProgressPanel();
  updateInfoPanel();
  updateActionButtons();
  state.gameStartedOnce = true;
}

function restartAll(){
  if(state.gameStartedOnce && !confirm(t('askRestart'))) return;
  stopTimer();
  state.stage = 1;
  prepareTeams();
  startGame(true);
}

function flipCard(uid){
  if(!state.running || state.locked) return;
  const card = state.cards.find(c=>c.uid===uid);
  if(!card || card.matched || card.flipped) return;
  if(state.flipped.length >= 2) return;
  card.flipped = true;
  state.flipped.push(card);
  state.openedCount++;
  renderBoard();
  updateInfoPanel();
  beep('flip');
  if(state.flipped.length === 2) checkMatch();
}

function checkMatch(){
  state.locked = true;
  const [a,b] = state.flipped;
  const team = state.teams[state.currentTeam];
  team.attempts++;
  if(a.matchId === b.matchId && a.uid !== b.uid){
    a.matched = b.matched = true;
    team.score += 1;
    team.matches += 1;
    state.matchedPairs += 1;
    showToast(true, team.name);
    beep('success');
    setTimeout(()=>{
      state.flipped = [];
      state.locked = false;
      if(state.correctTurn === 'next') nextTeam();
      renderBoard();
      renderRanking();
      updateInfoPanel();
      updateActionButtons();
      if(state.matchedPairs >= state.totalPairs) finishStage(true, 'matched');
    }, 650);
  } else {
    showToast(false);
    beep('wrong');
    setTimeout(()=>{
      a.flipped = false; b.flipped = false;
      state.flipped = [];
      state.locked = false;
      if(state.wrongTurn === 'next') nextTeam();
      renderBoard();
      renderRanking();
      updateInfoPanel();
      updateActionButtons();
    }, 950);
  }
}

function nextTeam(){
  state.currentTeam = (state.currentTeam + 1) % state.teams.length;
  updateInfoPanel();
  renderRanking();
}

function finishStage(cleared, reason){
  state.running = false;
  state.locked = true;
  stopTimer();
  renderBoard();
  renderRanking();
  updateInfoPanel();
  updateActionButtons();

  const sorted = [...state.teams].sort((a,b)=> b.score-a.score || a.attempts-b.attempts);
  $('winnerGrid').innerHTML = sorted.map((team, idx)=>`
    <div class="winner-item">
      <div class="medal ${['m1','m2','m3','m4'][idx] || 'm4'}">${idx+1}</div>
      <div>
        <div style="font-size:22px">${team.emoji} ${escapeHtml(team.name)}</div>
        <div style="font-size:14px; color:#5879a9; margin-top:4px">${t('totalScore')}: ${team.score} · ${t('matchCount')}: ${team.matches} · ${t('attempts')}: ${team.attempts}</div>
      </div>
      <div style="font-size:20px">${team.score} ${t('rankScore')}</div>
    </div>`).join('');

  const finalStage = state.stage >= state.stageCount;
  const title = finalStage ? t('finalClear') : t('stageClear');
  const sub = finalStage ? t('finalClearSub') : t('stageClearSub');
  $('modalTitle').textContent = title;
  $('modalSub').textContent = sub;
  $('nextStageBtn').style.display = finalStage ? 'none' : 'inline-block';
  $('stageModalOverlay').classList.add('show');
  beep('stage');
}

function showToast(success, team=''){
  $('toastBig').textContent = success ? t('toastSuccess') : t('toastNoMatch');
  $('toastSub').textContent = success ? format(t('toastSuccessSub'), {team}) : t('toastNoMatchSub');
  $('toast').classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=> $('toast').classList.remove('show'), 1200);
}

function revealAll(){
  if(state.helpUses.reveal <= 0 || !state.running || state.locked) return showToast(false), $('toastSub').textContent=t('noMoreHelp');
  state.helpUses.reveal--;
  const affected = state.cards.filter(c=>!c.matched);
  affected.forEach(c=>c.flipped = true);
  renderBoard(); updateActionButtons();
  setTimeout(()=>{
    state.cards.filter(c=>!c.matched).forEach(c=>c.flipped = false);
    renderBoard();
  }, 1600);
}

function hintPair(){
  if(state.helpUses.hint <= 0 || !state.running || state.locked) return showToast(false), $('toastSub').textContent=t('noMoreHelp');
  state.helpUses.hint--;
  const unmatched = state.cards.filter(c=>!c.matched);
  const seen = new Map(); let pair = [];
  for(const c of unmatched){
    if(seen.has(c.matchId)){ pair=[seen.get(c.matchId), c]; break; }
    seen.set(c.matchId, c);
  }
  if(pair.length){
    pair.forEach(c=> bySel(`[data-uid="${c.uid}"]`)?.classList.add('hint-glow'));
    setTimeout(()=> pair.forEach(c=> bySel(`[data-uid="${c.uid}"]`)?.classList.remove('hint-glow')), 2600);
  }
  updateActionButtons();
}

function reshuffleRemaining(){
  if(state.helpUses.reshuffle <= 0 || !state.running || state.locked) return showToast(false), $('toastSub').textContent=t('noMoreHelp');
  state.helpUses.reshuffle--;
  const matched = state.cards.filter(c=>c.matched);
  const unmatched = shuffle(state.cards.filter(c=>!c.matched).map(c=>({...c, flipped:false})));
  const result = [];
  let u=0, m=0;
  state.cards.forEach(c=>{ result.push(c.matched ? matched[m++] : unmatched[u++]); });
  state.cards = result;
  state.flipped = []; state.locked = false;
  renderBoard(); updateActionButtons(); beep('flip');
}

function skipTurn(){
  if(state.helpUses.skip <= 0 || !state.running || state.locked) return showToast(false), $('toastSub').textContent=t('noMoreHelp');
  state.helpUses.skip--;
  state.flipped.forEach(c=>c.flipped=false);
  state.flipped = [];
  nextTeam();
  renderBoard(); updateActionButtons();
}

function openSettings(){
  syncStateToSettings();
  $('settingsOverlay').classList.add('show');
}
function closeSettings(){ $('settingsOverlay').classList.remove('show'); }

function syncStateToSettings(){
  ensureRecommendedSettingsDefaults();
  $('teamCountInput').value = String(state.teamCount);
  $('stageCountInput').value = String(state.stageCount);
  $('timeLimitInput').value = String(state.timerLimit);
  $('pairCountInput').value = String(state.totalPairs);
  $('correctTurnInput').value = state.correctTurn;
  $('wrongTurnInput').value = state.wrongTurn;
  $('teamNamesInput').value = (state.teamNames && String(state.teamNames).trim()) ? state.teamNames : t('teamDefaults');
  $('bankInput').value = state.bankText;
}

function applySettingsFromForm(){
  state.teamCount = Number($('teamCountInput').value);
  state.stageCount = Number($('stageCountInput').value);
  state.timerLimit = Number($('timeLimitInput').value);
  state.totalPairs = Number($('pairCountInput').value);
  state.correctTurn = $('correctTurnInput').value;
  state.wrongTurn = $('wrongTurnInput').value;
  state.teamNames = $('teamNamesInput').value.trim() || t('teamDefaults');
  state.bankText = $('bankInput').value.trim() || t('sampleBank');
  saveLocal();
  closeSettings();
  state.stage = 1;
  prepareTeams();
  startGame(true);
}

function exportTxt(){
  const blob = new Blob([state.bankText], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'S001-memory-match-bank.txt'; a.click();
  URL.revokeObjectURL(url);
}

function importTxt(file){
  const reader = new FileReader();
  reader.onload = ()=>{ $('bankInput').value = String(reader.result || ''); };
  reader.readAsText(file, 'utf-8');
}

function nextStage(){
  $('stageModalOverlay').classList.remove('show');
  state.stage += 1;
  startGame(false);
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function beep(type){ try{ const AC = window.AudioContext || window.webkitAudioContext; const ctx = new AC(); const osc = ctx.createOscillator(); const gain=ctx.createGain(); const now=ctx.currentTime; const map={ flip:[600,.04], success:[900,.12], wrong:[180,.12], stage:[680,.2]}; const [f,d]=map[type]||map.flip; osc.frequency.setValueAtTime(f,now); if(type==='success'||type==='stage') osc.frequency.exponentialRampToValueAtTime(f*1.35, now+d); if(type==='wrong') osc.frequency.exponentialRampToValueAtTime(110, now+d); gain.gain.setValueAtTime(.001,now); gain.gain.exponentialRampToValueAtTime(.1,now+.01); gain.gain.exponentialRampToValueAtTime(.001,now+d); osc.connect(gain); gain.connect(ctx.destination); osc.start(now); osc.stop(now+d+.02); setTimeout(()=>ctx.close(), (d+.1)*1000);}catch(e){} }

function fitStageToScreen(){
  const app = document.querySelector('.app');
  const mode = state.ratio || '16:9';
  let design = {w:1600, h:900};
  if(mode === '4:3') design = {w:1200, h:900};
  if(mode === '3:4') design = {w:900, h:1200};
  if(mode === '9:16') design = {w:900, h:1600};

  document.body.classList.toggle('ratio-43', mode === '4:3');
  document.body.classList.toggle('ratio-169', mode === '16:9');
  document.body.classList.toggle('ratio-34', mode === '3:4');
  document.body.classList.toggle('ratio-916', mode === '9:16');

  app.style.width = design.w + 'px';
  app.style.height = design.h + 'px';
  const scale = Math.min(window.innerWidth / design.w, window.innerHeight / design.h);
  const left = Math.max(0, (window.innerWidth - design.w * scale) / 2);
  const top = Math.max(0, (window.innerHeight - design.h * scale) / 2);
  app.style.transform = `translate(${left}px, ${top}px) scale(${scale})`;
}

window.addEventListener('resize', fitStageToScreen);
window.addEventListener('orientationchange', ()=> setTimeout(fitStageToScreen, 150));
document.addEventListener('fullscreenchange', ()=> setTimeout(fitStageToScreen, 80));

function bindEvents(){
  $('langSelect').addEventListener('change', ()=>{
    const priorTeamNames = state.teams.map(x=>x.name).join(',');
    state.lang = $('langSelect').value;
    if(!state.bankText || state.bankText === '' || state.bankText === I18N.zh.sampleBank || state.bankText===I18N.en.sampleBank || state.bankText===I18N.ms.sampleBank){ state.bankText = t('sampleBank'); }
    const usedDefaultNames = !state.teamNames || state.teamNames===I18N.zh.teamDefaults || state.teamNames===I18N.en.teamDefaults || state.teamNames===I18N.ms.teamDefaults || priorTeamNames===I18N.zh.teamDefaults || priorTeamNames===I18N.en.teamDefaults || priorTeamNames===I18N.ms.teamDefaults;
    if(usedDefaultNames){
      state.teamNames = t('teamDefaults');
      const defs = t('teamDefaults').split(',');
      state.teams.forEach((team, i)=>{ if(team) team.name = defs[i] || team.name; team.emoji = t('teamEmoji')[i] || team.emoji; });
    }
    applyLanguage();
  });
  $('settingsBtn').addEventListener('click', openSettings);
  $('cancelSettingsBtn').addEventListener('click', closeSettings);
  $('applySettingsBtn').addEventListener('click', ()=>{ state.bankText = $('bankInput').value; applySettingsFromForm(); });
  $('loadSampleBtn').addEventListener('click', ()=>{ $('bankInput').value = t('sampleBank'); });
  $('exportTxtBtn').addEventListener('click', ()=>{ state.bankText = $('bankInput').value || state.bankText; exportTxt(); });
  $('importTxtFile').addEventListener('change', e=>{ const file = e.target.files?.[0]; if(file) importTxt(file); e.target.value=''; });
  $('restartBtn').addEventListener('click', restartAll);
  $('fullscreenBtn').addEventListener('click', async ()=>{ 
    if(!document.fullscreenElement) await document.documentElement.requestFullscreen?.();
    else await document.exitFullscreen?.();
    setTimeout(fitStageToScreen, 80);
  });
  $('ratioSelect').addEventListener('change', ()=>{
    state.ratio = $('ratioSelect').value;
    saveLocal();
    fitStageToScreen();
  });
  $('revealBtn').addEventListener('click', revealAll);
  $('hintBtn').addEventListener('click', hintPair);
  $('reshuffleBtn').addEventListener('click', reshuffleRemaining);
  $('skipBtn').addEventListener('click', skipTurn);
  $('nextStageBtn').addEventListener('click', nextStage);
  $('playAgainBtn').addEventListener('click', ()=>{ $('stageModalOverlay').classList.remove('show'); state.stage = 1; prepareTeams(); startGame(true); });
  $('closeStageModalBtn').addEventListener('click', ()=> $('stageModalOverlay').classList.remove('show'));
  $('settingsOverlay').addEventListener('click', (e)=>{ if(e.target === $('settingsOverlay')) closeSettings(); });
  $('stageModalOverlay').addEventListener('click', (e)=>{ if(e.target === $('stageModalOverlay')) $('stageModalOverlay').classList.remove('show'); });
}

function init(){
  loadLocal();
  bindEvents();
  applyLanguage();
  prepareTeams();
  syncStateToSettings();
  startGame(true);
  fitStageToScreen();
}

init();
</script>

        const s = t('sampleBank');
        if(s && s !== 'sampleBank') return s;
      }
    }catch(e){}
    return FALLBACK_BANKS[lang] || FALLBACK_BANKS.zh;
  }

  function parsePairs(text){
    const raw = String(text || '').trim();
    if(!raw) return [];
    return raw.split(/\r?\n/)
      .map(line => line.trim())
      .filter(Boolean)
      .map(line => {
        const parts = line.split(/[,，|\t]/).map(x => x.trim()).filter(Boolean);
        return { left: parts[0] || '', right: parts.slice(1).join(',') || '' };
      })
      .filter(x => x.left && x.right);
  }

  function ensureGoodState(){
    const lang = currentLang();
    const bank = sampleBank();
    let pairs = [];

    try{
      pairs = parsePairs(typeof state !== 'undefined' ? state.bankText : '');
    }catch(e){ pairs = []; }

    if(pairs.length < 6){
      try{
        if(typeof state !== 'undefined'){
          state.lang = lang;
          state.bankText = bank;
          state.totalPairs = [6,8,10,12].includes(Number(state.totalPairs)) ? Number(state.totalPairs) : 8;
          state.stageCount = [3,4,5,6].includes(Number(state.stageCount)) ? Number(state.stageCount) : 5;
          state.teamCount = [2,3,4].includes(Number(state.teamCount)) ? Number(state.teamCount) : 2;
          state.timerLimit = [0,180,300,480,600].includes(Number(state.timerLimit)) ? Number(state.timerLimit) : 300;
          state.correctTurn = ['stay','next'].includes(state.correctTurn) ? state.correctTurn : 'stay';
          state.wrongTurn = ['next','stay'].includes(state.wrongTurn) ? state.wrongTurn : 'next';
          state.teamNames = (state.teamNames && String(state.teamNames).trim()) ? state.teamNames : (FALLBACK_TEAM_NAMES[lang] || FALLBACK_TEAM_NAMES.zh);
        }
      }catch(e){}
      try{
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        stored.lang = lang;
        stored.bankText = bank;
        stored.totalPairs = stored.totalPairs || 8;
        stored.stageCount = stored.stageCount || 5;
        stored.teamCount = stored.teamCount || 2;
        stored.timerLimit = stored.timerLimit ?? 300;
        stored.teamNames = stored.teamNames || (FALLBACK_TEAM_NAMES[lang] || FALLBACK_TEAM_NAMES.zh);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(stored));
      }catch(e){}
      if($('bankInput')) $('bankInput').value = bank;
      pairs = parsePairs(bank);
    }
    return pairs;
  }

  function shuffleLocal(arr){
    const a = [...arr];
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random() * (i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function iconFor(txt){
    try{
      if(typeof iconForText === 'function') return iconForText(txt) || '';
    }catch(e){}
    const key = String(txt || '').toLowerCase();
    if(key.includes('apple') || key.includes('苹果') || key.includes('epal')) return '🍎';
    if(key.includes('banana') || key.includes('香蕉') || key.includes('pisang')) return '🍌';
    if(key.includes('teacher') || key.includes('老师') || key.includes('guru')) return '👩‍🏫';
    if(key.includes('student') || key.includes('学生') || key.includes('murid')) return '🧒';
    if(key.includes('book') || key.includes('书') || key.includes('buku')) return '📕';
    if(key.includes('cat') || key.includes('猫') || key.includes('kucing')) return '🐱';
    if(key.includes('ai') || key.includes('智能')) return '🤖';
    return '📘';
  }

  function buildCardsFallback(){
    const pairs = ensureGoodState();
    const count = Math.max(6, Math.min(12, Number((typeof state !== 'undefined' && state.totalPairs) || 8), pairs.length));
    const selected = shuffleLocal(pairs).slice(0, count);
    const cards = [];
    selected.forEach((pair, idx) => {
      cards.push({uid:`${idx}-a`, matchId:`m-${idx}`, text:pair.left, kindKey:'kindA', matched:false, flipped:false, icon:iconFor(pair.left)});
      cards.push({uid:`${idx}-b`, matchId:`m-${idx}`, text:pair.right, kindKey:'kindB', matched:false, flipped:false, icon:iconFor(pair.right)});
    });

    try{
      if(typeof state !== 'undefined'){
        state.stagePairPool = selected;
        state.cards = shuffleLocal(cards);
        state.matchedPairs = 0;
        state.openedCount = 0;
        state.flipped = [];
        state.locked = false;
        state.running = true;
      }
      return true;
    }catch(e){
      console.error('[S001 final card fix] state build failed', e);
      return false;
    }
  }

  function boardCount(){
    const board = $('board');
    return board ? board.querySelectorAll('.card').length : 0;
  }

  function manualBoardRender(){
    const board = $('board');
    if(!board) return;

    try{
      if(typeof state === 'undefined' || !Array.isArray(state.cards) || state.cards.length < 12){
        buildCardsFallback();
      }
    }catch(e){
      buildCardsFallback();
    }

    let cards = [];
    try{ cards = Array.isArray(state.cards) ? state.cards : []; }catch(e){}
    if(cards.length < 12) return;

    const n = cards.length;
    const cols = n <= 16 ? 4 : n <= 20 ? 5 : 6;
    board.className = `board cols-${cols}`;
    board.innerHTML = cards.map(card => `
      <button class="card ${card.flipped ? 'flipped':''} ${card.matched ? 'matched':''}" data-uid="${String(card.uid).replace(/"/g,'&quot;')}">
        <div class="card-inner">
          <div class="card-face card-front">
            <div class="star-mini s1">⭐</div>
            <div class="star-mini s2">⭐</div>
            <div class="star-mini s3">⭐</div>
            <div class="star-mark">★</div>
          </div>
          <div class="card-face card-back">
            <div class="card-icon">${card.icon || '📘'}</div>
            <div class="card-text">${escapeHtmlLocal(card.text)}</div>
            <div class="card-kind">${escapeHtmlLocal(kindName(card.kindKey))}</div>
          </div>
        </div>
      </button>
    `).join('');

    board.querySelectorAll('.card').forEach(btn => {
      btn.addEventListener('click', function(){
        try{
          if(typeof flipCard === 'function') flipCard(this.dataset.uid);
        }catch(e){}
      });
    });
  }

  function kindName(k){
    try{
      if(typeof t === 'function') return t(k || 'kindA');
    }catch(e){}
    const lang = currentLang();
    if(lang === 'en') return k === 'kindB' ? 'Right' : 'Left';
    if(lang === 'ms') return k === 'kindB' ? 'Kanan' : 'Kiri';
    return k === 'kindB' ? '右边' : '左边';
  }

  function escapeHtmlLocal(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function forceCards(reason){
    try{
      ensureGoodState();

      if(typeof state !== 'undefined'){
        state.running = true;
        if(!Array.isArray(state.cards) || state.cards.length < 12){
          let ok = false;
          try{ ok = typeof buildStageCards === 'function' ? !!buildStageCards() : false; }catch(e){ ok = false; }
          if(!ok || !Array.isArray(state.cards) || state.cards.length < 12){
            buildCardsFallback();
          }
        }
      }

      try{ if(typeof renderBoard === 'function') renderBoard(); }catch(e){ console.error('[S001 final renderBoard failed]', e); }
      if(boardCount() === 0) manualBoardRender();

      try{ if(typeof prepareTeams === 'function' && (!state.teams || !state.teams.length)) prepareTeams(); }catch(e){}
      try{ if(typeof updateInfoPanel === 'function') updateInfoPanel(); }catch(e){}
      try{ if(typeof renderRanking === 'function') renderRanking(); }catch(e){}
      try{ if(typeof updateProgressPanel === 'function') updateProgressPanel(); }catch(e){}
      try{ if(typeof updateActionButtons === 'function') updateActionButtons(); }catch(e){}
      try{ if(typeof saveLocal === 'function') saveLocal(); }catch(e){}
      try{ if(typeof fitStageToScreen === 'function') fitStageToScreen(); }catch(e){}

      if(boardCount() === 0){
        setTimeout(manualBoardRender, 80);
      }
    }catch(err){
      console.error('[S001 final forceCards]', reason, err);
      try{ manualBoardRender(); }catch(e){}
    }
  }

  function bindExtra(){
    const restart = $('restartBtn');
    if(restart && !restart.dataset.s001FinalForce){
      restart.dataset.s001FinalForce = '1';
      restart.addEventListener('click', function(){ setTimeout(()=>forceCards('restart'), 120); }, true);
    }
    const langSelect = $('langSelect');
    if(langSelect && !langSelect.dataset.s001FinalForce){
      langSelect.dataset.s001FinalForce = '1';
      langSelect.addEventListener('change', function(){ setTimeout(()=>forceCards('language'), 180); }, true);
    }
    const apply = $('applySettingsBtn');
    if(apply && !apply.dataset.s001FinalForce){
      apply.dataset.s001FinalForce = '1';
      apply.addEventListener('click', function(){ setTimeout(()=>forceCards('apply'), 250); }, true);
    }
  }

  function init(){
    bindExtra();
    setTimeout(()=>forceCards('init-100'), 100);
    setTimeout(()=>forceCards('init-500'), 500);
    setTimeout(()=>{ if(boardCount()===0) forceCards('init-1200'); }, 1200);
    setTimeout(()=>{ if(boardCount()===0) forceCards('init-2500'); }, 2500);
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>

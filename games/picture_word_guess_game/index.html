<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>看圖猜生字</title>
<style>
:root{
  --bg:#071426;--panel:#102033;--line:rgba(255,255,255,.14);--text:#f8fafc;--muted:#cbd5e1;
  --gold:#facc15;--good:#22c55e;--bad:#ef4444;--blue:#38bdf8;--purple:#a78bfa;--orange:#fb923c;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,"Segoe UI","Microsoft YaHei",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 30% 10%,rgba(250,204,21,.12),transparent 24%),linear-gradient(135deg,#020617,#0f172a 50%,#164e63)}
button,input,textarea,select{font:inherit}.hidden{display:none!important}
.app{height:100vh;width:min(1580px,98vw);margin:0 auto;padding:12px;display:grid;grid-template-rows:auto 1fr;gap:10px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border:1px solid var(--line);background:rgba(15,23,42,.84);border-radius:20px;box-shadow:0 12px 32px rgba(0,0,0,.26)}
.brand{display:flex;align-items:center;gap:12px;min-width:0}.logo{width:52px;height:52px;border-radius:17px;display:grid;place-items:center;font-size:30px;background:linear-gradient(135deg,#facc15,#22c55e,#38bdf8)}
h1{margin:0;font-size:clamp(24px,2.3vw,38px);line-height:1.05}.sub{margin-top:4px;font-size:13px;color:var(--muted)}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn{border:0;border-radius:13px;padding:9px 12px;font-weight:900;cursor:pointer;background:var(--gold);color:#111827;box-shadow:0 8px 18px rgba(0,0,0,.18)}
.btn.secondary{background:#334155;color:#fff;border:1px solid var(--line);box-shadow:none}.btn.good{background:var(--good);color:#052e16}.btn.bad{background:var(--bad);color:#fff}.btn.blue{background:var(--blue);color:#062033}.btn.purple{background:var(--purple);color:#1e1b4b}.btn.orange{background:var(--orange);color:#111827}.btn.small{padding:7px 10px;border-radius:11px;font-size:13px}
.input,.select{border:1px solid rgba(255,255,255,.15);background:#08111f;color:#fff;border-radius:12px;padding:9px 10px;width:100%}
.main{min-height:0;display:grid;grid-template-columns:290px 1fr 300px;gap:10px}.panel{min-height:0;background:rgba(15,23,42,.84);border:1px solid var(--line);border-radius:20px;padding:12px;overflow:hidden}
.section{padding:10px;border-radius:15px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);margin-bottom:10px}.section-title{font-size:14px;font-weight:900;margin-bottom:8px}.help{font-size:13px;color:var(--muted);line-height:1.5}
.team-list{display:grid;gap:8px}.team-card{padding:9px 10px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center;font-weight:900}.team-card.active{outline:3px solid var(--gold)}.team-score{font-size:26px;color:#fde68a}
.board{min-height:0;display:grid;grid-template-rows:auto auto minmax(0,1fr) auto;gap:10px}.statusbar{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:16px;background:rgba(15,23,42,.72);border:1px solid var(--line)}.timer{font-size:28px;font-weight:950;color:var(--gold)}
.qtitle{padding:12px 16px;border-radius:18px;background:linear-gradient(135deg,rgba(250,204,21,.18),rgba(56,189,248,.08));border:1px solid rgba(250,204,21,.25);font-size:24px;font-weight:950}.answerBox{font-size:14px;color:#fde68a}
.stage-wrap{min-height:0;border-radius:24px;border:1px solid rgba(255,255,255,.12);background:linear-gradient(180deg,rgba(2,6,23,.88),rgba(15,23,42,.9));padding:12px;display:grid;place-items:center;overflow:hidden}
.puzzle-stage{position:relative;max-width:100%;max-height:100%;width:100%;height:100%;display:grid;place-items:center}
.puzzle-grid{position:relative;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(5,1fr);gap:2px;border-radius:18px;overflow:hidden;background:#020617;border:1px solid rgba(255,255,255,.16);box-shadow:0 18px 40px rgba(0,0,0,.32)}
.tile{position:relative;min-width:0;min-height:0;background-color:#020617;background-repeat:no-repeat;transition:.25s;overflow:hidden}
.tile.hidden-tile{background-image:none!important;background:linear-gradient(135deg,#0f172a,#1e293b)!important}
.tile.hidden-tile::before{content:"?";position:absolute;inset:0;display:grid;place-items:center;font-size:clamp(18px,2.2vw,38px);font-weight:950;color:rgba(255,255,255,.18)}
.tile.revealed{box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
.tile.flash{animation:flash .65s ease}@keyframes flash{0%,100%{filter:none}45%{filter:brightness(1.8) saturate(1.2)}}
.buzzer-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.buzzer{min-height:58px;border-radius:16px;border:2px solid rgba(255,255,255,.14);font-size:18px;font-weight:950;cursor:pointer}.buzzer[disabled]{opacity:.35;cursor:not-allowed}.buzzer.t1{background:#38bdf8;color:#062033}.buzzer.t2{background:#fb923c;color:#111827}.buzzer.t3{background:#a78bfa;color:#1e1b4b}.buzzer.t4{background:#22c55e;color:#052e16}
.judgeBox{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.judgeTeam{padding:8px 12px;border-radius:999px;background:rgba(250,204,21,.16);border:1px solid rgba(250,204,21,.35);font-weight:950;color:#fde68a}
.log-list,.q-list{display:flex;flex-direction:column;gap:8px}.log,.q-pill{padding:8px 10px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:12px;line-height:1.45}.q-pill.active{background:rgba(250,204,21,.15);border-color:rgba(250,204,21,.35);color:#fef08a}.q-pill.done{background:rgba(34,197,94,.14);border-color:rgba(34,197,94,.3)}
.setup{position:fixed;inset:0;background:rgba(2,6,23,.92);z-index:20;display:grid;place-items:center;padding:18px}.setup-card{width:min(1180px,96vw);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid var(--line);border-radius:24px;padding:18px}.setup-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.editor-list{display:grid;gap:12px;margin-top:12px}.q-editor{padding:12px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09)}.q-editor-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}.q-editor-body{display:grid;grid-template-columns:300px 1fr;gap:12px}.preview{min-height:220px;border-radius:16px;background:#020617;border:1px solid rgba(255,255,255,.1);display:grid;place-items:center;overflow:hidden}.preview img{max-width:100%;max-height:100%;object-fit:contain}.uploadbox{display:grid;gap:8px}
.win{position:fixed;inset:0;background:rgba(2,6,23,.88);z-index:40;display:grid;place-items:center;text-align:center;padding:20px}.win-card{width:min(760px,94vw);background:linear-gradient(135deg,rgba(250,204,21,.22),rgba(56,189,248,.16));border:1px solid rgba(250,204,21,.38);border-radius:28px;padding:28px}.win h2{font-size:42px;margin:0 0 8px}.win p{font-size:20px;color:#e2e8f0}
@media(max-width:1100px){.main{grid-template-columns:260px 1fr}.panel.right{display:none}.q-editor-body{grid-template-columns:1fr}.setup-grid{grid-template-columns:1fr 1fr}.buzzer-row{grid-template-columns:repeat(2,1fr)}}@media(max-width:760px){html,body{overflow:auto}.app{height:auto}.main{grid-template-columns:1fr}.setup-grid{grid-template-columns:1fr}}
</style>

  <script defer src="../_shared/shared-polish.js"></script>

<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><div class="logo">🖼️</div><div><h1 id="title">看圖猜生字</h1><div id="subtitle" class="sub">圖片 5×5 逐步揭開，分組搶答猜出生字。</div></div></div>
    <div class="actions"><select id="lang" class="select" style="width:auto"><option value="zh">中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select><button id="setupBtn" class="btn secondary">設定題庫</button><button id="fullBtn" class="btn secondary">全屏</button><button id="resetBtn" class="btn bad">重開</button></div>
  </div>
  <div class="main">
    <div class="panel">
      <div class="section"><div id="scoreTitle" class="section-title">隊伍分數</div><div id="teamList" class="team-list"></div></div>
      <div class="section"><div id="ruleTitle" class="section-title">玩法說明</div><div id="ruleText" class="help">老師上傳圖片與答案。圖片會切成 5×5，每 3 秒隨機揭開一片。學生按下搶答後，由老師判斷正確或錯誤。答錯可繼續搶答。</div></div>
    </div>
    <div class="board">
      <div class="statusbar"><div><b id="roundText">準備開始</b><div id="hintText" class="help">等待圖片逐步揭開，學生可隨時搶答。</div></div><div id="timer" class="timer">00:00</div></div>
      <div class="qtitle"><span id="questionTitle">看圖猜生字</span> <span id="answerText" class="answerBox hidden"></span></div>
      <div class="stage-wrap"><div id="puzzleStage" class="puzzle-stage"><div id="puzzleGrid" class="puzzle-grid"></div></div></div>
      <div>
        <div id="buzzerRow" class="buzzer-row"></div>
        <div id="judgeBox" class="judgeBox hidden" style="margin-top:8px"><span id="judgeTeam" class="judgeTeam"></span><button id="correctBtn" class="btn good">正確，加分</button><button id="wrongBtn" class="btn bad">錯誤，繼續搶答</button><button id="showAnswerBtn" class="btn secondary">顯示答案</button><button id="nextBtn" class="btn blue hidden">下一題</button></div>
      </div>
    </div>
    <div class="panel right"><h3 id="qListTitle" style="margin:0 0 10px">題目清單</h3><div id="questionList" class="q-list"></div><h3 id="logTitle" style="margin:14px 0 10px">搶答記錄</h3><div id="logs" class="log-list"></div></div>
  </div>
</div>
<div id="setup" class="setup"><div class="setup-card">
  <div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><div><h2 id="setupTitle" style="margin:0">看圖猜生字｜老師設定</h2><div id="setupHelp" class="help" style="margin-top:6px">每題上傳一張圖片，並輸入答案。遊戲會把圖片切成 5×5，開始後每 3 秒自動隨機揭開一片。</div></div><select id="setupLang" class="select" style="width:auto"><option value="zh">中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select></div>
  <div class="setup-grid"><input id="timeLimit" class="input" type="number" min="60" max="1800" value="300"><select id="teamCount" class="select"><option value="2">2 組</option><option value="3">3 組</option><option value="4">4 組</option></select><input id="pointValue" class="input" type="number" min="1" max="100" value="10"><button id="addQuestionBtn" class="btn secondary">新增題目</button></div>
  <div class="actions" style="margin-top:12px"><button id="sampleBtn" class="btn secondary">載入示範</button><button id="startBtn" class="btn good">開始遊戲</button></div>
  <div id="editorList" class="editor-list"></div>
</div></div>
<div id="win" class="win hidden"><div class="win-card"><h2 id="winTitle">遊戲結束</h2><p id="winDesc"></p><button class="btn good" onclick="location.reload()" id="againBtn">再玩一次</button></div></div>
<script>
const $=s=>document.querySelector(s);
let lang='zh', setupQuestions=[], questions=[], current=0, teamCount=2, teams=[], pointValue=10, revealed=[], revealTimer=null, endAt=0, timerId=null, buzzedTeam=null, logs=[], roundDone=false, imageRatio=1.4;
const L={
 zh:{title:'看圖猜生字',sub:'圖片 5×5 逐步揭開，分組搶答猜出生字。',setup:'設定題庫',full:'全屏',reset:'重開',score:'隊伍分數',ruleTitle:'玩法說明',rule:'老師上傳圖片與答案。圖片會切成 5×5，每 3 秒隨機揭開一片。學生按下搶答後，由老師判斷正確或錯誤。答錯可繼續搶答。',ready:'準備開始',hint:'等待圖片逐步揭開，學生可隨時搶答。',qTitle:'看圖猜生字',qList:'題目清單',log:'搶答記錄',setupTitle:'看圖猜生字｜老師設定',setupHelp:'每題上傳一張圖片，並輸入答案。遊戲會把圖片切成 5×5，開始後每 3 秒自動隨機揭開一片。',add:'新增題目',sample:'載入示範',start:'開始遊戲',correct:'正確，加分',wrong:'錯誤，繼續搶答',show:'顯示答案',next:'下一題',again:'再玩一次',team:n=>`第 ${n} 組`,round:(a,b)=>`第 ${a} 題 / 共 ${b} 題`,answer:a=>`答案：${a}`,buzz:n=>`第 ${n} 組搶答！`,ok:(n,p)=>`第 ${n} 組答對 +${p}`,bad:n=>`第 ${n} 組答錯，繼續搶答`,finish:'遊戲結束',upload:'上傳圖片',ans:'答案 / 生字',remove:'刪除'},
 en:{title:'Picture Word Guess',sub:'A 5×5 image reveal game. Teams buzz in to guess the word.',setup:'Questions',full:'Fullscreen',reset:'Restart',score:'Team scores',ruleTitle:'How to play',rule:'Teachers upload an image and answer. The image is split into 5×5 tiles. Every 3 seconds, a random tile is revealed. Teams buzz in; the teacher judges correct or wrong. Wrong answers can continue.',ready:'Ready',hint:'Wait for tiles to reveal. Teams may buzz anytime.',qTitle:'Picture Word Guess',qList:'Question list',log:'Buzz log',setupTitle:'Picture Word Guess | Teacher Settings',setupHelp:'Upload one image and enter the answer for each question. The image is split into 5×5 and reveals one random tile every 3 seconds.',add:'Add question',sample:'Load sample',start:'Start game',correct:'Correct, score',wrong:'Wrong, continue',show:'Show answer',next:'Next',again:'Play again',team:n=>`Team ${n}`,round:(a,b)=>`Question ${a} / ${b}`,answer:a=>`Answer: ${a}`,buzz:n=>`Team ${n} buzzed!`,ok:(n,p)=>`Team ${n} correct +${p}`,bad:n=>`Team ${n} wrong, continue`,finish:'Game over',upload:'Upload image',ans:'Answer / word',remove:'Remove'},
 ms:{title:'Teka Perkataan Melalui Gambar',sub:'Gambar 5×5 dibuka sedikit demi sedikit. Kumpulan menekan buzzer untuk meneka.',setup:'Soalan',full:'Skrin penuh',reset:'Mula semula',score:'Markah kumpulan',ruleTitle:'Cara bermain',rule:'Guru memuat naik gambar dan jawapan. Gambar dipotong 5×5. Setiap 3 saat, satu bahagian dibuka secara rawak. Kumpulan menekan buzzer dan guru menilai betul atau salah. Jawapan salah boleh terus rebut.',ready:'Sedia',hint:'Tunggu bahagian gambar dibuka. Kumpulan boleh rebut bila-bila masa.',qTitle:'Teka perkataan',qList:'Senarai soalan',log:'Rekod rebut',setupTitle:'Teka Perkataan Melalui Gambar | Tetapan Guru',setupHelp:'Muat naik satu gambar dan masukkan jawapan untuk setiap soalan. Gambar dipotong 5×5 dan dibuka satu bahagian setiap 3 saat.',add:'Tambah soalan',sample:'Muat contoh',start:'Mula permainan',correct:'Betul, tambah markah',wrong:'Salah, terus rebut',show:'Papar jawapan',next:'Seterusnya',again:'Main lagi',team:n=>`Kumpulan ${n}`,round:(a,b)=>`Soalan ${a} / ${b}`,answer:a=>`Jawapan: ${a}`,buzz:n=>`Kumpulan ${n} menekan buzzer!`,ok:(n,p)=>`Kumpulan ${n} betul +${p}`,bad:n=>`Kumpulan ${n} salah, terus rebut`,finish:'Permainan tamat',upload:'Muat naik gambar',ans:'Jawapan / perkataan',remove:'Buang'}
};
const t=(k,...a)=>{const v=(L[lang]||L.zh)[k];return typeof v==='function'?v(...a):v||k};
function sampleSvg(word,i){const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="${i%2?'#0f766e':'#1d4ed8'}"/><stop offset="1" stop-color="#0f172a"/></linearGradient></defs><rect width="900" height="620" rx="30" fill="url(#g)"/><circle cx="230" cy="220" r="95" fill="#facc15"/><rect x="430" y="160" width="250" height="180" rx="30" fill="#38bdf8"/><path d="M220 420 C350 300 500 520 690 360" stroke="#22c55e" stroke-width="38" fill="none" stroke-linecap="round"/><text x="450" y="560" text-anchor="middle" fill="white" font-family="Arial,Microsoft YaHei" font-size="52" font-weight="900">${word}</text></svg>`;return 'data:image/svg+xml,'+encodeURIComponent(svg)}
function loadSample(){setupQuestions=[{title:'太陽',answer:'日',image:sampleSvg('日',0)},{title:'月亮',answer:'月',image:sampleSvg('月',1)},{title:'山峰',answer:'山',image:sampleSvg('山',2)}];renderEditors()}
function addQuestion(){setupQuestions.push({title:'',answer:'',image:sampleSvg('?',setupQuestions.length)});renderEditors()}
function removeQuestion(i){setupQuestions.splice(i,1);renderEditors()}
function readFile(f,cb){const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(f)}
function renderEditors(){const box=$('#editorList');box.innerHTML='';setupQuestions.forEach((q,i)=>{const d=document.createElement('div');d.className='q-editor';d.innerHTML=`<div class="q-editor-head"><b>Q${i+1}</b><button class="btn small secondary rm">${t('remove')}</button></div><div class="q-editor-body"><div class="uploadbox"><input class="input titleInput" value="${(q.title||'').replaceAll('"','&quot;')}" placeholder="${t('qTitle')}"><input class="input answerInput" value="${(q.answer||'').replaceAll('"','&quot;')}" placeholder="${t('ans')}"><label class="help">${t('upload')}</label><input class="input fileInput" type="file" accept="image/*"></div><div class="preview"><img src="${q.image||''}" alt=""></div></div>`;box.appendChild(d);d.querySelector('.rm').onclick=()=>removeQuestion(i);d.querySelector('.titleInput').oninput=e=>q.title=e.target.value;d.querySelector('.answerInput').oninput=e=>q.answer=e.target.value;d.querySelector('.fileInput').onchange=e=>{const f=e.target.files[0];if(f)readFile(f,src=>{q.image=src;renderEditors()})};})}
function apply(){document.documentElement.lang=lang==='zh'?'zh-Hans':lang;document.title=t('title');$('#title').textContent=t('title');$('#subtitle').textContent=t('sub');$('#setupBtn').textContent=t('setup');$('#fullBtn').textContent=t('full');$('#resetBtn').textContent=t('reset');$('#scoreTitle').textContent=t('score');$('#ruleTitle').textContent=t('ruleTitle');$('#ruleText').textContent=t('rule');$('#roundText').textContent=t('ready');$('#hintText').textContent=t('hint');$('#questionTitle').textContent=t('qTitle');$('#qListTitle').textContent=t('qList');$('#logTitle').textContent=t('log');$('#setupTitle').textContent=t('setupTitle');$('#setupHelp').textContent=t('setupHelp');$('#addQuestionBtn').textContent=t('add');$('#sampleBtn').textContent=t('sample');$('#startBtn').textContent=t('start');$('#correctBtn').textContent=t('correct');$('#wrongBtn').textContent=t('wrong');$('#showAnswerBtn').textContent=t('show');$('#nextBtn').textContent=t('next');$('#againBtn').textContent=t('again');renderEditors();renderTeams();renderList()}
function start(){questions=setupQuestions.filter(q=>q.image&&q.answer).map(q=>({...q}));if(!questions.length){loadSample();questions=setupQuestions.map(q=>({...q}))}teamCount=Number($('#teamCount').value||2);pointValue=Number($('#pointValue').value||10);teams=Array.from({length:teamCount},(_,i)=>({name:t('team',i+1),score:0}));current=0;logs=[];$('#setup').classList.add('hidden');endAt=Date.now()+Number($('#timeLimit').value||300)*1000;clearInterval(timerId);timerId=setInterval(tick,200);loadRound(0)}
function tick(){const s=Math.max(0,Math.ceil((endAt-Date.now())/1000));$('#timer').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');if(s<=0)finish()}
function loadRound(i){current=i;revealed=new Array(25).fill(false);buzzedTeam=null;roundDone=false;$('#judgeBox').classList.add('hidden');$('#nextBtn').classList.add('hidden');$('#answerText').classList.add('hidden');setImageRatio(questions[current].image);buildGrid();renderRound();clearInterval(revealTimer);revealOne();revealTimer=setInterval(revealOne,3000)}
function setImageRatio(src){const img=new Image();img.onload=()=>{imageRatio=img.naturalWidth/img.naturalHeight;resizeGrid()};img.src=src;setTimeout(resizeGrid,50)}
function resizeGrid(){const grid=$('#puzzleGrid');const wrap=$('#puzzleStage');const w=wrap.clientWidth,h=wrap.clientHeight;let gw=w,gh=w/(imageRatio||1.4);if(gh>h){gh=h;gw=h*(imageRatio||1.4)}grid.style.width=gw+'px';grid.style.height=gh+'px'}
window.addEventListener('resize',resizeGrid);
function buildGrid(){const grid=$('#puzzleGrid');grid.innerHTML='';for(let r=0;r<5;r++){for(let c=0;c<5;c++){const idx=r*5+c;const d=document.createElement('div');d.className='tile hidden-tile';d.dataset.idx=idx;d.style.backgroundImage=`url("${questions[current].image}")`;d.style.backgroundSize='500% 500%';d.style.backgroundPosition=`${c*25}% ${r*25}%`;grid.appendChild(d)}}resizeGrid()}
function revealOne(){if(roundDone)return;const closed=revealed.map((v,i)=>v?null:i).filter(v=>v!==null);if(!closed.length)return;const idx=closed[Math.floor(Math.random()*closed.length)];revealed[idx]=true;const tile=$(`#puzzleGrid .tile[data-idx="${idx}"]`);if(tile){tile.classList.remove('hidden-tile');tile.classList.add('revealed','flash');setTimeout(()=>tile.classList.remove('flash'),700)}renderRound()}
function renderRound(){$('#roundText').textContent=t('round',current+1,questions.length);$('#questionTitle').textContent=questions[current]?.title||t('qTitle');$('#answerText').textContent=t('answer',questions[current]?.answer||'');renderTeams();renderList();renderLogs();renderBuzzers()}
function renderTeams(){const box=$('#teamList');box.innerHTML='';(teams.length?teams:Array.from({length:Number($('#teamCount')?.value||2)},(_,i)=>({name:t('team',i+1),score:0}))).forEach((tm,i)=>{const d=document.createElement('div');d.className='team-card'+(buzzedTeam===i?' active':'');d.innerHTML=`<span>${t('team',i+1)}</span><span class="team-score">${tm.score}</span>`;box.appendChild(d)})}
function renderBuzzers(){const row=$('#buzzerRow');row.innerHTML='';for(let i=0;i<teamCount;i++){const b=document.createElement('button');b.className='buzzer t'+(i+1);b.textContent=t('team',i+1);b.disabled=buzzedTeam!==null||roundDone;b.onclick=()=>buzz(i);row.appendChild(b)}}
function buzz(i){buzzedTeam=i;logs.unshift('🔔 '+t('buzz',i+1));logs=logs.slice(0,10);$('#judgeTeam').textContent=t('buzz',i+1);$('#judgeBox').classList.remove('hidden');renderRound()}
function markCorrect(){if(buzzedTeam===null)return;teams[buzzedTeam].score+=pointValue;logs.unshift('✅ '+t('ok',buzzedTeam+1,pointValue));logs=logs.slice(0,10);roundDone=true;clearInterval(revealTimer);revealed.fill(true);document.querySelectorAll('.tile').forEach(t=>t.classList.remove('hidden-tile'));$('#nextBtn').classList.remove('hidden');renderRound()}
function markWrong(){if(buzzedTeam===null)return;logs.unshift('❌ '+t('bad',buzzedTeam+1));logs=logs.slice(0,10);buzzedTeam=null;$('#judgeBox').classList.add('hidden');renderRound()}
function showAnswer(){$('#answerText').classList.toggle('hidden')}
function nextRound(){if(current<questions.length-1)loadRound(current+1);else finish()}
function renderList(){$('#questionList').innerHTML=(questions.length?questions:setupQuestions).map((q,i)=>`<div class="q-pill ${i===current&&questions.length?'active':''} ${questions.length&&i<current?'done':''}">Q${i+1}｜${q.title||t('qTitle')}<br><span>${q.answer||''}</span></div>`).join('')}
function renderLogs(){$('#logs').innerHTML=logs.map(x=>`<div class="log">${x}</div>`).join('')}
function finish(){clearInterval(timerId);clearInterval(revealTimer);$('#win').classList.remove('hidden');$('#winTitle').textContent=t('finish');const sorted=[...teams].map((x,i)=>({...x,i})).sort((a,b)=>b.score-a.score);$('#winDesc').textContent=sorted.map(x=>`${t('team',x.i+1)}：${x.score}`).join(' ｜ ')}
$('#lang').onchange=e=>{lang=e.target.value;apply()};$('#setupLang').onchange=e=>{lang=e.target.value;apply()};$('#setupBtn').onclick=()=>$('#setup').classList.remove('hidden');$('#fullBtn').onclick=()=>document.documentElement.requestFullscreen?.();$('#resetBtn').onclick=()=>location.reload();$('#addQuestionBtn').onclick=addQuestion;$('#sampleBtn').onclick=loadSample;$('#startBtn').onclick=start;$('#correctBtn').onclick=markCorrect;$('#wrongBtn').onclick=markWrong;$('#showAnswerBtn').onclick=showAnswer;$('#nextBtn').onclick=nextRound;
loadSample();apply();
</script>
</body>
</html>

<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>图片侦探找不同</title>
<style>
:root{--bg:#0f172a;--green:#22c55e;--blue:#38bdf8;--gold:#facc15;--red:#ef4444;--line:rgba(255,255,255,.14);--text:#f8fafc;--muted:#cbd5e1}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;color:var(--text);background:linear-gradient(135deg,#020617,#0f3d2e 55%,#164e63)}
button,input,textarea,select{font:inherit}.app{height:100vh;width:min(1540px,98vw);margin:0 auto;padding:12px;display:grid;grid-template-rows:auto 1fr;gap:10px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--line);background:rgba(15,23,42,.8);border-radius:20px}
.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:30px;background:linear-gradient(135deg,#22c55e,#38bdf8,#facc15)}h1{margin:0;font-size:clamp(22px,2.5vw,36px)}.sub{font-size:13px;color:var(--muted)}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn{border:0;border-radius:13px;padding:9px 12px;font-weight:900;cursor:pointer;background:var(--gold);color:#111827}.btn.secondary{background:#334155;color:#fff;border:1px solid var(--line)}.btn.good{background:var(--green);color:#052e16}.btn.bad{background:var(--red);color:#fff}.input,.select{border:1px solid rgba(255,255,255,.15);background:#08111f;color:#fff;border-radius:12px;padding:9px 10px;width:100%}
.main{min-height:0;display:grid;grid-template-columns:290px 1fr 280px;gap:10px}.panel{min-height:0;background:rgba(15,23,42,.84);border:1px solid var(--line);border-radius:20px;padding:12px;overflow:hidden}.section{padding:10px;border-radius:15px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);margin-bottom:10px}.section-title{font-size:14px;font-weight:900;margin-bottom:8px}.help{font-size:13px;color:var(--muted);line-height:1.5}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat{padding:10px;border-radius:15px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08)}.stat b{font-size:26px;display:block}.stat span{font-size:12px;color:var(--muted)}
.board{min-height:0;display:grid;grid-template-rows:auto auto 1fr auto;gap:10px}.statusbar{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:16px;background:rgba(15,23,42,.72);border:1px solid var(--line)}.timer{font-size:30px;font-weight:950;color:var(--gold)}
.roundTitle{padding:12px 16px;border-radius:18px;background:linear-gradient(135deg,rgba(34,197,94,.18),rgba(56,189,248,.08));border:1px solid rgba(34,197,94,.25);font-size:24px;font-weight:950}
.compare{min-height:0;display:grid;grid-template-columns:1fr 1fr;gap:10px}.pane{position:relative;border-radius:22px;background:#020617;border:1px solid rgba(255,255,255,.12);overflow:hidden;display:grid;place-items:center}.pane img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center center;z-index:1;pointer-events:none}.pane .tag{position:absolute;left:12px;top:12px;z-index:3;padding:6px 10px;border-radius:999px;background:rgba(2,6,23,.78);border:1px solid rgba(255,255,255,.12);font-weight:900}.stageHint{position:absolute;bottom:12px;left:12px;right:12px;z-index:3;padding:8px 12px;border-radius:12px;background:rgba(2,6,23,.72);border:1px solid rgba(255,255,255,.08);color:#cbd5e1;font-size:13px}
.hitbox{position:absolute;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:999px;border:3px solid rgba(250,204,21,.3);z-index:4;cursor:pointer}.hitbox.found{border-color:var(--green);background:rgba(34,197,94,.18)}.hitbox.found::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;font-weight:950;color:#dcfce7;font-size:24px}
.actionsBottom{display:flex;gap:8px;flex-wrap:wrap}
.q-list,.log-list{display:flex;flex-direction:column;gap:8px;overflow:hidden}.q-pill,.log{padding:8px 10px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:12px;line-height:1.45}.q-pill.active{background:rgba(34,197,94,.16);border-color:rgba(34,197,94,.4);color:#bbf7d0}.q-pill.done{background:rgba(34,197,94,.12)}
.setup{position:fixed;inset:0;background:rgba(2,6,23,.92);z-index:20;display:grid;place-items:center;padding:18px}.setup-card{width:min(1200px,96vw);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid var(--line);border-radius:24px;padding:18px}.setup-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.editorList{display:grid;gap:12px;margin-top:12px}.q-editor{padding:12px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09)}.q-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}.q-body{display:grid;grid-template-columns:1fr 1fr;gap:10px}.editStage{position:relative;min-height:260px;border-radius:16px;background:#020617;border:1px solid rgba(255,255,255,.12);overflow:hidden;cursor:crosshair}.editStage img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center center;z-index:1;pointer-events:none}.editMarker{position:absolute;transform:translate(-50%,-50%);width:34px;height:34px;border-radius:999px;background:var(--gold);color:#111827;display:grid;place-items:center;font-weight:950;z-index:3}
.selectorRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.markBtn{padding:7px 10px;border-radius:999px;background:#334155;border:1px solid rgba(255,255,255,.12);cursor:pointer;font-weight:850}.markBtn.active{background:var(--gold);color:#111827}
.win{position:fixed;inset:0;background:rgba(2,6,23,.88);z-index:40;display:grid;place-items:center;text-align:center;padding:20px}.win-card{width:min(760px,94vw);background:linear-gradient(135deg,rgba(34,197,94,.23),rgba(56,189,248,.16));border:1px solid rgba(34,197,94,.38);border-radius:28px;padding:28px}.win h2{font-size:42px;margin:0 0 8px}.hidden{display:none!important}
@media(max-width:1100px){.main{grid-template-columns:260px 1fr}.panel.right{display:none}.q-body{grid-template-columns:1fr}.setup-grid{grid-template-columns:1fr 1fr}}
@media(max-width:760px){html,body{overflow:auto}.app{height:auto}.main{grid-template-columns:1fr}.compare{grid-template-columns:1fr}.setup-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><div class="logo">🔎</div><div><h1 id="title"></h1><div id="subtitle" class="sub"></div></div></div>
    <div class="actions"><select id="lang" class="select" style="width:auto"><option value="zh">中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select><button id="setupBtn" class="btn secondary"></button><button id="fullBtn" class="btn secondary"></button><button id="resetBtn" class="btn bad"></button></div>
  </div>
  <div class="main">
    <div class="panel">
      <div class="section"><div id="scoreTitle" class="section-title"></div><div class="stat-grid"><div class="stat"><b id="score">0</b><span id="scoreLabel"></span></div><div class="stat"><b id="foundCount">0/0</b><span id="foundLabel"></span></div><div class="stat"><b id="roundCount">0/0</b><span id="roundLabel"></span></div><div class="stat"><b id="attempts">0</b><span id="attemptLabel"></span></div></div></div>
      <div class="section"><div id="ruleTitle" class="section-title"></div><div id="ruleText" class="help"></div></div>
    </div>
    <div class="board">
      <div class="statusbar"><div><b id="roundText"></b><div id="hintText" class="help"></div></div><div id="timer" class="timer">00:00</div></div>
      <div id="questionTitle" class="roundTitle"></div>
      <div class="compare">
        <div class="pane"><div class="tag" id="leftLabel"></div><img id="leftImg" alt=""><div class="stageHint" id="leftHint"></div></div>
        <div class="pane" id="rightPane"><div class="tag" id="rightLabel"></div><img id="rightImg" alt=""><div class="stageHint" id="rightHint"></div></div>
      </div>
      <div class="actionsBottom"><button id="checkBtn" class="btn good"></button><button id="nextBtn" class="btn secondary hidden"></button></div>
    </div>
    <div class="panel right"><h3 id="qListTitle" style="margin:0 0 10px"></h3><div id="questionList" class="q-list"></div><h3 id="logTitle" style="margin:14px 0 10px"></h3><div id="logs" class="log-list"></div></div>
  </div>
</div>

<div id="setup" class="setup">
  <div class="setup-card">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><h2 id="setupTitle" style="margin:0"></h2><select id="setupLang" class="select" style="width:auto"><option value="zh">中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select></div>
    <div id="setupHelp" class="help" style="margin-top:8px"></div>
    <div class="setup-grid" style="margin-top:12px">
      <input id="timeLimit" class="input" type="number" min="60" max="1800" value="300">
      <select id="presetCount" class="select"><option value="5">建立 5 题</option><option value="10">建立 10 题</option></select>
      <button id="buildBtn" class="btn secondary"></button>
    </div>
    <div class="actions" style="margin-top:12px;justify-content:flex-start"><button id="sampleBtn" class="btn secondary"></button><button id="addBtn" class="btn secondary"></button><button id="startBtn" class="btn good"></button></div>
    <div id="editorList" class="editorList"></div>
  </div>
</div>

<div id="win" class="win hidden"><div class="win-card"><h2 id="winTitle"></h2><p id="winDesc" style="font-size:20px;color:#e2e8f0"></p><button id="againBtn" class="btn good" onclick="location.reload()"></button></div></div>

<script>
const I18N={
zh:{title:"图片侦探找不同",subtitle:"上传两张图片并设置差异位置，学生点击右图找出所有不同。",setup:"设置题库",fullscreen:"全屏",restart:"重开",scoreTitle:"成绩",score:"分数",found:"已找到",round:"题组",attempt:"误点次数",ruleTitle:"玩法说明",ruleText:"老师上传左右两张图，再设置 3–5 个差异位置。学生点击右图找不同，找齐后进入下一题。",left:"原图",right:"找不同",hint:"请在右边图片点击差异位置。",hintLeft:"左图仅供对照。",hintRight:"点击右图找出所有不同。",check:"检查结果",next:"下一题",qList:"题组清单",logTitle:"记录",setupTitle:"图片侦探找不同｜老师设置",setupHelp:"每题上传左图与右图，再在右图上设置 3–5 个差异点。若只是快速测试，可先载入示范题组。",build:"建立题组",sample:"载入示范",add:"新增一题",start:"开始游戏",uploadA:"上传左图",uploadB:"上传右图",titlePh:"题目标题，例如：找出课室里的不同",points:"差异数量",remove:"删除",pick:"选择差异点",finish:"完成！",again:"再玩一次",final:"最终得分",foundAll:"全部找到了！",notAll:"还有差异未找到。",pickPoint:"请先在设置区完成差异点。"},
en:{title:"Image Detective: Spot the Difference",subtitle:"Upload two images and set the difference spots. Students click the right image to find them all.",setup:"Question settings",fullscreen:"Fullscreen",restart:"Restart",scoreTitle:"Score",score:"Score",found:"Found",round:"Sets",attempt:"Miss taps",ruleTitle:"How to play",ruleText:"Upload two images and set 3–5 difference spots on the right image. Students click the right image to find them all.",left:"Original",right:"Find differences",hint:"Click the right image to find the differences.",hintLeft:"Left image is for comparison.",hintRight:"Click the right image to find all differences.",check:"Check",next:"Next",qList:"Question list",logTitle:"Log",setupTitle:"Spot the Difference | Teacher Settings",setupHelp:"Upload a left and right image for each set, then mark 3–5 difference spots on the right image. Load samples for quick testing.",build:"Build sets",sample:"Load samples",add:"Add set",start:"Start game",uploadA:"Upload left image",uploadB:"Upload right image",titlePh:"Question title, e.g. Find the classroom differences",points:"Differences",remove:"Remove",pick:"Pick difference marker",finish:"Completed!",again:"Play again",final:"Final score",foundAll:"All differences found!",notAll:"Some differences are still missing.",pickPoint:"Please set the difference spots first."},
ms:{title:"Detektif Gambar: Cari Perbezaan",subtitle:"Muat naik dua gambar dan tetapkan titik perbezaan. Murid klik gambar kanan untuk mencarinya.",setup:"Tetapan soalan",fullscreen:"Skrin penuh",restart:"Mula semula",scoreTitle:"Markah",score:"Markah",found:"Dijumpai",round:"Set",attempt:"Klik tersasar",ruleTitle:"Cara bermain",ruleText:"Muat naik dua gambar dan tetapkan 3–5 titik perbezaan pada gambar kanan. Murid klik gambar kanan untuk mencari semua perbezaan.",left:"Gambar asal",right:"Cari perbezaan",hint:"Klik gambar kanan untuk mencari perbezaan.",hintLeft:"Gambar kiri untuk perbandingan.",hintRight:"Klik gambar kanan untuk mencari semua perbezaan.",check:"Semak",next:"Seterusnya",qList:"Senarai set",logTitle:"Rekod",setupTitle:"Cari Perbezaan | Tetapan Guru",setupHelp:"Muat naik gambar kiri dan kanan untuk setiap set, kemudian tandakan 3–5 titik perbezaan pada gambar kanan. Muat contoh untuk ujian pantas.",build:"Bina set",sample:"Muat contoh",add:"Tambah set",start:"Mula permainan",uploadA:"Muat naik gambar kiri",uploadB:"Muat naik gambar kanan",titlePh:"Tajuk soalan, contoh: Cari perbezaan dalam kelas",points:"Bilangan perbezaan",remove:"Padam",pick:"Pilih penanda",finish:"Selesai!",again:"Main lagi",final:"Markah akhir",foundAll:"Semua perbezaan dijumpai!",notAll:"Masih ada perbezaan belum dijumpai.",pickPoint:"Sila tetapkan titik perbezaan terlebih dahulu."}
};
let lang=new URLSearchParams(location.search).get("lang")||localStorage.getItem("diff_lang")||"zh";
let setupQuestions=[],questions=[],currentIndex=0,found=[],attempts=0,score=0,logs=[],timerId=null,endAt=0,roundDone=false;
const $=s=>document.querySelector(s);const $$=s=>[...document.querySelectorAll(s)];const T=k=>(I18N[lang]||I18N.zh)[k]||k;
function svgScene(title,variant=0,altered=false){
  const dotA=altered?'#ef4444':'#22c55e', dotB=altered?'#facc15':'#38bdf8', dotC=altered?'#38bdf8':'#f97316';
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="${variant%2?'#0f766e':'#1d4ed8'}"/><stop offset="1" stop-color="#0f172a"/></linearGradient></defs>
  <rect width="960" height="540" rx="30" fill="url(#g)"/>
  <rect x="80" y="90" width="160" height="230" rx="22" fill="${dotA}" opacity=".9"/>
  <circle cx="430" cy="170" r="72" fill="${dotB}" opacity=".9"/>
  <polygon points="700,110 800,250 600,250" fill="${dotC}" opacity=".9"/>
  <rect x="180" y="360" width="${altered?260:210}" height="90" rx="24" fill="${altered?'#a78bfa':'#34d399'}" opacity=".9"/>
  <circle cx="${altered?640:610}" cy="385" r="38" fill="${altered?'#ffffff':'#fde68a'}" opacity=".95"/>
  <text x="480" y="500" text-anchor="middle" fill="white" font-size="34" font-family="Arial,Microsoft YaHei,sans-serif" font-weight="700">${title}</text>
  </svg>`;
  return `data:image/svg+xml,${encodeURIComponent(svg)}`;
}
function defaultSpots(n){
  const sets={3:[{x:.19,y:.23},{x:.45,y:.31},{x:.74,y:.35}],4:[{x:.19,y:.23},{x:.45,y:.31},{x:.72,y:.34},{x:.66,y:.71}],5:[{x:.19,y:.23},{x:.45,y:.31},{x:.72,y:.34},{x:.28,y:.74},{x:.66,y:.71}]};
  return (sets[n]||sets[3]).map(p=>({...p}));
}
function makeBlankQuestion(i){return{title:`Q${i+1}`,left:svgScene(`Q${i+1}`,i,false),right:svgScene(`Q${i+1}`,i,true),spots:defaultSpots(3),active:0};}
function loadSamples(n=5){setupQuestions=[];for(let i=0;i<n;i++){setupQuestions.push({title:(lang==='en'?'Spot set ':lang==='ms'?'Set beza ':'找不同题组 ')+(i+1),left:svgScene((lang==='en'?'Set ':lang==='ms'?'Set ':'题组 ')+(i+1),i,false),right:svgScene((lang==='en'?'Set ':lang==='ms'?'Set ':'题组 ')+(i+1),i,true),spots:defaultSpots(4),active:0});}renderEditors();}
function buildSets(n){setupQuestions=[];for(let i=0;i<n;i++)setupQuestions.push(makeBlankQuestion(i));renderEditors();}
function addQuestion(){setupQuestions.push(makeBlankQuestion(setupQuestions.length));renderEditors();}
function removeQuestion(i){setupQuestions.splice(i,1);renderEditors();}
function readFile(file, cb){const fr=new FileReader();fr.onload=e=>cb(e.target.result);fr.readAsDataURL(file);}
function applyLang(){
  document.documentElement.lang=lang==='zh'?'zh-Hans':lang;document.title=T('title');
  $('#title').textContent=T('title');$('#subtitle').textContent=T('subtitle');$('#setupBtn').textContent=T('setup');$('#fullBtn').textContent=T('fullscreen');$('#resetBtn').textContent=T('restart');
  $('#scoreTitle').textContent=T('scoreTitle');$('#scoreLabel').textContent=T('score');$('#foundLabel').textContent=T('found');$('#roundLabel').textContent=T('round');$('#attemptLabel').textContent=T('attempt');$('#ruleTitle').textContent=T('ruleTitle');$('#ruleText').textContent=T('ruleText');
  $('#hintText').textContent=T('hint');$('#leftLabel').textContent=T('left');$('#rightLabel').textContent=T('right');$('#leftHint').textContent=T('hintLeft');$('#rightHint').textContent=T('hintRight');$('#checkBtn').textContent=T('check');$('#nextBtn').textContent=T('next');$('#qListTitle').textContent=T('qList');$('#logTitle').textContent=T('logTitle');
  $('#setupTitle').textContent=T('setupTitle');$('#setupHelp').textContent=T('setupHelp');$('#buildBtn').textContent=T('build');$('#sampleBtn').textContent=T('sample');$('#addBtn').textContent=T('add');$('#startBtn').textContent=T('start');$('#winTitle').textContent=T('finish');$('#againBtn').textContent=T('again');
  $('#lang').value=lang;$('#setupLang').value=lang;renderEditors();if(questions.length)renderRound();
}
function renderEditors(){
  const box=$('#editorList'); if(!box) return; box.innerHTML='';
  setupQuestions.forEach((q,i)=>{
    const div=document.createElement('div');div.className='q-editor';
    div.innerHTML=`<div class="q-head"><b>Q${i+1}</b><button class="btn secondary removeBtn">${T('remove')}</button></div>
      <div class="q-body">
        <div>
          <input class="input titleInput" placeholder="${T('titlePh')}" value="${(q.title||'').replaceAll('"','&quot;')}">
          <label class="help">${T('uploadA')}</label><input class="input leftInput" type="file" accept="image/*">
          <label class="help">${T('uploadB')}</label><input class="input rightInput" type="file" accept="image/*">
          <label class="help">${T('points')}</label><select class="select pointCount"><option value="3">3</option><option value="4">4</option><option value="5">5</option></select>
          <div class="selectorRow markRow"></div>
        </div>
        <div>
          <div class="editStage"><img class="editImg" alt=""></div>
        </div>
      </div>`;
    box.appendChild(div);
    div.querySelector('.removeBtn').onclick=()=>removeQuestion(i);
    const titleInput=div.querySelector('.titleInput');titleInput.oninput=e=>q.title=e.target.value;
    div.querySelector('.leftInput').onchange=e=>{const f=e.target.files?.[0];if(f)readFile(f,src=>{q.left=src;});};
    div.querySelector('.rightInput').onchange=e=>{const f=e.target.files?.[0];if(f)readFile(f,src=>{q.right=src;renderEditors();});};
    const pointCount=div.querySelector('.pointCount');pointCount.value=String(q.spots.length);pointCount.onchange=e=>{q.spots=defaultSpots(Number(e.target.value));q.active=0;renderEditors();};
    const stage=div.querySelector('.editStage'); const img=div.querySelector('.editImg'); img.src=q.right;
    const markRow=div.querySelector('.markRow');
    q.spots.forEach((p,idx)=>{const b=document.createElement('button');b.className='markBtn'+(q.active===idx?' active':'');b.textContent=`${T('pick')} ${idx+1}`;b.onclick=()=>{q.active=idx;renderEditors();};markRow.appendChild(b);});
    q.spots.forEach((p,idx)=>{const m=document.createElement('div');m.className='editMarker';m.style.left=(p.x*100)+'%';m.style.top=(p.y*100)+'%';m.textContent=idx+1;stage.appendChild(m);});
    stage.onclick=e=>{
      const r=stage.getBoundingClientRect(); const x=(e.clientX-r.left)/r.width, y=(e.clientY-r.top)/r.height;
      q.spots[q.active]={x:Math.max(.05,Math.min(.95,x)),y:Math.max(.05,Math.min(.95,y))}; renderEditors();
    };
  });
}
function startGame(){
  questions=setupQuestions.map(q=>({title:q.title||'Q',left:q.left,right:q.right,spots:q.spots.map(p=>({...p}))})).filter(q=>q.left&&q.right&&q.spots.length>=3);
  if(!questions.length){loadSamples(5);questions=setupQuestions.map(q=>({title:q.title,left:q.left,right:q.right,spots:q.spots.map(p=>({...p}))}));}
  currentIndex=0;found=[];attempts=0;score=0;logs=[];roundDone=false;$('#setup').classList.add('hidden');
  endAt=Date.now()+Number($('#timeLimit').value||300)*1000; clearInterval(timerId); timerId=setInterval(tick,200); loadRound(0); updateStats();
}
function tick(){const left=Math.max(0,endAt-Date.now()); const s=Math.ceil(left/1000); $('#timer').textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; if(left<=0)finish();}
function loadRound(i){currentIndex=i;found=new Array(questions[i].spots.length).fill(false);roundDone=false;$('#nextBtn').classList.add('hidden');renderRound(); updateStats();}
function renderRound(){
  const q=questions[currentIndex]; if(!q) return;
  $('#questionTitle').textContent=q.title; $('#roundText').textContent=`${T('round')}：${currentIndex+1}/${questions.length}`; $('#leftImg').src=q.left; $('#rightImg').src=q.right;
  const pane=$('#rightPane'); pane.querySelectorAll('.hitbox').forEach(n=>n.remove());
  q.spots.forEach((p,idx)=>{const d=document.createElement('div'); d.className='hitbox'+(found[idx]?' found':''); d.style.left=(p.x*100)+'%'; d.style.top=(p.y*100)+'%'; d.dataset.idx=idx; d.onclick=(e)=>{e.stopPropagation(); if(!found[idx]){found[idx]=true; score+=20; addLog(`✅ ${q.title} #${idx+1}`); renderRound(); if(found.every(Boolean)){roundDone=true; score+=40; addLog('🏁 '+T('foundAll')); $('#nextBtn').classList.remove('hidden');}}}; pane.appendChild(d);});
  pane.onclick=e=>{
    if(roundDone) return;
    const r=pane.getBoundingClientRect(), x=(e.clientX-r.left)/r.width, y=(e.clientY-r.top)/r.height;
    const q=questions[currentIndex]; let hit=false;
    q.spots.forEach((p,idx)=>{const dx=x-p.x, dy=y-p.y; if(!found[idx] && Math.hypot(dx,dy)<.08){found[idx]=true; score+=20; hit=true; addLog(`✅ ${q.title} #${idx+1}`);} });
    if(!hit){attempts++; score=Math.max(0,score-5); addLog('❌ '+T('notAll'));} else if(found.every(Boolean)){roundDone=true; score+=40; addLog('🏁 '+T('foundAll')); $('#nextBtn').classList.remove('hidden');}
    renderRound();
  };
  renderQuestionList(); renderLogs(); updateStats();
}
function nextRound(){ if(currentIndex<questions.length-1) loadRound(currentIndex+1); else finish(); }
function updateStats(){ $('#score').textContent=score; $('#foundCount').textContent=`${found.filter(Boolean).length}/${questions[currentIndex]?.spots.length||0}`; $('#roundCount').textContent=`${currentIndex+1}/${questions.length||0}`; $('#attempts').textContent=attempts;}
function renderQuestionList(){ $('#questionList').innerHTML=questions.map((q,i)=>`<div class="q-pill ${i===currentIndex?'active':''} ${i<currentIndex?'done':''}">Q${i+1}｜${q.title}<br><span>${q.spots.length} points</span></div>`).join('');}
function addLog(x){logs.unshift(x);logs=logs.slice(0,8);renderLogs();}
function renderLogs(){ $('#logs').innerHTML=logs.map(x=>`<div class="log">${x}</div>`).join('');}
function checkRound(){ if(found.every(Boolean)){ addLog('✅ '+T('foundAll')); if(!roundDone){roundDone=true; score+=40; $('#nextBtn').classList.remove('hidden'); updateStats();} } else {attempts++; score=Math.max(0,score-5); addLog('❌ '+T('notAll')); updateStats();}}
function finish(){clearInterval(timerId); $('#winDesc').textContent=`${T('final')}：${score}｜${T('round')}：${questions.length}`; $('#win').classList.remove('hidden');}
$('#lang').onchange=e=>{lang=e.target.value; localStorage.setItem('diff_lang',lang); applyLang();}; $('#setupLang').onchange=e=>{lang=e.target.value; localStorage.setItem('diff_lang',lang); applyLang();};
$('#setupBtn').onclick=()=>$('#setup').classList.remove('hidden'); $('#fullBtn').onclick=()=>document.documentElement.requestFullscreen?.(); $('#resetBtn').onclick=()=>location.reload();
$('#buildBtn').onclick=()=>buildSets(Number($('#presetCount').value||5)); $('#sampleBtn').onclick=()=>loadSamples(5); $('#addBtn').onclick=addQuestion; $('#startBtn').onclick=startGame; $('#checkBtn').onclick=checkRound; $('#nextBtn').onclick=nextRound;
applyLang(); loadSamples(5);
</script>
</body></html>

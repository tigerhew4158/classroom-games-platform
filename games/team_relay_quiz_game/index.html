<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>团队答题接力赛</title>
<style>
:root{--bg:#08111f;--bg2:#1d4ed8;--panel:rgba(15,23,42,.84);--line:rgba(255,255,255,.14);--text:#f8fafc;--muted:#cbd5e1;--accent:#fbbf24;--good:#22c55e;--bad:#ef4444;--blue:#38bdf8;--red:#fb7185}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top,rgba(56,189,248,.28),transparent 28%),linear-gradient(135deg,#020617,#1e3a8a 58%,#1d4ed8)}
button,input,textarea,select{font:inherit}.app{height:100vh;width:min(1520px,98vw);margin:0 auto;padding:12px;display:grid;grid-template-rows:auto 1fr;gap:10px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--line);background:rgba(15,23,42,.74);border-radius:20px;box-shadow:0 14px 34px rgba(0,0,0,.28)}.brand{display:flex;align-items:center;gap:12px}.logo{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;font-size:30px;background:linear-gradient(135deg,#38bdf8,#22c55e,#facc15)}
h1{margin:0;font-size:clamp(22px,2.5vw,36px);line-height:1.05}.sub{font-size:13px;color:var(--muted);margin-top:4px}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn{border:0;border-radius:13px;padding:9px 12px;font-weight:900;cursor:pointer;background:var(--accent);color:#111827;box-shadow:0 8px 18px rgba(0,0,0,.18)}.btn.secondary{background:#334155;color:#fff;border:1px solid var(--line);box-shadow:none}.btn.good{background:var(--good);color:#052e16}.btn.bad{background:var(--bad);color:#fff}.input,.select{border:1px solid rgba(255,255,255,.15);background:#08111f;color:#fff;border-radius:12px;padding:9px 10px;width:100%}
.main{min-height:0;display:grid;grid-template-columns:330px 1fr;gap:10px}.panel{min-height:0;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:12px;box-shadow:0 14px 34px rgba(0,0,0,.22);overflow:hidden}.section{padding:10px;border-radius:15px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);margin-bottom:10px}.section-title{font-size:14px;color:#e2e8f0;font-weight:900;margin-bottom:8px}.help{font-size:13px;line-height:1.55;color:var(--muted)}
.team-list{display:grid;gap:9px}.team-card{padding:11px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}.team-card.active{outline:3px solid var(--accent)}.team-head{display:flex;justify-content:space-between;gap:10px}.team-name{font-size:20px;font-weight:950}.team-score{font-size:24px;font-weight:950;color:#fde68a}.track{margin-top:9px;height:28px;border-radius:999px;background:#020617;border:1px solid rgba(255,255,255,.12);overflow:hidden;position:relative}.bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#22c55e,#38bdf8,#facc15);transition:.25s width}.runner{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:22px;transition:.25s left}
.game{min-height:0;display:grid;grid-template-rows:auto 1fr auto;gap:10px}.statusbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-radius:16px;background:rgba(15,23,42,.72);border:1px solid var(--line)}.turn{font-size:20px;font-weight:950}.timer{font-size:28px;font-weight:950;color:var(--accent)}
.question-card{min-height:0;display:grid;place-items:center;padding:20px;border-radius:24px;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.12),transparent 28%),rgba(2,6,23,.32);border:1px solid rgba(255,255,255,.12)}.question-inner{width:min(900px,96%);padding:24px;border-radius:26px;background:rgba(15,23,42,.9);border:1px solid rgba(255,255,255,.13);box-shadow:0 22px 60px rgba(0,0,0,.35)}.q-title{font-size:clamp(24px,3vw,42px);font-weight:950;line-height:1.3;margin-bottom:20px}.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}.option{text-align:left;border:1px solid rgba(255,255,255,.12);background:#1e293b;color:#fff;border-radius:16px;padding:16px;font-weight:900;cursor:pointer}.option:hover{background:#334155}.option.good{background:rgba(34,197,94,.38);border-color:#22c55e}.option.bad{background:rgba(239,68,68,.38);border-color:#ef4444}
.log-row{display:flex;gap:8px;flex-wrap:wrap;padding:10px;border-radius:16px;background:rgba(15,23,42,.72);border:1px solid var(--line);min-height:54px}.log-pill{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:13px;color:#e2e8f0}
.setup{position:fixed;inset:0;background:rgba(2,6,23,.92);z-index:20;display:grid;place-items:center;padding:18px}.setup-card{width:min(980px,96vw);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 28px 80px rgba(0,0,0,.5)}.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}textarea.input{grid-column:1/-1;min-height:230px;line-height:1.45}
.win{position:fixed;inset:0;background:rgba(2,6,23,.88);z-index:40;display:grid;place-items:center;text-align:center;padding:20px}.win-card{width:min(760px,94vw);background:linear-gradient(135deg,rgba(56,189,248,.23),rgba(34,197,94,.16));border:1px solid rgba(56,189,248,.38);border-radius:28px;padding:28px}.win h2{font-size:42px;margin:0 0 8px}.hidden{display:none!important}
@media(max-width:900px){html,body{overflow:auto}.app{height:auto}.main{grid-template-columns:1fr}.options,.setup-grid{grid-template-columns:1fr}textarea.input{grid-column:auto}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar"><div class="brand"><div class="logo">🏃</div><div><h1 id="title"></h1><div id="subtitle" class="sub"></div></div></div><div class="actions"><select id="lang" class="select" style="width:auto"><option value="zh">中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select><button id="setupBtn" class="btn secondary"></button><button id="fullBtn" class="btn secondary"></button><button id="resetBtn" class="btn bad"></button></div></div>
  <div class="main">
    <div class="panel"><div class="section"><div id="teamTitle" class="section-title"></div><div id="teamList" class="team-list"></div></div><div class="section"><div id="ruleTitle" class="section-title"></div><div id="ruleText" class="help"></div></div></div>
    <div class="game"><div class="statusbar"><div><div id="turnText" class="turn"></div><div id="progressText" class="help"></div></div><div id="timer" class="timer">00:00</div></div><div class="question-card"><div class="question-inner"><div id="qTitle" class="q-title"></div><div id="options" class="options"></div></div></div><div id="logs" class="log-row"></div></div>
  </div>
</div>
<div id="setup" class="setup"><div class="setup-card"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><h2 id="setupTitle" style="margin:0"></h2><select id="setupLang" class="select" style="width:auto"><option value="zh">中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select></div><div id="setupHelp" class="help" style="margin-top:8px"></div><div class="setup-grid" style="margin-top:12px"><select id="teamCount" class="select"><option value="2">2 Teams</option><option value="3">3 Teams</option><option value="4">4 Teams</option><option value="5">5 Teams</option></select><input id="finishSteps" class="input" type="number" min="3" max="20" value="8"><input id="timeLimit" class="input" type="number" min="60" max="900" value="300"><select id="wrongMode" class="select"><option value="stay">答错停留</option><option value="back">答错后退一格</option></select><textarea id="questionText" class="input"></textarea></div><div class="actions" style="margin-top:12px;justify-content:flex-start"><button id="sampleBtn" class="btn secondary"></button><button id="startBtn" class="btn good"></button></div></div></div>
<div id="win" class="win hidden"><div class="win-card"><h2 id="winTitle"></h2><p id="winDesc" style="font-size:20px;color:#e2e8f0"></p><button id="againBtn" class="btn good" onclick="location.reload()"></button></div></div>
<script>
const I18N={
 zh:{title:"团队答题接力赛",subtitle:"每队轮流答题，答对前进一格，先跑完全程的队伍获胜。",setup:"设置题库",fullscreen:"全屏",restart:"重开",setupTitle:"团队答题接力赛｜老师设置",setupHelp:"老师输入题库后，各队轮流作答。答对前进，答错停留或后退。适合全班分组复习。",teamTitle:"队伍进度",ruleTitle:"玩法说明",ruleText:"轮到某队时，该队派一位学生作答。答对就接力前进；答错按老师设定处理。先到终点获胜。",turn:"轮到",progress:"进度",sample:"载入示范",start:"开始游戏",again:"再玩一次",win:"获胜！",timeup:"时间到！",qph:"题目格式：题目 | 答案 | 选项1,选项2,选项3,选项4",correct:"答对，前进！",wrong:"答错。",team:"第 {n} 队"},
 en:{title:"Team Relay Quiz",subtitle:"Teams answer in turns. Correct answers move forward. First team to finish wins.",setup:"Question settings",fullscreen:"Fullscreen",restart:"Restart",setupTitle:"Team Relay Quiz | Teacher Settings",setupHelp:"Enter questions. Teams answer in turns. Correct answers move forward; wrong answers stay or move back. Great for team revision.",teamTitle:"Team progress",ruleTitle:"How to play",ruleText:"On each turn, one student answers for the team. Correct answer moves the team forward. First team to reach the finish wins.",turn:"Turn",progress:"Progress",sample:"Load sample",start:"Start game",again:"Play again",win:"wins!",timeup:"Time up!",qph:"Format: Question | Answer | Option 1,Option 2,Option 3,Option 4",correct:"Correct, move forward!",wrong:"Incorrect.",team:"Team {n}"},
 ms:{title:"Kuiz Relay Berkumpulan",subtitle:"Pasukan menjawab secara bergilir. Jawapan betul maju satu langkah. Pasukan pertama tamat menang.",setup:"Tetapan soalan",fullscreen:"Skrin penuh",restart:"Mula semula",setupTitle:"Kuiz Relay Berkumpulan | Tetapan Guru",setupHelp:"Masukkan soalan. Pasukan menjawab bergilir. Betul maju; salah kekal atau undur. Sesuai untuk ulang kaji kumpulan.",teamTitle:"Kemajuan pasukan",ruleTitle:"Cara bermain",ruleText:"Setiap giliran, seorang murid menjawab untuk pasukan. Jawapan betul menggerakkan pasukan ke depan. Pasukan pertama sampai penamat menang.",turn:"Giliran",progress:"Kemajuan",sample:"Muat contoh",start:"Mula permainan",again:"Main lagi",win:"menang!",timeup:"Masa tamat!",qph:"Format: Soalan | Jawapan | Pilihan 1,Pilihan 2,Pilihan 3,Pilihan 4",correct:"Betul, maju!",wrong:"Salah.",team:"Pasukan {n}"}
};
let lang=new URLSearchParams(location.search).get("lang")||localStorage.getItem("relay_lang")||"zh";let teams=[],questions=[],turn=0,current=null,finish=8,wrongMode="stay",logs=[],timerId=null,endAt=0;
const $=s=>document.querySelector(s);function T(k){return(I18N[lang]||I18N.zh)[k]||k}function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function applyLang(){document.documentElement.lang=lang==="zh"?"zh-Hans":lang;document.title=T("title");["title","subtitle","setupTitle","setupHelp","teamTitle","ruleTitle","ruleText"].forEach(id=>$("#"+id).textContent=T(id));$("#setupBtn").textContent=T("setup");$("#fullBtn").textContent=T("fullscreen");$("#resetBtn").textContent=T("restart");$("#sampleBtn").textContent=T("sample");$("#startBtn").textContent=T("start");$("#againBtn").textContent=T("again");$("#questionText").placeholder=T("qph");$("#lang").value=lang;$("#setupLang").value=lang;renderTeams();}
function sample(){const s=lang==="en"?"What does AI stand for? | Artificial Intelligence | Artificial Intelligence,Auto Internet,Advanced Image,Active Input\nWhich password is safer? | Long with mixed characters | Long with mixed characters,123456,Birthday,Name":lang==="ms"?"Apakah maksud AI? | Artificial Intelligence | Artificial Intelligence,Auto Internet,Advanced Image,Active Input\nKata laluan mana lebih selamat? | Panjang dan bercampur aksara | Panjang dan bercampur aksara,123456,Tarikh lahir,Nama":"AI 的英文全名是什么？ | Artificial Intelligence | Artificial Intelligence,Auto Internet,Advanced Image,Active Input\n安全密码应该怎样？ | 长且混合不同字符 | 长且混合不同字符,123456,生日,名字";$("#questionText").value=s;}
function parseQ(){const rows=$("#questionText").value.split("\n").map(x=>x.trim()).filter(Boolean),out=[];rows.forEach(row=>{const p=row.split("|").map(x=>x.trim());if(p.length>=2){let opts=p[2]?p[2].split(",").map(x=>x.trim()).filter(Boolean):[];if(!opts.includes(p[1]))opts.unshift(p[1]);out.push({q:p[0],a:p[1],opts:shuffle(opts).slice(0,4)})}});return out.length?out:[]}
function start(){questions=parseQ();if(!questions.length){sample();questions=parseQ()}finish=Number($("#finishSteps").value||8);wrongMode=$("#wrongMode").value;teams=Array.from({length:Number($("#teamCount").value||2)},(_,i)=>({name:T("team").replace("{n}",i+1),pos:0,score:0}));turn=0;logs=[];$("#setup").classList.add("hidden");nextQuestion();endAt=Date.now()+Number($("#timeLimit").value||300)*1000;timerId=setInterval(tick,200);renderTeams();}
function tick(){const left=Math.max(0,endAt-Date.now());const s=Math.ceil(left/1000);$("#timer").textContent=`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;if(left<=0)timeup()}
function nextQuestion(){current=questions[Math.floor(Math.random()*questions.length)];$("#turnText").textContent=`${T("turn")}：${teams[turn].name}`;$("#progressText").textContent=`${T("progress")}：${teams[turn].pos}/${finish}`;$("#qTitle").textContent=current.q;$("#options").innerHTML=shuffle(current.opts).map(o=>`<button class="option" data-answer="${String(o).replaceAll('"','&quot;')}">${o}</button>`).join("");document.querySelectorAll(".option").forEach(b=>b.onclick=()=>answer(b.dataset.answer,b));}
function answer(ans,btn){const team=teams[turn],ok=ans===current.a;if(ok){btn.classList.add("good");team.pos++;team.score+=10;addLog(`✅ ${team.name} ${T("correct")}`)}else{btn.classList.add("bad");if(wrongMode==="back")team.pos=Math.max(0,team.pos-1);addLog(`❌ ${team.name} ${T("wrong")}`)}renderTeams();if(team.pos>=finish){win(team);return;}setTimeout(()=>{turn=(turn+1)%teams.length;nextQuestion()},650)}
function renderTeams(){$("#teamList").innerHTML=teams.map((t,i)=>`<div class="team-card ${i===turn?"active":""}"><div class="team-head"><div class="team-name">${t.name}</div><div class="team-score">${t.score}</div></div><div class="track"><div class="bar" style="width:${Math.min(100,t.pos/finish*100)}%"></div><div class="runner" style="left:${Math.min(100,t.pos/finish*100)}%">🏃</div></div><div class="help">${t.pos}/${finish}</div></div>`).join("")}
function addLog(x){logs.unshift(x);logs=logs.slice(0,8);$("#logs").innerHTML=logs.map(l=>`<span class="log-pill">${l}</span>`).join("")}
function win(t){clearInterval(timerId);$("#winTitle").textContent=`🏆 ${t.name} ${T("win")}`;$("#winDesc").textContent=`${T("progress")}：${t.pos}/${finish}｜Score：${t.score}`;$("#win").classList.remove("hidden")}
function timeup(){clearInterval(timerId);const w=[...teams].sort((a,b)=>b.pos-a.pos||b.score-a.score)[0];$("#winTitle").textContent=`⏱️ ${T("timeup")}`;$("#winDesc").textContent=`🏆 ${w.name}｜${T("progress")}：${w.pos}/${finish}｜Score：${w.score}`;$("#win").classList.remove("hidden")}
$("#lang").onchange=e=>{lang=e.target.value;localStorage.setItem("relay_lang",lang);applyLang();sample()};$("#setupLang").onchange=e=>{lang=e.target.value;localStorage.setItem("relay_lang",lang);applyLang();sample()};$("#sampleBtn").onclick=sample;$("#startBtn").onclick=start;$("#setupBtn").onclick=()=>$("#setup").classList.remove("hidden");$("#resetBtn").onclick=()=>location.reload();$("#fullBtn").onclick=()=>document.documentElement.requestFullscreen?.();applyLang();sample();
</script>
</body>
</html>

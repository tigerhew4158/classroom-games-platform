<!doctype html>
<html lang="zh-Hans"><head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>关键词抢滩战</title>
<style>
:root{--line:rgba(255,255,255,.14);--text:#f8fafc;--muted:#cbd5e1;--gold:#facc15;--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--a:#38bdf8;--b:#f97316}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#082f49 0%,#0f766e 48%,#c0843d 100%)}
button,input,textarea,select{font:inherit}.app{height:100vh;width:min(1540px,98vw);margin:0 auto;padding:12px;display:grid;grid-template-rows:auto 1fr;gap:10px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--line);background:rgba(15,23,42,.78);border-radius:20px}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;font-size:30px;background:linear-gradient(135deg,#38bdf8,#facc15,#f97316)}h1{margin:0;font-size:clamp(22px,2.5vw,36px)}.sub{font-size:13px;color:var(--muted)}
.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:13px;padding:9px 12px;font-weight:900;cursor:pointer;background:var(--gold);color:#111827}.btn.secondary{background:#334155;color:#fff;border:1px solid var(--line)}.btn.good{background:var(--green);color:#052e16}.btn.bad{background:var(--red);color:#fff}.input,.select{border:1px solid rgba(255,255,255,.15);background:#08111f;color:#fff;border-radius:12px;padding:9px 10px;width:100%}
.main{min-height:0;display:grid;grid-template-columns:280px 1fr 280px;gap:10px}.panel{min-height:0;background:rgba(15,23,42,.84);border:1px solid var(--line);border-radius:20px;padding:12px;overflow:hidden}.section{padding:10px;border-radius:15px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);margin-bottom:10px}.section-title{font-size:14px;font-weight:900;margin-bottom:8px}.help{font-size:13px;color:var(--muted);line-height:1.5}
.teamStat{display:grid;grid-template-columns:1fr 1fr;gap:8px}.teamCard{padding:10px;border-radius:16px;background:rgba(2,6,23,.3);border:2px solid transparent}.teamCard.a{border-color:rgba(56,189,248,.6)}.teamCard.b{border-color:rgba(249,115,22,.6)}.teamCard .name{font-weight:900}.teamCard .score{font-size:30px;font-weight:950}
.board{min-height:0;display:grid;grid-template-rows:auto auto auto 1fr auto;gap:10px}.statusbar{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:16px;background:rgba(15,23,42,.72);border:1px solid var(--line)}.timer{font-size:30px;font-weight:950;color:var(--gold)}
.prompt{padding:12px 16px;border-radius:18px;background:linear-gradient(135deg,rgba(56,189,248,.18),rgba(251,191,36,.12));border:1px solid rgba(56,189,248,.25);font-size:24px;font-weight:950}.subprompt{padding:10px 14px;border-radius:14px;background:rgba(15,23,42,.72);border:1px solid var(--line)}
.beach{min-height:0;border-radius:24px;border:1px solid rgba(255,255,255,.12);background:linear-gradient(180deg,rgba(191,219,254,.18) 0,rgba(20,184,166,.08) 35%,rgba(251,191,36,.15) 70%,rgba(120,53,15,.10) 100%);padding:16px;display:grid;grid-template-rows:auto 1fr auto;gap:12px;overflow:hidden}
.tide{height:24px;border-radius:999px;background:rgba(2,6,23,.35);border:1px solid rgba(255,255,255,.08);position:relative;overflow:hidden}.wave{position:absolute;top:0;bottom:0;border-radius:999px}.wave.a{left:0;background:linear-gradient(90deg,rgba(56,189,248,.85),rgba(14,165,233,.65))}.wave.b{right:0;background:linear-gradient(90deg,rgba(251,146,60,.65),rgba(249,115,22,.9))}
.wordGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-content:start;overflow:auto}.word{padding:14px 10px;border-radius:18px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.16);backdrop-filter:blur(2px);text-align:center;font-weight:900;cursor:pointer;user-select:none;min-height:72px;display:grid;place-items:center}.word.used{opacity:.38;cursor:not-allowed}.word.a{outline:3px solid var(--a);background:rgba(56,189,248,.16)}.word.b{outline:3px solid var(--b);background:rgba(249,115,22,.18)}.legend{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.chip{padding:8px 12px;border-radius:999px;background:rgba(2,6,23,.55);border:1px solid rgba(255,255,255,.1);font-weight:800}
.q-list,.log-list{display:flex;flex-direction:column;gap:8px;overflow:hidden}.q-pill,.log{padding:8px 10px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:12px;line-height:1.45}.q-pill.active{background:rgba(56,189,248,.16);border-color:rgba(56,189,248,.4)}
.setup{position:fixed;inset:0;background:rgba(2,6,23,.92);z-index:20;display:grid;place-items:center;padding:18px}.setup-card{width:min(1000px,96vw);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid var(--line);border-radius:24px;padding:18px}.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}textarea.input{grid-column:1/-1;min-height:300px;line-height:1.45}.win{position:fixed;inset:0;background:rgba(2,6,23,.88);z-index:40;display:grid;place-items:center;text-align:center;padding:20px}.win-card{width:min(760px,94vw);background:linear-gradient(135deg,rgba(56,189,248,.23),rgba(251,191,36,.16));border:1px solid rgba(56,189,248,.38);border-radius:28px;padding:28px}.win h2{font-size:42px;margin:0 0 8px}.hidden{display:none!important}
@media(max-width:1100px){.main{grid-template-columns:260px 1fr}.panel.right{display:none}.wordGrid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){html,body{overflow:auto}.app{height:auto}.main{grid-template-columns:1fr}.setup-grid{grid-template-columns:1fr}.wordGrid{grid-template-columns:repeat(2,1fr)}}
</style></head>
<body>
<div class="app">
  <div class="topbar"><div class="brand"><div class="logo">🏖️</div><div><h1 id="title"></h1><div id="subtitle" class="sub"></div></div></div><div class="actions"><select id="lang" class="select" style="width:auto"><option value="zh">中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select><button id="setupBtn" class="btn secondary"></button><button id="fullBtn" class="btn secondary"></button><button id="resetBtn" class="btn bad"></button></div></div>
  <div class="main">
    <div class="panel"><div class="section"><div id="scoreTitle" class="section-title"></div><div class="teamStat"><div class="teamCard a"><div class="name" id="teamALabel"></div><div class="score" id="scoreA">0</div></div><div class="teamCard b"><div class="name" id="teamBLabel"></div><div class="score" id="scoreB">0</div></div></div></div><div class="section"><div id="ruleTitle" class="section-title"></div><div id="ruleText" class="help"></div></div></div>
    <div class="board">
      <div class="statusbar"><div><b id="roundText"></b><div id="hintText" class="help"></div></div><div id="timer" class="timer">00:00</div></div>
      <div id="promptTitle" class="prompt"></div>
      <div id="promptText" class="subprompt"></div>
      <div class="beach">
        <div class="tide"><div id="waveA" class="wave a"></div><div id="waveB" class="wave b"></div></div>
        <div id="wordGrid" class="wordGrid"></div>
        <div class="legend"><div class="chip" id="turnChip"></div><div class="chip" id="foundChip"></div></div>
      </div>
      <div class="actions"><button id="skipBtn" class="btn secondary"></button><button id="nextBtn" class="btn good hidden"></button></div>
    </div>
    <div class="panel right"><h3 id="qListTitle" style="margin:0 0 10px"></h3><div id="questionList" class="q-list"></div><h3 id="logTitle" style="margin:14px 0 10px"></h3><div id="logs" class="log-list"></div></div>
  </div>
</div>
<div id="setup" class="setup"><div class="setup-card"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><h2 id="setupTitle" style="margin:0"></h2><select id="setupLang" class="select" style="width:auto"><option value="zh">中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select></div><div id="setupHelp" class="help" style="margin-top:8px"></div><div class="setup-grid" style="margin-top:12px"><input id="timeLimit" class="input" type="number" min="60" max="1800" value="300"><textarea id="roundTextArea" class="input"></textarea></div><div class="actions" style="margin-top:12px;justify-content:flex-start"><button id="sampleBtn" class="btn secondary"></button><button id="startBtn" class="btn good"></button></div></div></div>
<div id="win" class="win hidden"><div class="win-card"><h2 id="winTitle"></h2><p id="winDesc" style="font-size:20px;color:#e2e8f0"></p><button id="againBtn" class="btn good" onclick="location.reload()"></button></div></div>
<script>
const I18N={
zh:{title:"关键词抢滩战",subtitle:"两队轮流抢答关键词，抢下正确词语就向沙滩推进。",setup:"设置题库",fullscreen:"全屏",restart:"重开",scoreTitle:"队伍得分",teamA:"A队",teamB:"B队",ruleTitle:"玩法说明",ruleText:"老师输入题组：题名｜提示句｜正确关键词｜全部关键词。两队轮流点击词卡；答对可抢下一块滩头并得分，答错则换对方。",round:"题组",hint:"点击正确关键词，为队伍抢下滩头。",skip:"跳过本题",next:"下一题",setupTitle:"关键词抢滩战｜老师设置",setupHelp:"每行一题，格式：题名|提示句|正确关键词1,正确关键词2|全部关键词1,全部关键词2,全部关键词3...。建议每题 6–10 个词。",sample:"载入示范",start:"开始游戏",qList:"题组清单",logTitle:"记录",turn:"当前回合",found:"已抢下",finish:"比赛结束！",again:"再玩一次",final:"最终总分",ph:"例：AI好帮手|请找出和 AI 学习有关的关键词|观察,提问,判断|观察,提问,判断,睡觉,发呆,跑步"},
en:{title:"Keyword Beachhead Battle",subtitle:"Two teams take turns to capture the correct keywords and push onto the beach.",setup:"Question settings",fullscreen:"Fullscreen",restart:"Restart",scoreTitle:"Team scores",teamA:"Team A",teamB:"Team B",ruleTitle:"How to play",ruleText:"Enter rounds in the format: title | prompt | correct keywords | all keywords. Teams tap word cards in turn. A correct answer captures beach ground and scores; a wrong answer passes the turn.",round:"Set",hint:"Tap the correct keywords to capture the beach.",skip:"Skip this set",next:"Next",setupTitle:"Keyword Beachhead Battle | Teacher Settings",setupHelp:"One round per line. Format: title|prompt|correct1,correct2|all1,all2,all3... Suggested 6–10 words per round.",sample:"Load sample",start:"Start game",qList:"Question list",logTitle:"Log",turn:"Turn",found:"Captured",finish:"Battle finished!",again:"Play again",final:"Final total score",ph:"Example: AI Helpers|Find keywords related to AI learning|observe,ask,judge|observe,ask,judge,sleep,daydream,run"},
ms:{title:"Pertempuran Pantai Kata Kunci",subtitle:"Dua kumpulan bergilir-gilir merampas kata kunci yang betul untuk mara ke pantai.",setup:"Tetapan soalan",fullscreen:"Skrin penuh",restart:"Mula semula",scoreTitle:"Markah kumpulan",teamA:"Kumpulan A",teamB:"Kumpulan B",ruleTitle:"Cara bermain",ruleText:"Masukkan set dengan format: tajuk | petunjuk | kata kunci betul | semua kata kunci. Kumpulan menekan kad kata secara bergilir. Jawapan betul merampas pantai dan mendapat markah; jawapan salah menyerahkan giliran.",round:"Set",hint:"Tekan kata kunci yang betul untuk merampas pantai.",skip:"Langkau set ini",next:"Seterusnya",setupTitle:"Pertempuran Pantai Kata Kunci | Tetapan Guru",setupHelp:"Satu set setiap baris. Format: tajuk|petunjuk|betul1,betul2|semua1,semua2,semua3... Cadangan 6–10 perkataan setiap set.",sample:"Muat contoh",start:"Mula permainan",qList:"Senarai set",logTitle:"Rekod",turn:"Giliran",found:"Dirampas",finish:"Pertempuran tamat!",again:"Main lagi",final:"Jumlah markah akhir",ph:"Contoh: AI pembantu|Cari kata kunci berkaitan pembelajaran AI|memerhati,bertanya,menilai|memerhati,bertanya,menilai,tidur,bermimpi,berlari"}
};
let lang=new URLSearchParams(location.search).get("lang")||localStorage.getItem("beach_lang")||"zh";let rounds=[],currentIndex=0,team='A',scoreA=0,scoreB=0,foundSet=new Set(),used=new Set(),logs=[],timerId=null,endAt=0;
const $=s=>document.querySelector(s);const T=k=>(I18N[lang]||I18N.zh)[k]||k;
function applyLang(){document.documentElement.lang=lang==='zh'?'zh-Hans':lang; document.title=T('title'); $('#title').textContent=T('title');$('#subtitle').textContent=T('subtitle');$('#setupBtn').textContent=T('setup');$('#fullBtn').textContent=T('fullscreen');$('#resetBtn').textContent=T('restart');$('#scoreTitle').textContent=T('scoreTitle');$('#teamALabel').textContent=T('teamA');$('#teamBLabel').textContent=T('teamB');$('#ruleTitle').textContent=T('ruleTitle');$('#ruleText').textContent=T('ruleText');$('#hintText').textContent=T('hint');$('#skipBtn').textContent=T('skip');$('#nextBtn').textContent=T('next');$('#setupTitle').textContent=T('setupTitle');$('#setupHelp').textContent=T('setupHelp');$('#sampleBtn').textContent=T('sample');$('#startBtn').textContent=T('start');$('#qListTitle').textContent=T('qList');$('#logTitle').textContent=T('logTitle');$('#winTitle').textContent=T('finish');$('#againBtn').textContent=T('again');$('#roundTextArea').placeholder=T('ph');$('#lang').value=lang;$('#setupLang').value=lang;render();}
function sample(){const s=lang==='en'
?`AI Helpers|Find keywords related to AI learning|observe,ask,judge|observe,ask,judge,sleep,daydream,run,collect,analyse
Cyber Safety|Find actions that keep your account safe|strong password,logout,check link|strong password,logout,check link,share password,click all links,post ID card`
:lang==='ms'
?`Pembantu AI|Cari kata kunci berkaitan pembelajaran AI|memerhati,bertanya,menilai|memerhati,bertanya,menilai,tidur,bermimpi,berlari,mengumpul,menganalisis
Keselamatan Siber|Cari tindakan yang menjaga akaun anda|kata laluan kuat,log keluar,semak pautan|kata laluan kuat,log keluar,semak pautan,kongsi kata laluan,klik semua pautan,siar kad pengenalan`
:`AI好帮手|请找出和 AI 学习有关的关键词|观察,提问,判断|观察,提问,判断,睡觉,发呆,跑步,收集,分析
网络安全|请找出保护账号安全的做法|强密码,登出,检查链接|强密码,登出,检查链接,分享密码,乱点链接,公开身份证`;
$('#roundTextArea').value=s;}
function parse(){const rows=$('#roundTextArea').value.split('\n').map(x=>x.trim()).filter(Boolean); return rows.map(row=>{const p=row.split('|').map(x=>x.trim()); const title=p[0]||'Q'; const prompt=p[1]||''; const correct=(p[2]||'').split(',').map(x=>x.trim()).filter(Boolean); let all=(p[3]||'').split(',').map(x=>x.trim()).filter(Boolean); if(!all.length) all=[...correct,'A','B','C']; all=[...new Set([...all,...correct])].sort(()=>Math.random()-.5); return {title,prompt,correct,all};}).filter(x=>x.correct.length>=2 && x.all.length>=4);}
function start(){rounds=parse(); if(!rounds.length){sample(); rounds=parse();} currentIndex=0; team='A'; scoreA=0; scoreB=0; logs=[]; $('#setup').classList.add('hidden'); endAt=Date.now()+Number($('#timeLimit').value||300)*1000; clearInterval(timerId); timerId=setInterval(tick,200); loadRound(0);}
function tick(){const left=Math.max(0,endAt-Date.now()); const s=Math.ceil(left/1000); $('#timer').textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; if(left<=0)finish();}
function loadRound(i){currentIndex=i; foundSet=new Set(); used=new Set(); team='A'; render();}
function render(){if(!rounds.length){$('#promptTitle').textContent=''; $('#promptText').textContent=''; return;} const r=rounds[currentIndex]; $('#promptTitle').textContent=r.title; $('#promptText').textContent=r.prompt; $('#roundText').textContent=`${T('round')}：${currentIndex+1}/${rounds.length}`; $('#scoreA').textContent=scoreA; $('#scoreB').textContent=scoreB; $('#turnChip').textContent=`${T('turn')}：${team==='A'?T('teamA'):T('teamB')}`; $('#foundChip').textContent=`${T('found')}：${foundSet.size}/${r.correct.length}`; const pctA=(scoreA+scoreB)?scoreA/(scoreA+scoreB)*100:50; $('#waveA').style.width=pctA+'%'; $('#waveB').style.width=(100-pctA)+'%'; const grid=$('#wordGrid'); grid.innerHTML=''; r.all.forEach(w=>{const d=document.createElement('div'); const owner=[...used].find(x=>x.split('::')[0]===w)?.split('::')[1]||''; d.className='word'+(usedHas(w)?' used':'')+(owner?' '+owner.toLowerCase():''); d.textContent=w; d.onclick=()=>pickWord(w); grid.appendChild(d);}); $('#questionList').innerHTML=rounds.map((q,i)=>`<div class="q-pill ${i===currentIndex?'active':''}">${i+1}. ${q.title}<br><span>${q.correct.length} keywords</span></div>`).join(''); $('#logs').innerHTML=logs.map(x=>`<div class="log">${x}</div>`).join('');}
function usedHas(word){return [...used].some(x=>x.split('::')[0]===word);}
function pickWord(word){const r=rounds[currentIndex]; if(usedHas(word)) return; used.add(word+'::'+team); if(r.correct.includes(word)){foundSet.add(word); if(team==='A') scoreA+=10; else scoreB+=10; logs.unshift(`✅ ${team==='A'?T('teamA'):T('teamB')}：${word}`); if(foundSet.size===r.correct.length){$('#nextBtn').classList.remove('hidden'); logs.unshift('🏁 '+r.title+'｜'+T('found')+` ${foundSet.size}/${r.correct.length}`);} } else {logs.unshift(`❌ ${team==='A'?T('teamA'):T('teamB')}：${word}`); team=(team==='A'?'B':'A');} logs=logs.slice(0,8); render();}
function nextRound(){if(currentIndex<rounds.length-1){$('#nextBtn').classList.add('hidden'); loadRound(currentIndex+1);} else finish();}
function skipRound(){team=(team==='A'?'B':'A'); logs.unshift(`↔️ ${T('turn')}：${team==='A'?T('teamA'):T('teamB')}`); logs=logs.slice(0,8); render();}
function finish(){clearInterval(timerId); const winner=scoreA===scoreB?'Draw':(scoreA>scoreB?T('teamA'):T('teamB')); $('#winDesc').textContent=`${T('final')}：${T('teamA')} ${scoreA} ｜ ${T('teamB')} ${scoreB} ｜ Winner: ${winner}`; $('#win').classList.remove('hidden');}
$('#lang').onchange=e=>{lang=e.target.value; localStorage.setItem('beach_lang',lang); applyLang();}; $('#setupLang').onchange=e=>{lang=e.target.value; localStorage.setItem('beach_lang',lang); applyLang();};
$('#setupBtn').onclick=()=>$('#setup').classList.remove('hidden'); $('#fullBtn').onclick=()=>document.documentElement.requestFullscreen?.(); $('#resetBtn').onclick=()=>location.reload(); $('#sampleBtn').onclick=sample; $('#startBtn').onclick=start; $('#skipBtn').onclick=skipRound; $('#nextBtn').onclick=nextRound;
sample(); applyLang();
</script></body></html>

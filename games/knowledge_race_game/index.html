<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知识赛马课堂小游戏</title>
  <style>
    :root{
      --bg:#f7f2e8;
      --panel:#fffaf0;
      --ink:#2e261c;
      --muted:#766858;
      --border:#e3d2b6;
      --shadow:0 16px 35px rgba(93,63,27,.18);
      --accent:#b87925;
      --accent2:#f2b84b;
      --good:#16965f;
      --bad:#c43d3d;
      --red:#e85d57;
      --blue:#4d8fe8;
      --green:#31ad63;
      --purple:#9a6ee8;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 20% 15%, rgba(255,225,146,.85), transparent 28%),
        radial-gradient(circle at 80% 10%, rgba(255,183,77,.55), transparent 25%),
        linear-gradient(135deg,#fff7e5 0%,#f3dfbc 55%,#e7c594 100%);
      min-height:100vh;
    }
    .app{max-width:1440px;margin:0 auto;padding:18px;}
    header{
      display:flex;align-items:center;justify-content:space-between;gap:14px;
      background:rgba(255,250,240,.9);border:1px solid var(--border);border-radius:24px;
      padding:14px 18px;box-shadow:var(--shadow);backdrop-filter:blur(8px);
    }
    .title-wrap{display:flex;align-items:center;gap:14px;min-width:0;}
    .logo{
      width:56px;height:56px;border-radius:16px;display:grid;place-items:center;font-size:34px;
      background:linear-gradient(135deg,#ffdd7b,#d08b23);box-shadow:inset 0 0 0 2px rgba(255,255,255,.45),0 8px 18px rgba(0,0,0,.12);
    }
    h1{font-size:clamp(24px,3vw,44px);margin:0;line-height:1.05;letter-spacing:.5px;}
    .subtitle{color:var(--muted);font-size:14px;margin-top:4px;}
    .header-actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;align-items:center;}
    button,select,input,textarea{
      font:inherit;border-radius:14px;border:1px solid var(--border);background:#fff;color:var(--ink);
    }
    button{cursor:pointer;padding:10px 14px;font-weight:750;transition:.14s transform,.14s filter,.14s box-shadow;box-shadow:0 5px 12px rgba(92,59,19,.08);}
    button:hover{transform:translateY(-1px);filter:brightness(1.02)}
    button:active{transform:translateY(1px)}
    .btn-primary{background:linear-gradient(135deg,#ffcf66,#bf7620);color:#241606;border:none;}
    .btn-dark{background:#2f261f;color:#fff;border:none;}
    .btn-good{background:linear-gradient(135deg,#40c57c,#12804f);color:#fff;border:none;}
    .btn-bad{background:linear-gradient(135deg,#ef7770,#b82c2c);color:#fff;border:none;}
    .btn-soft{background:#fff6e6;}
    .btn-small{padding:7px 10px;border-radius:11px;font-size:13px;}
    .layout{display:grid;grid-template-columns:360px minmax(0,1fr);gap:16px;margin-top:16px;align-items:start;}
    .layout.playing{grid-template-columns:1fr;}
    .settings{background:rgba(255,250,240,.95);border:1px solid var(--border);border-radius:24px;padding:16px;box-shadow:var(--shadow);}
    .settings.hidden{display:none;}
    .panel{background:rgba(255,250,240,.95);border:1px solid var(--border);border-radius:24px;padding:16px;box-shadow:var(--shadow);}
    .section-title{font-weight:900;font-size:18px;margin:6px 0 12px;display:flex;align-items:center;gap:8px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
    .form-row.one{grid-template-columns:1fr;}
    label{display:block;font-size:13px;color:var(--muted);font-weight:750;margin-bottom:6px;}
    select,input,textarea{width:100%;padding:10px 12px;background:#fffdfa;outline:none;}
    textarea{min-height:170px;resize:vertical;line-height:1.45;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;font-size:13px;}
    .hint{font-size:12px;color:var(--muted);line-height:1.45;margin:8px 0;}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
    .game-top{display:grid;grid-template-columns:minmax(260px,1fr) auto;gap:12px;align-items:stretch;margin-bottom:14px;}
    .status-card{background:linear-gradient(135deg,#fffaf0,#ffe7b6);border:1px solid var(--border);border-radius:20px;padding:12px 14px;display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap;}
    .stat{display:flex;flex-direction:column;gap:2px;min-width:90px;}
    .stat b{font-size:24px;line-height:1;color:#5c3611;}
    .stat span{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.4px;}
    .active-team-badge{font-size:20px;font-weight:950;padding:10px 16px;border-radius:999px;background:#fff;border:2px solid var(--accent2);box-shadow:0 7px 16px rgba(0,0,0,.08);}
    .quick-actions{display:flex;flex-wrap:wrap;gap:8px;align-content:center;justify-content:flex-end;}
    .race-board{padding:16px;border-radius:24px;background:linear-gradient(180deg,#7abd61 0%,#6eaa55 100%);border:3px solid rgba(105,75,31,.35);box-shadow:inset 0 0 0 3px rgba(255,255,255,.16),var(--shadow);position:relative;overflow:hidden;}
    .race-board:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.12) 0 1px,transparent 1px 80px),linear-gradient(0deg,rgba(0,0,0,.04) 0 1px,transparent 1px 60px);pointer-events:none;}
    .track-wrap{position:relative;z-index:1;display:flex;flex-direction:column;gap:12px;}
    .lane{display:grid;grid-template-columns:120px 1fr 64px;gap:12px;align-items:center;background:rgba(255,255,255,.23);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:10px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);}
    .team-label{border-radius:16px;color:#fff;padding:10px 12px;font-weight:950;text-align:center;text-shadow:0 1px 0 rgba(0,0,0,.18);box-shadow:0 7px 14px rgba(0,0,0,.12);}
    .team-label small{display:block;font-size:12px;font-weight:800;opacity:.9;margin-top:2px;}
    .track{position:relative;height:58px;background:repeating-linear-gradient(90deg,#e2b36b 0 54px,#d9a55b 54px 108px);border-radius:16px;overflow:hidden;border:2px solid rgba(86,54,19,.35);box-shadow:inset 0 4px 12px rgba(65,34,6,.22);}
    .track:after{content:"";position:absolute;top:0;bottom:0;right:3.5%;width:6px;background:repeating-linear-gradient(0deg,#111 0 8px,#fff 8px 16px);box-shadow:0 0 0 2px rgba(255,255,255,.7);}
    .steps{position:absolute;inset:0;display:flex;}
    .step{flex:1;border-right:1px dashed rgba(74,42,12,.35)}
    .racer{position:absolute;top:50%;transform:translate(-50%,-50%) scaleX(var(--flip,1));font-size:38px;filter:drop-shadow(0 5px 5px rgba(0,0,0,.23));transition:left .55s cubic-bezier(.18,.78,.24,1.24);white-space:nowrap;z-index:3;}
    .score-pill{font-weight:950;color:#fff;background:rgba(0,0,0,.35);padding:10px 8px;border-radius:14px;text-align:center;}
    .question-area{margin-top:14px;display:grid;grid-template-columns:minmax(0,1.2fr) minmax(270px,.8fr);gap:14px;}
    .question-card,.answer-card{background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:22px;padding:16px;box-shadow:0 10px 25px rgba(70,43,10,.08);}
    .q-label{color:var(--muted);font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
    .question-text{font-size:clamp(26px,3.4vw,52px);font-weight:950;line-height:1.12;min-height:92px;display:flex;align-items:center;word-break:break-word;}
    .answer-reveal{margin-top:10px;padding:10px 12px;border-radius:14px;background:#fff4d7;border:1px dashed #dbad5a;color:#5b3611;font-weight:800;display:none;word-break:break-word;}
    .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
    .option{font-size:18px;padding:14px;border-radius:16px;background:#fff;border:2px solid #ead6b4;min-height:54px;}
    .option.correct{background:#e4faee;border-color:#35a66b;}
    .option.wrong{background:#ffe8e8;border-color:#d65b5b;}
    .open-answer{display:flex;gap:8px;margin-top:12px;}
    .open-answer input{font-size:20px;font-weight:800;}
    .judge-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
    .team-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;}
    .team-card{background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:18px;padding:12px;text-align:center;box-shadow:0 8px 16px rgba(0,0,0,.06);}
    .team-card .emoji{font-size:30px}.team-card .name{font-weight:950;margin-top:4px}.team-card .score{font-size:28px;font-weight:950;color:#5a3411}.team-card.active{outline:4px solid rgba(255,199,88,.8);transform:translateY(-2px)}
    .message{margin-top:12px;padding:12px 14px;border-radius:16px;background:#fff6df;border:1px solid #ead6b4;font-weight:850;color:#5b3611;min-height:46px;display:flex;align-items:center;}
    .modal{position:fixed;inset:0;background:rgba(42,27,9,.58);display:none;place-items:center;padding:20px;z-index:20;}
    .modal.show{display:grid;}
    .modal-card{max-width:660px;width:100%;background:#fffaf0;border-radius:26px;border:1px solid var(--border);box-shadow:0 30px 80px rgba(0,0,0,.35);padding:24px;text-align:center;}
    .modal-card h2{font-size:36px;margin:0 0 8px}.ranking{margin-top:14px;display:grid;gap:8px}.rank-row{display:grid;grid-template-columns:50px 1fr 90px;gap:10px;align-items:center;background:#fff;border:1px solid var(--border);border-radius:16px;padding:10px 12px;font-weight:900}.rank-row:first-child{background:linear-gradient(135deg,#fff0b9,#ffd35b)}
    .file-input{display:none;}
    body.full-game .app{max-width:1920px;padding:12px;} body.full-game header{padding:10px 14px;} body.full-game .subtitle{display:none;} body.full-game .game-top{grid-template-columns:1fr auto;} body.full-game .race-board{padding:14px;} body.full-game .question-area{grid-template-columns:1fr .78fr;}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.game-top,.question-area{grid-template-columns:1fr}.team-cards{grid-template-columns:repeat(2,1fr)}.lane{grid-template-columns:90px 1fr 54px}.team-label{font-size:13px;padding:8px}.options{grid-template-columns:1fr}.header-actions{width:100%;justify-content:flex-start}header{flex-wrap:wrap}}
    @media (max-width:620px){.app{padding:10px}.form-row{grid-template-columns:1fr}.lane{grid-template-columns:1fr;gap:8px}.track{height:52px}.score-pill{width:100%}.question-text{font-size:28px}.team-cards{grid-template-columns:1fr}.open-answer{flex-direction:column}.quick-actions{justify-content:flex-start}}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title-wrap">
        <div class="logo" id="logoEmoji">🐎</div>
        <div>
          <h1 data-i18n="title">知识赛马</h1>
          <div class="subtitle" data-i18n="subtitle">答对就前进，最先到终点的队伍获胜</div>
        </div>
      </div>
      <div class="header-actions">
        <select id="uiLang" title="Language">
          <option value="zh">简体中文</option>
          <option value="en">English</option>
          <option value="ms">Bahasa Melayu</option>
        </select>
        <button class="btn-soft" id="fullscreenBtn" data-i18n="fullscreen">全屏</button>
        <button class="btn-soft" id="soundBtn" data-i18n="soundOn">音效：开</button>
      </div>
    </header>

    <main class="layout" id="layout">
      <aside class="settings" id="settingsPanel">
        <div class="section-title">⚙️ <span data-i18n="teacherSettings">老师设定</span></div>
        <div class="form-row">
          <div>
            <label data-i18n="teamCount">队伍数量</label>
            <select id="teamCount">
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>
          <div>
            <label data-i18n="raceTheme">赛道主题</label>
            <select id="raceTheme">
              <option value="horse" data-i18n="themeHorse">赛马</option>
              <option value="car" data-i18n="themeCar">赛车</option>
              <option value="rocket" data-i18n="themeRocket">火箭</option>
              <option value="boat" data-i18n="themeBoat">小船</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div>
            <label data-i18n="goalSteps">终点步数</label>
            <select id="goalSteps">
              <option value="6">6</option><option value="8" selected>8</option><option value="10">10</option><option value="12">12</option><option value="15">15</option>
            </select>
          </div>
          <div>
            <label data-i18n="gameTime">游戏时间</label>
            <select id="gameTime">
              <option value="0" data-i18n="noLimit">不限时</option>
              <option value="180">3 分钟</option><option value="300" selected>5 分钟</option><option value="480">8 分钟</option><option value="600">10 分钟</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div>
            <label data-i18n="correctAction">答对后</label>
            <select id="correctAction">
              <option value="next" data-i18n="nextTeam">换下一队</option>
              <option value="stay" data-i18n="sameTeam">本队继续</option>
            </select>
          </div>
          <div>
            <label data-i18n="wrongAction">答错后</label>
            <select id="wrongAction">
              <option value="next" data-i18n="nextTeam">换下一队</option>
              <option value="stay" data-i18n="sameTeam">本队继续</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div>
            <label data-i18n="wrongPenalty">答错是否后退</label>
            <select id="wrongPenalty">
              <option value="0" data-i18n="no">否</option>
              <option value="1" data-i18n="yes">是</option>
            </select>
          </div>
          <div>
            <label data-i18n="shuffleQuestions">题目顺序</label>
            <select id="shuffleMode">
              <option value="shuffle" data-i18n="shuffle">随机</option>
              <option value="order" data-i18n="order">顺序</option>
            </select>
          </div>
        </div>
        <div class="form-row one">
          <div>
            <label data-i18n="questionBank">题库</label>
            <textarea id="questionText"></textarea>
            <div class="hint" data-i18n="bankHint">格式：题目,正确答案,错误选项1,错误选项2,错误选项3。只有两栏时会变成开放题，由老师判断答对或答错。</div>
          </div>
        </div>
        <div class="toolbar">
          <button class="btn-primary" id="startBtn" data-i18n="startGame">开始游戏</button>
          <button class="btn-soft" id="importBtn" data-i18n="importTxt">导入TXT</button>
          <button class="btn-soft" id="exportBtn" data-i18n="exportTxt">导出TXT</button>
          <button class="btn-soft" id="sampleBtn" data-i18n="sample">示例题库</button>
        </div>
        <input class="file-input" type="file" id="fileInput" accept=".txt,text/plain" />
      </aside>

      <section class="panel" id="gamePanel">
        <div class="game-top">
          <div class="status-card">
            <div class="stat"><span data-i18n="timeLeft">剩余时间</span><b id="timeLeft">05:00</b></div>
            <div class="stat"><span data-i18n="questionNo">题号</span><b id="questionNo">0/0</b></div>
            <div class="active-team-badge" id="activeTeamBadge">🔴 红队</div>
          </div>
          <div class="quick-actions">
            <button class="btn-small btn-soft" id="showSettingsBtn" data-i18n="showSettings">显示设定</button>
            <button class="btn-small btn-soft" id="nextQuestionBtn" data-i18n="nextQuestion">下一题</button>
            <button class="btn-small btn-dark" id="endBtn" data-i18n="endGame">结束</button>
            <button class="btn-small btn-soft" id="resetBtn" data-i18n="reset">重置</button>
          </div>
        </div>

        <div class="race-board">
          <div class="track-wrap" id="tracks"></div>
        </div>

        <div class="question-area">
          <div class="question-card">
            <div class="q-label" data-i18n="currentQuestion">当前题目</div>
            <div class="question-text" id="questionDisplay" data-i18n="waitingStart">请先设定题库，然后点击开始游戏。</div>
            <div class="answer-reveal" id="answerReveal"></div>
            <div class="options" id="options"></div>
          </div>
          <div class="answer-card">
            <div class="q-label" data-i18n="answerArea">作答区</div>
            <div id="openMode">
              <div class="hint" data-i18n="openHint">开放题：学生口答或写在白板后，由老师点击答对 / 答错。</div>
              <div class="open-answer">
                <input id="openInput" type="text" data-i18n-placeholder="studentAnswer" placeholder="学生答案 / 备注" />
                <button class="btn-soft" id="revealBtn" data-i18n="showAnswer">显示答案</button>
              </div>
              <div class="judge-row">
                <button class="btn-good" id="correctBtn" data-i18n="correct">答对</button>
                <button class="btn-bad" id="wrongBtn" data-i18n="wrong">答错</button>
              </div>
            </div>
            <div class="message" id="message" data-i18n="readyMsg">准备开始。老师开始游戏后，设定区会自动隐藏。</div>
          </div>
        </div>

        <div class="team-cards" id="teamCards"></div>
      </section>
    </main>
  </div>

  <div class="modal" id="resultModal">
    <div class="modal-card">
      <h2 id="resultTitle">比赛结束</h2>
      <p id="resultText">排名如下</p>
      <div class="ranking" id="ranking"></div>
      <div class="toolbar" style="justify-content:center;margin-top:18px">
        <button class="btn-primary" id="playAgainBtn" data-i18n="playAgain">再玩一次</button>
        <button class="btn-soft" id="closeResultBtn" data-i18n="close">关闭</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const I18N = {
    zh:{
      title:'知识赛马',subtitle:'答对就前进，最先到终点的队伍获胜',fullscreen:'全屏',soundOn:'音效：开',soundOff:'音效：关',teacherSettings:'老师设定',teamCount:'队伍数量',raceTheme:'赛道主题',themeHorse:'赛马',themeCar:'赛车',themeRocket:'火箭',themeBoat:'小船',goalSteps:'终点步数',gameTime:'游戏时间',noLimit:'不限时',correctAction:'答对后',wrongAction:'答错后',nextTeam:'换下一队',sameTeam:'本队继续',wrongPenalty:'答错是否后退',yes:'是',no:'否',shuffleQuestions:'题目顺序',shuffle:'随机',order:'顺序',questionBank:'题库',bankHint:'格式：题目,正确答案,错误选项1,错误选项2,错误选项3。只有两栏时会变成开放题，由老师判断答对或答错。',startGame:'开始游戏',importTxt:'导入TXT',exportTxt:'导出TXT',sample:'示例题库',timeLeft:'剩余时间',questionNo:'题号',showSettings:'显示设定',hideSettings:'隐藏设定',nextQuestion:'下一题',endGame:'结束',reset:'重置',currentQuestion:'当前题目',waitingStart:'请先设定题库，然后点击开始游戏。',answerArea:'作答区',openHint:'开放题：学生口答或写在白板后，由老师点击答对 / 答错。',studentAnswer:'学生答案 / 备注',showAnswer:'显示答案',hideAnswer:'隐藏答案',correct:'答对',wrong:'答错',readyMsg:'准备开始。老师开始游戏后，设定区会自动隐藏。',red:'红队',blue:'蓝队',green:'绿队',purple:'紫队',score:'得分',step:'步',answer:'答案',correctMsg:'答对！前进一步。',wrongMsg:'答错。',finishWin:'冲过终点！',timeUp:'时间到！',gameOver:'比赛结束',rankingText:'排名如下',playAgain:'再玩一次',close:'关闭',questionEmpty:'题库为空，请先输入题目。',needTwoCols:'每一行至少需要：题目,正确答案',openQuestion:'开放题',choiceQuestion:'选择题',selectAnswer:'请选择答案。',settingsShown:'已显示老师设定。',settingsHidden:'老师设定已隐藏。',sampleLoaded:'已载入示例题库。',fileLoaded:'已导入题库。',exported:'已导出题库。',noMore:'题目已经用完，将重新循环。',manualNext:'已切换下一题。',teamTurn:'轮到',first:'第一名',draw:'平手'},
    en:{
      title:'Knowledge Race',subtitle:'Answer correctly to move forward. First team to the finish wins.',fullscreen:'Fullscreen',soundOn:'Sound: On',soundOff:'Sound: Off',teacherSettings:'Teacher Settings',teamCount:'Number of Teams',raceTheme:'Race Theme',themeHorse:'Horse Race',themeCar:'Car Race',themeRocket:'Rocket Race',themeBoat:'Boat Race',goalSteps:'Finish Steps',gameTime:'Game Time',noLimit:'No Limit',correctAction:'After Correct',wrongAction:'After Wrong',nextTeam:'Next Team',sameTeam:'Same Team Continues',wrongPenalty:'Move Back If Wrong',yes:'Yes',no:'No',shuffleQuestions:'Question Order',shuffle:'Random',order:'In Order',questionBank:'Question Bank',bankHint:'Format: Question,Correct Answer,Wrong Option 1,Wrong Option 2,Wrong Option 3. With only two columns, it becomes an open question for the teacher to judge.',startGame:'Start Game',importTxt:'Import TXT',exportTxt:'Export TXT',sample:'Sample Bank',timeLeft:'Time Left',questionNo:'Question',showSettings:'Show Settings',hideSettings:'Hide Settings',nextQuestion:'Next Question',endGame:'End',reset:'Reset',currentQuestion:'Current Question',waitingStart:'Set the question bank, then click Start Game.',answerArea:'Answer Area',openHint:'Open question: students answer orally or on the board. Teacher marks correct or wrong.',studentAnswer:'Student answer / note',showAnswer:'Show Answer',hideAnswer:'Hide Answer',correct:'Correct',wrong:'Wrong',readyMsg:'Ready. Teacher settings will hide automatically after starting.',red:'Red Team',blue:'Blue Team',green:'Green Team',purple:'Purple Team',score:'Score',step:'Step',answer:'Answer',correctMsg:'Correct! Move forward one step.',wrongMsg:'Wrong.',finishWin:'reached the finish line!',timeUp:'Time is up!',gameOver:'Game Over',rankingText:'Ranking',playAgain:'Play Again',close:'Close',questionEmpty:'Question bank is empty.',needTwoCols:'Each line needs at least: Question,Correct Answer',openQuestion:'Open Question',choiceQuestion:'Multiple Choice',selectAnswer:'Choose     ms:{
      title:'Lumba Ilmu',subtitle:'Jawab betul untuk mara. Pasukan pertama sampai penamat menang.',fullscreen:'Skrin Penuh',soundOn:'Bunyi: Hidup',soundOff:'Bunyi: Mati',teacherSettings:'Tetapan Guru',teamCount:'Bilangan Pasukan',raceTheme:'Tema Perlumbaan',themeHorse:'Lumba Kuda',themeCar:'Lumba Kereta',themeRocket:'Lumba Roket',themeBoat:'Lumba Bot',goalSteps:'Langkah Penamat',gameTime:'Masa Permainan',noLimit:'Tiada Had',correctAction:'Selepas Betul',wrongAction:'Selepas Salah',nextTeam:'Pasukan Seterusnya',sameTeam:'Pasukan Sama Teruskan',wrongPenalty:'Undur Jika Salah',yes:'Ya',no:'Tidak',shuffleQuestions:'Susunan Soalan',shuffle:'Rawak',order:'Ikut Turutan',questionBank:'Bank Soalan',bankHint:'Format: Soalan,Jawapan Betul,Pilihan Salah 1,Pilihan Salah 2,Pilihan Salah 3. Jika hanya dua lajur, ia menjadi soalan terbuka dan guru menilai betul/salah.',startGame:'Mula Permainan',importTxt:'Import TXT',exportTxt:'Eksport TXT',sample:'Contoh Soalan',timeLeft:'Masa Tinggal',questionNo:'Soalan',showSettings:'Papar Tetapan',hideSettings:'Sembunyi Tetapan',nextQuestion:'Soalan Seterusnya',endGame:'Tamat',reset:'Tetap Semula',currentQuestion:'Soalan Semasa',waitingStart:'Tetapkan bank soalan, kemudian klik Mula Permainan.',answerArea:'Ruang Jawapan',openHint:'Soalan terbuka: murid jawab secara lisan atau di papan putih. Guru klik betul atau salah.',studentAnswer:'Jawapan murid / catatan',showAnswer:'Papar Jawapan',hideAnswer:'Sembunyi Jawapan',correct:'Betul',wrong:'Salah',readyMsg:'Sedia. Tetapan guru akan disembunyikan selepas mula.',red:'Pasukan Merah',blue:'Pasukan Biru',green:'Pasukan Hijau',purple:'Pasukan Ungu',score:'Markah',step:'Langkah',answer:'Jawapan',correctMsg:'Betul! Maju satu langkah.',wrongMsg:'Salah.',finishWin:'sampai ke garisan penamat!',timeUp:'Masa tamat!',gameOver:'Permainan Tamat',rankingText:'Kedudukan',playAgain:'Main Lagi',close:'Tutup',questionEmpty:'Bank soalan kosong.',needTwoCols:'Setiap baris perlu sekurang-kurangnya: Soalan,Jawapan Betul',openQuestion:'Soalan Terbuka',choiceQuestion:'Pilihan Jawapan',selectAnswer:'Sila pilih jawapan.',settingsShown:'Tetapan guru dipaparkan.',settingsHidden:'Tetapan guru disembunyikan.',sampleLoaded:'Contoh soalan dimuatkan.',fileLoaded:'Bank soalan diimport.',exported:'Bank soalan dieksport.',noMore:'Semua soalan telah digunakan. Senarai dimulakan semula.',manualNext:'Soalan seterusnya dimuatkan.',teamTurn:'Giliran:',first:'Tempat Pertama',draw:'Seri'}
  };

  const TEAM_COLORS = ['var(--red)','var(--blue)','var(--green)','var(--purple)'];
  const TEAM_KEYS = ['red','blue','green','purple'];
  const TEAM_DOTS = ['🔴','🔵','🟢','🟣'];
  const THEME_EMOJI = {horse:'🐎', car:'🏎️', rocket:'🚀', boat:'⛵'};
  function getRacerFlip(theme){ return theme==='horse' ? -1 : 1; }
  const SAMPLE = `马来西亚首都是哪里？,吉隆坡,新山,槟城,马六甲\nAI 可以随便用同学照片做搞笑图吗？,不可以,可以,只要好笑就可以,老师没看到就可以\n太阳从哪里升起？,东方,西方,南方,北方\nCPU 的中文意思是什么？,中央处理器,显卡,硬盘,显示器\n光合作用需要什么？,阳光,盐,铁,沙子\npassword 的中文意思是什么？,密码\nChatGPT 属于什么工具？,AI工具\nJalur Gemilang 是什么？,马来西亚国旗\nSelamat pagi 的中文意思是什么？,早安\n水的化学式是什么？,H2O,CO2,O2,NaCl`;

  const $ = (id)=>document.getElementById(id);
  let lang='zh';
  let teams=[];
  let teamCount=2;
  let activeTeam=0;
  let goalSteps=8;
  let questions=[];
  let currentQ=null;
  let currentIndex=0;
  let questionCounter=0;
  let timer=null;
  let remaining=300;
  let gameStarted=false;
  let soundOn=true;
  let answerVisible=false;
  let selectedLocked=false;

  function t(key){return (I18N[lang] && I18N[lang][key]) || I18N.zh[key] || key;}

  function applyI18n(){
    document.documentElement.lang = lang==='zh'?'zh-CN':lang==='ms'?'ms':'en';
    document.querySelectorAll('[data-i18n]').forEach(el=>{
      const key=el.getAttribute('data-i18n');
      if(!key) return;
      if(el.tagName==='OPTION') el.textContent=t(key); else el.textContent=t(key);
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{
      el.placeholder=t(el.getAttribute('data-i18n-placeholder'));
    });
    $('soundBtn').textContent = soundOn ? t('soundOn') : t('soundOff');
    $('showSettingsBtn').textContent = $('settingsPanel').classList.contains('hidden') ? t('showSettings') : t('hideSettings');
    renderTeams();
    renderQuestion();
    updateStatus();
    saveSettings();
  }

  function saveSettings(){
    const data={lang,soundOn,teamCount:$('teamCount').value,raceTheme:$('raceTheme').value,goalSteps:$('goalSteps').value,gameTime:$('gameTime').value,correctAction:$('correctAction').value,wrongAction:$('wrongAction').value,wrongPenalty:$('wrongPenalty').value,shuffleMode:$('shuffleMode').value,questionText:$('questionText').value};
    localStorage.setItem('lead_knowledge_race_settings', JSON.stringify(data));
  }

  function loadSettings(){
    const raw=localStorage.getItem('lead_knowledge_race_settings');
    if(raw){
      try{
        const s=JSON.parse(raw);
        lang=s.lang || 'zh'; $('uiLang').value=lang; soundOn=s.soundOn!==false;
        ['teamCount','raceTheme','goalSteps','gameTime','correctAction','wrongAction','wrongPenalty','shuffleMode','questionText'].forEach(id=>{ if(s[id]!==undefined) $(id).value=s[id]; });
      }catch(e){}
    }
    if(!$('questionText').value.trim()) $('questionText').value=SAMPLE;
  }

  function parseCSVLine(line){
    const out=[]; let cur=''; let quote=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){
        if(quote && line[i+1]==='"'){cur+='"'; i++;}
        else quote=!quote;
      }else if((ch===',' || ch==='，') && !quote){out.push(cur.trim()); cur='';}
      else cur+=ch;
    }
    out.push(cur.trim());
    return out.filter((v,i)=>v!=='' || i<2);
  }

  function parseQuestions(){
    const lines=$('questionText').value.split(/\r?\n/).map(l=>l.trim()).filter(l=>l && !l.startsWith('#'));
    const list=[];
    for(const line of lines){
      const cols=parseCSVLine(line);
      if(cols.length>=2 && cols[0] && cols[1]){
        list.push({q:cols[0], answer:cols[1], wrongs:cols.slice(2).filter(Boolean)});
      }
    }
    return list;
  }

  function shuffle(arr){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];}
    return a;
  }

  function initTeams(){
    teamCount=parseInt($('teamCount').value,10);
    teams=Array.from({length:teamCount},(_,i)=>({name:t(TEAM_KEYS[i]),dot:TEAM_DOTS[i],score:0,steps:0,color:TEAM_COLORS[i]}));
    activeTeam=0;
  }

  function renderTeams(){
    if(!teams.length) initTeams();
    const theme=$('raceTheme').value;
    $('logoEmoji').textContent = THEME_EMOJI[theme] || '🐎';
    teams.forEach((tm,i)=>{tm.name=t(TEAM_KEYS[i]); tm.dot=TEAM_DOTS[i];});
    const tracks=$('tracks'); tracks.innerHTML='';
    const cards=$('teamCards'); cards.innerHTML='';
    goalSteps=parseInt($('goalSteps').value,10);
    teams.forEach((tm,i)=>{
      const lane=document.createElement('div'); lane.className='lane';
      lane.innerHTML=`<div class="team-label" style="background:${tm.color}">${tm.dot} ${tm.name}<small>${t('score')}: ${tm.score}</small></div><div class="track"><div class="steps">${Array.from({length:goalSteps},()=>'<div class="step"></div>').join('')}</div><div class="racer" id="racer-${i}" style="--flip:${getRacerFlip(theme)}">${THEME_EMOJI[theme] || '🐎'}</div></div><div class="score-pill">${tm.steps}/${goalSteps}</div>`;
      tracks.appendChild(lane);
      const card=document.createElement('div'); card.className='team-card'+(i===activeTeam?' active':'');
      card.innerHTML=`<div class="emoji">${tm.dot}</div><div class="name">${tm.name}</div><div class="score">${tm.score}</div><div class="hint">${tm.steps} ${t('step')}</div>`;
      cards.appendChild(card);
    });
    requestAnimationFrame(updateRacers);
  }

  function updateRacers(){
    goalSteps=parseInt($('goalSteps').value,10);
    teams.forEach((tm,i)=>{
      const r=$(`racer-${i}`);
      if(r){
        const pct=Math.min(96, Math.max(4, (tm.steps/goalSteps)*92 + 4));
        r.style.left=pct+'%';
      }
    });
  }

  function formatTime(sec){
    if(sec<=0) return '00:00';
    const m=Math.floor(sec/60).toString().padStart(2,'0');
    const s=(sec%60).toString().padStart(2,'0');
    return `${m}:${s}`;
  }

  function updateStatus(){
    $('timeLeft').textContent = parseInt($('gameTime').value,10)===0 ? '∞' : formatTime(remaining);
    $('questionNo').textContent = `${questionCounter}/${questions.length || 0}`;
    if(teams[activeTeam]) $('activeTeamBadge').textContent = `${teams[activeTeam].dot} ${teams[activeTeam].name}`;
  }

  function setMessage(msg){$('message').textContent=msg;}

  function beep(type='good'){
    if(!soundOn) return;
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o=ctx.createOscillator(); const g=ctx.createGain();
      o.type='sine'; o.frequency.value = type==='good'?660:(type==='bad'?180:420);
      g.gain.setValueAtTime(.001,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.18,ctx.currentTime+.02);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.18);
      o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+.2);
    }catch(e){}
  }

  function speak(text){
    if(!soundOn || !('speechSynthesis' in window)) return;
    const u=new SpeechSynthesisUtterance(text); u.rate=.95; u.pitch=1.05; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
  }

  function nextQuestion(manual=false){
    if(!questions.length){ setMessage(t('questionEmpty')); return; }
    if(currentIndex>=questions.length){
      setMessage(t('noMore'));
      currentIndex=0;
      if($('shuffleMode').value==='shuffle') questions=shuffle(questions);
    }
    currentQ=questions[currentIndex++];
    questionCounter++;
    selectedLocked=false; answerVisible=false; $('answerReveal').style.display='none'; $('answerReveal').textContent=''; $('openInput').value='';
    renderQuestion(); updateStatus();
    if(manual) setMessage(t('manualNext')); else setMessage(`${t('teamTurn')} ${teams[activeTeam].name}`);
  }

  function renderQuestion(){
    const qEl=$('questionDisplay'), optEl=$('options'), openEl=$('openMode');
    optEl.innerHTML='';
    if(!currentQ){ qEl.textContent=t('waitingStart'); openEl.style.display='block'; return; }
    qEl.textContent=currentQ.q;
    const isChoice=currentQ.wrongs && currentQ.wrongs.length>0;
    openEl.style.display=isChoice?'none':'block';
    if(isChoice){
      const opts=shuffle([currentQ.answer, ...currentQ.wrongs]);
      opts.forEach(opt=>{
        const btn=document.createElement('button'); btn.className='option'; btn.textContent=opt;
        btn.onclick=()=>chooseOption(btn,opt);
        optEl.appendChild(btn);
      });
    }
  }

  function chooseOption(btn,opt){
    if(selectedLocked || !gameStarted) return;
    selectedLocked=true;
    const all=[...document.querySelectorAll('.option')];
    all.forEach(b=>{ if(norm(b.textContent)===norm(currentQ.answer)) b.classList.add('correct'); });
    if(norm(opt)===norm(currentQ.answer)) handleCorrect(); else {btn.classList.add('wrong'); handleWrong();}
  }

  function norm(s){return String(s||'').trim().toLowerCase();}

  function handleCorrect(){
    if(!gameStarted || !teams[activeTeam]) return;
    teams[activeTeam].score+=1;
    teams[activeTeam].steps=Math.min(goalSteps, teams[activeTeam].steps+1);
    beep('good'); speak(currentQ ? currentQ.answer : '');
    setMessage(`${teams[activeTeam].name}：${t('correctMsg')}`);
    renderTeams(); updateStatus();
    if(teams[activeTeam].steps>=goalSteps){ finishGame(`${teams[activeTeam].name} ${t('finishWin')}`); return; }
    const stay=$('correctAction').value==='stay';
    setTimeout(()=>{ if(!gameStarted) return; if(!stay) moveNextTeam(); nextQuestion(); }, 650);
  }

  function handleWrong(){
    if(!gameStarted || !teams[activeTeam]) return;
    if($('wrongPenalty').value==='1'){
      teams[activeTeam].steps=Math.max(0, teams[activeTeam].steps-1);
      teams[activeTeam].score=Math.max(0, teams[activeTeam].score-1);
    }
    beep('bad');
    setMessage(`${teams[activeTeam].name}：${t('wrongMsg')} ${t('answer')}：${currentQ ? currentQ.answer : ''}`);
    renderTeams(); updateStatus();
    const stay=$('wrongAction').value==='stay';
    setTimeout(()=>{ if(!gameStarted) return; if(!stay) moveNextTeam(); nextQuestion(); }, 1000);
  }

  function moveNextTeam(){ activeTeam=(activeTeam+1)%teams.length; renderTeams(); updateStatus(); }

  function startGame(){
    const parsed=parseQuestions();
    if(!parsed.length){ alert(t('questionEmpty')+'\n'+t('needTwoCols')); return; }
    saveSettings();
    goalSteps=parseInt($('goalSteps').value,10);
    initTeams();
    questions=$('shuffleMode').value==='shuffle'?shuffle(parsed):parsed.slice();
    currentIndex=0; questionCounter=0; gameStarted=true; currentQ=null; selectedLocked=false;
    remaining=parseInt($('gameTime').value,10);
    $('settingsPanel').classList.add('hidden'); $('layout').classList.add('playing'); document.body.classList.add('full-game');
    renderTeams(); updateStatus(); nextQuestion();
    if(timer) clearInterval(timer);
    if(remaining>0){
      timer=setInterval(()=>{ remaining--; updateStatus(); if(remaining<=0){finishGame(t('timeUp'));}},1000);
    }
  }

  function resetGame(keepSettingsHidden=false){
    if(timer) clearInterval(timer); timer=null;
    gameStarted=false; currentQ=null; questions=[]; currentIndex=0; questionCounter=0; remaining=parseInt($('gameTime').value,10);
    initTeams(); renderTeams(); renderQuestion(); updateStatus(); setMessage(t('readyMsg'));
    if(!keepSettingsHidden){$('settingsPanel').classList.remove('hidden'); $('layout').classList.remove('playing'); document.body.classList.remove('full-game');}
  }

  function finishGame(reason=''){
    if(timer) clearInterval(timer); timer=null; gameStarted=false;
    beep('good');
    const sorted=teams.map((tm,i)=>({...tm,idx:i})).sort((a,b)=>b.steps-a.steps || b.score-a.score);
    $('resultTitle').textContent=t('gameOver'); $('resultText').textContent=reason || t('rankingText');
    $('ranking').innerHTML='';
    sorted.forEach((tm,i)=>{
      const row=document.createElement('div'); row.className='rank-row';
      row.innerHTML=`<div>${i===0?'🏆':i+1}</div><div>${tm.dot} ${tm.name}</div><div>${tm.score} / ${tm.steps}</div>`;
      $('ranking').appendChild(row);
    });
    $('resultModal').classList.add('show');
  }

  function toggleSettings(){
    const hidden=$('settingsPanel').classList.toggle('hidden');
    $('layout').classList.toggle('playing', hidden);
    document.body.classList.toggle('full-game', hidden);
    $('showSettingsBtn').textContent=hidden?t('showSettings'):t('hideSettings');
    setMessage(hidden?t('settingsHidden'):t('settingsShown'));
  }

  function exportTxt(){
    const blob=new Blob([$('questionText').value],{type:'text/plain;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='knowledge-race-question-bank.txt'; a.click(); URL.revokeObjectURL(a.href); setMessage(t('exported'));
  }

  function importTxt(file){
    const reader=new FileReader();
    reader.onload=()=>{$('questionText').value=reader.result; saveSettings(); setMessage(t('fileLoaded'));};
    reader.readAsText(file,'utf-8');
  }

  function bind(){
    $('uiLang').onchange=e=>{lang=e.target.value; applyI18n();};
    document.querySelectorAll('select,textarea,input').forEach(el=>{el.addEventListener('change',saveSettings); el.addEventListener('input',()=>{ if(el.id==='questionText') saveSettings();});});
    $('startBtn').onclick=startGame;
    $('resetBtn').onclick=()=>resetGame(false);
    $('endBtn').onclick=()=>finishGame('');
    $('nextQuestionBtn').onclick=()=>{ if(gameStarted) nextQuestion(true); };
    $('showSettingsBtn').onclick=toggleSettings;
    $('correctBtn').onclick=()=>{ if(gameStarted) handleCorrect(); };
    $('wrongBtn').onclick=()=>{ if(gameStarted) handleWrong(); };
    $('revealBtn').onclick=()=>{
      if(!currentQ) return;
      answerVisible=!answerVisible;
      $('answerReveal').style.display=answerVisible?'block':'none';
      $('answerReveal').textContent=`${t('answer')}：${currentQ.answer}`;
      $('revealBtn').textContent=answerVisible?t('hideAnswer'):t('showAnswer');
    };
    $('fullscreenBtn').onclick=()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); };
    $('soundBtn').onclick=()=>{soundOn=!soundOn; $('soundBtn').textContent=soundOn?t('soundOn'):t('soundOff'); saveSettings();};
    $('sampleBtn').onclick=()=>{$('questionText').value=SAMPLE; saveSettings(); setMessage(t('sampleLoaded'));};
    $('importBtn').onclick=()=>$('fileInput').click();
    $('fileInput').onchange=e=>{ if(e.target.files[0]) importTxt(e.target.files[0]); e.target.value=''; };
    $('exportBtn').onclick=exportTxt;
    $('playAgainBtn').onclick=()=>{$('resultModal').classList.remove('show'); startGame();};
    $('closeResultBtn').onclick=()=>{$('resultModal').classList.remove('show');};
    $('teamCount').onchange=()=>{initTeams(); renderTeams(); saveSettings();};
    $('raceTheme').onchange=()=>{renderTeams(); saveSettings();};
    $('goalSteps').onchange=()=>{goalSteps=parseInt($('goalSteps').value,10); renderTeams(); saveSettings();};
    window.addEventListener('keydown',e=>{
      if(e.key==='F11') return;
      if(e.code==='Space' && gameStarted){ e.preventDefault(); nextQuestion(true); }
      if(e.key==='1' && gameStarted && currentQ && currentQ.wrongs.length===0) handleCorrect();
      if(e.key==='2' && gameStarted && currentQ && currentQ.wrongs.length===0) handleWrong();
    });
  }

  loadSettings();
  initTeams();
  bind();
  applyI18n();
  resetGame(false);
})();
</script>

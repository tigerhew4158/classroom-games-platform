  <style>
    :root{
      --bg:#101827; --panel:#172236; --panel2:#1f2d44; --text:#f8fafc; --muted:#b8c1d1;
      --primary:#60a5fa; --good:#22c55e; --bad:#ef4444; --warn:#f59e0b;
      --border:rgba(255,255,255,.13); --shadow:0 18px 50px rgba(0,0,0,.28);
      --red:#ef4444; --blue:#3b82f6; --green:#22c55e; --purple:#a855f7;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans SC","Microsoft YaHei",Arial,sans-serif;background:radial-gradient(circle at top,#263956 0,#101827 45%,#0b1020 100%);color:var(--text);min-height:100vh}
    button,select,textarea,input{font:inherit}
    button{border:0;border-radius:14px;padding:10px 14px;cursor:pointer;font-weight:800;color:white;background:#31435f;transition:.18s transform,.18s filter,.18s background}
    button:hover{filter:brightness(1.08);transform:translateY(-1px)}
    button:disabled{opacity:.45;cursor:not-allowed;transform:none}
    .primary{background:linear-gradient(135deg,#2563eb,#7c3aed)}
    .success{background:linear-gradient(135deg,#16a34a,#22c55e)}
    .danger{background:linear-gradient(135deg,#dc2626,#fb7185)}
    .warning{background:linear-gradient(135deg,#d97706,#f59e0b)}
    .ghost{background:rgba(255,255,255,.08);border:1px solid var(--border)}
    .app{display:grid;grid-template-columns:390px 1fr;gap:18px;padding:18px;min-height:100vh}
    body.playing .app{grid-template-columns:1fr}
    body.playing .settings{display:none}
    .settings,.game{background:rgba(23,34,54,.88);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}

    .brand{display:flex;align-items:center;gap:12px;margin-bottom:14px}

    .section h3{margin:0 0 10px;font-size:15px;color:#dbeafe}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
    label{display:block;color:var(--muted);font-size:12px;font-weight:800;margin-bottom:6px}
    select,input,textarea{width:100%;border-radius:14px;border:1px solid var(--border);background:rgba(15,23,42,.85);color:var(--text);padding:10px;outline:none}
    textarea{min-height:170px;resize:vertical;line-height:1.45;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;font-size:13px}
    .hint{font-size:12px;color:var(--muted);line-height:1.45;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.18);padding:10px;border-radius:14px;margin-top:8px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.file{display:none}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.status{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.pill{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:999px;padding:8px 12px;font-weight:900;color:#e5e7eb}.timer{font-variant-numeric:tabular-nums;font-size:22px;background:rgba(0,0,0,.25);border-radius:16px;padding:8px 14px;border:1px solid var(--border)}
    .scoreboard{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.teamCard{position:relative;overflow:hidden;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:18px;padding:12px;min-height:94px}.teamCard.active{outline:3px solid rgba(255,255,255,.52);box-shadow:0 0 0 5px rgba(96,165,250,.14)}.teamHead{display:flex;justify-content:space-between;align-items:center;font-weight:1000}.teamScore{font-size:26px;font-weight:1000}.track{height:12px;background:rgba(255,255,255,.12);border-radius:999px;margin-top:10px;overflow:hidden}.fill{height:100%;width:0%;border-radius:999px;transition:.3s width}.teamIcon{position:absolute;right:10px;bottom:4px;font-size:34px;opacity:.22}
    .questionPanel{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;align-items:stretch}.questionBox,.sideBox{background:rgba(255,255,255,.065);border:1px solid var(--border);border-radius:22px;padding:16px}.questionLabel{font-size:12px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.06em}.questionText{font-size:28px;line-height:1.35;font-weight:1000;margin-top:8px}.answerPreview{font-size:14px;color:#cbd5e1;margin-top:10px;word-break:break-word}.turnName{font-size:34px;font-weight:1000;line-height:1.1}.message{min-height:48px;color:#e5e7eb;line-height:1.4;margin-top:10px}.message.good{color:#86efac}.message.bad{color:#fca5a5}.message.warn{color:#fcd34d}
    .workarea{display:grid;grid-template-columns:1fr;gap:12px;flex:1}.bank,.answerArea{background:rgba(15,23,42,.55);border:1px solid var(--border);border-radius:22px;padding:14px}.bankTitle{font-size:13px;color:var(--muted);font-weight:900;margin-bottom:10px;display:flex;justify-content:space-between;gap:10px}.tokenWrap{display:flex;gap:10px;flex-wrap:wrap;align-items:center;min-height:76px}.token{user-select:none;touch-action:none;border:1px solid rgba(255,255,255,.18);background:linear-gradient(180deg,rgba(255,255,255,.17),rgba(255,255,255,.08));border-radius:16px;padding:12px 16px;font-size:20px;font-weight:1000;box-shadow:0 8px 18px rgba(0,0,0,.16);cursor:pointer}.token:hover{filter:brightness(1.1)}.token.dragging{opacity:.45}.slots{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}.slot{min-height:64px;border:2px dashed rgba(255,255,255,.20);border-radius:16px;display:flex;align-items:center;justify-content:center;padding:8px;background:rgba(255,255,255,.035);position:relative}.slot:before{content:attr(data-n);position:absolute;top:5px;left:8px;color:rgba(255,255,255,.26);font-weight:900;font-size:12px}.slot.over{border-color:#93c5fd;background:rgba(147,197,253,.12)}.slot .token{width:100%;text-align:center;margin:0}.controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}.bigbtn{font-size:18px;padding:13px 20px}.rankModal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;z-index:20;padding:20px}.rankCard{width:min(640px,100%);background:#172236;border:1px solid var(--border);border-radius:26px;box-shadow:var(--shadow);padding:22px}.rankCard h2{margin:0 0 12px;font-size:28px}.rankList{display:grid;gap:10px}.rankItem{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:16px;padding:12px 14px;font-size:18px;font-weight:900}.confetti{position:fixed;pointer-events:none;inset:0;overflow:hidden;z-index:30}.confetti i{position:absolute;width:10px;height:14px;top:-20px;animation:fall 1.8s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(680deg);opacity:.2}}

<body>
  <div class="app">
    <aside class="settings" id="settingsPanel">
      <div class="brand"><div class="logo">🔀</div><div><h1 data-i18n="title">S003 句子排序挑战</h1><div class="sub" data-i18n="subtitle">把词语、句子或步骤排回正确顺序</div></div></div>
      <div class="section" style="border-top:0;margin-top:0;padding-top:0">
        <div class="row">
          <div><label data-i18n="uiLang">介面语言</label><select id="langSelect"><option value="zh">简体中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select></div>
          <div><label data-i18n="teamCount">队伍数量</label><select id="teamCount"><option value="2">2</option><option value="3">3</option><option value="4">4</option></select></div>
        </div>
        <div class="row">
          <div><label data-i18n="gameTime">游戏时间</label><select id="gameMinutes"><option value="0">不限时</option><option value="3">3 分钟</option><option value="5" selected>5 分钟</option><option value="8">8 分钟</option><option value="10">10 分钟</option></select></div>
          <div><label data-i18n="targetScore">目标分</label><input id="targetScore" type="number" min="1" max="50" value="8"></div>
        </div>
        <div class="row">
          <div><label data-i18n="questionMode">出题方式</label><select id="questionMode"><option value="random">随机</option><option value="order">顺序</option></select></div>
          <div><label data-i18n="wrongPenalty">答错扣分</label><select id="wrongPenalty"><option value="no">不扣分</option><option value="yes">扣 1 分</option></select></div>
        </div>
        <div class="row">
          <div><label data-i18n="rightTurn">答对后</label><select id="rightTurn"><option value="next">换下一队</option><option value="same">本队继续</option></select></div>
          <div><label data-i18n="wrongTurn">答错后</label><select id="wrongTurn"><option value="next">换下一队</option><option value="same">本队继续</option></select></div>
        </div>
        <div class="row">
          <div><label data-i18n="showAnswer">答错显示答案</label><select id="showAnswer"><option value="yes">显示</option><option value="no">不显示</option></select></div>
          <div><label data-i18n="sound">音效</label><select id="soundOn"><option value="yes">开启</option><option value="no">关闭</option></select></div>
        </div>
      </div>
      <div class="section">
        <h3 data-i18n="questionBank">题库设定</h3>
        <textarea id="bankInput" spellcheck="false"></textarea>
        <div class="hint" data-i18n="formatHint">格式：提示 | 正确顺序。项目请用 / 分隔。例如：AI流程 | 收集资料 / 标注图片 / 训练模型 / 测试模型。</div>
        <div class="actions" style="margin-top:10px">
          <button class="ghost" id="importBtn" data-i18n="importTxt">汇入 TXT</button><input class="file" id="fileInput" type="file" accept=".txt,text/plain">
          <button class="ghost" id="exportBtn" data-i18n="exportTxt">导出 TXT</button>
          <button class="ghost" id="sampleBtn" data-i18n="loadSample">载入范例</button>
        </div>
      </div>
      <div class="section">
        <button class="primary bigbtn" id="startBtn" style="width:100%" data-i18n="startGame">开始游戏</button>
      </div>
    </aside>

    <main class="game">
      <div class="topbar">
        <div class="status">
          <div class="pill" id="gameTitle" data-i18n="title">句子排序挑战</div>
          <div class="pill"><span data-i18n="round">回合</span> <span id="roundNo">0</span></div>
          <div class="timer" id="timer">05:00</div>
        </div>
        <div class="actions">
          <button class="ghost" id="showSettingsBtn" data-i18n="showSettings">显示老师设定</button>
          <button class="ghost" id="fullscreenBtn" data-i18n="fullscreen">全屏</button>
          <button class="warning" id="nextBtn" data-i18n="nextQuestion">下一题</button>
          <button class="danger" id="resetBtn" data-i18n="reset">重置</button>
        </div>
      </div>

      <section class="scoreboard" id="scoreboard"></section>

      <section class="questionPanel">
        <div class="questionBox">
          <div class="questionLabel" data-i18n="currentQuestion">当前题目</div>
          <div class="questionText" id="questionText">请先设定题库，然后开始游戏。</div>
          <div class="answerPreview" id="answerHint"></div>
        </div>
        <div class="sideBox">
          <div class="questionLabel" data-i18n="currentTeam">当前队伍</div>
          <div class="turnName" id="turnName">-</div>
          <div class="message" id="message" data-i18n="readyMsg">准备开始。老师点击“开始游戏”后，设定区会隐藏。</div>
        </div>
      </section>

      <section class="workarea">
        <div class="answerArea">
          <div class="bankTitle"><span data-i18n="answerArea">答案排序区</span><span id="filledCount">0/0</span></div>
          <div class="slots" id="slots"></div>
        </div>
        <div class="bank">
          <div class="bankTitle"><span data-i18n="wordBank">词语卡片区</span><span data-i18n="clickTip">点击或拖动卡片来排序</span></div>
          <div class="tokenWrap" id="wordBank"></div>
        </div>
      </section>

      <div class="controls">
        <button class="ghost bigbtn" id="clearBtn" data-i18n="clearAnswer">清空答案</button>
        <button class="success bigbtn" id="checkBtn" data-i18n="submitAnswer">提交答案</button>
      </div>
    </main>
  </div>

  <div class="rankModal" id="rankModal">
    <div class="rankCard">
      <h2 id="endTitle">游戏结束</h2>
      <div class="rankList" id="rankList"></div>
      <div class="actions" style="justify-content:flex-end;margin-top:16px">
        <button class="ghost" id="closeRankBtn" data-i18n="close">关闭</button>
        <button class="primary" id="playAgainBtn" data-i18n="playAgain">再玩一次</button>
      </div>
    </div>
  </div>
  <div class="confetti" id="confetti"></div>

function normalizeBankText(s){return String(s||'').trim().replaceAll(String.fromCharCode(13)+String.fromCharCode(10),String.fromCharCode(10));}
function isBuiltInSample(s){const v=normalizeBankText(s); return Object.values(SAMPLE_BANKS).some(x=>normalizeBankText(x)===v);}
function loadSampleForCurrentLanguage(){$('bankInput').value=getSampleBank(); save(); toast(t('loaded'),'good');};
let state={lang:'zh',started:false,teams:[],teamCount:2,currentTeam:0,questions:[],qIndex:0,round:0,active:null,tokens:[],answer:[],timer:null,timeLeft:300,targetScore:8,settings:{}};
const $=id=>document.getElementById(id); const t=k=>I18N[state.lang][k]||I18N.zh[k]||k;
const els=['langSelect','teamCount','gameMinutes','targetScore','questionMode','wrongPenalty','rightTurn','wrongTurn','showAnswer','soundOn','bankInput'];
function save(){const data={}; els.forEach(id=>data[id]=$(id).value); localStorage.setItem('sentenceOrderGameSettings_v2',JSON.stringify(data));}
function load(){try{const d=JSON.parse(localStorage.getItem('sentenceOrderGameSettings_v2')||'{}'); els.forEach(id=>{if(d[id]!=null)$(id).value=d[id]});}catch(e){} state.lang=$('langSelect').value||'zh'; if(!$('bankInput').value.trim() || isBuiltInSample($('bankInput').value))$('bankInput').value=getSampleBank();}
function applyLang(){state.lang=$('langSelect').value; document.documentElement.lang=state.lang==='zh'?'zh-CN':state.lang; document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.dataset.i18n)}); const gm=$('gameMinutes'); [...gm.options].forEach(o=>{const map={'0':'unlimited','3':'min3','5':'min5','8':'min8','10':'min10'}; o.textContent=t(map[o.value])}); const qm=$('questionMode'); qm.options[0].textContent=t('random'); qm.options[1].textContent=t('order'); $('wrongPenalty').options[0].textContent=t('no'); $('wrongPenalty').options[1].textContent=t('yes'); $('showAnswer').options[0].textContent=t('show'); $('showAnswer').options[1].textContent=t('hide'); $('soundOn').options[0].textContent=t('on'); $('soundOn').options[1].textContent=t('off'); ['rightTurn','wrongTurn'].forEach(id=>{const s=$(id); s.options[0].textContent=t('next'); s.options[1].textContent=t('same')}); renderScoreboard(); updateHeader(); save();}
function parseBank(text){
  const qs=[];
  String(text||'').split(/\r?\n/).forEach((line,idx)=>{
    line = line.trim();
    if(!line || line.startsWith('#')) return;

    // 修正：支持老师常用的中文符号，避免题库看起来有内容但开始游戏解析不到。
    // 支持格式：
    // 1. 提示 | 正确顺序1 / 正确顺序2 / 正确顺序3
    // 2. 提示｜正确顺序1／正确顺序2／正确顺序3
    // 3. 提示：正确顺序1 / 正确顺序2 / 正确顺序3
    // 4. 直接输入：正确顺序1 / 正确顺序2 / 正确顺序3
    let normalized = line
      .replaceAll('｜','|')
      .replaceAll('／','/')
      .replaceAll('→','/')
      .replaceAll('⇒','/')
      .replaceAll('，',',')
      .replaceAll('；',';');

    let prompt='', order=normalized;
    const separators = ['|','=>','：',':','\t'];
    let used = false;
    for(const sep of separators){
      if(normalized.includes(sep)){
        const parts = normalized.split(sep);
        prompt = parts.shift().trim();
        order = parts.join(sep).trim();
        used = true;
        break;
      }
    }

    if(!used){
      prompt = t('question')+' '+(idx+1);
      order = normalized;
    }

    let segs = splitSegments(order);
    if(segs.length >= 2){
      qs.push({prompt,segments:segs,raw:line});
    }
  });
  return qs;
}
function splitSegments(s){s=s.trim(); let arr=[]; if(s.includes('/')) arr=s.split('/'); else if(s.includes('→')) arr=s.split('→'); else if(/\s/.test(s)) arr=s.split(/\s+/); else {try{arr=[...s.matchAll(/[\p{Script=Han}]|[A-Za-z0-9]+|[^\s]/gu)].map(m=>m[0]);}catch(e){arr=s.split('')}} return arr.map(x=>x.trim()).filter(Boolean);}
function shuffle(a){const b=a.slice(); for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]];} return b;}
function makeTeams(n){const keys=['teamRed','teamBlue','teamGreen','teamPurple'], colors=['var(--red)','var(--blue)','var(--green)','var(--purple)'], icons=['🐎','🏎️','🚀','⛵']; return Array.from({length:n},(_,i)=>({name:t(keys[i]),score:0,color:colors[i],icon:icons[i]}));}
function readSettings(){state.teamCount=parseInt($('teamCount').value,10); state.targetScore=Math.max(1,parseInt($('targetScore').value,10)||8); state.settings={minutes:parseInt($('gameMinutes').value,10),mode:$('questionMode').value,wrongPenalty:$('wrongPenalty').value==='yes',rightTurn:$('rightTurn').value,wrongTurn:$('wrongTurn').value,showAnswer:$('showAnswer').value==='yes',sound:$('soundOn').value==='yes'};}
function startGame(){
  readSettings();
  save();

  const bankText = $('bankInput').value;
  const qs = parseBank(bankText);

  if(!qs.length){
    // 再尝试一次：把常见中文符号转成标准分隔符后解析。
    const fixedText = String(bankText||'')
      .replaceAll('｜','|')
      .replaceAll('／','/')
      .replaceAll('→','/')
      .replaceAll('⇒','/')
      .replaceAll('，',',')
      .replaceAll('；',';');
    const qs2 = parseBank(fixedText);
    if(qs2.length){
      $('bankInput').value = fixedText;
      state.questions = state.settings.mode==='random'?shuffle(qs2):qs2;
    }else{
      toast(t('bankError'),'bad');
      return;
    }
  }else{
    state.questions=state.settings.mode==='random'?shuffle(qs):qs;
  }

  state.qIndex=0; state.round=0; state.currentTeam=0; state.teams=makeTeams(state.teamCount);
  state.started=true; state.timeLeft=state.settings.minutes>0?state.settings.minutes*60:0;
  document.body.classList.add('playing'); $('rankModal').style.display='none';
  renderScoreboard(); updateTimer(); clearInterval(state.timer);
  if(state.settings.minutes>0){
    state.timer=setInterval(()=>{state.timeLeft--; updateTimer(); if(state.timeLeft<=0)endGame(t('timeUp'));},1000);
  }
  nextQuestion(false);
  toast(t('settingsHidden'),'warn');
  save();
}
function updateTimer(){if(state.settings.minutes===0){$('timer').textContent='∞'; return;} const m=Math.floor(state.timeLeft/60), s=state.timeLeft%60; $('timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
function renderScoreboard(){const board=$('scoreboard'); board.innerHTML=''; const teams=state.teams.length?state.teams:makeTeams(parseInt($('teamCount').value,10)||2); board.style.gridTemplateColumns=`repeat(${Math.min(teams.length,4)},1fr)`; teams.forEach((team,i)=>{const pct=Math.max(0,Math.min(100,(team.score/(state.targetScore||8))*100)); const div=document.createElement('div'); div.className='teamCard '+(state.started&&i===state.currentTeam?'active':''); div.innerHTML=`<div class="teamHead"><span>${team.name}</span><span class="teamScore">${team.score}</span></div><div class="track"><div class="fill" style="width:${pct}%;background:${team.color}"></div></div><div class="teamIcon">${team.icon}</div>`; board.appendChild(div);});}
function updateHeader(){$('gameTitle').textContent=t('title'); $('turnName').textContent=state.teams[state.currentTeam]?.name||'-'; $('roundNo').textContent=state.round||0;}
function nextQuestion(advanceTurn=true){if(!state.started){toast(t('needStart'),'warn'); return;} if(advanceTurn) state.currentTeam=(state.currentTeam+1)%state.teams.length; if(state.settings.mode==='random' && state.qIndex>=state.questions.length){state.questions=shuffle(parseBank($('bankInput').value)); state.qIndex=0;} if(state.settings.mode==='order' && state.qIndex>=state.questions.length) state.qIndex=0; const q=state.questions[state.qIndex++]; if(!q){toast(t('noQuestion'),'bad');return;} state.active=q; state.round++; let shuffled=shuffle(q.segments.map((text,i)=>({id:'tok'+Date.now()+'_'+i,text,placed:null}))); let guard=0; while(shuffled.map(x=>x.text).join('\u0001')===q.segments.join('\u0001') && q.segments.length>2 && guard++<8) shuffled=shuffle(shuffled); state.tokens=shuffled; state.answer=Array(q.segments.length).fill(null); $('questionText').textContent=q.prompt||t('question'); $('answerHint').textContent=''; renderTokens(); renderScoreboard(); updateHeader(); toast('', ''); save();}
function renderTokens(){const bank=$('wordBank'), slots=$('slots'); bank.innerHTML=''; slots.innerHTML=''; state.tokens.filter(tok=>tok.placed==null).forEach(tok=>bank.appendChild(tokenEl(tok))); state.answer.forEach((tok,i)=>{const slot=document.createElement('div'); slot.className='slot'; slot.dataset.n=i+1; slot.dataset.index=i; slot.addEventListener('dragover',e=>{e.preventDefault(); slot.classList.add('over')}); slot.addEventListener('dragleave',()=>slot.classList.remove('over')); slot.addEventListener('drop',e=>{e.preventDefault(); slot.classList.remove('over'); const id=e.dataTransfer.getData('text/plain'); placeToken(id,i);}); if(tok) slot.appendChild(tokenEl(tok,true)); slots.appendChild(slot);}); bank.addEventListener('dragover',e=>e.preventDefault()); bank.addEventListener('drop',e=>{e.preventDefault(); const id=e.dataTransfer.getData('text/plain'); unplaceToken(id)}); $('filledCount').textContent=`${state.answer.filter(Boolean).length}/${state.answer.length}`;}
function tokenEl(tok,inSlot=false){const el=document.createElement('div'); el.className='token'; el.draggable=true; el.textContent=tok.text; el.dataset.id=tok.id; el.addEventListener('dragstart',e=>{el.classList.add('dragging'); e.dataTransfer.setData('text/plain',tok.id)}); el.addEventListener('dragend',()=>el.classList.remove('dragging')); el.addEventListener('click',()=>{if(inSlot)unplaceToken(tok.id); else placeToken(tok.id,firstEmpty());}); return el;}
function firstEmpty(){return state.answer.findIndex(x=>!x)}
function findToken(id){return state.tokens.find(x=>x.id===id)}
function placeToken(id,index){if(index<0)return; const tok=findToken(id); if(!tok)return; if(tok.placed!=null) state.answer[tok.placed]=null; if(state.answer[index]) state.answer[index].placed=null; tok.placed=index; state.answer[index]=tok; renderTokens();}
function unplaceToken(id){const tok=findToken(id); if(!tok)return; if(tok.placed!=null){state.answer[tok.placed]=null; tok.placed=null; renderTokens();}}
function clearAnswer(){state.tokens.forEach(t=>t.placed=null); state.answer=Array(state.active?.segments.length||0).fill(null); renderTokens();}
function checkAnswer(){if(!state.started||!state.active){toast(t('needStart'),'warn'); return;} if(state.answer.some(x=>!x)){toast(t('notFull'),'warn'); return;} const user=state.answer.map(x=>x.text); const ok=user.length===state.active.segments.length && user.every((v,i)=>v===state.active.segments[i]); if(ok) handleCorrect(); else handleWrong();}
function handleCorrect(){const team=state.teams[state.currentTeam]; team.score++; sound('good'); toast(t('correct'),'good'); confetti(); renderScoreboard(); if(team.score>=state.targetScore){endGame(t('targetReached')); return;} setTimeout(()=>{if(state.settings.rightTurn==='next') nextQuestion(true); else nextQuestion(false);},900);}
function handleWrong(){const team=state.teams[state.currentTeam]; if(state.settings.wrongPenalty) team.score--; sound('bad'); renderScoreboard(); const ans=state.active.segments.join(' / '); toast(t('wrong')+(state.settings.showAnswer?' '+t('correctAnswer')+ans:''),'bad'); $('answerHint').textContent=state.settings.showAnswer?t('correctAnswer')+ans:''; setTimeout(()=>{if(state.settings.wrongTurn==='next') nextQuestion(true); else nextQuestion(false);}, state.settings.showAnswer?1800:900);}
function toast(msg,type){const m=$('message'); m.textContent=msg||''; m.className='message '+(type||'');}
function sound(kind){if(!state.settings.sound)return; try{const ctx=new (window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=kind==='good'?740:170; o.type=kind==='good'?'triangle':'sawtooth'; g.gain.setValueAtTime(.0001,ctx.currentTime); g.gain.exponentialRampToValueAtTime(.12,ctx.currentTime+.02); g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+.22); o.start(); o.stop(ctx.currentTime+.24);}catch(e){}}
function endGame(reason){if(!state.started)return; clearInterval(state.timer); state.started=false; document.body.classList.remove('playing'); const ranked=state.teams.slice().sort((a,b)=>b.score-a.score); $('endTitle').textContent=`${t('gameOver')} · ${reason}`; const list=$('rankList'); list.innerHTML=''; ranked.forEach((team,i)=>{const item=document.createElement('div'); item.className='rankItem'; item.innerHTML=`<span>${i+1}. ${team.name} ${i===0?'🏆':''}</span><span>${team.score} ${t('score')}</span>`; list.appendChild(item);}); $('rankModal').style.display='flex'; renderScoreboard(); updateHeader();}
function resetGame(){clearInterval(state.timer); state.started=false; document.body.classList.remove('playing'); state.teams=makeTeams(parseInt($('teamCount').value,10)||2); state.currentTeam=0; state.round=0; state.active=null; state.tokens=[]; state.answer=[]; $('rankModal').style.display='none'; $('questionText').textContent=t('readyMsg'); $('answerHint').textContent=''; $('wordBank').innerHTML=''; $('slots').innerHTML=''; $('filledCount').textContent='0/0'; toast(t('readyMsg'),''); readSettings(); state.timeLeft=state.settings.minutes*60; updateTimer(); renderScoreboard(); updateHeader();}
function confetti(){const c=$('confetti'); c.innerHTML=''; const colors=['#60a5fa','#22c55e','#f59e0b','#ef4444','#a855f7','#f472b6']; for(let i=0;i<38;i++){const x=document.createElement('i'); x.style.left=Math.random()*100+'vw'; x.style.background=colors[i%colors.length]; x.style.animationDelay=(Math.random()*.25)+'s'; x.style.transform=`rotate(${Math.random()*360}deg)`; c.appendChild(x);} setTimeout(()=>c.innerHTML='',2100);}
function exportTxt(){const blob=new Blob([$('bankInput').value],{type:'text/plain;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='sentence_order_questions.txt'; a.click(); URL.revokeObjectURL(a.href);}
function importTxt(file){const r=new FileReader(); r.onload=()=>{$('bankInput').value=r.result; toast(t('loaded'),'good'); save();}; r.readAsText(file,'utf-8');}
function fullscreen(){const el=document.documentElement; if(!document.fullscreenElement) el.requestFullscreen?.(); else document.exitFullscreen?.();}
$('langSelect').addEventListener('change',applyLang); ['teamCount','gameMinutes','targetScore','questionMode','wrongPenalty','rightTurn','wrongTurn','showAnswer','soundOn','bankInput'].forEach(id=>$(id).addEventListener('change',save)); $('bankInput').addEventListener('input',save);
$('startBtn').addEventListener('click',startGame); $('showSettingsBtn').addEventListener('click',()=>{document.body.classList.toggle('playing'); toast(document.body.classList.contains('playing')?t('settingsHidden'):t('settingsShown'),'warn')}); $('fullscreenBtn').addEventListener('click',fullscreen); $('nextBtn').addEventListener('click',()=>nextQuestion(true)); $('resetBtn').addEventListener('click',resetGame); $('clearBtn').addEventListener('click',clearAnswer); $('checkBtn').addEventListener('click',checkAnswer); $('sampleBtn').addEventListener('click',()=>{ $('bankInput').value=getSampleBank(); save(); toast(t('loaded'),'good'); }); $('exportBtn').addEventListener('click',exportTxt); $('importBtn').addEventListener('click',()=>$('fileInput').click()); $('fileInput').addEventListener('change',e=>{if(e.target.files[0]) importTxt(e.target.files[0])}); $('closeRankBtn').addEventListener('click',()=>$('rankModal').style.display='none'); $('playAgainBtn').addEventListener('click',()=>{ $('rankModal').style.display='none'; startGame();});
load(); applyLang(); resetGame();
</script>

<script>
(function(){
  const SAMPLE_TEXTS = {
    zh:`中文句子 | 我 / 喜欢 / 学习 / 人工智能
学习步骤 | 先观察 / 再思考 / 最后回答
电脑操作 | 打开电脑 / 输入密码 / 开始学习
资料处理 | 收集资料 / 分析资料 / 做出结论
AI项目流程 | 收集资料 / 标注图片 / 训练模型 / 测试模型 / 展示成果
网络安全步骤 | 发现可疑链接 / 不要点击 / 告诉老师或家长 / 删除信息
科学实验步骤 | 提出问题 / 作出假设 / 进行实验 / 记录结果 / 得出结论
作文结构 | 开头 / 发展 / 高潮 / 结尾`,
    en:`English Sentence | I / like / to / learn / AI
Learning Steps | Observe first / Think carefully / Answer clearly
Computer Steps | Turn on the computer / Enter the password / Start learning
Data Process | Collect data / Analyse data / Make a conclusion
AI Project Flow | Collect data / Label images / Train the model / Test the model / Present the result
Cyber Safety Steps | Find a suspicious link / Do not click it / Tell a teacher or parent / Delete the message
Science Experiment | Ask a question / Make a hypothesis / Do the experiment / Record results / Draw a conclusion
Story Structure | Beginning / Development / Climax / Ending`,
    ms:`Ayat Bahasa Melayu | Saya / suka / belajar / AI
Langkah Pembelajaran | Perhatikan dahulu / Fikir dengan teliti / Jawab dengan jelas
Langkah Komputer | Hidupkan komputer / Masukkan kata laluan / Mula belajar
Proses Data | Kumpul data / Analisis data / Buat kesimpulan
Aliran Projek AI | Kumpul data / Label imej / Latih model / Uji model / Bentangkan hasil
Langkah Keselamatan Siber | Jumpa pautan mencurigakan / Jangan klik / Beritahu guru atau ibu bapa / Padam mesej
Eksperimen Sains | Tanya soalan / Buat hipotesis / Jalankan eksperimen / Catat keputusan / Buat kesimpulan
Struktur Karangan | Permulaan / Perkembangan / Klimaks / Penutup`
  };
  const TARGET_TEXTAREA_IDS = ["bankInput"];
  const SAMPLE_BUTTON_IDS = ["sampleBtn"];
  function $(id){ return document.getElementById(id); }
  function cleanSampleText(text){
    return String(text || '')
      .replace(/\r\n/g,'\n')
      .split('\n')
      .map(line => line.trim())
      .filter(line => line && !line.startsWith('#'))
      .join('\n');
  }
  function currentLang(){
    const sel = $('langSelect');
    return sel && SAMPLE_TEXTS[sel.value] ? sel.value : 'zh';
  }
  function currentSampleText(){
    return SAMPLE_TEXTS[currentLang()] || SAMPLE_TEXTS.zh;
  }
  function findBankField(){
    for (const id of TARGET_TEXTAREA_IDS){
      const el = $(id);
      if (el && ('value' in el)) return el;
    }
    return document.querySelector('textarea');
  }
  function afterFill(field){
    try { field.dispatchEvent(new Event('input', { bubbles:true })); } catch(e) {}
    try { field.dispatchEvent(new Event('change', { bubbles:true })); } catch(e) {}
    try { if (typeof save === 'function') save(); } catch(e) {}
    try { if (typeof toast === 'function') toast('已载入对应语言题库 / Sample loaded / Contoh dimuat', 'good'); } catch(e) {}
  }
  function loadBuiltInSampleQuestionBank(event){
    if (event) { event.preventDefault(); event.stopPropagation(); event.stopImmediatePropagation(); }
    const field = findBankField();
    if (!field) return;
    field.value = cleanSampleText(currentSampleText());
    afterFill(field);
  }
  window.loadBuiltInSampleQuestionBank = loadBuiltInSampleQuestionBank;
  SAMPLE_BUTTON_IDS.forEach(id => {
    const btn = $(id);
    if (btn && !btn.dataset.sampleLoaderFixed) {
      btn.dataset.sampleLoaderFixed = '1';
      btn.addEventListener('click', loadBuiltInSampleQuestionBank, true);
    }
  });
})();
</script>

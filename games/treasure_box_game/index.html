<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宝箱开开看 Classroom Game</title>
  <style>
    :root{
      --bg1:#07111f; --bg2:#10264a; --card:#ffffff; --text:#1f2937; --muted:#6b7280;
      --primary:#f59e0b; --primary2:#f97316; --good:#16a34a; --bad:#dc2626; --line:#e5e7eb;
      --shadow:0 16px 40px rgba(0,0,0,.25); --radius:22px;
      --red:#ef4444; --blue:#3b82f6; --green:#22c55e; --purple:#a855f7;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;
      background: radial-gradient(circle at top left, #244a86 0, var(--bg2) 28%, var(--bg1) 75%);
      color:#fff; min-height:100vh;
    }
    .app{max-width:1440px;margin:0 auto;padding:18px;}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;}
    .brand{display:flex;align-items:center;gap:12px;}
    .logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#facc15,#f97316);display:grid;place-items:center;font-size:30px;box-shadow:var(--shadow)}
    h1{font-size:clamp(24px,3vw,42px);line-height:1;margin:0;letter-spacing:.5px}
    .subtitle{color:#cbd5e1;font-size:14px;margin-top:6px}
    .quickBtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    button,.btn{border:none;border-radius:14px;padding:10px 14px;font-weight:800;cursor:pointer;transition:.15s transform,.15s filter;background:#fff;color:#111827;box-shadow:0 8px 18px rgba(0,0,0,.14)}
    button:hover{transform:translateY(-1px);filter:brightness(1.03)}
    button:active{transform:translateY(1px)}
    button.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:white}
    button.good{background:var(--good);color:white}
    button.bad{background:var(--bad);color:white}
    button.ghost{background:rgba(255,255,255,.12);color:white;border:1px solid rgba(255,255,255,.24);box-shadow:none}
    button.small{padding:8px 10px;border-radius:12px;font-size:13px}
    .layout{display:grid;grid-template-columns:370px 1fr;gap:16px;align-items:start}
    .layout.playing{grid-template-columns:1fr}.layout.playing .settings{display:none}.layout.playing .game{min-height:calc(100vh - 100px)}
    .panel{background:rgba(255,255,255,.96);color:var(--text);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .settings{position:sticky;top:14px}.panelHeader{padding:16px 18px;background:linear-gradient(135deg,#111827,#374151);color:white;font-weight:900;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .panelBody{padding:16px}.sectionTitle{font-weight:900;margin:12px 0 8px;color:#111827}.hint{font-size:13px;color:var(--muted);line-height:1.5;margin-top:6px}
    label{display:block;font-size:13px;font-weight:800;margin:10px 0 6px;color:#374151}
    select,input,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:10px 12px;font:inherit;background:white;color:#111827;outline:none}
    textarea{min-height:170px;resize:vertical;line-height:1.5;font-family:"Consolas","Courier New",monospace;font-size:13px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.rowBtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.rowBtns button{flex:1;min-width:120px}
    .game{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;min-height:720px;position:relative;overflow:hidden}.game:before{content:"";position:absolute;inset:-120px auto auto -120px;width:260px;height:260px;background:#facc15;border-radius:50%;filter:blur(90px);opacity:.18;pointer-events:none}
    .hud{display:grid;grid-template-columns:minmax(240px,1fr) auto minmax(240px,1fr);gap:12px;align-items:center;margin-bottom:14px;position:relative;z-index:1}.statusCard{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:12px}.timer{font-size:clamp(28px,5vw,64px);font-weight:1000;text-align:center;text-shadow:0 6px 14px rgba(0,0,0,.25)}
    .currentTurn{font-weight:1000;font-size:20px}.roundInfo{font-size:13px;color:#cbd5e1;margin-top:4px}.goalInfo{text-align:right;font-weight:900}.goalInfo small{display:block;color:#cbd5e1;font-weight:700;margin-top:4px}
    .teams{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;position:relative;z-index:1}.teamCard{border-radius:18px;padding:12px;background:rgba(255,255,255,.94);color:#111827;border:4px solid transparent;box-shadow:0 10px 22px rgba(0,0,0,.16);position:relative;overflow:hidden}.teamCard.active{outline:4px solid #facc15;transform:translateY(-2px)}.teamName{font-weight:1000;font-size:18px;display:flex;align-items:center;gap:8px}.teamDot{width:16px;height:16px;border-radius:999px;display:inline-block}.teamScore{font-size:42px;font-weight:1000;line-height:1;margin-top:8px}.teamMeta{color:#6b7280;font-size:13px;margin-top:5px}.bar{height:10px;background:#e5e7eb;border-radius:999px;margin-top:10px;overflow:hidden}.barFill{height:100%;width:0%;background:linear-gradient(90deg,#facc15,#f97316);transition:.35s}
    .boardWrap{background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.16);border-radius:24px;padding:14px;position:relative;z-index:1}.boardTop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.boardTitle{font-weight:1000;font-size:20px}.boardHint{font-size:13px;color:#cbd5e1}.board{display:grid;gap:12px;grid-template-columns:repeat(6,1fr)}
    .chest{aspect-ratio:1.15/1;min-height:86px;border-radius:20px;background:linear-gradient(160deg,#b45309 0%,#f59e0b 46%,#92400e 100%);box-shadow:inset 0 -10px 18px rgba(0,0,0,.18),0 10px 18px rgba(0,0,0,.25);border:3px solid rgba(255,255,255,.3);position:relative;color:white;font-weight:1000;font-size:clamp(24px,3vw,38px);display:grid;place-items:center;cursor:pointer;overflow:hidden;transition:.18s transform,.18s filter,.18s opacity}.chest:hover{transform:translateY(-3px) scale(1.02);filter:saturate(1.08)}.chest:before{content:"";position:absolute;left:0;right:0;top:38%;height:10px;background:rgba(120,53,15,.75);box-shadow:0 0 0 3px rgba(255,255,255,.16)}.chest:after{content:"";position:absolute;width:22px;height:26px;border-radius:7px;background:#fef3c7;border:3px solid #92400e;top:38%;left:50%;transform:translate(-50%,-15%)}.chest .num{position:relative;z-index:2;text-shadow:0 4px 8px rgba(0,0,0,.3);margin-top:28px}.chest.opened{background:linear-gradient(160deg,#334155,#64748b);cursor:default;opacity:.72;transform:none}.chest.opened:before,.chest.opened:after{opacity:.45}.chest.opened .num{font-size:28px;margin-top:0}
    .eventLog{margin-top:12px;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:12px;min-height:54px;color:#e5e7eb;font-weight:700}.eventLog b{color:#fef08a}
    .modalBackdrop{position:fixed;inset:0;background:rgba(2,6,23,.72);display:none;align-items:center;justify-content:center;z-index:50;padding:18px}.modalBackdrop.show{display:flex}.modal{max-width:860px;width:100%;background:white;color:#111827;border-radius:28px;box-shadow:0 30px 80px rgba(0,0,0,.45);overflow:hidden}.modalHead{padding:18px 22px;background:linear-gradient(135deg,#f59e0b,#f97316);color:white;display:flex;align-items:center;justify-content:space-between;gap:10px}.modalTitle{font-weight:1000;font-size:24px}.modalBody{padding:22px}.bigEvent{font-size:clamp(34px,7vw,80px);text-align:center;margin:8px 0}.eventText{text-align:center;font-weight:1000;font-size:clamp(22px,3vw,36px);line-height:1.2}.question{font-size:clamp(22px,3vw,34px);font-weight:1000;line-height:1.25;margin-bottom:14px}.answerBox{padding:12px 14px;border-radius:16px;background:#f3f4f6;color:#111827;font-weight:900;margin:12px 0;display:none}.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}.option{padding:14px;border-radius:16px;border:2px solid #e5e7eb;background:#f9fafb;font-weight:900;text-align:left}.option.correct{background:#dcfce7;border-color:#22c55e}.option.wrong{background:#fee2e2;border-color:#ef4444}.modalActions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px}.rankList{display:grid;gap:10px;margin-top:12px}.rankItem{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid #e5e7eb;border-radius:16px;padding:12px 14px;background:#f9fafb;font-weight:900}.rankMedal{font-size:28px}.hidden{display:none!important}.footerNote{text-align:center;color:#94a3b8;font-size:12px;margin-top:12px}
    @media (max-width:1100px){.layout{grid-template-columns:1fr}.settings{position:static}.hud{grid-template-columns:1fr}.goalInfo{text-align:left}.teams{grid-template-columns:repeat(2,1fr)}.board{grid-template-columns:repeat(4,1fr)}}
    @media (max-width:640px){.app{padding:12px}.topbar{align-items:flex-start;flex-direction:column}.quickBtns{justify-content:flex-start}.grid2,.grid3{grid-template-columns:1fr}.teams{grid-template-columns:1fr}.board{grid-template-columns:repeat(3,1fr);gap:8px}.chest{min-height:70px;border-radius:16px}.options{grid-template-columns:1fr}.modalBody{padding:16px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo">💰</div>
        <div>
          <h1 data-i18n="appTitle">宝箱开开看</h1>
          <div class="subtitle" data-i18n="appSub">适合老师投影使用的分组课堂小游戏</div>
        </div>
      </div>
      <div class="quickBtns">
        <button class="ghost small" id="showSettingsBtn" data-i18n="showSettings">显示老师设定</button>
        <button class="ghost small" id="fsBtn" data-i18n="fullscreen">全屏</button>
        <button class="ghost small" id="resetBtn" data-i18n="reset">重置</button>
      </div>
    </div>

    <div class="layout" id="layout">
      <aside class="settings panel" id="settingsPanel">
        <div class="panelHeader">
          <span data-i18n="teacherSettings">老师设定</span>
          <span>⚙️</span>
        </div>
        <div class="panelBody">
          <div class="grid2">
            <div>
              <label data-i18n="uiLang">介面语言</label>
              <select id="langSelect">
                <option value="zh">简体中文</option>
                <option value="en">English</option>
                <option value="ms">Bahasa Melayu</option>
              </select>
            </div>
            <div>
              <label data-i18n="teamCount">组数</label>
              <select id="teamCount">
                <option value="2">2</option><option value="3">3</option><option value="4">4</option>
              </select>
            </div>
          </div>

          <div class="grid2">
            <div>
              <label data-i18n="gameTime">游戏时间</label>
              <select id="gameTime">
                <option value="0" data-i18n="noLimit">不限时</option>
                <option value="180">3 分钟</option>
                <option value="300" selected>5 分钟</option>
                <option value="480">8 分钟</option>
                <option value="600">10 分钟</option>
              </select>
            </div>
            <div>
              <label data-i18n="targetScore">目标分</label>
              <select id="targetScore">
                <option value="0" data-i18n="noTarget">不设目标</option>
                <option value="8">8</option><option value="10" selected>10</option><option value="15">15</option><option value="20">20</option>
              </select>
            </div>
          </div>

          <div class="grid2">
            <div>
              <label data-i18n="boxCount">宝箱数量</label>
              <select id="boxCount">
                <option value="12">12</option><option value="16" selected>16</option><option value="20">20</option><option value="24">24</option>
              </select>
            </div>
            <div>
              <label data-i18n="questionMode">题目顺序</label>
              <select id="questionMode">
                <option value="random" data-i18n="random">随机</option>
                <option value="order" data-i18n="order">顺序</option>
              </select>
            </div>
          </div>

          <div class="grid2">
            <div>
              <label data-i18n="quizPoints">答题得分</label>
              <select id="quizPoints"><option value="1">+1</option><option value="2" selected>+2</option><option value="3">+3</option></select>
            </div>
            <div>
              <label data-i18n="wrongPenalty">答错扣分</label>
              <select id="wrongPenalty"><option value="0" data-i18n="noDeduct">不扣分</option><option value="1">-1</option><option value="2">-2</option></select>
            </div>
          </div>

          <div class="grid2">
            <div>
              <label data-i18n="afterQuestion">答题后</label>
              <select id="afterQuestion"><option value="next" data-i18n="nextTeam">换下一组</option><option value="same" data-i18n="sameTeam">本组继续</option></select>
            </div>
            <div>
              <label data-i18n="sound">音效</label>
              <select id="soundSelect"><option value="on" data-i18n="on">开启</option><option value="off" data-i18n="off">关闭</option></select>
            </div>
          </div>

          <div class="sectionTitle" data-i18n="questionBank">题库</div>
          <textarea id="questionBank" spellcheck="false"></textarea>
          <div class="hint" data-i18n="bankHint">格式：题目,正确答案,错误选项1,错误选项2,错误选项3。只有两栏时为开放题。</div>
          <div class="rowBtns">
            <button id="importBtn" data-i18n="importTxt">汇入 TXT</button>
            <button id="exportBtn" data-i18n="exportTxt">导出 TXT</button>
            <input id="fileInput" type="file" accept=".txt,text/plain" class="hidden" />
          </div>
          <div class="rowBtns">
            <button class="primary" id="startBtn" data-i18n="startGame">开始游戏</button>
          </div>
          <div class="hint" data-i18n="startHint">开始后老师设定区会隐藏，只保留游戏介面，适合投影使用。</div>
        </div>
      </aside>

      <main class="game" id="gameArea">
        <div class="hud">
          <div class="statusCard">
            <div class="currentTurn" id="turnText">轮到：红队</div>
            <div class="roundInfo" id="roundInfo">请点击一个未开启的宝箱。</div>
          </div>
          <div class="timer" id="timer">05:00</div>
          <div class="statusCard goalInfo" id="goalInfo">目标分：10<small>开启宝箱，可能得分、扣分、答题或遇到惊喜。</small></div>
        </div>
        <div class="teams" id="teams"></div>
        <div class="boardWrap">
          <div class="boardTop">
            <div>
              <div class="boardTitle" data-i18n="boardTitle">选择一个宝箱</div>
              <div class="boardHint" data-i18n="boardHint">每个宝箱都有不同事件：题目、加分、陷阱、交换、偷分或空箱。</div>
            </div>
            <button class="small" id="reshuffleBtn" data-i18n="reshuffle">重新开局</button>
          </div>
          <div class="board" id="board"></div>
        </div>
        <div class="eventLog" id="eventLog">💡 <span data-i18n="logReady">设定完成后点击开始游戏。</span></div>
        <div class="footerNote">LEAD AI Classroom Game Box · Offline HTML Game</div>
      </main>
    </div>
  </div>

  <div class="modalBackdrop" id="modalBackdrop">
    <div class="modal" id="modal">
      <div class="modalHead">
        <div class="modalTitle" id="modalTitle">宝箱事件</div>
        <button class="small" id="modalClose">×</button>
      </div>
      <div class="modalBody" id="modalBody"></div>
    </div>
  </div>

<script>
const I18N = {

const DEFAULT_BANK = `马来西亚首都是哪里？,吉隆坡,新山,槟城,马六甲
AI 可以随便用同学照片做搞笑图吗？,不可以,可以,只要好笑就可以,老师没看到就可以

ChatGPT 属于什么工具？,AI工具,游戏工具,交通工具,运动工具

植物制造食物的过程叫什么？,光合作用,呼吸作用,蒸发作用,消化作用

let state = {
  lang:'zh', started:false, teamCount:2, teams:[], current:0, boxes:[], opened:0,
  questions:[], qIndex:0, seconds:300, totalSeconds:300, timer:null, target:10,
  quizPoints:2, wrongPenalty:0, afterQuestion:'next', sound:true, questionMode:'random', pendingBox:null
};

const $ = id => document.getElementById(id);
function t(key, vars={}){ let s=(I18N[state.lang]||I18N.zh)[key] || I18N.zh[key] || key; Object.entries(vars).forEach(([k,v])=>s=s.replaceAll('{'+k+'}',v)); return s; }
function saveSettings(){
  const data={lang:$('langSelect').value, teamCount:$('teamCount').value, gameTime:$('gameTime').value,targetScore:$('targetScore').value,boxCount:$('boxCount').value,questionMode:$('questionMode').value,quizPoints:$('quizPoints').value,wrongPenalty:$('wrongPenalty').value,afterQuestion:$('afterQuestion').value,sound:$('soundSelect').value,bank:$('questionBank').value};
  localStorage.setItem('treasureBoxSettings', JSON.stringify(data));
}
function loadSettings(){
  const raw=localStorage.getItem('treasureBoxSettings');
  let data={}; try{ if(raw) data=JSON.parse(raw); }catch(e){}
  $('questionBank').value=data.bank || DEFAULT_BANK;
  ['langSelect','teamCount','gameTime','targetScore','boxCount','questionMode','quizPoints','wrongPenalty','afterQuestion','soundSelect'].forEach(id=>{ if(data[id.replace('Select','').replace('Count','Count')]!==undefined){} });
  if(data.lang) $('langSelect').value=data.lang;
  if(data.teamCount) $('teamCount').value=data.teamCount;
  if(data.gameTime) $('gameTime').value=data.gameTime;
  if(data.targetScore) $('targetScore').value=data.targetScore;
  if(data.boxCount) $('boxCount').value=data.boxCount;
  if(data.questionMode) $('questionMode').value=data.questionMode;
  if(data.quizPoints) $('quizPoints').value=data.quizPoints;
  if(data.wrongPenalty) $('wrongPenalty').value=data.wrongPenalty;
  if(data.afterQuestion) $('afterQuestion').value=data.afterQuestion;
  if(data.sound) $('soundSelect').value=data.sound;
  state.lang=$('langSelect').value;
}
function applyI18n(){
  document.documentElement.lang = state.lang==='zh'?'zh-CN':state.lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ const key=el.getAttribute('data-i18n'); if(I18N[state.lang][key]) el.textContent=I18N[state.lang][key]; });
  [...$('gameTime').options].forEach(opt=>{ const key=opt.getAttribute('data-i18n'); if(key) opt.textContent=t(key); });
  [...$('targetScore').options, ...$('questionMode').options, ...$('wrongPenalty').options, ...$('afterQuestion').options, ...$('soundSelect').options].forEach(opt=>{ const key=opt.getAttribute('data-i18n'); if(key) opt.textContent=t(key); });
  updateUI();
}
function parseCSVLine(line){
  const out=[]; let cur='', q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"' && line[i+1]==='"'){cur+='"'; i++;}
    else if(c==='"'){q=!q;}
    else if(c===',' && !q){out.push(cur.trim()); cur='';}
    else cur+=c;
  }
  out.push(cur.trim()); return out.filter(x=>x.length>0);
}
function parseQuestions(){
  const lines=$('questionBank').value.split(/\r?\n/).map(x=>x.trim()).filter(x=>x && !x.startsWith('#'));
  return lines.map(line=>{
    const p=parseCSVLine(line);
    if(p.length<2) return null;
    return {q:p[0], ans:p[1], wrong:p.slice(2), used:false};
  }).filter(Boolean);
}
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
function makeTeams(n){
  const keys=['teamRed','teamBlue','teamGreen','teamPurple']; const colors=['var(--red)','var(--blue)','var(--green)','var(--purple)'];
  return Array.from({length:n},(_,i)=>({name:t(keys[i]),key:keys[i],color:colors[i],score:0,opened:0}));
}
function buildBoxes(n){
  // Distribution keeps the game lively but still question-centered.
  const events=[];
  const qCount=Math.ceil(n*.42), bonus=Math.ceil(n*.18), trap=Math.ceil(n*.14), special=Math.max(0,n-qCount-bonus-trap-2);
  for(let i=0;i<qCount;i++) events.push('quiz');
  for(let i=0;i<bonus;i++) events.push('bonus');
  for(let i=0;i<trap;i++) events.push('trap');
  const specials=['steal','swap','double','empty','empty','bonus','quiz'];
  for(let i=0;i<special;i++) events.push(specials[i%specials.length]);
  while(events.length<n) events.push('quiz');
  shuffle(events);
  return events.slice(0,n).map((type,i)=>({id:i+1,type,opened:false,result:null}));
}
function startGame(){
  state.lang=$('langSelect').value; state.teamCount=parseInt($('teamCount').value); state.totalSeconds=parseInt($('gameTime').value); state.seconds=state.totalSeconds; state.target=parseInt($('targetScore').value); state.quizPoints=parseInt($('quizPoints').value); state.wrongPenalty=parseInt($('wrongPenalty').value); state.afterQuestion=$('afterQuestion').value; state.sound=$('soundSelect').value==='on'; state.questionMode=$('questionMode').value; state.questions=parseQuestions(); state.qIndex=0; state.teams=makeTeams(state.teamCount); state.current=0; state.opened=0; state.boxes=buildBoxes(parseInt($('boxCount').value)); state.started=true; state.pendingBox=null;
  saveSettings(); applyI18n(); $('layout').classList.add('playing'); log('🎮 '+t('clickBox'));
  if(state.timer) clearInterval(state.timer); if(state.totalSeconds>0){ state.timer=setInterval(tick,1000); }
  playTone('start'); updateUI();
}
function resetGame(confirmIt=true){
  if(confirmIt && state.started && !confirm(t('confirmReset'))) return;
  if(state.timer) clearInterval(state.timer); state.timer=null; state.started=false; state.current=0; state.opened=0; state.teams=makeTeams(parseInt($('teamCount').value)); state.boxes=[]; $('layout').classList.remove('playing'); updateUI(); log('💡 '+t('logReady'));
}
function tick(){ state.seconds--; if(state.seconds<=0){ state.seconds=0; updateUI(); endGame(t('timeUp')); return;} updateTimer(); }
function updateTimer(){
  if(state.totalSeconds===0){ $('timer').textContent='∞'; return; }
  const m=Math.floor(state.seconds/60).toString().padStart(2,'0'); const s=(state.seconds%60).toString().padStart(2,'0'); $('timer').textContent=`${m}:${s}`;
}
function updateUI(){
  updateTimer();
  const turnTeam=state.teams[state.current] || makeTeams(parseInt($('teamCount').value))[0];
  $('turnText').textContent=`${t('turn')}：${turnTeam.name}`;
  $('roundInfo').textContent=state.started?t('clickBox'):t('logReady');
  $('goalInfo').innerHTML=`${state.target>0?t('goal')+'：'+state.target:t('noGoal')}<small>${t('boardHint')}</small>`;
  renderTeams(); renderBoard();
}
function renderTeams(){
  const wrap=$('teams'); wrap.innerHTML='';
  state.teams.forEach((team,i)=>{
    team.name=t(team.key);
    const div=document.createElement('div'); div.className='teamCard'+(i===state.current&&state.started?' active':''); div.style.borderColor=team.color;
    const pct=state.target>0?Math.min(100,Math.max(0,team.score/state.target*100)):Math.min(100,team.score*10);
    div.innerHTML=`<div class="teamName"><span class="teamDot" style="background:${team.color}"></span>${team.name}</div><div class="teamScore">${team.score}</div><div class="teamMeta">${t('opened')} ${team.opened||0} ${t('boxes')}</div><div class="bar"><div class="barFill" style="width:${pct}%"></div></div>`;
    wrap.appendChild(div);
  });
  wrap.style.gridTemplateColumns=`repeat(${Math.min(state.teams.length||parseInt($('teamCount').value),4)},1fr)`;
}
function renderBoard(){
  const board=$('board'); board.innerHTML=''; const boxes=state.boxes.length?state.boxes:buildBoxes(parseInt($('boxCount').value)).map(b=>({...b,preview:true}));
  const count=boxes.length; board.style.gridTemplateColumns = count<=12?'repeat(4,1fr)':count<=16?'repeat(4,1fr)':count<=20?'repeat(5,1fr)':'repeat(6,1fr)';
  boxes.forEach(box=>{
    const el=document.createElement('button'); el.className='chest'+(box.opened?' opened':''); el.disabled=box.opened || box.preview;
    el.innerHTML=`<span class="num">${box.opened ? eventIcon(box.type) : box.id}</span>`;
    el.addEventListener('click',()=>openBox(box.id)); board.appendChild(el);
  });
}
function eventIcon(type){ return {quiz:'❓',bonus:'⭐',trap:'💣',empty:'🕳️',swap:'🔄',steal:'🦹',double:'🔥'}[type] || '✅'; }
function eventName(type){ return {quiz:t('quiz'),bonus:t('bonus'),trap:t('trap'),empty:t('empty'),swap:t('swap'),steal:t('steal'),double:t('double')}[type] || t('event'); }
function openBox(id){
  if(!state.started){ alert(t('pleaseStart')); return; }
  const box=state.boxes.find(b=>b.id===id); if(!box || box.opened) return;
  box.opened=true; state.opened++; state.pendingBox=box; state.teams[state.current].opened++;
  playTone('open');
  if(box.type==='quiz' || box.type==='double') showQuiz(box.type==='double');
  else applyEvent(box);
  updateUI();
}
function applyEvent(box){
  const team=state.teams[state.current]; let msg='', icon=eventIcon(box.type), title=eventName(box.type);
  if(box.type==='bonus'){
    const n=[1,2,3][Math.floor(Math.random()*3)]; team.score += n; msg=t('gotPoints',{n}); playTone('good');
  } else if(box.type==='trap'){
    const n=[1,2][Math.floor(Math.random()*2)]; team.score = Math.max(0, team.score-n); msg=t('lostPoints',{n}); playTone('bad');
  } else if(box.type==='empty'){
    msg=t('nothing');
  } else if(box.type==='swap'){
    let candidates=state.teams.map((tm,i)=>({tm,i})).filter(x=>x.i!==state.current);
    candidates.sort((a,b)=>b.tm.score-a.tm.score);
    const other=candidates[0]; if(other){ const tmp=team.score; team.score=other.tm.score; other.tm.score=tmp; msg=t('swapped',{team:other.tm.name}); playTone('special'); } else msg=t('nothing');
  } else if(box.type==='steal'){
    let candidates=state.teams.map((tm,i)=>({tm,i})).filter(x=>x.i!==state.current && x.tm.score>0).sort((a,b)=>b.tm.score-a.tm.score);
    if(candidates.length){ const other=candidates[0]; const n=Math.min(1,other.tm.score); other.tm.score-=n; team.score+=n; msg=t('stole',{team:other.tm.name,n}); playTone('special'); } else { msg=t('noSteal'); }
  }
  log(`🎁 <b>${team.name}</b> ${t('openResult')} #${box.id}: ${title} — ${msg}`);
  showEventModal(title, icon, msg, ()=>{ nextTurn(); checkEnd(); });
}
function getQuestion(){
  if(!state.questions.length) return null;
  if(state.questionMode==='order'){
    const q=state.questions[state.qIndex % state.questions.length]; state.qIndex++; return q;
  }
  return state.questions[Math.floor(Math.random()*state.questions.length)];
}
function showQuiz(isDouble=false){
  const q=getQuestion(); const team=state.teams[state.current]; const points=state.quizPoints*(isDouble?2:1);
  if(!q){
    team.score+=points; log(`❓ <b>${team.name}</b>: ${t('gotPoints',{n:points})}`); showEventModal(t('quiz'),'❓',t('gotPoints',{n:points}),()=>{nextTurn();checkEnd();}); return;
  }
  const isMC=q.wrong && q.wrong.length>0; const title=isDouble?t('double'):t('quiz');
  let html=`<div class="question">${escapeHtml(q.q)}</div>`;
  if(isMC){
    const opts=shuffle([q.ans,...q.wrong].map(x=>({text:x,correct:x===q.ans})));
    html+=`<div class="options">${opts.map((o,i)=>`<button class="option" data-correct="${o.correct}">${String.fromCharCode(65+i)}. ${escapeHtml(o.text)}</button>`).join('')}</div><div class="hint">${t('chooseOption')}</div>`;
  } else {
    html+=`<div class="answerBox" id="answerBox"><b>${t('correctAnswer')}：</b>${escapeHtml(q.ans)}</div><div class="modalActions"><button id="showAnsBtn">${t('showAnswer')}</button><button class="good" id="openCorrectBtn">${t('correct')}</button><button class="bad" id="openWrongBtn">${t('wrong')}</button></div>`;
  }
  openModal(title, html);
  if(isMC){
    document.querySelectorAll('.option').forEach(btn=>btn.addEventListener('click',()=>{
      const ok=btn.dataset.correct==='true'; document.querySelectorAll('.option').forEach(b=>{ b.disabled=true; if(b.dataset.correct==='true') b.classList.add('correct'); }); if(!ok) btn.classList.add('wrong');
      resolveQuiz(ok, points);
    }));
  } else {
    $('showAnsBtn').onclick=()=>{$('answerBox').style.display='block'};
    $('openCorrectBtn').onclick=()=>resolveQuiz(true, points);
    $('openWrongBtn').onclick=()=>resolveQuiz(false, points);
  }
}
function resolveQuiz(ok, points){
  const team=state.teams[state.current]; let msg='';
  if(ok){ team.score += points; msg=t('answerRight',{n:points}); playTone('good'); }
  else { if(state.wrongPenalty>0){ team.score=Math.max(0,team.score-state.wrongPenalty); msg=t('answerWrongPenalty',{n:state.wrongPenalty}); } else msg=t('answerWrong'); playTone('bad'); }
  log(`❓ <b>${team.name}</b>: ${msg}`);
  const body=$('modalBody'); const actions=document.createElement('div'); actions.className='modalActions'; actions.innerHTML=`<button class="primary" id="quizContinueBtn">${t('continue')}</button>`; body.appendChild(actions); $('quizContinueBtn').focus(); $('quizContinueBtn').onclick=()=>{ closeModal(); if(state.afterQuestion==='next') nextTurn(); checkEnd(); updateUI(); };
  updateUI();
}
function nextTurn(){ state.current=(state.current+1)%state.teams.length; updateUI(); }
function checkEnd(){
  if(state.target>0 && state.teams.some(tm=>tm.score>=state.target)){ endGame(t('targetReached')); return true; }
  if(state.opened>=state.boxes.length){ endGame(t('allOpened')); return true; }
  return false;
}
function endGame(reason){
  if(!state.started) return;
  state.started=false; if(state.timer) clearInterval(state.timer); state.timer=null; updateUI(); playTone('end');
  const ranked=[...state.teams].sort((a,b)=>b.score-a.score || b.opened-a.opened);
  const medals=['🥇','🥈','🥉','🏅'];
  const html=`<div class="eventText">${escapeHtml(reason)}</div><div class="rankList">${ranked.map((tm,i)=>`<div class="rankItem"><span><span class="rankMedal">${medals[i]||'🏅'}</span> ${escapeHtml(tm.name)}</span><span>${tm.score} ${t('score')}</span></div>`).join('')}</div><div class="modalActions"><button class="primary" id="endNewBtn">${t('reshuffle')}</button><button id="endSettingsBtn">${t('showSettings')}</button></div>`;
  openModal(t('gameOver'), html); $('endNewBtn').onclick=()=>{ closeModal(); startGame(); }; $('endSettingsBtn').onclick=()=>{ closeModal(); $('layout').classList.remove('playing'); };
}
function showEventModal(title, icon, msg, cb){
  openModal(title, `<div class="bigEvent">${icon}</div><div class="eventText">${escapeHtml(msg)}</div><div class="modalActions"><button class="primary" id="continueBtn">${t('continue')}</button></div>`);
  $('continueBtn').onclick=()=>{ closeModal(); if(cb) cb(); updateUI(); };
}
function openModal(title, html){ $('modalTitle').textContent=title; $('modalBody').innerHTML=html; $('modalBackdrop').classList.add('show'); }
function closeModal(){ $('modalBackdrop').classList.remove('show'); }
function log(html){ $('eventLog').innerHTML=html; }
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function playTone(type){
  if(!state.sound) return; try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)(); const o=ctx.createOscillator(); const g=ctx.createGain();
    const map={open:[220,.08],good:[660,.12],bad:[150,.18],special:[440,.08],start:[523,.12],end:[330,.2]}; const [freq,dur]=map[type]||[300,.1];
    o.frequency.value=freq; o.type=type==='bad'?'sawtooth':'sine'; g.gain.value=.08; o.connect(g); g.connect(ctx.destination); o.start(); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur); o.stop(ctx.currentTime+dur+.02);
  }catch(e){}
}
function exportTxt(){ const blob=new Blob([$('questionBank').value],{type:'text/plain;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='treasure_box_questions.txt'; a.click(); URL.revokeObjectURL(a.href); }
function importTxt(file){ const reader=new FileReader(); reader.onload=()=>{$('questionBank').value=reader.result; saveSettings();}; reader.readAsText(file,'utf-8'); }
function bind(){
  $('langSelect').addEventListener('change',()=>{state.lang=$('langSelect').value; saveSettings(); applyI18n();});
  document.querySelectorAll('select,textarea').forEach(el=>el.addEventListener('change',saveSettings));
  $('startBtn').onclick=startGame; $('resetBtn').onclick=()=>resetGame(true); $('reshuffleBtn').onclick=()=>startGame();
  $('showSettingsBtn').onclick=()=>{$('layout').classList.toggle('playing')};
  $('fsBtn').onclick=()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); };
  $('importBtn').onclick=()=>$('fileInput').click(); $('fileInput').onchange=e=>{ if(e.target.files[0]) importTxt(e.target.files[0]); };
  $('exportBtn').onclick=exportTxt; $('modalClose').onclick=closeModal; $('modalBackdrop').addEventListener('click',e=>{ if(e.target===$('modalBackdrop')) closeModal(); });
}
loadSettings(); bind(); applyI18n(); resetGame(false);
</script>

<!doctype html>

<head>

<title>王国资源争夺战</title>
<style>
:root{--bg:#091528;--panel:#10233b;--line:rgba(255,255,255,.14);--text:#f8fafc;--muted:#d7e6f8;--gold:#facc15;--blue:#38bdf8;--orange:#fb923c;--green:#22c55e;--red:#ef4444;--purple:#a78bfa}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,"Segoe UI","Microsoft YaHei",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 18% 8%,rgba(56,189,248,.12),transparent 24%),radial-gradient(circle at 82% 12%,rgba(250,204,21,.10),transparent 22%),linear-gradient(135deg,#07111f,#0c1d33 46%,#12294a)}button,input,textarea,select{font:inherit}.hidden{display:none!important}
.app{height:100vh;width:min(1640px,98vw);margin:0 auto;padding:12px;display:grid;grid-template-rows:auto 1fr;gap:10px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 14px;border:1px solid var(--line);border-radius:20px;background:rgba(15,23,42,.84)}.brand{display:flex;align-items:center;gap:12px}.logo{width:56px;height:56px;border-radius:17px;display:grid;place-items:center;font-size:32px;background:linear-gradient(135deg,#facc15,#38bdf8,#a78bfa)}h1{margin:0;font-size:clamp(24px,2.4vw,40px);line-height:1.05}.sub{margin-top:4px;color:var(--muted);font-size:13px}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:13px;padding:9px 12px;font-weight:950;cursor:pointer;background:var(--gold);color:#111827}.btn.secondary{background:#334155;color:#fff;border:1px solid var(--line)}.btn.good{background:var(--green);color:#052e16}.btn.bad{background:var(--red);color:#fff}.btn.blue{background:var(--blue);color:#062033}.btn.orange{background:var(--orange);color:#111827}.btn.purple{background:var(--purple);color:#1e1b4b}.btn.small{padding:6px 10px;font-size:12px}.input,.select{border:1px solid rgba(255,255,255,.14);background:#08111f;color:#fff;border-radius:12px;padding:9px 10px;width:100%}
.main{min-height:0;display:grid;grid-template-columns:310px 1fr 330px;gap:10px}.panel{min-height:0;background:rgba(15,23,42,.84);border:1px solid var(--line);border-radius:22px;padding:12px;overflow:auto}.section{padding:10px;border-radius:16px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);margin-bottom:10px}.section-title{font-size:14px;font-weight:950;margin-bottom:8px}.help{font-size:14px;color:var(--muted);line-height:1.55}
.score-grid{display:grid;gap:10px}.team-card{padding:10px;border-radius:18px;border:1px solid rgba(255,255,255,.10);background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));transition:.25s}.team-card.active{outline:3px solid var(--gold)}.team-header{display:grid;grid-template-columns:56px 1fr auto;gap:10px;align-items:center}.team-crest{width:56px;height:56px;border-radius:14px;background:#0b1322;object-fit:cover;border:1px solid rgba(255,255,255,.12)}.team-name{font-size:18px;font-weight:950}.team-theme{font-size:12px;color:#cbd5e1}.team-score{font-size:30px;font-weight:950;color:#fde68a}.res-line{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}.res-pill{padding:7px 8px;border-radius:12px;background:rgba(255,255,255,.05);font-size:12px;text-align:center}.bar{height:12px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:8px}.bar>span{display:block;height:100%;background:linear-gradient(90deg,#facc15,#22c55e);width:0;transition:width .3s ease}
.board{min-height:0;display:grid;grid-template-rows:auto auto 1fr auto;gap:10px}.statusbar{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:16px;background:rgba(15,23,42,.72);border:1px solid var(--line)}.timer{font-size:30px;font-weight:950;color:var(--gold)}.titleCard{padding:13px 16px;border-radius:18px;background:linear-gradient(135deg,rgba(250,204,21,.18),rgba(96,165,250,.08));border:1px solid rgba(250,204,21,.25);font-size:24px;font-weight:950;color:#fff}
.mapWrap{min-height:0;position:relative;border-radius:26px;border:1px solid rgba(255,255,255,.12);overflow:hidden;background:#0b172a}.mapBg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.mapSpot{position:absolute;display:flex;flex-direction:column;align-items:center;gap:6px}.mapSpot img.building{width:190px;max-width:23vw;filter:drop-shadow(0 12px 18px rgba(0,0,0,.25));transition:.3s}.mapSpot .hotBtn{border:0;border-radius:999px;padding:8px 12px;font-weight:950;cursor:pointer;background:rgba(15,23,42,.88);color:#fff;border:1px solid rgba(255,255,255,.16);box-shadow:0 8px 16px rgba(0,0,0,.18)}.mapSpot .hotBtn.active{outline:3px solid var(--gold)}.mapSpot .levelTag{padding:4px 10px;border-radius:999px;background:rgba(250,204,21,.95);color:#111827;font-weight:950;font-size:12px}
#castleSpot{left:50%;top:34%;transform:translate(-50%,-50%)}#castleImg{width:250px;max-width:28vw}.teamOutpost{position:absolute;top:10px;width:220px}.teamOutpost.left{left:10px}.teamOutpost.right{right:10px}.teamOutpost img{width:100%;height:auto;border-radius:18px;border:1px solid rgba(255,255,255,.16)}#farmSpot{left:11%;bottom:11%}#forestSpot{right:11%;bottom:11%}#mineSpot{left:50%;top:14%;transform:translateX(-50%)}
.growBurst{position:absolute;pointer-events:none;inset:auto auto 0 0;opacity:0}.growBurst.show{animation:growpop .9s ease}.growBurst img{width:110px;height:110px}@keyframes growpop{0%{opacity:0;transform:translateY(10px) scale(.5)}35%{opacity:1}100%{opacity:0;transform:translateY(-40px) scale(1.2)}}
.zoneCards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.zoneCard{padding:10px;border-radius:16px;background:rgba(15,23,42,.76);border:1px solid rgba(255,255,255,.12)}.zoneCard h3{margin:0 0 8px;font-size:18px}.zoneDesc{font-size:12px;color:#dbeafe}.upTree{margin-top:8px;display:grid;gap:8px}.node{display:grid;grid-template-columns:20px 1fr auto;gap:8px;align-items:center;font-size:12px;color:#cbd5e1}.dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.24)}.node.on .dot{background:var(--gold);border-color:#fff}.node .thumb{width:36px;height:36px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:#09111f;object-fit:cover}
.footerActions{display:flex;gap:8px;flex-wrap:wrap}.event-list,.log-list{display:flex;flex-direction:column;gap:8px}.event-pill,.log{padding:8px 10px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:12px;line-height:1.45}.event-pill.good{background:rgba(34,197,94,.12)}.event-pill.bad{background:rgba(239,68,68,.12)}
.modal{position:fixed;inset:0;background:rgba(2,6,23,.82);z-index:30;display:grid;place-items:center;padding:18px}.modal-card{width:min(920px,94vw);background:linear-gradient(180deg,#16253d,#0f172a);border:1px solid rgba(255,255,255,.22);border-radius:24px;padding:22px;box-shadow:0 18px 42px rgba(0,0,0,.45)}.modal-card h2{font-size:34px;margin:0 0 10px}.modal-card .help{font-size:16px;color:#dbeafe;font-weight:700}.options{display:grid;gap:12px;margin-top:14px}.opt{padding:16px 18px;border-radius:16px;background:linear-gradient(180deg,rgba(30,41,59,.96),rgba(15,23,42,.96));border:1px solid rgba(255,255,255,.18);cursor:pointer;font-weight:900;font-size:20px;color:#fff;text-align:left}.opt:hover{border-color:rgba(250,204,21,.75)}
.eventCardGrid{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:center}.eventImg{width:100%;height:180px;object-fit:cover;border-radius:20px;border:1px solid rgba(255,255,255,.14);background:#0b1322}.eventBox{padding:18px 16px;border-radius:22px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);position:relative;overflow:hidden}.eventBox.good{background:linear-gradient(180deg,rgba(34,197,94,.20),rgba(34,197,94,.08));border-color:rgba(34,197,94,.32)}.eventBox.bad{background:linear-gradient(180deg,rgba(239,68,68,.22),rgba(239,68,68,.08));border-color:rgba(239,68,68,.36)}.eventBox.bad.shake{animation:cardShake .5s ease}.eventDelta{position:absolute;right:16px;top:16px;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.18);font-size:20px;font-weight:950}.eventSymbol{font-size:58px;line-height:1}.eventBox .title{font-size:30px;font-weight:950;margin:6px 0}.eventBox .desc{font-size:18px;line-height:1.5;color:#fff}@keyframes cardShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.setup{position:fixed;inset:0;background:rgba(2,6,23,.92);z-index:20;display:grid;place-items:center;padding:18px}.setup-card{width:min(1220px,96vw);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid var(--line);border-radius:24px;padding:18px}.setup-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:10px}.split2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}.setup textarea.input{min-height:260px;line-height:1.45}
.eventEditor{margin-top:10px;display:grid;gap:10px}.eventRow{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);border-radius:18px;padding:10px}.eventRowGrid{display:grid;grid-template-columns:110px 110px 1fr 120px auto;gap:8px;align-items:center}.eventRow .descInput{margin-top:8px}.eventRowFooter{display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap}.previewSmall{width:90px;height:60px;object-fit:cover;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:#0b1322}
.win{position:fixed;inset:0;background:rgba(2,6,23,.88);z-index:40;display:grid;place-items:center;text-align:center;padding:20px}.win-card{width:min(760px,94vw);background:linear-gradient(135deg,rgba(250,204,21,.23),rgba(34,197,94,.16));border:1px solid rgba(250,204,21,.38);border-radius:28px;padding:28px}.win h2{font-size:42px;margin:0 0 8px}.win p{font-size:20px;color:#e2e8f0}
@media(max-width:1280px){.main{grid-template-columns:290px 1fr}.panel.right{display:none}.zoneCards{grid-template-columns:1fr}.setup-grid{grid-template-columns:1fr 1fr}.split2{grid-template-columns:1fr}}@media(max-width:760px){html,body{overflow:auto}.app{height:auto}.main{grid-template-columns:1fr}.eventCardGrid{grid-template-columns:1fr}.teamOutpost{display:none}.setup-grid,.eventRowGrid{grid-template-columns:1fr}.mapSpot img.building{width:140px}}
</style>

<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><div class="logo">🏰</div><div><h1 id="title"></h1><div id="subtitle" class="sub"></div></div></div>
    <div class="actions"><select id="lang" class="select" style="width:auto"><option value="zh">中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select><button id="setupBtn" class="btn secondary"></button><button id="fullBtn" class="btn secondary"></button><button id="resetBtn" class="btn bad"></button></div>
  </div>
  <div class="main">
    <div class="panel">
      <div class="section"><div id="scoreTitle" class="section-title"></div><div id="teamCards" class="score-grid"></div></div>
      <div class="section"><div id="ruleTitle" class="section-title"></div><div id="ruleText" class="help"></div></div>
    </div>
    <div class="board">
      <div class="statusbar"><div><b id="roundText"></b><div id="hintText" class="help"></div></div><div id="timer" class="timer">00:00</div></div>
      <div id="boardTitle" class="titleCard"></div>
      <div class="mapWrap">
        <img class="mapBg" src="assets/map_background.svg" alt="map" />
        <div class="teamOutpost left"><img id="teamABanner" alt="A banner" /></div>
        <div class="teamOutpost right"><img id="teamBBanner" alt="B banner" /></div>
        <div id="castleSpot" class="mapSpot"><img id="castleImg" class="building" alt="castle"><div id="castleLevelTag" class="levelTag"></div></div>
        <div id="mineSpot" class="mapSpot"><img id="mineImg" class="building" alt="mine"><div id="mineLevelTag" class="levelTag"></div><button id="mineBtn" class="hotBtn"></button><div id="mineBurst" class="growBurst"><img src="assets/event_mine_discovery.svg"></div></div>
        <div id="farmSpot" class="mapSpot"><img id="farmImg" class="building" alt="farm"><div id="farmLevelTag" class="levelTag"></div><button id="farmBtn" class="hotBtn"></button><div id="farmBurst" class="growBurst"><img src="assets/event_farm_harvest.svg"></div></div>
        <div id="forestSpot" class="mapSpot"><img id="forestImg" class="building" alt="forest"><div id="forestLevelTag" class="levelTag"></div><button id="forestBtn" class="hotBtn"></button><div id="forestBurst" class="growBurst"><img src="assets/event_forest_birth.svg"></div></div>
      </div>
      <div class="zoneCards">
        <div class="zoneCard"><h3 id="farmName"></h3><div id="farmDesc" class="zoneDesc"></div><div id="farmTree" class="upTree"></div></div>
        <div class="zoneCard"><h3 id="forestName"></h3><div id="forestDesc" class="zoneDesc"></div><div id="forestTree" class="upTree"></div></div>
        <div class="zoneCard"><h3 id="mineName"></h3><div id="mineDesc" class="zoneDesc"></div><div id="mineTree" class="upTree"></div></div>
      </div>
      <div class="footerActions"><button id="sampleBtnInline" class="btn secondary"></button><button id="skipBtn" class="btn secondary"></button></div>
    </div>
    <div class="panel right"><h3 id="eventTitle" style="margin:0 0 10px"></h3><div id="eventList" class="event-list"></div><h3 id="logTitle" style="margin:14px 0 10px"></h3><div id="logs" class="log-list"></div></div>
  </div>
</div>
<div id="setup" class="setup"><div class="setup-card"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><div><h2 id="setupTitle" style="margin:0"></h2><div id="setupHelp" class="help" style="margin-top:6px"></div></div><select id="setupLang" class="select" style="width:auto"><option value="zh">中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select></div><div class="setup-grid" style="margin-top:12px"><input id="roundLimit" class="input" type="number" min="6" max="40" value="18"><input id="targetScore" class="input" type="number" min="10" max="100" value="20"><input id="timeLimit" class="input" type="number" min="60" max="1800" value="360"><select id="themeA" class="select"></select><select id="themeB" class="select"></select></div><div class="split2"><div><div id="questionLabel" class="section-title" style="margin:10px 0 6px"></div><textarea id="questionText" class="input"></textarea></div><div><div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><div id="eventLabel" class="section-title" style="margin:10px 0 6px"></div><button id="addEventBtn" class="btn small purple" type="button"></button></div><div id="eventFormat" class="help" style="margin-bottom:8px"></div><div id="eventEditor" class="eventEditor"></div></div></div><div class="actions" style="margin-top:12px;justify-content:flex-start"><button id="sampleBtn" class="btn secondary"></button><button id="startBtn" class="btn good"></button></div></div></div>
<div id="quizModal" class="modal hidden"><div class="modal-card"><h2 id="qModalTitle"></h2><div id="qModalMeta" class="help" style="margin-bottom:10px"></div><div id="qModalPrompt" style="font-size:30px;font-weight:950;line-height:1.45;color:#fff;margin-top:6px"></div><div id="qOptions" class="options"></div></div></div>
<div id="eventModal" class="modal hidden"><div class="modal-card"><h2 id="eventModalTitle"></h2><div class="eventCardGrid"><img id="eventCardImg" class="eventImg" alt="event image"><div id="eventBox" class="eventBox"><div id="eventDelta" class="eventDelta"></div><div id="eventSymbol" class="eventSymbol"></div><div id="eventBoxTitle" class="title"></div><div id="eventBoxDesc" class="desc"></div></div></div><div style="display:flex;justify-content:flex-end;margin-top:14px"><button id="eventOkBtn" class="btn good"></button></div></div></div>
<div id="win" class="win hidden"><div class="win-card"><h2 id="winTitle"></h2><p id="winDesc"></p><button id="againBtn" class="btn good" onclick="location.reload()"></button></div></div>
<script>
const THEMES={azure:{name:'Azure', crest:'assets/theme_azure_crest.svg', banner:'assets/theme_azure_banner.svg'}, crimson:{name:'Crimson', crest:'assets/theme_crimson_crest.svg', banner:'assets/theme_crimson_banner.svg'}, emerald:{name:'Emerald', crest:'assets/theme_emerald_crest.svg', banner:'assets/theme_emerald_banner.svg'}, violet:{name:'Violet', crest:'assets/theme_violet_crest.svg', banner:'assets/theme_violet_banner.svg'}};
const ASSETS={farm:['assets/farm_lv1.svg','assets/farm_lv2.svg','assets/farm_lv3.svg','assets/farm_lv4.svg'], forest:['assets/forest_lv1.svg','assets/forest_lv2.svg','assets/forest_lv3.svg','assets/forest_lv4.svg'], mine:['assets/mine_lv1.svg','assets/mine_lv2.svg','assets/mine_lv3.svg','assets/mine_lv4.svg'], event:{farm_harvest:'assets/event_farm_harvest.svg', farm_pest:'assets/event_farm_pest.svg', forest_birth:'assets/event_forest_birth.svg', forest_fire:'assets/event_forest_fire.svg', mine_discovery:'assets/event_mine_discovery.svg', mine_accident:'assets/event_mine_accident.svg', merchant:'assets/event_merchant.svg', storm:'assets/event_storm.svg'}};
const TREE={farm:['小菜圃','丰收田','风车农场','丰收庄园'],forest:['小树林','育林区','护林营','生态园'],mine:['采石点','矿洞','矿车站','精炼场']};
const I18N={zh:{title:'王国资源争夺战',subtitle:'围绕中央王都，开发农田、森林与金矿，并应对随机好坏事件。',setup:'设置题库',fullscreen:'全屏',restart:'重开',scoreTitle:'王国得分',teamA:'蓝色王国',teamB:'橙色王国',ruleTitle:'玩法说明',ruleText:'轮到某队时，可选择农田、森林或金矿进行开发。答对题目即可获得基础分，并触发随机事件。资源会真正盖在地图上，并拥有各自独立升级树。先达到目标分，或回合结束时分数较高者获胜。',round:(a,b,t)=>`回合：${a}/${b} ｜ 当前行动：${t}`,hint:'请选择一个开发区域来进行本回合行动。',boardTitle:'中央王都与资源发展地图',eventTitle:'随机事件',logTitle:'战况记录',farm:'农田开发',forest:'森林开发',mine:'金矿开发',develop:'开发这里',farmDesc:'粮食发展路线：小菜圃 → 丰收田 → 风车农场 → 丰收庄园。',forestDesc:'生态发展路线：小树林 → 育林区 → 护林营 → 生态园。',mineDesc:'矿业发展路线：采石点 → 矿洞 → 矿车站 → 精炼场。',skip:'跳过本回合',loadSample:'载入示范',setupTitle:'王国资源争夺战｜老师设置',setupHelp:'老师可自选两国皮肤主题、自定义题库，以及新增带图片的好事件 / 灾难事件卡。',questionLabel:'题库',eventLabel:'自定义事件卡',eventFormat:'每张事件卡可设置：区域、类型、标题、描述、分数变化，并可上传一张图片。',sample:'载入示范题库与事件卡',start:'开始游戏',addEvent:'新增事件卡',themeA:'蓝色王国皮肤',themeB:'橙色王国皮肤',qTitle:(z,n)=>`正在开发：${z} ＋${n}`,qOf:(team,lane)=>`${team} ｜ ${lane}`,turnGain:(team,lane,n)=>`${team} 成功开发 ${lane}，获得基础分 +${n}`,turnFail:(team,lane)=>`${team} 在 ${lane} 开发失败`,positive:'好事件',negative:'灾难事件',eventApplied:(team,n)=>`${team} 事件分数变动 ${n>0?'+':''}${n}`,ok:'继续',winner:t=>`${t} 获胜！`,draw:'平手！',summary:(a,b)=>`最终得分：蓝色王国 ${a} ｜ 橙色王国 ${b}`,again:'再玩一次'},en:{title:'Kingdom Resource Clash',subtitle:'Build farms, forests and gold mines around the capital while handling random events.',setup:'Question Bank',fullscreen:'Fullscreen',restart:'Restart',scoreTitle:'Kingdom Scores',teamA:'Blue Kingdom',teamB:'Orange Kingdom',ruleTitle:'How to play',ruleText:'Choose Farm, Forest or Gold Mine each turn. A correct answer grants base points and triggers a random event. Buildings truly rise on the map and each resource has its own upgrade tree. Reach the target score first, or finish with the higher score.',round:(a,b,t)=>`Round ${a}/${b} ｜ Acting: ${t}`,hint:'Choose a development zone.',boardTitle:'Royal Capital & Growth Map',eventTitle:'Random Events',logTitle:'Battle Log',farm:'Farm Development',forest:'Forest Development',mine:'Go Permainan',farm:'Pembangunan Ladang',forest:'Pembangunan Hutan',mine:'Pembangunan Lombong Emas',develop:'Bangunkan di sini',farmDesc:'Laluan makanan: Kebun Kecil → Sawah Makmur → Ladang Kincir → Manor Tuaian.',forestDesc:'Laluan alam: Belukar → Hutan Terkawal → Kem Renjer → Taman Ekologi.',mineDesc:'Laluan lombong: Kuari → Terowong → Stesen Troli → Penapisan.',skip:'Langkau Giliran',loadSample:'Muat Contoh',setupTitle:'Pertempuran Sumber Kerajaan | Tetapan Guru',setupHelp:'Guru boleh memilih kulit kerajaan, menyesuaikan bank soalan dan membina kad peristiwa bergambar.',questionLabel:'Bank Soalan',eventLabel:'Kad Peristiwa Tersuai',eventFormat:'Setiap kad peristiwa boleh ditetapkan zon, jenis, tajuk, penerangan, perubahan skor dan gambar.',sample:'Muat Contoh Soalan & Peristiwa',start:'Mula Permainan',addEvent:'Tambah Kad Peristiwa',themeA:'Kulit Kerajaan Biru',themeB:'Kulit Kerajaan Jingga',qTitle:(z,n)=>`Membangun: ${z} +${n}`,qOf:(team,lane)=>`${team} ｜ ${lane}`,turnGain:(team,lane,n)=>`${team} berjaya membangun ${lane} dan mendapat +${n}`,turnFail:(team,lane)=>`${team} gagal membangun ${lane}`,positive:'Peristiwa Baik',negative:'Peristiwa Bencana',eventApplied:(team,n)=>`Perubahan skor ${team} ${n>0?'+':''}${n}`,ok:'Teruskan',winner:t=>`${t} menang!`,draw:'Seri!',summary:(a,b)=>`Skor akhir: Biru ${a} ｜ Jingga ${b}`,again:'Main Lagi'}};
const defaultQuestions=['AI 从什么学习？|训练资料|魔法|只靠猜测|什么都不需要|1','看到可疑链接时应该？|马上点开|先检查来源|输入密码|转发给朋友|2','哪一种密码较安全？|123456|生日日期|BlueSky!2026|名字拼音|3','森林着火时首先要？|靠近围观|通知老师或大人|继续玩耍|拍视频上传|2','农田虫害可以比喻成哪类风险？|生产风险|天气是奖励|完全没影响|一定加分|1','矿场安全最重要的是？|快速工作|忽略规则|佩戴安全装备|单独行动|3'];
const sampleEventRows=[
 {zone:'farm',type:'good',title:'农作物大丰收',desc:'天气理想，粮食大增，额外 +2 分。',delta:2,image:ASSETS.event.farm_harvest},
 {zone:'farm',type:'bad',title:'农田虫害',desc:'虫害扩散，农田减产，扣 2 分。',delta:-2,image:ASSETS.event.farm_pest},
 {zone:'forest',type:'good',title:'森林中的动物生宝宝了',desc:'生态更繁荣，王国声望提升，额外 +2 分。',delta:2,image:ASSETS.event.forest_birth},
 {zone:'forest',type:'bad',title:'森林大火',desc:'大火烧毁林地，王国损失资源，扣 2 分。',delta:-2,image:ASSETS.event.forest_fire},
 {zone:'mine',type:'good',title:'发现金矿新矿脉',desc:'金矿产量提升，额外 +3 分。',delta:3,image:ASSETS.event.mine_discovery},
 {zone:'mine',type:'bad',title:'金矿工伤事件',desc:'发生工伤事故，需要善后，扣 2 分。',delta:-2,image:ASSETS.event.mine_accident},
 {zone:'any',type:'good',title:'贸易商队到访',desc:'外来商队带来财富，额外 +1 分。',delta:1,image:ASSETS.event.merchant},
 {zone:'any',type:'bad',title:'暴风雨来袭',desc:'全国秩序受扰，扣 1 分。',delta:-1,image:ASSETS.event.storm}
];
const $=s=>document.querySelector(s); let lang='zh'; let questions=[]; let customEvents=[]; let roundLimit=18,targetScore=20,timeLimit=360,timeEnd=0,timerId=null,round=1,turn='A',activeLane=null; let themeState={A:'azure',B:'crimson'}; let state={A:{score:0,farm:0,forest:0,mine:0},B:{score:0,farm:0,forest:0,mine:0}}; let logs=[],events=[]; const laneBase={farm:2,forest:2,mine:3};
function t(k,...a){const v=(I18N[lang]||I18N.zh)[k]; return typeof v==='function'?v(...a):v||k} function teamName(c){return c==='A'?t('teamA'):t('teamB')} function laneName(l){return t(l)}
function populateThemeSelects(){ const ops=Object.entries(THEMES).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join(''); $('#themeA').innerHTML=ops; $('#themeB').innerHTML=ops; $('#themeA').value='azure'; $('#themeB').value='crimson'; }
function loadSample(){ $('#questionText').value=defaultQuestions.join('\n'); const box=$('#eventEditor'); box.innerHTML=''; sampleEventRows.forEach(ev=>addEventRow(ev)); }
function addEventRow(data={zone:'any',type:'good',title:'',desc:'',delta:1,image:''}){ const row=document.createElement('div'); row.className='eventRow'; row.innerHTML=`<div class="eventRowGrid"><select class="select zoneSel"><option value="farm">farm</option><option value="forest">forest</option><option value="mine">mine</option><option value="any">any</option></select><select class="select typeSel"><option value="good">good</option><option value="bad">bad</option></select><input class="input titleInput" placeholder="Title"><input class="input deltaInput" type="number" placeholder="Delta"><button class="btn small bad delBtn" type="button">删除</button></div><textarea class="input descInput" placeholder="Description"></textarea><div class="eventRowFooter"><img class="previewSmall" alt="preview"><input class="input imgInput" type="file" accept="image/*" style="max-width:280px"><span class="help">可上传图片；若不上传，可保留预设图片。</span></div>`; $('#eventEditor').appendChild(row); row.querySelector('.zoneSel').value=data.zone||'any'; row.querySelector('.typeSel').value=data.type||'good'; row.querySelector('.titleInput').value=data.title||''; row.querySelector('.descInput').value=data.desc||''; row.querySelector('.deltaInput').value=data.delta??1; const prev=row.querySelector('.previewSmall'); prev.src=data.image||''; row.dataset.image=data.image||''; row.querySelector('.imgInput').addEventListener('change', e=>{const f=e.target.files[0]; if(!f) return; const rd=new FileReader(); rd.onload=()=>{row.dataset.image=rd.result; prev.src=rd.result;}; rd.readAsDataURL(f)}); row.querySelector('.delBtn').onclick=()=>row.remove(); }
function parseQuestions(){ return $('#questionText').value.split('\n').map(x=>x.trim()).filter(Boolean).map(r=>{const p=r.split('|').map(s=>s.trim()); return {q:p[0],opts:p.slice(1,5),ans:Number(p[5]||1)-1}}).filter(x=>x.q && x.opts.length>=4); }
function parseEventRows(){ return [...document.querySelectorAll('.eventRow')].map(row=>({ zone:row.querySelector('.zoneSel').value, type:row.querySelector('.typeSel').value, title:row.querySelector('.titleInput').value.trim(), desc:row.querySelector('.descInput').value.trim(), delta:Number(row.querySelector('.deltaInput').value||0), image:row.dataset.image||'' })).filter(x=>x.title && x.desc); }
function applyI18N(){ document.title=t('title'); $('#title').textContent=t('title'); $('#subtitle').textContent=t('subtitle'); $('#setupBtn').textContent=t('setup'); $('#fullBtn').textContent=t('fullscreen'); $('#resetBtn').textContent=t('restart'); $('#scoreTitle').textContent=t('scoreTitle'); $('#ruleTitle').textContent=t('ruleTitle'); $('#ruleText').textContent=t('ruleText'); $('#eventTitle').textContent=t('eventTitle'); $('#logTitle').textContent=t('logTitle'); $('#boardTitle').textContent=t('boardTitle'); $('#skipBtn').textContent=t('skip'); $('#sampleBtnInline').textContent=t('loadSample'); $('#farmName').textContent=t('farm'); $('#forestName').textContent=t('forest'); $('#mineName').textContent=t('mine'); $('#farmDesc').textContent=t('farmDesc'); $('#forestDesc').textContent=t('forestDesc'); $('#mineDesc').textContent=t('mineDesc'); $('#farmBtn').textContent=t('develop'); $('#forestBtn').textContent=t('develop'); $('#mineBtn').textContent=t('develop'); $('#setupTitle').textContent=t('setupTitle'); $('#setupHelp').textContent=t('setupHelp'); $('#questionLabel').textContent=t('questionLabel'); $('#eventLabel').textContent=t('eventLabel'); $('#eventFormat').textContent=t('eventFormat'); $('#sampleBtn').textContent=t('sample'); $('#startBtn').textContent=t('start'); $('#addEventBtn').textContent=t('addEvent'); $('#themeA').title=t('themeA'); $('#themeB').title=t('themeB'); $('#eventOkBtn').textContent=t('ok'); $('#againBtn').textContent=t('again'); renderTrees(); render(); }
function startGame(){ questions=parseQuestions(); customEvents=parseEventRows(); if(!questions.length){ loadSample(); questions=parseQuestions(); customEvents=parseEventRows(); } roundLimit=Number($('#roundLimit').value||18); targetScore=Number($('#targetScore').value||20); timeLimit=Number($('#timeLimit').value||360); themeState.A=$('#themeA').value; themeState.B=$('#themeB').value; state={A:{score:0,farm:0,forest:0,mine:0},B:{score:0,farm:0,forest:0,mine:0}}; logs=[]; events=[]; round=1; turn='A'; activeLane=null; $('#setup').classList.add('hidden'); timeEnd=Date.now()+timeLimit*1000; clearInterval(timerId); timerId=setInterval(tick,200); render(); }
function tick(){ const s=Math.max(0,Math.ceil((timeEnd-Date.now())/1000)); $('#timer').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); if(s<=0) finishGame(); }
function renderTeamCards(){ const box=$('#teamCards'); box.innerHTML=''; ['A','B'].forEach(code=>{ const tm=state[code], prosp=Math.min(100, Math.round(tm.score/Math.max(1,targetScore)*100)); const theme=THEMES[themeState[code]]; const div=document.createElement('div'); div.className='team-card'+(turn===code?' active':''); div.innerHTML=`<div class="team-header"><img class="team-crest" src="${theme.crest}" alt="crest"><div><div class="team-name">${teamName(code)}</div><div class="team-theme">${theme.name} theme</div></div><div class="team-score">${tm.score}</div></div><div class="res-line"><div class="res-pill">🌾 Lv.${tm.farm}</div><div class="res-pill">🌲 Lv.${tm.forest}</div><div class="res-pill">⛏️ Lv.${tm.mine}</div></div><div class="bar"><span style="width:${prosp}%"></span></div>`; box.appendChild(div); }); }
function currentGlobalLevel(lane){ return Math.max(state.A[lane], state.B[lane], 1); }
function currentCastleLevel(){ const total=state.A.farm+state.A.forest+state.A.mine+state.B.farm+state.B.forest+state.B.mine; return Math.min(4, Math.max(1, 1+Math.floor(total/4))); }
function renderMapImages(){ $('#farmImg').src=ASSETS.farm[currentGlobalLevel('farm')-1]; $('#forestImg').src=ASSETS.forest[currentGlobalLevel('forest')-1]; $('#mineImg').src=ASSETS.mine[currentGlobalLevel('mine')-1]; const leading = state.A.score===state.B.score ? 'A' : (state.A.score>state.B.score?'A':'B'); $('#castleImg').src=`assets/castle_${themeState[leading]}_lv${currentCastleLevel()}.svg`; $('#castleLevelTag').textContent='Castle Lv.'+currentCastleLevel(); $('#farmLevelTag').textContent='Lv.'+currentGlobalLevel('farm'); $('#forestLevelTag').textContent='Lv.'+currentGlobalLevel('forest'); $('#mineLevelTag').textContent='Lv.'+currentGlobalLevel('mine'); $('#teamABanner').src=THEMES[themeState.A].banner; $('#teamBBanner').src=THEMES[themeState.B].banner; ['farm','forest','mine'].forEach(k=>$('#'+k+'Btn').classList.toggle('active', activeLane===k)); }
function renderTrees(){ ['farm','forest','mine'].forEach(lane=>{ const lv=currentGlobalLevel(lane); const box=$('#'+lane+'Tree'); box.innerHTML=''; TREE[lane].forEach((name,idx)=>{ const node=document.createElement('div'); node.className='node'+((idx+1)<=lv?' on':''); node.innerHTML=`<span class="dot"></span><span>${idx+1}. ${name}</span><img class="thumb" src="${ASSETS[lane][idx]}" alt="thumb">`; box.appendChild(node); }); }); }
function renderLogs(){ $('#logs').innerHTML=logs.map(x=>`<div class="log">${x}</div>`).join(''); }
function renderEvents(){ $('#eventList').innerHTML=events.map(x=>`<div class="event-pill ${x.type}"><b>${x.team}</b><br>${x.text}</div>`).join(''); }
function render(){ renderTeamCards(); renderMapImages(); renderTrees(); renderLogs(); renderEvents(); $('#roundText').textContent=t('round',round,roundLimit,teamName(turn)); $('#hintText').textContent=t('hint'); }
function chooseLane(lane){ activeLane=lane; render(); askQuestion(lane); }
function askQuestion(lane){ const q=questions[Math.floor(Math.random()*questions.length)]; $('#qModalTitle').textContent=t('qTitle',laneName(lane),laneBase[lane]); $('#qModalMeta').textContent=t('qOf',teamName(turn),laneName(lane)); $('#qModalPrompt').textContent=q.q; const box=$('#qOptions'); box.innerHTML=''; q.opts.forEach((opt,i)=>{ const b=document.createElement('button'); b.className='opt'; b.textContent=String.fromCharCode(65+i)+'. '+opt; b.onclick=()=>answerQuestion(i===q.ans, lane); box.appendChild(b); }); $('#quizModal').classList.remove('hidden'); }
function answerQuestion(correct,lane){ $('#quizModal').classList.add('hidden'); if(correct){ state[turn].score += laneBase[lane]; state[turn][lane]=Math.min(4,state[turn][lane]+1); logs.unshift('✅ '+t('turnGain',teamName(turn),laneName(lane),laneBase[lane])); logs=logs.slice(0,12); animateGrowth(lane); if(Math.random()<0.75) triggerEvent(turn,lane,false); else nextTurn(); } else { logs.unshift('❌ '+t('turnFail',teamName(turn),laneName(lane))); logs=logs.slice(0,12); if(Math.random()<0.45) triggerEvent(turn,lane,true); else nextTurn(); } render(); }
function animateGrowth(lane){ const burst=$('#'+lane+'Burst'); burst.classList.remove('show'); void burst.offsetWidth; burst.classList.add('show'); setTimeout(()=>burst.classList.remove('show'),900); }
function triggerEvent(teamCode,lane,forceBad){ let pool=customEvents.filter(e=>(e.zone===lane || e.zone==='any') && (!forceBad || e.type==='bad')); if(!pool.length) pool=sampleEventRows.filter(e=>(e.zone===lane || e.zone==='any') && (!forceBad || e.type==='bad')); const ev=pool[Math.floor(Math.random()*pool.length)]; applyEvent(teamCode, ev); }
function applyEvent(teamCode, ev){ state[teamCode].score += Number(ev.delta||0); events.unshift({type:ev.type, team:teamName(teamCode), text:(ev.delta>0?'+':'')+ev.delta+' ｜ '+ev.title}); events=events.slice(0,10); logs.unshift((ev.type==='good'?'🌟 ':'⚠️ ')+t('eventApplied',teamName(teamCode),Number(ev.delta||0))); logs=logs.slice(0,12); $('#eventModalTitle').textContent=ev.type==='good'?t('positive'):t('negative'); $('#eventCardImg').src=ev.image || (ev.type==='good'?ASSETS.event.merchant:ASSETS.event.storm); $('#eventDelta').textContent=(ev.delta>0?'+':'')+ev.delta; $('#eventSymbol').textContent=ev.type==='good'?'✨':'⚠️'; $('#eventBoxTitle').textContent=ev.title; $('#eventBoxDesc').textContent=ev.desc; const box=$('#eventBox'); box.className='eventBox '+ev.type + (ev.type==='bad'?' shake':''); $('#eventModal').classList.remove('hidden'); render(); }
function nextTurn(){ if(state.A.score>=targetScore || state.B.score>=targetScore){ finishGame(); return; } activeLane=null; if(turn==='A') turn='B'; else { turn='A'; round += 1; } if(round>roundLimit){ finishGame(); return; } render(); }
function finishGame(){ clearInterval(timerId); const a=state.A.score,b=state.B.score; $('#win').classList.remove('hidden'); $('#winTitle').textContent=(a===b)?t('draw'):t('winner',a>b?teamName('A'):teamName('B')); $('#winDesc').textContent=t('summary',a,b); }
$('#lang').onchange=e=>{lang=e.target.value; $('#setupLang').value=lang; applyI18N();}; $('#setupLang').onchange=e=>{lang=e.target.value; $('#lang').value=lang; applyI18N();}; $('#setupBtn').onclick=()=>$('#setup').classList.remove('hidden'); $('#fullBtn').onclick=()=>document.documentElement.requestFullscreen?.(); $('#resetBtn').onclick=()=>location.reload(); $('#sampleBtn').onclick=loadSample; $('#sampleBtnInline').onclick=loadSample; $('#startBtn').onclick=startGame; $('#addEventBtn').onclick=()=>addEventRow(); $('#skipBtn').onclick=()=>{logs.unshift('⏭️ '+teamName(turn)+' skipped turn'); logs=logs.slice(0,12); if(turn==='A') turn='B'; else {turn='A'; round+=1;} render();}; $('#farmBtn').onclick=()=>chooseLane('farm'); $('#forestBtn').onclick=()=>chooseLane('forest'); $('#mineBtn').onclick=()=>chooseLane('mine'); $('#eventOkBtn').onclick=()=>{ $('#eventModal').classList.add('hidden'); nextTurn(); };
populateThemeSelects(); loadSample(); applyI18N();
</script>

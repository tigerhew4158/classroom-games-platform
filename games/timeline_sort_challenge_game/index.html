<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>时间线排序挑战</title>
<style>
:root{--bg:#0f172a;--bg2:#7c2d12;--panel:rgba(15,23,42,.84);--line:rgba(255,255,255,.14);--text:#f8fafc;--muted:#cbd5e1;--accent:#fbbf24;--good:#22c55e;--bad:#ef4444;--blue:#38bdf8}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top,rgba(251,191,36,.25),transparent 28%),linear-gradient(135deg,#020617,#431407 58%,#7c2d12)}
button,input,textarea,select{font:inherit}.app{height:100vh;width:min(1520px,98vw);margin:0 auto;padding:12px;display:grid;grid-template-rows:auto 1fr;gap:10px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--line);background:rgba(15,23,42,.74);border-radius:20px;box-shadow:0 14px 34px rgba(0,0,0,.28)}.brand{display:flex;align-items:center;gap:12px}.logo{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;font-size:30px;background:linear-gradient(135deg,#f59e0b,#facc15,#ef4444)}
h1{margin:0;font-size:clamp(22px,2.5vw,36px);line-height:1.05}.sub{font-size:13px;color:var(--muted);margin-top:4px}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.btn{border:0;border-radius:13px;padding:9px 12px;font-weight:900;cursor:pointer;background:var(--accent);color:#111827;box-shadow:0 8px 18px rgba(0,0,0,.18)}.btn.secondary{background:#334155;color:#fff;border:1px solid var(--line);box-shadow:none}.btn.good{background:var(--good);color:#052e16}.btn.bad{background:var(--bad);color:#fff}.btn.blue{background:var(--blue);color:#062033}.input,.select{border:1px solid rgba(255,255,255,.15);background:#08111f;color:#fff;border-radius:12px;padding:9px 10px;width:100%}
.main{min-height:0;display:grid;grid-template-columns:300px 1fr 300px;gap:10px}.panel{min-height:0;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:12px;box-shadow:0 14px 34px rgba(0,0,0,.22);overflow:hidden}.section{padding:10px;border-radius:15px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);margin-bottom:10px}.section-title{font-size:14px;color:#e2e8f0;font-weight:900;margin-bottom:8px}.help{font-size:13px;line-height:1.55;color:var(--muted)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat{padding:10px;border-radius:15px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08)}.stat b{font-size:26px;display:block}.stat span{font-size:12px;color:var(--muted)}
.board{min-height:0;display:grid;grid-template-rows:auto 1fr auto;gap:10px}.statusbar{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:16px;background:rgba(15,23,42,.72);border:1px solid var(--line)}.timer{font-size:28px;font-weight:950;color:var(--accent)}
.timeline{position:relative;min-height:0;border-radius:24px;border:1px solid rgba(255,255,255,.12);background:rgba(2,6,23,.34);padding:18px;overflow:auto}.timeline:before{content:"";position:absolute;left:44px;top:30px;bottom:30px;width:6px;border-radius:999px;background:linear-gradient(#facc15,#fb923c,#ef4444);opacity:.65}.card{position:relative;margin:0 0 10px 48px;padding:14px 16px;border-radius:18px;background:rgba(15,23,42,.92);border:1px solid rgba(255,255,255,.12);box-shadow:0 8px 18px rgba(0,0,0,.2);cursor:grab;display:flex;justify-content:space-between;gap:10px;align-items:center}.card:before{content:attr(data-pos);position:absolute;left:-55px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:999px;display:grid;place-items:center;background:#facc15;color:#111827;font-weight:950}.card.dragging{opacity:.45}.card.correct{outline:3px solid var(--good)}.card.wrong{outline:3px solid var(--bad)}.card b{font-size:16px}.card span{color:var(--muted);font-size:13px}
.setup{position:fixed;inset:0;background:rgba(2,6,23,.92);z-index:20;display:grid;place-items:center;padding:18px}.setup-card{width:min(980px,96vw);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 28px 80px rgba(0,0,0,.5)}.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}textarea.input{grid-column:1/-1;min-height:240px;line-height:1.45}.log-list{height:100%;display:flex;flex-direction:column;gap:8px;overflow:hidden}.log{padding:8px 10px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:13px;line-height:1.45}
.win{position:fixed;inset:0;background:rgba(2,6,23,.88);z-index:40;display:grid;place-items:center;text-align:center;padding:20px}.win-card{width:min(760px,94vw);background:linear-gradient(135deg,rgba(251,191,36,.23),rgba(239,68,68,.15));border:1px solid rgba(251,191,36,.38);border-radius:28px;padding:28px}.win h2{font-size:42px;margin:0 0 8px}.hidden{display:none!important}
@media(max-width:1100px){.main{grid-template-columns:260px 1fr}.panel.right{display:none}}@media(max-width:760px){html,body{overflow:auto}.app{height:auto}.main{grid-template-columns:1fr}.setup-grid{grid-template-columns:1fr}textarea.input{grid-column:auto}}
</style>
  <link rel="stylesheet" href="../_shared/shared-polish.css" />
  <script defer src="../_shared/shared-polish.js"></script>
  <link rel="stylesheet" href="../_shared/cute-unify.css" />
  <script defer src="../_shared/cute-unify.js"></script>
</head>
<body>
<div class="app">
  <div class="topbar"><div class="brand"><div class="logo">⏳</div><div><h1 id="title"></h1><div id="subtitle" class="sub"></div></div></div><div class="actions"><select id="lang" class="select" style="width:auto"><option value="zh">中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select><button id="setupBtn" class="btn secondary"></button><button id="fullBtn" class="btn secondary"></button><button id="resetBtn" class="btn bad"></button></div></div>
  <div class="main">
    <div class="panel"><div class="section"><div id="scoreTitle" class="section-title"></div><div class="stat-grid"><div class="stat"><b id="score">0</b><span id="scoreLabel"></span></div><div class="stat"><b id="attempts">0</b><span id="attemptLabel"></span></div></div></div><div class="section"><div id="ruleTitle" class="section-title"></div><div id="ruleText" class="help"></div></div></div>
    <div class="board"><div class="statusbar"><div><b id="roundText"></b><div id="hintText" class="help"></div></div><div id="timer" class="timer">00:00</div></div><div id="timeline" class="timeline"></div><div class="actions"><button id="checkBtn" class="btn good"></button><button id="shuffleBtn" class="btn secondary"></button></div></div>
    <div class="panel right"><h3 id="logTitle" style="margin:0 0 10px"></h3><div id="logs" class="log-list"></div></div>
  </div>
</div>
<div id="setup" class="setup"><div class="setup-card"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><h2 id="setupTitle" style="margin:0"></h2><select id="setupLang" class="select" style="width:auto"><option value="zh">中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select></div><div id="setupHelp" class="help" style="margin-top:8px"></div><div class="setup-grid" style="margin-top:12px"><input id="timeLimit" class="input" type="number" min="30" max="600" value="180"><select id="mode" class="select"><option value="order">Use row order</option><option value="number">Use number before |</option></select><textarea id="itemText" class="input"></textarea></div><div class="actions" style="margin-top:12px;justify-content:flex-start"><button id="sampleBtn" class="btn secondary"></button><button id="startBtn" class="btn good"></button></div></div></div>
<div id="win" class="win hidden"><div class="win-card"><h2 id="winTitle"></h2><p id="winDesc" style="font-size:20px;color:#e2e8f0"></p><button id="againBtn" class="btn good" onclick="location.reload()"></button></div></div>
<script>
const I18N={
 zh:{title:"时间线排序挑战",subtitle:"老师输入事件或步骤，学生把卡片拖成正确时间线。",setup:"设置题库",fullscreen:"全屏",restart:"重开",setupTitle:"时间线排序挑战｜老师设置",setupHelp:"适合历史、科学流程、作文结构、项目步骤。可直接按行输入，系统会以输入顺序作为正确顺序。",scoreTitle:"成绩",score:"分数",attempt:"检查次数",ruleTitle:"玩法说明",ruleText:"把卡片拖到正确顺序，然后按检查。全部正确即完成挑战。",round:"排序项目",hint:"拖动卡片调整顺序。",check:"检查答案",shuffle:"重新打乱",logTitle:"记录",sample:"载入示范",start:"开始游戏",again:"再玩一次",finish:"完成！",finalScore:"最终得分",placeholder:"每行一个事件/步骤，正确顺序就是输入顺序。\\n例：\\n种子发芽\\n长出叶子\\n开花\\n结果",wrong:"还有顺序不正确。",correct:"全部正确！"},
 en:{title:"Timeline Sorting Challenge",subtitle:"Teachers enter events or steps. Students drag cards into the correct timeline.",setup:"Question settings",fullscreen:"Fullscreen",restart:"Restart",setupTitle:"Timeline Sorting Challenge | Teacher Settings",setupHelp:"Suitable for history, science processes, writing structure and project steps. Enter one item per line; row order is the correct order.",scoreTitle:"Score",score:"Score",attempt:"Checks",ruleTitle:"How to play",ruleText:"Drag cards into the correct order, then check. Complete the challenge when all are correct.",round:"Items",hint:"Drag cards to reorder.",check:"Check answer",shuffle:"Shuffle again",logTitle:"Log",sample:"Load sample",start:"Start game",again:"Play again",finish:"Finished!",finalScore:"Final score",placeholder:"One event/step per line. Row order is correct order.\\nExample:\\nSeed germinates\\nLeaves grow\\nFlowers bloom\\nFruit forms",wrong:"Some cards are still in the wrong order.",correct:"All correct!"},
 ms:{title:"Cabaran Susun Garis Masa",subtitle:"Guru memasukkan peristiwa atau langkah. Murid menyeret kad ke garis masa yang betul.",setup:"Tetapan soalan",fullscreen:"Skrin penuh",restart:"Mula semula",setupTitle:"Cabaran Susun Garis Masa | Tetapan Guru",setupHelp:"Sesuai untuk sejarah, proses sains, struktur karangan dan langkah projek. Masukkan satu item setiap baris; urutan baris ialah jawapan betul.",scoreTitle:"Markah",score:"Markah",attempt:"Semakan",ruleTitle:"Cara bermain",ruleText:"Seret kad ke urutan betul, kemudian semak. Cabaran selesai apabila semuanya betul.",round:"Item",hint:"Seret kad untuk susun semula.",check:"Semak jawapan",shuffle:"Kocok semula",logTitle:"Rekod",sample:"Muat contoh",start:"Mula permainan",again:"Main lagi",finish:"Selesai!",finalScore:"Markah akhir",placeholder:"Satu peristiwa/langkah setiap baris. Urutan baris ialah jawapan betul.\\nContoh:\\nBenih bercambah\\nDaun tumbuh\\nBunga mekar\\nBuah terbentuk",wrong:"Masih ada kad yang salah urutan.",correct:"Semua betul!"}
};
let lang=new URLSearchParams(location.search).get("lang")||localStorage.getItem("timeline_lang")||"zh";let items=[],attempts=0,score=0,timerId=null,endAt=0,logs=[];
const $=s=>document.querySelector(s);function T(k){return(I18N[lang]||I18N.zh)[k]||k}
function applyLang(){document.documentElement.lang=lang==="zh"?"zh-Hans":lang;document.title=T("title");["title","subtitle","setupTitle","setupHelp","scoreTitle","ruleTitle","ruleText","logTitle"].forEach(id=>$("#"+id).textContent=T(id));$("#setupBtn").textContent=T("setup");$("#fullBtn").textContent=T("fullscreen");$("#resetBtn").textContent=T("restart");$("#scoreLabel").textContent=T("score");$("#attemptLabel").textContent=T("attempt");$("#hintText").textContent=T("hint");$("#checkBtn").textContent=T("check");$("#shuffleBtn").textContent=T("shuffle");$("#sampleBtn").textContent=T("sample");$("#startBtn").textContent=T("start");$("#againBtn").textContent=T("again");$("#itemText").placeholder=T("placeholder");$("#lang").value=lang;$("#setupLang").value=lang;updateStats();}
function parseItems(){const rows=$("#itemText").value.split("\n").map(x=>x.trim()).filter(Boolean);return rows.map((row,i)=>{const p=row.split("|").map(x=>x.trim());if($("#mode").value==="number"&&p.length>=2)return{order:Number(p[0])||i+1,text:p.slice(1).join(" | ")};return{order:i+1,text:row};}).sort((a,b)=>a.order-b.order)}
function sample(){const s=lang==="en"?"Seed germinates\nLeaves grow\nFlowers bloom\nFruit forms":lang==="ms"?"Benih bercambah\nDaun tumbuh\nBunga mekar\nBuah terbentuk":"种子发芽\n长出叶子\n开花\n结果";$("#itemText").value=s;}
function start(){items=parseItems();if(items.length<2){sample();items=parseItems();}items=[...items].sort(()=>Math.random()-.5);attempts=0;score=0;logs=[];$("#setup").classList.add("hidden");render();endAt=Date.now()+Number($("#timeLimit").value||180)*1000;timerId=setInterval(tick,200);updateStats();}
function tick(){const left=Math.max(0,endAt-Date.now());const s=Math.ceil(left/1000);$("#timer").textContent=`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;if(left<=0)check(true)}
function render(){const tl=$("#timeline");tl.innerHTML=items.map((it,i)=>`<div class="card" draggable="true" data-order="${it.order}" data-pos="${i+1}"><b>${it.text}</b><span>#${it.order}</span></div>`).join("");bindDrag();$("#roundText").textContent=`${T("round")}：${items.length}`;renderLogs();}
function bindDrag(){let drag=null;document.querySelectorAll(".card").forEach(card=>{card.addEventListener("dragstart",()=>{drag=card;card.classList.add("dragging")});card.addEventListener("dragend",()=>{card.classList.remove("dragging");drag=null;syncItems()});card.addEventListener("dragover",e=>{e.preventDefault();const after=getAfterElement($("#timeline"),e.clientY);if(!drag)return;if(after==null)$("#timeline").appendChild(drag);else $("#timeline").insertBefore(drag,after);renumber();});});}
function getAfterElement(container,y){const els=[...container.querySelectorAll(".card:not(.dragging)")];return els.reduce((closest,child)=>{const box=child.getBoundingClientRect();const offset=y-box.top-box.height/2;if(offset<0&&offset>closest.offset)return{offset,element:child};return closest},{offset:Number.NEGATIVE_INFINITY}).element}
function renumber(){document.querySelectorAll(".card").forEach((c,i)=>c.dataset.pos=i+1)}
function syncItems(){items=[...document.querySelectorAll(".card")].map(c=>({order:Number(c.dataset.order),text:c.querySelector("b").textContent}))}
function check(timeout=false){attempts++;syncItems();let ok=true;document.querySelectorAll(".card").forEach((c,i)=>{const correct=Number(c.dataset.order)===i+1;c.classList.toggle("correct",correct);c.classList.toggle("wrong",!correct);if(!correct)ok=false;});if(ok){score=Math.max(10,100-(attempts-1)*10);addLog("✅ "+T("correct"));finish();}else{score=Math.max(0,score-5);addLog("❌ "+T("wrong"));if(timeout)finish();}updateStats();}
function shuffleAgain(){items=[...items].sort(()=>Math.random()-.5);render();}
function updateStats(){$("#score").textContent=score;$("#attempts").textContent=attempts}
function addLog(x){logs.unshift(x);logs=logs.slice(0,8);renderLogs()}
function renderLogs(){$("#logs").innerHTML=logs.map(x=>`<div class="log">${x}</div>`).join("")}
function finish(){clearInterval(timerId);$("#winTitle").textContent=T("finish");$("#winDesc").textContent=`${T("finalScore")}：${score}｜${T("attempt")}：${attempts}`;$("#win").classList.remove("hidden")}
$("#lang").onchange=e=>{lang=e.target.value;localStorage.setItem("timeline_lang",lang);applyLang()};$("#setupLang").onchange=e=>{lang=e.target.value;localStorage.setItem("timeline_lang",lang);applyLang()};$("#sampleBtn").onclick=sample;$("#startBtn").onclick=start;$("#checkBtn").onclick=()=>check(false);$("#shuffleBtn").onclick=shuffleAgain;$("#setupBtn").onclick=()=>$("#setup").classList.remove("hidden");$("#resetBtn").onclick=()=>location.reload();$("#fullBtn").onclick=()=>document.documentElement.requestFullscreen?.();applyLang();sample();
</script>

<script>
(function(){
  const SAMPLE_TEXT = "# P008 时间线排序挑战｜题库范例\n# 用途：历史事件、科学流程、项目步骤排序。\n# 建议格式：顺序编号 | 事件 / 步骤\n1 | 收集资料\n2 | 整理资料\n3 | 分析资料\n4 | 呈现结论\n\n1 | 打开学习平台\n2 | 选择游戏模板\n3 | 输入题库\n4 | 开始白板上课\n";
  const TARGET_TEXTAREA_IDS = ["itemText"];
  const SAMPLE_BUTTON_IDS = ["sampleBtn"];
  const SAMPLE_URL = 'question-bank-example.txt?v=sample-loader-fixed-20260627';
  function $(id){ return document.getElementById(id); }
  function cleanSampleText(text){
    return String(text || '')
      .replace(/
/g,'
')
      .split('
')
      .map(line => line.trim())
      .filter(line => line && !line.startsWith('#'))
      .join('
');
  }
  function findBankField(){
    for (const id of TARGET_TEXTAREA_IDS){
      const el = $(id);
      if (el && ('value' in el)) return el;
    }
    return document.querySelector('textarea');
  }
  async function getBuiltInSampleText(){
    try {
      const res = await fetch(SAMPLE_URL, { cache:'no-store' });
      if (res && res.ok) {
        const text = await res.text();
        if (cleanSampleText(text)) return text;
      }
    } catch(e) {}
    return SAMPLE_TEXT;
  }
  function afterFill(field){
    try { field.dispatchEvent(new Event('input', { bubbles:true })); } catch(e) {}
    try { field.dispatchEvent(new Event('change', { bubbles:true })); } catch(e) {}
    try {
      if (field.id === 'textItems') {
        const mode = $('mode'); if (mode) mode.value = 'text';
        const lines = cleanSampleText(field.value).split('
');
        const categories = [];
        lines.forEach(line => {
          const parts = line.split('|').map(x => x.trim()).filter(Boolean);
          if (parts[1] && !categories.includes(parts[1])) categories.push(parts[1]);
        });
        if (categories.length) {
          try { cats = categories; } catch(e) {}
          const catCount = $('catCount'); if (catCount) catCount.value = String(Math.min(Math.max(categories.length,2),5));
          try { if (typeof renderCats === 'function') renderCats(); } catch(e) {}
        }
        try { if (typeof buildItems === 'function') buildItems(false); } catch(e) {}
        try { if (typeof renderPreview === 'function') renderPreview(); } catch(e) {}
      }
      if (field.id === 'wordBank') { try { if (typeof applyBank === 'function') applyBank(true); } catch(e) {} }
      try { if (typeof saveSettings === 'function') saveSettings(); } catch(e) {}
      try { if (typeof renderPreview === 'function') renderPreview(); } catch(e) {}
      try { if (typeof renderItems === 'function') renderItems(); } catch(e) {}
      try { if (typeof setMessage === 'function') setMessage('已载入内置题库范例 / Built-in sample loaded / Contoh terbina telah dimuat'); } catch(e) {}
      try { if (typeof toast === 'function') toast('已载入内置题库范例'); } catch(e) {}
    } catch(e) { console.warn('Sample after-fill warning:', e); }
  }
  async function loadBuiltInSampleQuestionBank(event){
    if (event) { event.preventDefault(); event.stopPropagation(); event.stopImmediatePropagation(); }
    const field = findBankField();
    if (!field) return;
    const sampleText = cleanSampleText(await getBuiltInSampleText());
    if (!sampleText) return;
    field.value = sampleText;
    afterFill(field);
  }
  window.loadBuiltInSampleQuestionBank = loadBuiltInSampleQuestionBank;
  SAMPLE_BUTTON_IDS.forEach(id => {
    const btn = $(id);
    if (btn && !btn.dataset.sampleLoaderFixed) {
      btn.dataset.sampleLoaderFixed = '1';
      btn.addEventListener('click', loadBuiltInSampleQuestionBank, true);
    }
  });
})();
</script>
<!-- /built-in-sample-loader-fix -->
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>炸弹倒数抢答 | Bomb Quiz</title>
  <style>
    :root{
      --bg1:#160b2e;
      --bg2:#31104a;
      --card:rgba(255,255,255,.11);
      --card2:rgba(255,255,255,.17);
      --line:rgba(255,255,255,.22);
      --text:#fff;
      --muted:rgba(255,255,255,.72);
      --accent:#ffd166;
      --danger:#ff5a6e;
      --good:#39d98a;
      --blue:#4dabf7;
      --green:#63e6be;
      --red:#ff6b6b;
      --purple:#b197fc;
      --shadow:0 18px 45px rgba(0,0,0,.35);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,209,102,.22), transparent 26%),
        radial-gradient(circle at 78% 12%, rgba(77,171,247,.22), transparent 28%),
        radial-gradient(circle at 50% 90%, rgba(255,90,110,.18), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }
    button, select, input, textarea {font:inherit}
    .app{
      width:min(1480px, 96vw);
      margin:0 auto;
      padding:18px 0 28px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
    }
    .brand{
      display:flex;
      gap:12px;
      align-items:center;
    }
    .logo{
      width:58px;height:58px;
      display:grid;place-items:center;
      border-radius:18px;
      background:linear-gradient(135deg, #ffcc00, #ff4d6d);
      box-shadow:var(--shadow);
      font-size:34px;
    }
    h1{margin:0;font-size:clamp(24px, 3.2vw, 44px);letter-spacing:.5px}
    .subtitle{margin-top:2px;color:var(--muted);font-size:15px}
    .quick-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .btn{
      border:1px solid var(--line);
      color:#fff;
      background:rgba(255,255,255,.13);
      border-radius:14px;
      padding:10px 14px;
      cursor:pointer;
      transition:.15s transform,.15s background,.15s opacity;
      box-shadow:0 7px 16px rgba(0,0,0,.18);
      user-select:none;
    }
    .btn:hover{background:rgba(255,255,255,.22);transform:translateY(-1px)}
    .btn:active{transform:translateY(1px)}
    .btn.primary{background:linear-gradient(135deg,#ffb703,#fb5607);border:none;font-weight:800;color:#231100}
    .btn.good{background:linear-gradient(135deg,#40c057,#12b886);border:none;font-weight:800;color:#04120a}
    .btn.danger{background:linear-gradient(135deg,#ff5a6e,#c9184a);border:none;font-weight:800;color:#fff}
    .btn.blue{background:linear-gradient(135deg,#4dabf7,#4361ee);border:none;font-weight:800;color:#fff}
    .btn.ghost{background:transparent}
    .btn.small{padding:7px 10px;border-radius:10px;font-size:13px}
    .layout{
      display:grid;
      grid-template-columns:380px 1fr;
      gap:16px;
      align-items:start;
    }
    .layout.settings-hidden{grid-template-columns:1fr}
    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter: blur(12px);
      overflow:hidden;
    }
    .settings{position:sticky;top:14px;max-height:calc(100vh - 32px);overflow:auto}
    .settings.hidden{display:none}
    .panel-header{
      padding:16px 18px;
      background:rgba(255,255,255,.12);
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }
    .panel-title{font-weight:900;font-size:18px}
    .panel-body{padding:16px 18px}
    .form-row{margin-bottom:13px}
    .label{display:block;font-weight:800;font-size:13px;margin:0 0 6px;color:rgba(255,255,255,.86)}
    .hint{font-size:12px;color:var(--muted);line-height:1.35;margin-top:5px}
    select,input[type="number"],input[type="text"],textarea{
      width:100%;
      color:#fff;
      background:rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.22);
      border-radius:13px;
      padding:10px 12px;
      outline:none;
    }
    select option{background:#27113f;color:#fff}
    textarea{min-height:170px;resize:vertical;line-height:1.45}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .checkbox-row{display:flex;gap:9px;align-items:center;font-size:14px;color:var(--muted)}
    input[type="checkbox"]{width:18px;height:18px;accent-color:#ffb703}
    .file-row{display:flex;gap:8px;align-items:center}
    .file-row input{display:none}
    .game-panel{min-height:calc(100vh - 116px);display:flex;flex-direction:column}
    .scoreboard{
      display:grid;
      gap:10px;
      padding:14px;
      grid-template-columns:repeat(4,1fr);
    }
    .scoreboard.teams2{grid-template-columns:repeat(2,1fr)}
    .scoreboard.teams3{grid-template-columns:repeat(3,1fr)}
    .team-card{
      position:relative;
      border-radius:18px;
      padding:12px 14px;
      background:rgba(255,255,255,.10);
      border:1px solid var(--line);
      min-height:92px;
      overflow:hidden;
    }
    .team-card.active{
      background:rgba(255,255,255,.20);
      outline:3px solid rgba(255,209,102,.9);
      transform:translateY(-2px);
      box-shadow:0 16px 35px rgba(0,0,0,.28);
    }
    .team-card .stripe{
      position:absolute;inset:0 auto 0 0;width:8px;opacity:.95;
    }
    .team-name{font-weight:900;font-size:clamp(16px,1.7vw,25px);padding-left:4px;display:flex;align-items:center;gap:8px}
    .team-score{font-size:clamp(28px,3.5vw,56px);font-weight:1000;line-height:1;margin-top:8px}
    .team-status{color:var(--muted);font-size:13px;position:absolute;right:12px;top:14px}
    .main-area{
      display:grid;
      grid-template-columns:minmax(320px, 470px) 1fr;
      gap:14px;
      padding:0 14px 14px;
      flex:1;
    }
    .bomb-zone{
      border-radius:22px;
      background:rgba(0,0,0,.20);
      border:1px solid var(--line);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:18px;
      min-height:510px;
      position:relative;
      overflow:hidden;
    }
    .timer-pill{
      position:absolute;left:18px;top:16px;
      background:rgba(0,0,0,.28);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      font-weight:900;
    }
    .round-pill{
      position:absolute;right:18px;top:16px;
      background:rgba(0,0,0,.28);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      font-weight:900;
      color:var(--muted);
    }
    .bomb-wrap{
      width:min(320px,74vw);
      aspect-ratio:1;
      position:relative;
      margin-top:26px;
      display:grid;
      place-items:center;
    }
    .bomb{
      width:62%;height:62%;
      border-radius:50%;
      background:
        radial-gradient(circle at 34% 26%, rgba(255,255,255,.35), transparent 13%),
        radial-gradient(circle at 60% 70%, #09040f, #1b1027 62%, #0b0610 100%);
      box-shadow: inset -18px -24px 32px rgba(0,0,0,.45), 0 22px 45px rgba(0,0,0,.38);
      position:relative;
      display:grid;place-items:center;
      border:5px solid rgba(255,255,255,.08);
    }
    .bomb::before{
      content:"";
      position:absolute;
      top:-28px;right:42px;
      width:58px;height:38px;
      border-radius:16px 16px 4px 4px;
      background:linear-gradient(#615568,#231a2d);
      transform:rotate(16deg);
      border:3px solid rgba(255,255,255,.1);
    }
    .fuse{
      position:absolute;
      width:100px;height:70px;
      border-top:10px solid #8d6e63;
      border-radius:50% 50% 0 0;
      top:22px;right:26px;
      transform:rotate(26deg);
    }
    .spark{
      position:absolute;
      top:12px;right:14px;
      font-size:42px;
      filter:drop-shadow(0 0 18px #ffef70);
      animation:spark .42s infinite alternate;
    }
    @keyframes spark{from{transform:scale(.9) rotate(-8deg)}to{transform:scale(1.15) rotate(7deg)}}
    .bomb-count{
      font-size:clamp(48px,7vw,86px);
      font-weight:1000;
      color:#fff;
      text-shadow:0 8px 20px rgba(0,0,0,.5);
      z-index:2;
    }
    .bomb-count.danger{color:#ffcad4;animation:pulse .42s infinite alternate}
    @keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}
    .fusebar{
      width:90%;height:18px;background:rgba(255,255,255,.14);
      border-radius:999px;overflow:hidden;margin-top:12px;border:1px solid var(--line)
    }
    .fusefill{height:100%;width:100%;background:linear-gradient(90deg,#40c057,#ffd43b,#ff6b6b);transition:width .2s linear}
    .active-team-large{font-size:clamp(18px,2.4vw,32px);font-weight:1000;margin-top:18px;text-align:center}
    .bomb-message{min-height:44px;color:rgba(255,255,255,.82);text-align:center;margin-top:8px;font-size:16px;line-height:1.35}
    .question-zone{
      border-radius:22px;
      background:rgba(255,255,255,.105);
      border:1px solid var(--line);
      padding:18px;
      display:flex;
      flex-direction:column;
      min-height:510px;
    }
    .question-label{color:var(--muted);font-weight:800;font-size:15px;margin-bottom:8px;display:flex;justify-content:space-between;gap:8px;align-items:center}
    .question-box{
      flex:0 0 auto;
      min-height:160px;
      border-radius:20px;
      background:rgba(0,0,0,.24);
      border:1px solid rgba(255,255,255,.18);
      padding:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:clamp(26px,4vw,56px);
      font-weight:1000;
      line-height:1.18;
      word-break:break-word;
    }
    .answer-panel{
      margin-top:14px;
      display:grid;
      gap:10px;
      flex:1;
      align-content:start;
    }
    .choices{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }
    .choice{
      min-height:70px;
      padding:14px 16px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.22);
      background:rgba(255,255,255,.12);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      font-size:clamp(17px,2vw,28px);
      box-shadow:0 10px 20px rgba(0,0,0,.18);
    }
    .choice:hover{background:rgba(255,255,255,.21)}
    .manual-actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .answer-reveal{
      border-radius:18px;
      background:rgba(255,255,255,.11);
      border:1px dashed rgba(255,255,255,.28);
      padding:13px;
      color:var(--muted);
      min-height:62px;
      display:flex;align-items:center;justify-content:center;text-align:center;
      font-size:clamp(16px,1.8vw,25px);
      word-break:break-word;
    }
    .hidden-answer{filter:blur(7px);user-select:none}
    .logbox{
      margin-top:12px;
      max-height:150px;
      overflow:auto;
      border-radius:16px;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.14);
      padding:10px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }
    .result-overlay{
      position:fixed;inset:0;background:rgba(9,5,18,.82);backdrop-filter:blur(10px);
      display:none;align-items:center;justify-content:center;z-index:20;padding:20px;
    }
    .result-overlay.show{display:flex}
    .result-card{
      width:min(760px,96vw);
      border-radius:28px;
      background:linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.08));
      border:1px solid var(--line);
      box-shadow:0 28px 80px rgba(0,0,0,.55);
      padding:26px;
      text-align:center;
    }
    .result-title{font-size:clamp(30px,5vw,64px);font-weight:1000;margin:0 0 8px}
    .ranking{display:grid;gap:10px;margin:18px 0;text-align:left}
    .rank-row{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);background:rgba(255,255,255,.11);border-radius:16px;padding:12px 14px;font-size:20px;font-weight:900}
    .rank-row:first-child{background:linear-gradient(135deg,rgba(255,209,102,.42),rgba(255,255,255,.10))}
    .flash{
      position:fixed;inset:0;background:rgba(255,51,87,.28);z-index:12;pointer-events:none;display:none;
    }
    .flash.show{display:block;animation:flash .55s ease-out}
    @keyframes flash{from{opacity:1}to{opacity:0}}
    .shake{animation:shake .35s linear}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
    .confetti{position:fixed;inset:0;pointer-events:none;z-index:30;overflow:hidden}
    .confetti span{position:absolute;top:-20px;font-size:24px;animation:fall 2.2s linear forwards}
    @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
    @media (max-width: 980px){
      .layout{grid-template-columns:1fr}
      .settings{position:relative;top:auto;max-height:none}
      .main-area{grid-template-columns:1fr}
      .bomb-zone{min-height:410px}
      .question-zone{min-height:430px}
    }
    @media (max-width: 720px){
      .topbar{align-items:flex-start;flex-direction:column}
      .quick-actions{justify-content:flex-start}
      .scoreboard,.scoreboard.teams2,.scoreboard.teams3{grid-template-columns:1fr 1fr}
      .main-area{padding:0 10px 10px}
      .choices{grid-template-columns:1fr}
      .manual-actions{grid-template-columns:1fr}
      .grid2,.grid3{grid-template-columns:1fr}
    }
    @media print{body{background:#fff;color:#000}.settings,.quick-actions{display:none}}
  </style>
</head>
<body>
  <div class="flash" id="flash"></div>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo">💣</div>
        <div>
          <h1 id="appTitle">炸弹倒数抢答</h1>
          <div class="subtitle" id="appSubtitle">老师投影即可玩：答对就把炸弹传出去，炸弹爆炸时当前队伍扣分。</div>
        </div>
      </div>
      <div class="quick-actions">
        <button class="btn small" id="btnToggleSettings">显示/隐藏设定</button>
        <button class="btn small" id="btnFullscreen">全屏</button>
        <button class="btn small" id="btnNextQ">下一题</button>
        <button class="btn small danger" id="btnResetGame">重置</button>
      </div>
    </div>

    <div class="layout" id="layout">
      <aside class="panel settings" id="settingsPanel">
        <div class="panel-header">
          <div class="panel-title" id="settingsTitle">老师设定</div>
          <button class="btn small primary" id="btnStart">开始游戏</button>
        </div>
        <div class="panel-body">
          <div class="form-row">
            <label class="label" id="languageLabel">介面语言</label>
            <select id="languageSelect">
              <option value="zh">简体中文</option>
              <option value="en">English</option>
              <option value="ms">Bahasa Melayu</option>
            </select>
          </div>

          <div class="grid2">
            <div class="form-row">
              <label class="label" id="teamCountLabel">分组数量</label>
              <select id="teamCount">
                <option value="2">2 组</option>
                <option value="3">3 组</option>
                <option value="4">4 组</option>
              </select>
            </div>
            <div class="form-row">
              <label class="label" id="targetScoreLabel">目标分</label>
              <input id="targetScore" type="number" min="1" max="99" value="10">
            </div>
          </div>

          <div class="grid2">
            <div class="form-row">
              <label class="label" id="bombTimeLabel">每回合炸弹秒数</label>
              <select id="bombSeconds">
                <option value="8">8 秒</option>
                <option value="10">10 秒</option>
                <option value="15" selected>15 秒</option>
                <option value="20">20 秒</option>
                <option value="30">30 秒</option>
                <option value="45">45 秒</option>
              </select>
            </div>
            <div class="form-row">
              <label class="label" id="gameTimeLabel">游戏总时间</label>
              <select id="gameMinutes">
                <option value="0">不限时</option>
                <option value="3">3 分钟</option>
                <option value="5" selected>5 分钟</option>
                <option value="8">8 分钟</option>
                <option value="10">10 分钟</option>
              </select>
            </div>
          </div>

          <div class="grid2">
            <div class="form-row">
              <label class="label" id="wrongPenaltyLabel">答错扣分</label>
              <select id="wrongPenalty">
                <option value="0">不扣分</option>
                <option value="1">扣 1 分</option>
                <option value="2">扣 2 分</option>
              </select>
            </div>
            <div class="form-row">
              <label class="label" id="explodePenaltyLabel">爆炸扣分</label>
              <select id="explodePenalty">
                <option value="1">扣 1 分</option>
                <option value="2" selected>扣 2 分</option>
                <option value="3">扣 3 分</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <label class="label" id="wrongModeLabel">答错后</label>
            <select id="wrongMode">
              <option value="keep">炸弹留在本组，继续抢答</option>
              <option value="pass">传给下一组</option>
            </select>
          </div>

          <div class="grid2">
            <label class="checkbox-row"><input type="checkbox" id="soundToggle" checked><span id="soundLabel">开启音效</span></label>
            <label class="checkbox-row"><input type="checkbox" id="shuffleToggle" checked><span id="shuffleLabel">随机出题</span></label>
          </div>

          <div class="form-row" style="margin-top:14px">
            <label class="label" id="bankLabel">题库</label>
            <textarea id="questionBank" spellcheck="false"></textarea>
            <div class="hint" id="bankHint">格式：题目,正确答案 或 题目,正确答案,错误选项1,错误选项2,错误选项3</div>
          </div>

          <div class="file-row">
            <button class="btn small" id="btnImport">汇入 TXT</button>
            <input type="file" id="fileInput" accept=".txt,text/plain">
            <button class="btn small" id="btnExport">汇出 TXT</button>
            <button class="btn small" id="btnDemo">载入范例</button>
          </div>
        </div>
      </aside>

      <main class="panel game-panel" id="gamePanel">
        <div class="scoreboard teams2" id="scoreboard"></div>

        <div class="main-area" id="mainArea">
          <section class="bomb-zone" id="bombZone">
            <div class="timer-pill" id="gameTimer">总时间 05:00</div>
            <div class="round-pill" id="roundInfo">第 1 题</div>
            <div class="bomb-wrap" id="bombWrap">
              <div class="fuse"></div>
              <div class="spark">✨</div>
              <div class="bomb">
                <div class="bomb-count" id="bombCount">15</div>
              </div>
            </div>
            <div class="fusebar"><div class="fusefill" id="fuseFill"></div></div>
            <div class="active-team-large" id="activeTeamLarge">红队持有炸弹</div>
            <div class="bomb-message" id="bombMessage">答对就传给下一队；倒数归零会爆炸。</div>
          </section>

          <section class="question-zone">
            <div class="question-label">
              <span id="questionLabel">题目</span>
              <span id="questionCount">0 / 0</span>
            </div>
            <div class="question-box" id="questionBox">点击“开始游戏”</div>
            <div class="answer-panel">
              <div class="choices" id="choices"></div>
              <div class="answer-reveal" id="answerReveal"><span id="answerText" class="hidden-answer">答案会隐藏在这里</span></div>
              <div class="manual-actions">
                <button class="btn good" id="btnCorrect">答对 / 传出炸弹</button>
                <button class="btn danger" id="btnWrong">答错</button>
              </div>
              <div class="manual-actions">
                <button class="btn blue" id="btnShowAnswer">显示/隐藏答案</button>
                <button class="btn" id="btnForceExplode">立即爆炸</button>
              </div>
              <div class="logbox" id="logBox"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <div class="result-title" id="resultTitle">游戏结束</div>
      <div id="resultSummary" class="subtitle">排名如下</div>
      <div class="ranking" id="ranking"></div>
      <div class="quick-actions" style="justify-content:center">
        <button class="btn primary" id="btnPlayAgain">再玩一次</button>
        <button class="btn" id="btnCloseResult">关闭</button>
      </div>
    </div>
  </div>

  <script>
    const I18N = {
      zh: {
        appTitle:'炸弹倒数抢答',

    const COLORS = ['var(--red)','var(--blue)','var(--green)','var(--accent)'];
    const EMOJIS = ['🔴','🔵','🟢','🟡'];
    const $ = id => document.getElementById(id);
    let state = {
      lang:'zh', teamCount:2, teams:[], activeIndex:0,
      bank:[], order:[], qPointer:0, currentQuestion:null, questionNo:0,
      playing:false, paused:false, answerVisible:false,
      bombTotal:15, bombLeft:15, totalGameSeconds:300, gameLeft:300,
      bombTimer:null, gameTimer:null, roundLocked:false,
      logs:[]
    };

    const demoBank = `AI可以随便用同学照片做搞笑图吗？,不可以,可以,看情况,只要好笑就可以
马来西亚首都是哪里？,吉隆坡,新山,槟城,马六甲

    function t(key,...args){
      const v = I18N[state.lang][key];
      return typeof v === 'function' ? v(...args) : v;
    }
    function saveSettings(){
      const data = {
        lang:$('languageSelect').value, teamCount:$('teamCount').value, targetScore:$('targetScore').value,
        bombSeconds:$('bombSeconds').value, gameMinutes:$('gameMinutes').value,
        wrongPenalty:$('wrongPenalty').value, explodePenalty:$('explodePenalty').value, wrongMode:$('wrongMode').value,
        sound:$('soundToggle').checked, shuffle:$('shuffleToggle').checked, bank:$('questionBank').value
      };
      localStorage.setItem('bombQuizSettings', JSON.stringify(data));
    }
    function loadSettings(){
      const raw = localStorage.getItem('bombQuizSettings');
      if(raw){
        try{
          const d = JSON.parse(raw);
          $('languageSelect').value = d.lang || 'zh';
          $('teamCount').value = d.teamCount || '2';
          $('targetScore').value = d.targetScore || '10';
          $('bombSeconds').value = d.bombSeconds || '15';
          $('gameMinutes').value = d.gameMinutes || '5';
          $('wrongPenalty').value = d.wrongPenalty || '0';
          $('explodePenalty').value = d.explodePenalty || '2';
          $('wrongMode').value = d.wrongMode || 'keep';
          $('soundToggle').checked = d.sound !== false;
          $('shuffleToggle').checked = d.shuffle !== false;
          $('questionBank').value = d.bank || demoBank;
        }catch(e){$('questionBank').value = demoBank;}
      } else {
        $('questionBank').value = demoBank;
      }
      state.lang = $('languageSelect').value;
    }
    function applyLanguage(){
      state.lang = $('languageSelect').value;
      document.documentElement.lang = state.lang === 'zh' ? 'zh-CN' : state.lang;
      $('appTitle').textContent = t('appTitle');
      $('appSubtitle').textContent = t('appSubtitle');
      $('settingsTitle').textContent = t('settingsTitle');
      $('btnStart').textContent = t('start');
      $('btnToggleSettings').textContent = t('showSettings');
      $('btnFullscreen').textContent = t('fullscreen');
      $('btnNextQ').textContent = t('nextQ');
      $('btnResetGame').textContent = t('reset');
      $('languageLabel').textContent = t('language');
      $('teamCountLabel').textContent = t('teams');
      $('targetScoreLabel').textContent = t('target');
      $('bombTimeLabel').textContent = t('bombSeconds');
      $('gameTimeLabel').textContent = t('gameTime');
      $('wrongPenaltyLabel').textContent = t('wrongPenalty');
      $('explodePenaltyLabel').textContent = t('explodePenalty');
      $('wrongModeLabel').textContent = t('wrongMode');
      $('wrongMode').options[0].textContent = t('wrongKeep');
      $('wrongMode').options[1].textContent = t('wrongPass');
      $('soundLabel').textContent = t('sound');
      $('shuffleLabel').textContent = t('shuffle');
      $('bankLabel').textContent = t('bank');
      $('bankHint').textContent = t('bankHint');
      $('btnImport').textContent = t('import');
      $('btnExport').textContent = t('export');
      $('btnDemo').textContent = t('demo');
      $('questionLabel').textContent = t('question');
      $('btnCorrect').textContent = t('correct');
      $('btnWrong').textContent = t('wrong');
      $('btnShowAnswer').textContent = t('showAnswer');
      $('btnForceExplode').textContent = t('forceExplode');
      $('btnPlayAgain').textContent = t('playAgain');
      $('btnCloseResult').textContent = t('close');
      if(!state.playing){
        $('questionBox').textContent = t('clickStart');
        $('answerText').textContent = t('hiddenAnswer');
        $('bombMessage').textContent = t('bombMsg');
      }
      renderScoreboard();
      updateTimersUI();
      saveSettings();
    }
    function parseBank(text){
      return text.split(/\r?\n/).map(line=>line.trim()).filter(Boolean).map((line,idx)=>{
        const parts = line.split(',').map(x=>x.trim()).filter(x=>x.length>0);
        if(parts.length < 2) return null;
        const q = parts[0], answer = parts[1];
        const options = parts.length >= 3 ? parts.slice(1) : [];
        return {id:idx+1, q, answer, options};
      }).filter(Boolean);
    }
    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
      return a;
    }
    function initTeams(){
      state.teamCount = parseInt($('teamCount').value,10);
      state.teams = Array.from({length:state.teamCount}, (_,i)=>({
        name:t('teamsNames')[i], score:0, color:COLORS[i], emoji:EMOJIS[i]
      }));
      state.activeIndex = 0;
      renderScoreboard();
    }
    function renderScoreboard(){
      if(!state.teams.length){
        const count = parseInt($('teamCount').value,10) || 2;
        state.teams = Array.from({length:count}, (_,i)=>({name:t('teamsNames')[i], score:0, color:COLORS[i], emoji:EMOJIS[i]}));
      } else {
        state.teams.forEach((team,i)=> team.name = t('teamsNames')[i]);
      }
      const board = $('scoreboard');
      board.className = `scoreboard teams${state.teams.length}`;
      board.innerHTML = state.teams.map((team,i)=>`
        <div class="team-card ${i===state.activeIndex && state.playing ? 'active' : ''}">
          <div class="stripe" style="background:${team.color}"></div>
          <div class="team-name">${team.emoji} ${escapeHtml(team.name)}</div>
          <div class="team-status">${i===state.activeIndex && state.playing ? t('active') : t('waiting')}</div>
          <div class="team-score">${team.score} <span style="font-size:15px;color:var(--muted)">${t('score')}</span></div>
        </div>`).join('');
      if(state.playing) $('activeTeamLarge').textContent = t('active', state.teams[state.activeIndex].name);
    }
    function escapeHtml(str){return String(str).replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
    function formatTime(sec){
      if(sec <= 0) return '00:00';
      const m = Math.floor(sec/60), s = sec%60;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    function updateTimersUI(){
      const mins = parseInt($('gameMinutes').value,10);
      if(state.playing){
        $('gameTimer').textContent = `${t('totalTime')} ${mins===0?t('unlimited'):formatTime(state.gameLeft)}`;
      }else{
        const total = mins*60;
        $('gameTimer').textContent = `${t('totalTime')} ${mins===0?t('unlimited'):formatTime(total)}`;
      }
      $('roundInfo').textContent = t('round', Math.max(1,state.questionNo || 1));
    }
    function startGame(){
      saveSettings();
      state.bank = parseBank($('questionBank').value);
      if(!state.bank.length){alert(t('noBank'));return;}
      initTeams();
      state.order = $('shuffleToggle').checked ? shuffle(state.bank) : state.bank.slice();
      state.qPointer = 0;
      state.questionNo = 0;
      state.playing = true;
      state.roundLocked = false;
      state.logs = [];
      state.bombTotal = parseInt($('bombSeconds').value,10);
      state.bombLeft = state.bombTotal;
      const mins = parseInt($('gameMinutes').value,10);
      state.totalGameSeconds = mins*60;
      state.gameLeft = state.totalGameSeconds;
      state.answerVisible = false;
      hideSettings(true);
      log('🚀 ' + t('start'));
      nextQuestion(true);
      restartBombTimer();
      restartGameTimer();
      renderScoreboard();
      updateTimersUI();
      beep(660, .07, 'square');
    }
    function hideSettings(hide){
      $('settingsPanel').classList.toggle('hidden', hide);
      $('layout').classList.toggle('settings-hidden', hide);
    }
    function stopTimers(){
      clearInterval(state.bombTimer); clearInterval(state.gameTimer);
      state.bombTimer = null; state.gameTimer = null;
    }
    function restartBombTimer(){
      clearInterval(state.bombTimer);
      state.bombLeft = state.bombTotal;
      updateBombUI();
      state.bombTimer = setInterval(()=>{
        if(!state.playing) return;
        state.bombLeft--;
        updateBombUI();
        if(state.bombLeft <= 5 && state.bombLeft > 0) beep(880, .04, 'square');
        if(state.bombLeft <= 0){explode();}
      },1000);
    }
    function restartGameTimer(){
      clearInterval(state.gameTimer);
      if(state.totalGameSeconds <= 0){updateTimersUI();return;}
      state.gameTimer = setInterval(()=>{
        if(!state.playing) return;
        state.gameLeft--;
        updateTimersUI();
        if(state.gameLeft <= 0){endGame(t('timeUp'));}
      },1000);
    }
    function updateBombUI(){
      $('bombCount').textContent = Math.max(0,state.bombLeft);
      const pct = Math.max(0,(state.bombLeft/state.bombTotal)*100);
      $('fuseFill').style.width = pct + '%';
      $('bombCount').classList.toggle('danger', state.bombLeft <= Math.max(5, Math.ceil(state.bombTotal*.28)) && state.playing);
    }
    function nextQuestion(resetRound=false){
      if(!state.bank.length) return;
      if(state.qPointer >= state.order.length){
        state.order = $('shuffleToggle').checked ? shuffle(state.bank) : state.bank.slice();
        state.qPointer = 0;
      }
      state.currentQuestion = state.order[state.qPointer++];
      state.questionNo++;
      state.roundLocked = false;
      state.answerVisible = false;
      renderQuestion();
      updateTimersUI();
      if(!resetRound) restartBombTimer();
    }
    function renderQuestion(){
      const item = state.currentQuestion;
      if(!item){$('questionBox').textContent = t('noQuestion'); return;}
      $('questionBox').textContent = item.q;
      $('questionCount').textContent = t('qCount', state.qPointer, state.order.length);
      $('answerText').textContent = `${t('answer')}：${item.answer}`;
      $('answerText').classList.toggle('hidden-answer', !state.answerVisible);
      const choices = $('choices');
      choices.innerHTML = '';
      if(item.options && item.options.length >= 2){
        const opts = shuffle([...new Set(item.options)]);
        choices.innerHTML = opts.map(opt=>`<button class="choice" data-choice="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`).join('');
        choices.querySelectorAll('.choice').forEach(btn=>{
          btn.addEventListener('click',()=>{
            if(!state.playing || state.roundLocked) return;
            const choice = btn.dataset.choice;
            if(normalize(choice) === normalize(item.answer)){
              $('bombMessage').textContent = t('optionCorrect');
              markCorrect();
            } else {
              $('bombMessage').textContent = t('optionWrong');
              markWrong();
            }
          });
        });
      }
      $('bombMessage').textContent = t('bombMsg');
    }
    function normalize(s){return String(s).trim().toLowerCase().replace(/\s+/g,' ');}
    function currentTeam(){return state.teams[state.activeIndex];}
    function passBomb(){
      state.activeIndex = (state.activeIndex + 1) % state.teams.length;
      renderScoreboard();
    }
    function markCorrect(){
      if(!state.playing || state.roundLocked) return;
      state.roundLocked = true;
      const team = currentTeam();
      team.score += 1;
      log(t('correctLog', team.name));
      beep(720,.08,'sine'); setTimeout(()=>beep(960,.08,'sine'),90);
      checkTarget(team);
      if(!state.playing) return;
      passBomb();
      setTimeout(()=> nextQuestion(false), 450);
    }
    function markWrong(){
      if(!state.playing || state.roundLocked) return;
      const team = currentTeam();
      const penalty = parseInt($('wrongPenalty').value,10);
      if(penalty > 0) team.score -= penalty;
      log(t('wrongLog', team.name) + (penalty ? ` -${penalty}` : ''));
      beep(180,.12,'sawtooth');
      renderScoreboard();
      if($('wrongMode').value === 'pass'){
        state.roundLocked = true;
        passBomb();
        setTimeout(()=> nextQuestion(false), 450);
      }
    }
    function explode(){
      if(!state.playing) return;
      clearInterval(state.bombTimer);
      const team = currentTeam();
      const penalty = parseInt($('explodePenalty').value,10);
      team.score -= penalty;
      log(t('explodeLog', team.name) + ` -${penalty}`);
      renderScoreboard();
      $('flash').classList.add('show');
      $('bombZone').classList.add('shake');
      setTimeout(()=>$('flash').classList.remove('show'),600);
      setTimeout(()=>$('bombZone').classList.remove('shake'),400);
      boomSound();
      passBomb();
      setTimeout(()=> nextQuestion(false), 900);
    }
    function forceExplode(){explode();}
    function checkTarget(team){
      const target = parseInt($('targetScore').value,10) || 9999;
      if(team.score >= target){endGame(t('targetWin', team.name));}
    }
    function endGame(reason){
      state.playing = false;
      stopTimers();
      renderScoreboard();
      $('resultTitle').textContent = t('gameOver');
      $('resultSummary').textContent = reason || t('ranking');
      const sorted = state.teams.slice().sort((a,b)=>b.score-a.score);
      $('ranking').innerHTML = sorted.map((team,i)=>`
        <div class="rank-row"><span>${i+1}. ${team.emoji} ${escapeHtml(team.name)}</span><span>${team.score} ${t('score')}</span></div>
      `).join('');
      $('resultOverlay').classList.add('show');
      confetti();
    }
    function log(msg){
      state.logs.unshift(`${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})} ${msg}`);
      state.logs = state.logs.slice(0,30);
      $('logBox').innerHTML = state.logs.map(escapeHtml).join('<br>');
    }
    function toggleAnswer(){
      state.answerVisible = !state.answerVisible;
      $('answerText').classList.toggle('hidden-answer', !state.answerVisible);
    }
    function resetGame(){
      stopTimers();
      state.playing=false; state.currentQuestion=null; state.questionNo=0; state.qPointer=0; state.logs=[];
      initTeams();
      $('questionBox').textContent = t('clickStart');
      $('choices').innerHTML='';
      $('answerText').textContent = t('hiddenAnswer');
      $('answerText').classList.add('hidden-answer');
      $('logBox').innerHTML='';
      $('bombMessage').textContent = t('bombMsg');
      state.bombTotal=parseInt($('bombSeconds').value,10); state.bombLeft=state.bombTotal; updateBombUI(); updateTimersUI();
      $('resultOverlay').classList.remove('show');
    }
    function exportTxt(){
      const blob = new Blob([$('questionBank').value], {type:'text/plain;charset=utf-8'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href=url; a.download='bomb_quiz_question_bank.txt'; a.click();
      URL.revokeObjectURL(url);
      alert(t('exported'));
    }
    function importTxt(file){
      if(!file) return;
      const reader = new FileReader();
      reader.onload = e=>{$('questionBank').value = e.target.result; saveSettings(); alert(t('loaded'));};
      reader.readAsText(file, 'utf-8');
    }
    function fullscreen(){
      if(!document.fullscreenElement){document.documentElement.requestFullscreen?.();}
      else{document.exitFullscreen?.();}
    }
    function beep(freq=440,duration=.08,type='sine'){
      if(!$('soundToggle').checked) return;
      try{
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type; osc.frequency.value = freq;
        osc.connect(gain); gain.connect(ctx.destination);
        gain.gain.setValueAtTime(.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + duration);
        osc.start(); osc.stop(ctx.currentTime + duration);
      }catch(e){}
    }
    function boomSound(){
      if(!$('soundToggle').checked) return;
      beep(85,.18,'sawtooth'); setTimeout(()=>beep(55,.22,'square'),90); setTimeout(()=>beep(130,.12,'sawtooth'),150);
    }
    function confetti(){
      const box = document.createElement('div'); box.className='confetti';
      const chars = ['🎉','⭐','💥','🏆','✨'];
      for(let i=0;i<80;i++){
        const s = document.createElement('span');
        s.textContent = chars[Math.floor(Math.random()*chars.length)];
        s.style.left = Math.random()*100 + 'vw';
        s.style.animationDelay = (Math.random()*0.7) + 's';
        s.style.fontSize = (18 + Math.random()*22) + 'px';
        box.appendChild(s);
      }
      document.body.appendChild(box);
      setTimeout(()=>box.remove(),3000);
    }

    function bindEvents(){
      ['languageSelect','teamCount','targetScore','bombSeconds','gameMinutes','wrongPenalty','explodePenalty','wrongMode','soundToggle','shuffleToggle','questionBank'].forEach(id=>{
        $(id).addEventListener('change',()=>{saveSettings(); if(id==='languageSelect') applyLanguage(); if(id==='teamCount' && !state.playing){initTeams();}});
        if(id==='questionBank') $(id).addEventListener('input',saveSettings);
      });
      $('btnStart').addEventListener('click',startGame);
      $('btnToggleSettings').addEventListener('click',()=> hideSettings(!$('settingsPanel').classList.contains('hidden')));
      $('btnFullscreen').addEventListener('click',fullscreen);
      $('btnNextQ').addEventListener('click',()=>{ if(state.playing) nextQuestion(false); });
      $('btnResetGame').addEventListener('click',resetGame);
      $('btnCorrect').addEventListener('click',markCorrect);
      $('btnWrong').addEventListener('click',markWrong);
      $('btnShowAnswer').addEventListener('click',toggleAnswer);
      $('btnForceExplode').addEventListener('click',forceExplode);
      $('btnImport').addEventListener('click',()=>$('fileInput').click());
      $('fileInput').addEventListener('change',e=>importTxt(e.target.files[0]));
      $('btnExport').addEventListener('click',exportTxt);
      $('btnDemo').addEventListener('click',()=>{$('questionBank').value=demoBank;saveSettings();alert(t('loaded'));});
      $('btnPlayAgain').addEventListener('click',()=>{$('resultOverlay').classList.remove('show');startGame();});
      $('btnCloseResult').addEventListener('click',()=>$('resultOverlay').classList.remove('show'));
      document.addEventListener('keydown',e=>{
        if(e.key===' '){e.preventDefault(); if(state.playing) markCorrect();}
        if(e.key.toLowerCase()==='x'){if(state.playing) markWrong();}
        if(e.key.toLowerCase()==='n'){if(state.playing) nextQuestion(false);}
        if(e.key.toLowerCase()==='a'){toggleAnswer();}
      });
    }

    loadSettings();
    bindEvents();
    applyLanguage();
    resetGame();
  </script>
</body>
</html>

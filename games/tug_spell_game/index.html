<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S006 文字对应对战｜暗色测试版</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#d7dce5;
      --red:#ef476f;
      --red-soft:#fff0f3;
      --blue:#3b82f6;
      --blue-soft:#eef6ff;
      --green:#10b981;
      --green-soft:#ecfdf5;
      --yellow:#facc15;
      --dark:#334155;
      --purple:#635bff;
      --orange:#f97316;
      --shadow:0 18px 40px rgba(15,23,42,.10);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Noto Sans", Arial, sans-serif;
      background:linear-gradient(180deg,#f8fafc 0%,#eef2f7 100%);
      color:var(--text);
    }
    button,input,textarea,select{font:inherit}
    .app{max-width:1240px;margin:0 auto;padding:18px 18px 30px}
    .shell{
      background:rgba(255,255,255,.94);
      border:1px solid rgba(226,232,240,.9);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:22px;
    }
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:12px;flex-wrap:wrap}
    h1{margin:0;font-size:clamp(30px,4.4vw,46px);letter-spacing:.04em;text-align:center;flex:1;min-width:280px}
    .smallBtn{
      border:1px solid var(--border);background:#fff;color:var(--dark);
      padding:11px 16px;border-radius:999px;cursor:pointer;font-weight:900;
      box-shadow:0 2px 6px rgba(15,23,42,.06);font-size:18px;
    }
    .topActions{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap}
    .actionBtn{min-width:118px;text-align:center}
    .startTop{background:linear-gradient(180deg,#8b5cf6,#6d28d9)!important;color:#fff!important}
    .pauseTop{background:linear-gradient(180deg,#334155,#1e293b)!important;color:#fff!important}
    .resetTop{background:linear-gradient(180deg,#f43f5e,#be123c)!important;color:#fff!important}
    .smallBtn:hover{transform:translateY(-1px)}
    .langSelect{min-width:160px;text-align:center;font-weight:950;}
    .setup{
      border:1px solid var(--border);background:#f8fafc;border-radius:16px;padding:16px;margin:14px 0 20px;
    }
    .setup.hidden{display:none}
    .setupTitle{color:#4f46e5;font-weight:950;margin:0 0 12px;font-size:18px}
    .setupGrid{display:grid;grid-template-columns:260px 1fr;gap:14px;align-items:start}
    .settingsStack{display:grid;gap:12px}
    .field label{display:block;font-weight:850;margin-bottom:6px}
    .duration,.select,.target{
      width:100%;padding:11px;border:1px solid var(--border);border-radius:9px;background:#fff;
    }
    .inlineGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    textarea{
      width:100%;height:205px;padding:12px;border:1px solid var(--border);border-radius:9px;background:#fff;resize:vertical;
      line-height:1.5;
    }
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    .btn{
      border:0;border-radius:10px;color:#fff;font-weight:950;padding:12px 18px;cursor:pointer;
      box-shadow:0 10px 16px rgba(15,23,42,.10);
    }
    .btn:active{transform:translateY(1px)}
    .btn.green{background:#16a34a}.btn.gold{background:#d69000}.btn.blue{background:#2563eb}.btn.purple{background:#5b4ff6}.btn.dark{background:#334155}.btn.red{background:#e11d48}.btn.gray{background:#64748b}
    .hint{color:var(--muted);font-size:13px;margin-top:8px;line-height:1.5}
    .modeNote{
      background:#fff;border:1px dashed #cbd5e1;border-radius:12px;padding:10px 12px;color:#334155;font-weight:750;font-size:14px;line-height:1.5;
    }
    .statusRow{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;margin:12px 0 16px}
    .timer{font-size:clamp(23px,3vw,34px);font-weight:950;color:#dc2626;letter-spacing:.03em}
    .pill{background:#fff;border:1px solid var(--border);border-radius:999px;padding:8px 13px;font-weight:850;color:var(--dark)}

    .ropeWrap{position:relative;margin:12px auto 26px;max-width:1080px;height:62px;padding:0 26px;display:flex;align-items:center}
    .ropeWrap.hidden{display:none}
    .rope{
      position:relative;width:100%;height:42px;border-radius:999px;background:linear-gradient(180deg,#e5e7eb,#d1d5db);
      box-shadow:inset 0 3px 8px rgba(15,23,42,.18), 0 2px 7px rgba(15,23,42,.06);
      overflow:visible;
    }
    .centerLine{position:absolute;left:50%;top:6px;bottom:6px;width:4px;background:var(--orange);border-radius:4px;opacity:.9}
    .flag{
      position:absolute;left:50%;top:-11px;transform:translateX(-50%);font-size:34px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.18));transition:left .35s ease;
    }
    .ball{position:absolute;top:50%;width:34px;height:34px;border-radius:50%;transform:translateY(-50%);box-shadow:0 6px 14px rgba(15,23,42,.22), inset 0 6px 9px rgba(255,255,255,.5)}
    .ball.red{left:-17px;background:linear-gradient(135deg,#fb7185,#e11d48)}
    .ball.blue{right:-17px;background:linear-gradient(135deg,#60a5fa,#2563eb)}
    .winLine{position:absolute;top:-5px;bottom:-5px;width:3px;background:rgba(15,23,42,.18);border-radius:5px}.winLine.left{left:15%}.winLine.right{right:15%}

    .raceWrap{display:none;margin:8px auto 24px;max-width:1080px;background:#f8fafc;border:1px solid var(--border);border-radius:16px;padding:14px}
    .raceWrap.show{display:block}
    .raceTitle{font-weight:950;color:#334155;margin-bottom:10px;text-align:center}
    .raceLane{display:grid;grid-template-columns:90px 1fr 58px;gap:10px;align-items:center;margin:9px 0}
    .laneName{font-weight:950;text-align:right}.laneName.red{color:#e11d48}.laneName.blue{color:#2563eb}.laneName.green{color:#059669}
    .track{position:relative;height:32px;background:#e5e7eb;border-radius:999px;box-shadow:inset 0 2px 6px rgba(15,23,42,.12);overflow:hidden}
    .trackFill{height:100%;width:0%;border-radius:999px;transition:width .35s ease}
    .trackFill.red{background:linear-gradient(90deg,#fb7185,#e11d48)}
    .trackFill.blue{background:linear-gradient(90deg,#60a5fa,#2563eb)}
    .trackFill.green{background:linear-gradient(90deg,#34d399,#059669)}
    .runner{position:absolute;top:50%;left:0%;transform:translate(-50%,-50%);font-size:26px;transition:left .35s ease;filter:drop-shadow(0 2px 2px rgba(0,0,0,.18))}
    .finish{position:absolute;right:10px;top:2px;bottom:2px;width:4px;border-radius:8px;background:rgba(15,23,42,.28)}
    .laneScore{font-weight:950;color:#0f172a;text-align:left}

    .teams{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .teams.three{grid-template-columns:repeat(3,1fr)}
    .team{
      border:1.5px solid var(--border);border-radius:16px;padding:16px;background:#fff;position:relative;overflow:hidden;
    }
    .team.red{background:var(--red-soft);border-color:#fecdd3}.team.blue{background:var(--blue-soft);border-color:#bfdbfe}.team.green{background:var(--green-soft);border-color:#a7f3d0}
    .teamHeader{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
    .teamName{font-size:18px;font-weight:950}.team.red .teamName{color:#e11d48}.team.blue .teamName{color:#2563eb}.team.green .teamName{color:#059669}
    .score{font-weight:950;background:#fff;border:1px solid var(--border);border-radius:999px;padding:7px 10px;color:#0f172a;white-space:nowrap}
    .promptBox{text-align:center;margin:12px 0 12px}
    .promptLabel{font-size:13px;color:var(--muted);font-weight:850}
    .promptWord{font-size:clamp(32px,4vw,48px);font-weight:950;margin-top:6px;line-height:1.25;color:#3730a3;word-break:break-word}
    .speak{border:0;background:transparent;cursor:pointer;font-size:22px;vertical-align:middle;margin-left:4px}
    .answerRow{display:flex;gap:8px;margin:8px 0 12px}
    .answer{
      width:100%;padding:14px 12px;background:#fff;border:2px solid #e5e7eb;border-radius:12px;font-size:24px;font-weight:900;text-align:center;
      outline:none;
    }
    .answer:focus{border-color:#111827;box-shadow:0 0 0 3px rgba(15,23,42,.12)}
    .submitMini{border:0;border-radius:10px;background:#0f766e;color:#fff;font-weight:950;padding:0 16px;cursor:pointer;min-width:96px;font-size:20px}
    .keyboardMain{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
    .keyboardMain.dynamic{grid-template-columns:repeat(5,1fr)}
    .keyboardSpecial{display:grid;grid-template-columns:1.15fr 1.5fr 1fr 1fr 1fr;gap:8px;margin-top:10px}
    .key{
      border:1px solid #cbd5e1;background:#fff;border-radius:10px;padding:10px 6px;font-weight:950;cursor:pointer;min-height:48px;font-size:22px;
      box-shadow:0 1px 0 rgba(15,23,42,.10);word-break:break-word;
    }
    .key:hover{background:#f8fafc}.key:active{transform:translateY(1px)}
    .keyboardSpecial .key{min-height:54px;font-size:21px}
    .key.shift{background:#ffeb8a}.key.back{background:#d7dce3}.key.enter{background:#bbf7d0}.key.space{background:#e0e7ff}.key.clear{background:#fee2e2}
    .feedback{height:28px;text-align:center;font-size:16px;font-weight:950;margin-top:9px}.feedback.ok{color:#16a34a}.feedback.bad{color:#e11d48}
    .controls{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin:22px 0 8px}
    .bigBtn{border:0;border-radius:999px;color:#fff;font-weight:950;padding:15px 30px;cursor:pointer;min-width:150px;box-shadow:0 12px 20px rgba(15,23,42,.13)}
    .announcement{
      position:fixed;inset:0;background:rgba(15,23,42,.50);display:none;align-items:center;justify-content:center;padding:20px;z-index:50;
    }
    .announcement.show{display:flex}
    .modal{background:#fff;border-radius:24px;max-width:620px;width:100%;padding:32px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.25)}
    .modal h2{font-size:42px;margin:0 0 10px}.modal p{font-size:20px;line-height:1.6;margin:8px 0;color:var(--dark);font-weight:750}
    .modalBtns{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:22px}
    .shake{animation:shake .32s linear}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    .pulse{animation:pulse .35s ease}@keyframes pulse{50%{transform:scale(1.04)}}
    .footerNote{text-align:center;color:var(--muted);font-size:13px;margin-top:14px;line-height:1.6}
    @media (max-width: 1020px){.teams.three{grid-template-columns:1fr}.teams{grid-template-columns:1fr}.setupGrid{grid-template-columns:1fr}.inlineGrid{grid-template-columns:1fr}.raceLane{grid-template-columns:70px 1fr 50px}}
    @media (max-width: 820px){
      .app{padding:10px}.shell{padding:15px;border-radius:18px}.topbar{flex-wrap:wrap}h1{order:-1;width:100%;font-size:30px}.topActions{width:100%;justify-content:center}.actionBtn{min-width:102px}.keyboardMain{gap:6px}.keyboardSpecial{grid-template-columns:repeat(2,1fr)} .keyboardSpecial .space{grid-column:span 2}.promptWord{font-size:34px}.answerRow{flex-direction:column}.submitMini{padding:11px}.ropeWrap{padding:0 20px}
    }
    @media (prefers-color-scheme: dark){
      body{background:#0f172a}.shell{background:#111827;border-color:#334155}.setup{background:#0f172a;border-color:#334155}.team{border-color:#475569}.team.red{background:#2a1019}.team.blue{background:#0f203d}.team.green{background:#09261c}.answer,textarea,.duration,.select,.target,.smallBtn,.score,.pill,.key,.modal,.modeNote,.raceWrap{background:#fff;color:#0f172a}h1,.setupTitle{color:#fff}.hint,.footerNote,.promptLabel{color:#cbd5e1}.timer{color:#fb7185}
    }
  
    /* ===== S006 DARK THEME v1 ===== */
    :root{
      --bg:#071226; --bg2:#0b1a35; --card:#101f3a; --card2:#0c1830; --text:#eef5ff; --muted:#b9c9e8; --border:#31496f;
      --red:#fb5c79; --red-soft:#211321; --blue:#60a5fa; --blue-soft:#101d38; --green:#34d399; --green-soft:#0d241c;
      --yellow:#facc15; --dark:#cfe0ff; --purple:#8b5cf6; --orange:#f59e0b; --shadow:0 20px 48px rgba(0,0,0,.38);
    }
    body{
      background:
        radial-gradient(circle at 9% 11%,rgba(96,165,250,.12),transparent 24%),
        radial-gradient(circle at 92% 8%,rgba(139,92,246,.12),transparent 18%),
        linear-gradient(180deg,#071226 0%,#0b1a35 58%,#050b16 100%) !important;
      color:var(--text) !important;
    }
    .app{max-width:1360px;}
    .shell{background:linear-gradient(180deg,rgba(15,31,58,.96),rgba(8,18,37,.98)) !important;border:1px solid rgba(147,197,253,.22) !important;box-shadow:var(--shadow)!important;}
    .topbar{background:linear-gradient(90deg,#0f2a54,#193b74);border:1px solid rgba(147,197,253,.2);padding:14px 16px;border-radius:22px;}
    h1{color:#f5f9ff!important;text-shadow:0 2px 14px rgba(0,0,0,.35);}

    .smallBtn:hover{background:#12264a!important;}
    .setup{background:linear-gradient(180deg,#102143,#0b1830)!important;border:1px solid rgba(147,197,253,.22)!important;color:#eef5ff!important;}
    .setupTitle{color:#ffffff!important;}
    .setupGrid{grid-template-columns:320px 1fr;}
    .field label,.raceTitle,.promptLabel,.footerNote,.hint,.modeNote{color:#d8e6ff!important;}

    .duration,.select,.target,textarea,input.answer,select{background:#06142b!important;color:#f8fbff!important;border:1px solid #395984!important;}
    textarea{height:300px;font-family:Consolas,"Microsoft YaHei",monospace;line-height:1.55;}
    textarea::placeholder,input::placeholder{color:#90a9cc!important;}
    .btn{box-shadow:0 14px 28px rgba(0,0,0,.28)!important;border:1px solid rgba(255,255,255,.12)!important;}
    .btn.green{background:linear-gradient(180deg,#2fca73,#15824a)!important}.btn.gold{background:linear-gradient(180deg,#f9c74f,#c98700)!important;color:#1d1400!important}.btn.blue{background:linear-gradient(180deg,#3b82f6,#1d4ed8)!important}.btn.purple{background:linear-gradient(180deg,#8b5cf6,#6d28d9)!important}.btn.dark{background:linear-gradient(180deg,#334155,#1e293b)!important}.btn.red{background:linear-gradient(180deg,#f43f5e,#be123c)!important}.btn.gray{background:linear-gradient(180deg,#64748b,#334155)!important}
    .statusRow{margin:16px 0 18px}.timer{color:#fff!important;text-shadow:0 0 16px rgba(96,165,250,.35);}.pill{background:#0b1b37!important;color:#f4f8ff!important;border:1px solid #33527d!important;}
    .ropeWrap,.raceWrap{background:linear-gradient(180deg,#122542,#0d1b32)!important;border:1px solid rgba(147,197,253,.18)!important;border-radius:20px;box-shadow:0 14px 30px rgba(0,0,0,.22)!important;}
    .rope{background:linear-gradient(180deg,#273854,#182a46)!important;box-shadow:inset 0 3px 9px rgba(0,0,0,.35)!important}.winLine{background:rgba(255,255,255,.28)!important}.centerLine{background:#fbbf24!important}.track{background:#122342!important}.finish{background:rgba(255,255,255,.35)!important}.laneScore{color:#eaf2ff!important}
    .teams{gap:18px}.team{background:linear-gradient(180deg,#122542,#0d1b32)!important;border:1px solid rgba(147,197,253,.18)!important;color:#eef5ff!important;box-shadow:0 14px 30px rgba(0,0,0,.2)}
    .team.red{background:linear-gradient(180deg,#251422,#15101b)!important;border-color:rgba(251,92,121,.35)!important}.team.blue{background:linear-gradient(180deg,#10213f,#0b1830)!important;border-color:rgba(96,165,250,.35)!important}.team.green{background:linear-gradient(180deg,#0d2a20,#0b1d17)!important;border-color:rgba(52,211,153,.35)!important}
    .teamName,.score,.promptWord{color:#f8fbff!important}.team.red .teamName{color:#ff8aa0!important}.team.blue .teamName{color:#8ec5ff!important}.team.green .teamName{color:#7df0b7!important}
    .score{background:#0b1b37!important;border:1px solid #365783!important;color:#f8fbff!important}.promptWord{font-size:clamp(30px,3.7vw,46px)!important;text-shadow:0 2px 12px rgba(0,0,0,.28)}
    .answer{background:#07162f!important;color:#f8fbff!important;border:2px solid #42608d!important;border-radius:14px!important}.answer:focus{border-color:#93c5fd!important;box-shadow:0 0 0 3px rgba(96,165,250,.18)!important}.submitMini{background:linear-gradient(180deg,#14b8a6,#0f766e)!important;border-radius:12px!important;}
    .key{background:#0f2243!important;color:#f8fbff!important;border:1px solid #365783!important;border-radius:14px!important;min-height:48px!important}.key:hover{background:#17315f!important}.key.shift,.key.back,.key.enter,.key.space,.key.clear{color:#061226!important;font-weight:950!important}.key.shift{background:#fde68a!important}.key.back{background:#cbd5e1!important}.key.enter{background:#86efac!important}.key.space{background:#bfdbfe!important}.key.clear{background:#fecaca!important}
    .feedback.ok{color:#86efac!important}.feedback.bad{color:#ff8aa0!important}.modal{background:linear-gradient(180deg,#132542,#0b1830)!important;color:#eef5ff!important;border:1px solid #365783}.modal p{color:#dbeafe!important}.announcement{background:rgba(0,0,0,.64)!important}.footerNote{display:none!important}
    @media(max-width:1020px){.setupGrid{grid-template-columns:1fr}.teams.three,.teams{grid-template-columns:1fr}}

  /* S006_BUTTONS_INTERNAL_FIX_START */
#toggleSetup,#startBtn,#pauseBtn,#resetBtn,#fullScreenBtn,#applyBank,#importBtn,#exportBtn,#sampleBtn,#soundBtn,#playAgainBtn,#closeModalBtn{position:relative!important;z-index:2147482000!important;pointer-events:auto!important;}
.setup,.topbar,.topActions,.toolbar{pointer-events:auto!important;}
/* S006_BUTTONS_INTERNAL_FIX_END */

/* SHARED_RATIO_SUPPORT_START */
.ratioSelect{
  border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.12);
  color:#fff;
  border-radius:12px;
  padding:8px 10px;
  font-weight:900;
  min-width:112px;
  outline:none;
}
.ratioSelect option{color:#111827;background:#fff;}
body.ratio-169 .app{max-width:1480px;}
body.ratio-43 .app{max-width:1120px;}
body.ratio-34 .app{max-width:760px;}
body.ratio-916 .app{max-width:540px;}
body.ratio-43 .layout,
body.ratio-34 .layout,
body.ratio-916 .layout{grid-template-columns:1fr!important;}
body.ratio-43 .settings,
body.ratio-34 .settings,
body.ratio-916 .settings{position:relative!important;top:auto!important;}
body.ratio-34 .topbar,
body.ratio-916 .topbar{align-items:flex-start;flex-direction:column;}
body.ratio-34 .quickBtns,
body.ratio-916 .quickBtns{width:100%;justify-content:flex-start;}
body.ratio-34 .hud,
body.ratio-916 .hud{grid-template-columns:1fr!important;}
body.ratio-34 .stage,
body.ratio-916 .stage{grid-template-columns:1fr!important;}
body.ratio-34 .game,
body.ratio-916 .game{min-height:auto!important;}
body.ratio-34 .grid2,
body.ratio-916 .grid2,
body.ratio-34 .grid3,
body.ratio-916 .grid3{grid-template-columns:1fr!important;}
body.ratio-34 .teams,
body.ratio-916 .teams{grid-template-columns:1fr!important;}
body.ratio-34 .board,
body.ratio-916 .board,
body.ratio-34 .moleGrid,
body.ratio-916 .moleGrid{grid-template-columns:repeat(2,1fr)!important;}
body.ratio-34 .wheelBox,
body.ratio-916 .wheelBox{transform:scale(.82);transform-origin:center;}

body.ratio-916 .panelBody{padding:14px;}
body.ratio-34 h1,
body.ratio-916 h1{font-size:30px;}
/* SHARED_RATIO_SUPPORT_END */

</style>

<body>
  <div class="app">
    <div class="shell">
      <div class="topbar">
        <button class="smallBtn" id="toggleSetup"></button>
        <h1 id="mainTitle"></h1>
        <div class="topActions">
          <select class="smallBtn langSelect" id="languageSelect" title="Language">
            <option value="zh-Hans">简体中文</option>
            <option value="en">English UI</option>
            <option value="ms">Bahasa Melayu</option>
          </select>
          <button class="smallBtn actionBtn startTop" id="startBtn"></button>
          <button class="smallBtn actionBtn pauseTop" id="pauseBtn"></button>
          <button class="smallBtn actionBtn resetTop" id="resetBtn"></button>
          <button class="smallBtn" id="fullScreenBtn"></button>
        </div>
      </div>

      <section class="setup" id="setupPanel">
        <p class="setupTitle" id="setupTitle"></p>
        <div class="setupGrid">
          <div class="settingsStack">
            <div class="field">
              <label for="teamCount" id="teamCountLabel"></label>
              <select id="teamCount" class="select">
                <option value="2" id="teamTwoOption"></option>
                <option value="3" id="teamThreeOption"></option>
              </select>
            </div>
            <div class="inlineGrid">
              <div class="field">
                <label for="minutes" id="minutesLabel"></label>
                <input id="minutes" class="duration" type="number" min="1" max="30" value="3" />
              </div>
              <div class="field">
                <label for="targetScore" id="targetScoreLabel"></label>
                <input id="targetScore" class="target" type="number" min="3" max="30" value="8" />
              </div>
            </div>
            <div class="modeNote" id="modeNote"></div>
            <div class="hint" id="formatHint"></div>
          </div>
          <div class="field">
            <label for="wordBank" id="wordBankLabel"></label>
            <textarea id="wordBank" spellcheck="false"></textarea>
            <div class="toolbar">
              <button class="btn green" id="applyBank"></button>
              <button class="btn gold" id="importBtn"></button>

  const els = {

    setupTitle: $('setupTitle'), teamCountLabel: $('teamCountLabel'), teamTwoOption: $('teamTwoOption'), teamThreeOption: $('teamThreeOption'),
    minutesLabel: $('minutesLabel'), targetScoreLabel: $('targetScoreLabel'), wordBankLabel: $('wordBankLabel'), formatHint: $('formatHint'), autoHint: $('autoHint'),
    teamCount: $('teamCount'), minutes: $('minutes'), targetScore: $('targetScore'), modeNote: $('modeNote'),
    wordBank: $('wordBank'), applyBank: $('applyBank'), importBtn: $('importBtn'), exportBtn: $('exportBtn'), sampleBtn: $('sampleBtn'), fileInput: $('fileInput'),
    timer: $('timer'), bankCount: $('bankCount'), modePill: $('modePill'), soundBtn: $('soundBtn'),
    ropeWrap: $('ropeWrap'), flag: $('flag'), raceWrap: $('raceWrap'), raceTitle: $('raceTitle'), raceBoard: $('raceBoard'), teams: $('teams'),
    startBtn: $('startBtn'), pauseBtn: $('pauseBtn'), resetBtn: $('resetBtn'), footerNote: $('footerNote'),
    announcement: $('announcement'), resultTitle: $('resultTitle'), resultText: $('resultText'), resultScore: $('resultScore'),
    playAgainBtn: $('playAgainBtn'), closeModalBtn: $('closeModalBtn')
  };

  let lang = 'zh-Hans';
  let bank = [];
  let activeTeams = [];
  let current = {};
  let score = {};
  let shift = {};
  let tug = 0;
  let remaining = 180;
  let total = 180;
  let timerId = null;
  let running = false;
  let paused = false;
  let soundOn = true;
  const MAX_TUG = 7;

  function t(key, vars={}){
    let str = (I18N[lang] && I18N[lang][key]) || I18N['zh-Hans'][key] || key;
    Object.keys(vars).forEach(k => { str = str.replace(new RegExp('\\{' + k + '\\}', 'g'), vars[k]); });
    return str;
  }

  function teamDefs(){
    return [
      { id:'red', name:t('red'), icon:'🔴', className:'red' },
      { id:'blue', name:t('blue'), icon:'🔵', className:'blue' },
      { id:'green', name:t('green'), icon:'🟢', className:'green' }
    ];
  }

  function isLatinAnswer(str){ return /^[A-Za-zÀ-ÖØ-öø-ÿ\s'\-.]+$/.test(String(str || '')); }
  function cleanAnswer(str){
    return String(str || '')
      .normalize('NFKC')
      .trim()
      .toLocaleLowerCase()
      .replace(/[，、。！？；：]/g, m => ({'，':',','、':',','。':'.','！':'!','？':'?','；':';','：':':'})[m] || m)
      .replace(/\s+/g,' ');
  }
  function escapeText(s){ return String(s || '').replace(/[<>]/g, ''); }
  function getTeamCount(){ return parseInt(els.teamCount.value || '2', 10); }
  function getTargetScore(){ return Math.max(3, Math.min(30, parseInt(els.targetScore.value || '8', 10))); }

  function parseLine(line){
    const raw = line.trim();
    if(!raw || raw.startsWith('#')) return null;
    const parts = raw.split(/[,，=：:\t]/).map(x => x.trim()).filter(Boolean);
    if(parts.length < 2) return null;
    const prompt = parts[0];
    const answer = parts.slice(1).join(' ');
    return { prompt: escapeText(prompt), answer: escapeText(answer) };
  }

  function parseBank(text){
    const rows = String(text || '').split(/\r?\n/).map(parseLine).filter(Boolean);
    const seen = new Set();
    const unique = [];
    for(const row of rows){
      const key = cleanAnswer(row.prompt) + '|' + cleanAnswer(row.answer);
      if(!seen.has(key)){ seen.add(key); unique.push(row); }
    }
    return unique;
  }

  function saveSettings(){
    localStorage.setItem('lead_text_match_bank', els.wordBank.value);
    localStorage.setItem('lead_text_match_minutes', els.minutes.value);
    localStorage.setItem('lead_text_match_team_count', els.teamCount.value);
    localStorage.setItem('lead_text_match_target_score', els.targetScore.value);
    localStorage.setItem('lead_text_match_lang', lang);
  }

  function loadSettings(){
    lang = localStorage.getItem('lead_text_match_lang') || 'zh-Hans';
    if(!I18N[lang]) lang = 'zh-Hans';
    els.languageSelect.value = lang;
    els.wordBank.value = localStorage.getItem('lead_text_match_bank') || defaultBank();
    if(!els.wordBank.value.trim() || isBuiltInSample(els.wordBank.value)) els.wordBank.value = defaultBank();
    els.minutes.value = localStorage.getItem('lead_text_match_minutes') || 3;
    els.teamCount.value = localStorage.getItem('lead_text_match_team_count') || 2;
    els.targetScore.value = localStorage.getItem('lead_text_match_target_score') || 8;
    applyLanguage();
    renderTeams();
    applyBank(false);
  }

  function applyLanguage(){
    document.documentElement.lang = lang;
    document.title = t('title') + '｜2/3 Teams';
    els.mainTitle.textContent = t('title');
    els.toggleSetup.textContent = els.setupPanel.classList.contains('hidden') ? t('showSetup') : t('hideSetup');

    els.setupTitle.textContent = t('setupTitle');
    els.teamCountLabel.textContent = t('teamCountLabel');
    els.teamTwoOption.textContent = t('teamTwoOption');
    els.teamThreeOption.textContent = t('teamThreeOption');
    els.minutesLabel.textContent = t('minutesLabel');
    els.targetScoreLabel.textContent = t('targetScoreLabel');
    els.wordBankLabel.textContent = t('wordBankLabel');
    els.formatHint.innerHTML = t('formatHint');
    els.autoHint.textContent = t('autoHint');
    els.applyBank.textContent = t('applyBank');
    els.importBtn.textContent = t('importTxt');
    els.exportBtn.textContent = t('exportTxt');
    els.sampleBtn.textContent = t('sample');
    els.startBtn.textContent = t('start');
    els.pauseBtn.textContent = paused ? t('resume') : t('pause');
    els.resetBtn.textContent = t('reset');
    els.footerNote.textContent = t('footer');
    els.raceTitle.textContent = t('raceTitle');
    els.soundBtn.textContent = `${t('sound')}：${soundOn ? t('on') : t('off')}`;
    els.playAgainBtn.textContent = t('playAgain');
    els.closeModalBtn.textContent = t('close');
    setTimerText();
    updateBankCount();
    setModeUI();
  }

  function updateBankCount(){ els.bankCount.textContent = `${t('bank')}：${bank.length} ${t('questions')}`; }

  function setModeUI(){
    const count = getTeamCount();
    if(count === 2){
      els.modeNote.textContent = t('modeNote2');
      els.modePill.textContent = `${t('mode')}：${t('mode2')}`;
      els.ropeWrap.classList.remove('hidden');
      els.raceWrap.classList.remove('show');
    } else {
      els.modeNote.textContent = t('modeNote3');
      els.modePill.textContent = `${t('mode')}：${t('mode3')}`;
      els.ropeWrap.classList.add('hidden');
      els.raceWrap.classList.add('show');
    }
  }

  function renderTeams(){
    const count = getTeamCount();
    activeTeams = teamDefs().slice(0, count);
    els.teams.className = 'teams ' + (count === 3 ? 'three' : 'two');
    els.teams.innerHTML = activeTeams.map(team => `
      <section class="team ${team.className}" data-team="${team.id}">
        <div class="teamHeader">
          <div class="teamName">${team.icon} ${team.name}</div>
          <div class="score">${t('score')}：<span id="${team.id}Score">${score[team.id] || 0}</span></div>
        </div>
        <div class="promptBox">
          <div class="promptLabel">${t('promptLabel')}</div>
          <div class="promptWord"><span id="${team.id}Prompt">—</span><button class="speak" data-speak="${team.id}" title="${t('speak')}">🔊</button></div>
        </div>
        <div class="answerRow">
          <input class="answer" id="${team.id}Input" autocomplete="off" placeholder="${t('placeholder')}" />
          <button class="submitMini" data-submit="${team.id}">${t('submit')}</button>
        </div>
        <div class="keyboardMain" id="${team.id}KeyboardMain"></div>
        <div class="keyboardSpecial" id="${team.id}KeyboardSpecial"></div>
        <div class="feedback" id="${team.id}Feedback"></div>
      </section>
    `).join('');

    activeTeams.forEach(team => {
      shift[team.id] = false;
      current[team.id] = current[team.id] || null;
      score[team.id] = score[team.id] || 0;
      buildKeyboard(team.id);
      const input = $(team.id + 'Input');
      input.addEventListener('keydown', e => { if(e.key === 'Enter') submitAnswer(team.id); });
    });
    document.querySelectorAll('[data-submit]').forEach(b => b.addEventListener('click', () => submitAnswer(b.dataset.submit)));
    document.querySelectorAll('[data-speak]').forEach(b => b.addEventListener('click', () => speakPrompt(b.dataset.speak)));
    renderRaceBoard();
    setModeUI();
    activeTeams.forEach(team => {
      if(current[team.id]) {
        const prompt = $(team.id + 'Prompt');
        if(prompt) prompt.textContent = current[team.id].prompt;
      }
    });
  }

  function renderRaceBoard(){
    els.raceBoard.innerHTML = teamDefs().slice(0, 3).map(team => `
      <div class="raceLane">
        <div class="laneName ${team.className}">${team.name}</div>
        <div class="track">
          <div class="trackFill ${team.className}" id="${team.id}TrackFill"></div>
          <div class="runner" id="${team.id}Runner">🚩</div>
          <div class="finish"></div>
        </div>
        <div class="laneScore" id="${team.id}LaneScore">0/${getTargetScore()}</div>
      </div>
    `).join('');
    updateRaceBoard();
  }

  function applyBank(showAlert=true){
    const parsed = parseBank(els.wordBank.value);
    if(parsed.length < 2){
      if(showAlert) alert(t('minBank'));
      return false;
    }
    bank = parsed;
    saveSettings();
    updateBankCount();
    activeTeams.forEach(ti => pickQuestion(ti.id));
    if(showAlert && activeTeams[0]) briefFeedback(activeTeams[0].id, t('applied', {n:bank.length}), true);
    return true;
  }

  function randomQuestion(exceptAnswer){
    if(bank.length === 0) return null;
    let q = bank[Math.floor(Math.random()*bank.length)];
    if(bank.length > 1){
      let guard = 0;
      while(q.answer === exceptAnswer && guard++ < 10){ q = bank[Math.floor(Math.random()*bank.length)]; }
    }
    return q;
  }

  function pickQuestion(teamId){
    const prev = current[teamId]?.answer;
    current[teamId] = randomQuestion(prev);
    const prompt = $(teamId + 'Prompt');
    const input = $(teamId + 'Input');
    if(prompt) prompt.textContent = current[teamId]?.prompt || '—';
    if(input) input.value = '';
    buildKeyboard(teamId);
  }

  function formatTime(sec){
    const m = Math.floor(sec/60);
    const s = sec%60;
    return `${m}:${String(s).padStart(2,'0')}`;
  }
  function setTimerText(){ els.timer.textContent = `${t('timer')}: ${formatTime(remaining)}`; }

  function resetScores(){
    score = {};
    teamDefs().forEach(ti => score[ti.id] = 0);
    activeTeams.forEach(ti => {
      const el = $(ti.id + 'Score');
      if(el) el.textContent = '0';
      const fb = $(ti.id + 'Feedback');
      if(fb){ fb.textContent = ''; fb.className = 'feedback'; }
    });
  }

  function resetRound(keepBank=true){
    if(timerId) clearInterval(timerId);
    timerId = null;
    running = false; paused = false;
    tug = 0;
    total = Math.max(1, Math.min(30, parseInt(els.minutes.value || '3',10))) * 60;
    remaining = total;
    els.pauseBtn.textContent = t('pause');
    resetScores();
    setTimerText();
    updateRope();
    updateRaceBoard();
    if(!keepBank || bank.length === 0) applyBank(false);
    activeTeams.forEach(ti => pickQuestion(ti.id));
  }

  function startGame(){
    if(!applyBank(false)) return alert(t('needBank'));
    saveSettings();
    renderRaceBoard();
    resetRound(true);
    running = true; paused = false;
    els.setupPanel.classList.add('hidden');
    els.toggleSetup.textContent = t('showSetup');
    timerId = setInterval(tick, 1000);
    const firstInput = $(activeTeams[0]?.id + 'Input');
    if(firstInput) firstInput.focus();
    playTone('start');
  }

  function tick(){
    if(!running || paused) return;
    remaining--;
    setTimerText();
    if(remaining <= 0) endGame('time');
  }

  function pauseGame(){
    if(!running) return;
    paused = !paused;
    els.pauseBtn.textContent = paused ? t('resume') : t('pause');
  }

  function winnerByScore(){
    const top = Math.max(...activeTeams.map(ti => score[ti.id] || 0));
    const winners = activeTeams.filter(ti => (score[ti.id] || 0) === top);
    if(top === 0 || winners.length !== 1) return { winner:null, winners, top };
    return { winner:winners[0], winners, top };
  }

  function endGame(reason){
    if(timerId) clearInterval(timerId);
    timerId = null;
    running = false; paused = false;
    const count = getTeamCount();
    let winner = null;
    let draw = false;

    if(count === 2){
      if(reason === 'red' || reason === 'blue') winner = teamDefs().find(ti => ti.id === reason);
      else if(tug < 0) winner = teamDefs().find(ti => ti.id === 'red');
      else if(tug > 0) winner = teamDefs().find(ti => ti.id === 'blue');
      else { const r = winnerByScore(); winner = r.winner; draw = !winner; }
    } else {
      if(['red','blue','green'].includes(reason)) winner = teamDefs().find(ti => ti.id === reason);
      else { const r = winnerByScore(); winner = r.winner; draw = !winner; }
    }

    if(winner){
      els.resultTitle.textContent = `${winner.name}${t('win')}`;
      if(count === 2 && reason !== 'time') els.resultText.textContent = `${winner.name}${t('tugWin')}`;
      else if(count === 3 && reason !== 'time') els.resultText.textContent = `${winner.name}${t('raceWin', {target:getTargetScore()})}`;
      else els.resultText.textContent = t('timeLead', {team:winner.name});
    } else {
      draw = true;
      els.resultTitle.textContent = t('draw');
      els.resultText.textContent = t('drawText');
    }
    els.resultScore.textContent = activeTeams.map(ti => `${ti.name} ${score[ti.id] || 0} ${t('point')}`).join('｜');
    els.announcement.classList.add('show');
    playTone(draw ? 'draw' : 'win');
  }

  function updateRope(){
    const pct = 50 + (tug / MAX_TUG) * 35;
    els.flag.style.left = Math.max(15, Math.min(85, pct)) + '%';
  }

  function updateRaceBoard(){
    const target = getTargetScore();
    teamDefs().slice(0,3).forEach(ti => {
      const sc = score[ti.id] || 0;
      const pct = Math.max(0, Math.min(100, (sc / target) * 100));
      const fill = $(ti.id + 'TrackFill');
      const runner = $(ti.id + 'Runner');
      const laneScore = $(ti.id + 'LaneScore');
      if(fill) fill.style.width = pct + '%';
      if(runner) runner.style.left = pct + '%';
      if(laneScore) laneScore.textContent = `${sc}/${target}`;
    });
  }

  function submitAnswer(teamId){
    if(!running || paused){
      briefFeedback(teamId, running ? t('paused') : t('startFirst'), false);
      return;
    }
    const input = $(teamId + 'Input');
    const answer = cleanAnswer(input.value);
    const correct = cleanAnswer(current[teamId]?.answer || '');
    if(!answer){ briefFeedback(teamId, t('empty'), false); return; }

    if(answer === correct){
      score[teamId] = (score[teamId] || 0) + 1;
      const scoreEl = $(teamId + 'Score');
      if(scoreEl) scoreEl.textContent = score[teamId];
      const count = getTeamCount();
      if(count === 2){
        if(teamId === 'red') tug -= 1;
        if(teamId === 'blue') tug += 1;
        updateRope();
      } else {
        updateRaceBoard();
      }
      briefFeedback(teamId, count === 2 ? t('correct2') : t('correct3'), true);
      const panel = document.querySelector(`.team.${teamId}`);
      if(panel){ panel.classList.add('pulse'); setTimeout(() => panel.classList.remove('pulse'), 360); }
      playTone('ok');

      if(count === 2){
        if(tug <= -MAX_TUG) return endGame('red');
        if(tug >= MAX_TUG) return endGame('blue');
      } else {
        if(score[teamId] >= getTargetScore()) return endGame(teamId);
      }
      pickQuestion(teamId);
    } else {
      briefFeedback(teamId, t('tryAgain'), false);
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 340);
      playTone('bad');
      input.select();
    }
  }

  function briefFeedback(teamId, msg, ok){
    const el = $(teamId + 'Feedback');
    if(!el) return;
    el.textContent = msg;
    el.className = 'feedback ' + (ok ? 'ok' : 'bad');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => { el.textContent = ''; el.className = 'feedback'; }, 1800);
  }

  function bankCharacterPool(){
    const chars = [];
    bank.forEach(q => Array.from(q.answer || '').forEach(ch => { if(!/\s/.test(ch)) chars.push(ch); }));
    return [...new Set(chars)];
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1; i>0; i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }

  function dynamicKeysForAnswer(answer){
    const chars = [...new Set(Array.from(String(answer || '')).filter(ch => !/\s/.test(ch)))];
    const pool = bankCharacterPool().filter(ch => !chars.includes(ch));
    const targetCount = Math.min(18, Math.max(10, chars.length + 6));
    const extra = shuffle(pool).slice(0, Math.max(0, targetCount - chars.length));
    return shuffle([...chars, ...extra]);
  }

  function buildKeyboard(teamId){
    const main = $(teamId + 'KeyboardMain');
    const special = $(teamId + 'KeyboardSpecial');
    if(!main || !special) return;
    const answer = current[teamId]?.answer || '';
    main.innerHTML = '';
    special.innerHTML = '';
    main.className = 'keyboardMain';

    if(!answer || isLatinAnswer(answer)){
      const letters = 'abcdefghijklmnopqrstuvwxyz'.split('');
      letters.forEach(ch => {
        const b = document.createElement('button');
        b.className = 'key'; b.type = 'button'; b.textContent = shift[teamId] ? ch.toUpperCase() : ch;
        b.addEventListener('click', () => appendChar(teamId, shift[teamId] ? ch.toUpperCase() : ch));
        main.appendChild(b);
      });
      const apostrophe = document.createElement('button');
      apostrophe.className = 'key'; apostrophe.type='button'; apostrophe.textContent = "'";
      apostrophe.addEventListener('click', () => appendChar(teamId, "'"));
      main.appendChild(apostrophe);
      const hyphen = document.createElement('button');
      hyphen.className = 'key'; hyphen.type='button'; hyphen.textContent = '-';
      hyphen.addEventListener('click', () => appendChar(teamId, '-'));
      main.appendChild(hyphen);
      const dot = document.createElement('button');
      dot.className = 'key'; dot.type='button'; dot.textContent = '.';
      dot.addEventListener('click', () => appendChar(teamId, '.'));
      main.appendChild(dot);
      const comma = document.createElement('button');
      comma.className = 'key'; comma.type='button'; comma.textContent = ',';
      comma.addEventListener('click', () => appendChar(teamId, ','));
      main.appendChild(comma);
    } else {
      main.className = 'keyboardMain dynamic';
      dynamicKeysForAnswer(answer).forEach(ch => {
        const b = document.createElement('button');
        b.className = 'key'; b.type = 'button'; b.textContent = ch;
        b.addEventListener('click', () => appendChar(teamId, ch));
        main.appendChild(b);
      });
    }

    const shiftBtn = document.createElement('button');
    shiftBtn.className = 'key shift'; shiftBtn.type='button'; shiftBtn.textContent = 'Shift';
    shiftBtn.addEventListener('click', () => { shift[teamId] = !shift[teamId]; buildKeyboard(teamId); });
    special.appendChild(shiftBtn);

    const space = document.createElement('button');
    space.className = 'key space'; space.type='button'; space.textContent = t('space');
    space.addEventListener('click', () => appendChar(teamId, ' '));
    special.appendChild(space);

    const clear = document.createElement('button');
    clear.className = 'key clear'; clear.type='button'; clear.textContent = t('clear');
    clear.addEventListener('click', () => { const input = $(teamId + 'Input'); if(input){ input.value=''; input.focus(); } });
    special.appendChild(clear);

    const back = document.createElement('button');
    back.className = 'key back'; back.type='button'; back.textContent = '⌫';
    back.addEventListener('click', () => backspace(teamId));
    special.appendChild(back);

    const enter = document.createElement('button');
    enter.className = 'key enter'; enter.type='button'; enter.textContent = 'Enter';
    enter.addEventListener('click', () => submitAnswer(teamId));
    special.appendChild(enter);
  }

  function appendChar(teamId, ch){
    const input = $(teamId + 'Input'); if(!input) return;
    const start = input.selectionStart ?? input.value.length;
    const end = input.selectionEnd ?? input.value.length;
    input.value = input.value.slice(0,start) + ch + input.value.slice(end);
    input.focus(); input.selectionStart = input.selectionEnd = start + ch.length;
  }
  function backspace(teamId){
    const input = $(teamId + 'Input'); if(!input) return;
    const start = input.selectionStart ?? input.value.length;
    const end = input.selectionEnd ?? input.value.length;
    if(start !== end){ input.value = input.value.slice(0,start) + input.value.slice(end); input.selectionStart = input.selectionEnd = start; }
    else if(start > 0){ input.value = input.value.slice(0,start-1) + input.value.slice(start); input.selectionStart = input.selectionEnd = start-1; }
    input.focus();
  }

  function playTone(type){
    if(!soundOn) return;
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      const map = { ok:880, bad:180, start:520, win:1046, draw:360 };
      osc.frequency.value = map[type] || 440;
      osc.type = type === 'bad' ? 'sawtooth' : 'sine';
      gain.gain.setValueAtTime(.06, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .18);
      osc.start(); osc.stop(ctx.currentTime + .2);
      setTimeout(() => ctx.close(), 260);
    } catch(e) {}
  }

  function speechLangFor(text){
    if(/[\u3400-\u9FFF]/.test(text)) return 'zh-CN';
    if(lang === 'ms') return 'ms-MY';
    if(lang === 'en') return 'en-US';
    return I18N[lang].langCode;
  }

  function speakPrompt(teamId){
    const q = current[teamId];
    if(!q || !('speechSynthesis' in window)) return;
    const utter = new SpeechSynthesisUtterance(q.prompt);
    utter.lang = speechLangFor(q.prompt);
    utter.rate = .88;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utter);
  }

  function exportTxt(){
    const blob = new Blob([els.wordBank.value], { type:'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = t('downloadName');
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  function bindEvents(){
    els.toggleSetup.addEventListener('click', () => {
      els.setupPanel.classList.toggle('hidden');
      els.toggleSetup.textContent = els.setupPanel.classList.contains('hidden') ? t('showSetup') : t('hideSetup');
    });
    els.languageSelect.addEventListener('change', () => {
      const useSample = !els.wordBank.value.trim() || isBuiltInSample(els.wordBank.value);
      lang = els.languageSelect.value;
      if(useSample) els.wordBank.value = defaultBank();
      saveSettings();
      applyLanguage();
      applyBank(false);
      renderTeams();
      activeTeams.forEach(ti => pickQuestion(ti.id));
    });
    els.fullScreenBtn.addEventListener('click', () => {
      if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    });
    els.teamCount.addEventListener('change', () => { saveSettings(); renderTeams(); resetRound(true); });
    els.targetScore.addEventListener('change', () => { saveSettings(); renderRaceBoard(); updateRaceBoard(); });
    els.minutes.addEventListener('change', () => { saveSettings(); resetRound(true); });
    els.applyBank.addEventListener('click', () => applyBank(true));
    els.sampleBtn.addEventListener('click', () => { els.wordBank.value = defaultBank(); applyBank(true); });
    els.importBtn.addEventListener('click', () => els.fileInput.click());
    els.fileInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0]; if(!file) return;
      els.wordBank.value = await file.text(); applyBank(true); e.target.value = '';
    });
    els.exportBtn.addEventListener('click', exportTxt);
    els.soundBtn.addEventListener('click', () => { soundOn = !soundOn; els.soundBtn.textContent = `${t('sound')}：${soundOn ? t('on') : t('off')}`; });
    els.startBtn.addEventListener('click', startGame);
    els.pauseBtn.addEventListener('click', pauseGame);
    els.resetBtn.addEventListener('click', () => resetRound(true));
    els.playAgainBtn.addEventListener('click', () => { els.announcement.classList.remove('show'); startGame(); });
    els.closeModalBtn.addEventListener('click', () => els.announcement.classList.remove('show'));
    window.addEventListener('beforeunload', saveSettings);
  }


  /* S006_BUTTONS_INTERNAL_FIX_START */
  function bindSafeButtons(){
    function safe(el, fn){
      if(!el || el.dataset.s006SafeFixed) return;
      el.dataset.s006SafeFixed='1';
      el.addEventListener('click', (e)=>{e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();try{fn(e);}catch(err){console.error('[S006 button fix]',err);alert('按钮执行失败：'+(err.message||err));}}, true);
      el.style.pointerEvents='auto'; el.style.zIndex='2147482000'; el.style.position='relative';
    }
    safe(els.toggleSetup, ()=>{els.setupPanel.classList.toggle('hidden');els.toggleSetup.textContent=els.setupPanel.classList.contains('hidden')?t('showSetup'):t('hideSetup');});
    safe(els.fullScreenBtn, ()=>{if(!document.fullscreenElement) document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.();});
    safe(els.applyBank, ()=>applyBank(true));
    safe(els.sampleBtn, ()=>{els.wordBank.value=defaultBank();applyBank(true);});
    safe(els.importBtn, ()=>els.fileInput.click());
    safe(els.exportBtn, exportTxt);
    safe(els.startBtn, startGame);
    safe(els.pauseBtn, pauseGame);
    safe(els.resetBtn, ()=>resetRound(true));
    safe(els.playAgainBtn, ()=>{els.announcement.classList.remove('show');startGame();});
    safe(els.closeModalBtn, ()=>els.announcement.classList.remove('show'));
  }
  /* S006_BUTTONS_INTERNAL_FIX_END */

  bindEvents();
  bindSafeButtons();
  loadSettings();
  resetRound(true);
})();
</script>

<script>
(function(){
  const LS_KEY = 'S006_ratio_mode_v1';
  function qs(sel){return document.querySelector(sel);}
  function setRatio(value){
    const v = value || localStorage.getItem(LS_KEY) || '16:9';
    document.body.classList.remove('ratio-169','ratio-43','ratio-34','ratio-916');
    const cls = v === '4:3' ? 'ratio-43' : v === '3:4' ? 'ratio-34' : v === '9:16' ? 'ratio-916' : 'ratio-169';
    document.body.classList.add(cls);
    localStorage.setItem(LS_KEY, v);
    const sel = document.getElementById('ratioModeSelect');
    if(sel) sel.value = v;
  }
  function init(){
    let bar = qs('.quickBtns') || qs('.actions') || qs('.topbar');
    if(!bar) return;
    if(!document.getElementById('ratioModeSelect')){
      const sel = document.createElement('select');
      sel.id = 'ratioModeSelect';
      sel.className = 'ratioSelect';
      sel.innerHTML = '<option value="16:9">16:9</option><option value="4:3">4:3</option><option value="3:4">3:4</option><option value="9:16">9:16</option>';
      sel.title = '画面比例 / Screen Ratio';
      sel.addEventListener('change', function(){ setRatio(sel.value); });
      bar.insertBefore(sel, bar.firstChild);
    }
    setRatio(localStorage.getItem(LS_KEY) || '16:9');
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
<!-- SHARED_RATIO_SUPPORT_END -->

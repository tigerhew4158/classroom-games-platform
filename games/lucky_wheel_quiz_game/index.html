<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>S005 幸运转盘问答</title>
<style>
:root{
  --bg:#071426;
  --panel:#10213a;
  --panel2:#152943;
  --line:#315582;
  --text:#f8fbff;
  --muted:#cbd5e1;
  --yellow:#facc15;
  --blue:#3b82f6;
  --green:#22c55e;
  --red:#ef4444;
  --purple:#8b5cf6;
  --orange:#f97316;
  --cyan:#06b6d4;
  --shadow:0 18px 44px rgba(0,0,0,.36);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:radial-gradient(circle at 20% 0%,#1f5fae 0,#0b2542 24%,#061527 68%,#020817 100%);color:var(--text);font-family:"Microsoft YaHei","Noto Sans SC",system-ui,sans-serif}
body{overflow-x:hidden}
.app{width:min(1480px,calc(100vw - 24px));margin:0 auto;padding:16px 0 24px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:14px}
.logo{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;font-size:30px;background:linear-gradient(135deg,#f97316,#ec4899,#6366f1);box-shadow:var(--shadow)}
h1{margin:0;font-size:clamp(34px,4vw,54px);line-height:1;color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.2)}
.subtitle{font-size:14px;color:#dbeafe;margin-top:6px;font-weight:800}
.quickBtns{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
button,select,textarea,input{font:inherit}
button,select{border:1px solid rgba(147,197,253,.42);background:#0b1f3d;color:#fff;border-radius:12px;padding:10px 14px;font-weight:1000;outline:none}
button{cursor:pointer;box-shadow:0 6px 16px rgba(0,0,0,.18)}
button:hover{filter:brightness(1.08)}
button:active{transform:translateY(1px)}
button.primary{background:linear-gradient(90deg,#2563eb,#7c3aed);border-color:#93c5fd}
button.good{background:#16a34a;border-color:#86efac}
button.bad{background:#dc2626;border-color:#fecaca}
button.warn{background:#f59e0b;border-color:#fde68a;color:#101827}
button.ghost{background:rgba(15,35,65,.78)}
button.small{padding:8px 12px;font-size:14px}
select{min-width:120px}
.layout{display:grid;grid-template-columns:380px 1fr;gap:16px;align-items:start}
.layout.playing{grid-template-columns:1fr}
.layout.playing .settings{display:none}
.layout.playing.showSettings{grid-template-columns:380px 1fr}
.layout.playing.showSettings .settings{display:block}
.panel,.game{background:rgba(8,22,42,.92);border:1px solid rgba(147,197,253,.22);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}
.panelHeader{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(90deg,#2563eb,#7c3aed);padding:16px 18px;font-size:22px;font-weight:1000}
.panelBody{padding:16px 18px}
label{display:block;font-size:14px;color:#dbeafe;font-weight:1000;margin:0 0 7px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{margin-bottom:14px}
textarea{width:100%;min-height:180px;resize:vertical;border:1px solid #315582;border-radius:14px;background:#071b36;color:#fff;padding:12px;font-weight:800;line-height:1.5}
.hint{font-size:12px;color:#cbd5e1;line-height:1.5;margin-top:7px}
.rowBtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.hidden{display:none}
.eventSelector{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.eventChoice{display:flex;align-items:center;gap:8px;border:1px solid #315582;border-radius:12px;padding:9px 10px;background:#11233d;color:#fff;font-weight:950;cursor:pointer}
.eventChoice.active{background:linear-gradient(180deg,rgba(59,130,246,.2),rgba(124,58,237,.18));border-color:#93c5fd}
.eventChoice input{width:18px;height:18px}
.eventSummary{font-size:14px;font-weight:1000;color:#fef3c7;margin-top:8px}
.game{padding:18px;min-height:720px}
.hud{display:grid;grid-template-columns:minmax(260px,1fr) auto minmax(260px,1fr);gap:12px;align-items:center;margin-bottom:12px}
.statusCard{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);border-radius:18px;padding:14px}
.currentTurn{font-size:22px;font-weight:1000}
.roundInfo{font-size:14px;color:#cbd5e1;margin-top:5px;font-weight:850}
.timer{font-size:clamp(42px,5vw,72px);font-weight:1000;text-align:center;line-height:1;text-shadow:0 7px 18px rgba(0,0,0,.35)}
.goalInfo{text-align:right;font-weight:1000}
.goalInfo small{display:block;color:#cbd5e1;font-weight:800;margin-top:6px}
.turnPanel{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:14px;padding:16px 18px;border-radius:20px;background:linear-gradient(90deg,rgba(37,99,235,.34),rgba(124,58,237,.28));border:1px solid rgba(250,204,21,.38)}
.turnMain{font-size:clamp(26px,3vw,38px);font-weight:1000}
.turnSub{font-size:15px;color:#dbeafe;font-weight:900;margin-top:4px}
.scoreChange{min-width:145px;text-align:center;border-radius:16px;padding:11px 14px;background:#071b36;border:1px solid rgba(255,255,255,.16);font-size:18px;font-weight:1000;color:#fef3c7}
.scoreChange.good{color:#86efac;border-color:#86efac;background:rgba(34,197,94,.12)}
.scoreChange.bad{color:#fecaca;border-color:#fecaca;background:rgba(239,68,68,.1)}
.scoreBoard{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.teamCard{background:linear-gradient(180deg,#102747,#071b36);border:2px solid rgba(147,197,253,.36);border-radius:18px;padding:13px 14px;box-shadow:0 10px 26px rgba(0,0,0,.3)}
.teamCard.active{border-color:#facc15;outline:4px solid rgba(250,204,21,.34)}
.teamTop{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:18px;font-weight:1000}
.teamDot{width:14px;height:14px;border-radius:50%;display:inline-block;margin-right:5px}
.turnBadge{background:#facc15;color:#111827;border-radius:999px;padding:4px 9px;font-size:13px;font-weight:1000;white-space:nowrap}
.teamScore{font-size:48px;font-weight:1000;line-height:1;margin:8px 0 4px}
.teamMeta{font-size:14px;color:#dbeafe;font-weight:900}
.bar{height:9px;background:rgba(255,255,255,.15);border-radius:999px;overflow:hidden;margin-top:9px}
.barFill{height:100%;background:linear-gradient(90deg,#60a5fa,#facc15);transition:.25s}
.stage{display:grid;grid-template-columns:minmax(390px,520px) 1fr;gap:16px}
.wheelPanel,.sidePanel{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:16px;position:relative;min-height:430px}
.wheelPanel{display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:visible}
.pointer{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:24px solid transparent;border-right:24px solid transparent;border-bottom:44px solid #fef3c7;z-index:8;filter:drop-shadow(0 6px 8px rgba(0,0,0,.4))}
.wheelBox{width:420px;height:420px;max-width:88vw;max-height:88vw;position:relative;display:grid;place-items:center;cursor:pointer}
.wheel{position:absolute;inset:0;border-radius:50%;border:12px solid rgba(255,255,255,.9);box-shadow:inset 0 0 0 5px rgba(0,0,0,.16),0 20px 42px rgba(0,0,0,.36);overflow:hidden;transition:transform 4s cubic-bezier(.12,.72,.12,1)}
.wheel:before{content:"";position:absolute;left:50%;top:50%;width:108px;height:108px;transform:translate(-50%,-50%);background:#fffbea;border:9px solid rgba(255,255,255,.78);border-radius:50%;z-index:5;box-shadow:0 6px 18px rgba(0,0,0,.28)}
.wheelLabel{position:absolute;left:50%;top:50%;width:124px;height:34px;margin-left:-62px;margin-top:-17px;text-align:center;color:#fff;font-size:14px;line-height:1.05;font-weight:1000;text-shadow:0 2px 5px rgba(0,0,0,.55);transform-origin:50% 50%;z-index:6;pointer-events:none}
.spinBtn{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:106px;height:106px;border-radius:999px;background:linear-gradient(135deg,#fff,#fef3c7);border:7px solid rgba(255,255,255,.82);color:#4c1d95;font-size:22px;font-weight:1000;z-index:10;box-shadow:0 12px 26px rgba(0,0,0,.32)}
.spinBtn:disabled{opacity:.65;cursor:not-allowed}
.wheelHint{text-align:center;font-size:14px;font-weight:900;margin-top:10px;color:#dbeafe}
.resultBadge{margin-top:10px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:9px 14px;font-weight:1000}
.sideTitle{font-size:24px;font-weight:1000;margin-bottom:8px}
.sideText{font-size:14px;color:#dbeafe;line-height:1.5;font-weight:850;margin-bottom:12px}
.eventList{display:grid;gap:8px}
.eventItem{display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:9px 12px;font-weight:1000}
.eventLog{margin-top:12px;background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:13px 14px;min-height:48px;font-weight:1000;color:#fef3c7}
.modalBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:20px;z-index:2147483600}
.modalBackdrop.show{display:flex}
.modal{width:min(880px,calc(100vw - 40px));max-height:calc(100vh - 40px);overflow:auto;background:#fff;color:#111827;border-radius:24px;box-shadow:0 28px 100px rgba(0,0,0,.55)}
.modalHead{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(90deg,#2563eb,#7c3aed);color:#fff;padding:16px 20px}
.modalTitle{font-size:24px;font-weight:1000}
.modalBody{padding:22px}
.bigEvent{text-align:center;font-size:60px}
.eventText{text-align:center;font-size:24px;font-weight:1000;color:#4c1d95;margin:8px 0 14px}
.question{font-size:clamp(26px,3vw,42px);font-weight:1000;line-height:1.35;text-align:center;margin:16px 0 20px}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.option{background:#eef2ff!important;color:#111827!important;border:2px solid #c7d2fe!important;border-radius:18px!important;padding:16px 18px!important;font-size:22px!important;font-weight:1000!important}
.option.correct{background:#bbf7d0!important;border-color:#22c55e!important}
.option.wrong{background:#fecaca!important;border-color:#ef4444!important}
.answerBox{display:none;margin:16px 0;padding:16px;border-radius:18px;background:#fef3c7;font-size:22px;font-weight:900;text-align:center}
.modalActions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:18px}
.modalActions button{font-size:20px;min-width:140px}
.footerNote{text-align:center;color:#94a3b8;font-size:12px;margin-top:12px}

/* Ratio support */
body.ratio-43 .app{width:min(1120px,calc(100vw - 24px))}
body.ratio-34 .app{width:min(760px,calc(100vw - 24px))}
body.ratio-916 .app{width:min(540px,calc(100vw - 16px))}
body.ratio-43 .layout,body.ratio-34 .layout,body.ratio-916 .layout{grid-template-columns:1fr}
body.ratio-34 .topbar,body.ratio-916 .topbar{flex-direction:column;align-items:flex-start}
body.ratio-34 .quickBtns,body.ratio-916 .quickBtns{justify-content:flex-start}
body.ratio-34 .hud,body.ratio-916 .hud,body.ratio-43 .hud{grid-template-columns:1fr}
body.ratio-34 .goalInfo,body.ratio-916 .goalInfo,body.ratio-43 .goalInfo{text-align:left}
body.ratio-34 .scoreBoard,body.ratio-916 .scoreBoard{grid-template-columns:1fr}
body.ratio-43 .scoreBoard{grid-template-columns:repeat(2,1fr)}
body.ratio-34 .stage,body.ratio-916 .stage,body.ratio-43 .stage{grid-template-columns:1fr}
body.ratio-34 .wheelBox,body.ratio-916 .wheelBox{width:330px;height:330px}
body.ratio-34 .wheelLabel,body.ratio-916 .wheelLabel{font-size:11px;transform-origin:50% 50%}
body.ratio-34 .spinBtn,body.ratio-916 .spinBtn{width:88px;height:88px;font-size:18px}

@media (max-width:1150px){
  .layout{grid-template-columns:1fr}
  .hud{grid-template-columns:1fr}
  .goalInfo{text-align:left}
  .scoreBoard{grid-template-columns:repeat(2,1fr)}
  .stage{grid-template-columns:1fr}
}
@media (max-width:640px){
  .app{width:calc(100vw - 16px);padding-top:10px}
  .topbar{flex-direction:column;align-items:flex-start}
  .grid2,.eventSelector,.options,.scoreBoard{grid-template-columns:1fr}
  .wheelBox{width:330px;height:330px}
  .turnPanel{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo">🎡</div>
      <div>
        <h1 id="appTitle">幸运转盘问答</h1>
        <div class="subtitle" id="appSub">适合老师投影使用的分组课堂复习小游戏</div>
      </div>
    </div>
    <div class="quickBtns">
      <select id="ratioSelect" title="画面比例">
        <option value="16:9">16:9</option>
        <option value="4:3">4:3</option>
        <option value="3:4">3:4</option>
        <option value="9:16">9:16</option>
      </select>
      <button class="ghost small" id="showSettingsBtn">显示老师设定</button>
      <button class="ghost small" id="fsBtn">全屏</button>
      <button class="ghost small" id="resetBtn">重置</button>
    </div>
  </div>

  <div class="layout" id="layout">
    <aside class="settings panel" id="settingsPanel">
      <div class="panelHeader"><span id="teacherSettings">老师设定</span><span>⚙️</span></div>
      <div class="panelBody">
        <div class="grid2">
          <div class="field"><label id="uiLangLabel">介面语言</label><select id="langSelect"><option value="zh">简体中文</option><option value="en">English</option><option value="ms">Bahasa Melayu</option></select></div>
          <div class="field"><label id="teamCountLabel">组数</label><select id="teamCount"><option value="2">2</option><option value="3">3</option><option value="4">4</option></select></div>
        </div>
        <div class="grid2">
          <div class="field"><label id="gameTimeLabel">游戏时间</label><select id="gameTime"><option value="0">不限时</option><option value="180">3:00</option><option value="300" selected>5:00</option><option value="480">8:00</option><option value="600">10:00</option></select></div>
          <div class="field"><label id="targetScoreLabel">目标分</label><select id="targetScore"><option value="0">不设目标</option><option value="10" selected>10</option><option value="15">15</option><option value="20">20</option><option value="30">30</option></select></div>
        </div>
        <div class="grid2">
          <div class="field"><label id="questionModeLabel">题目顺序</label><select id="questionMode"><option value="random">随机</option><option value="order">顺序</option></select></div>
          <div class="field"><label id="turnAfterLabel">答题后</label><select id="turnAfter"><option value="next">换下一组</option><option value="same">本组继续</option></select></div>
        </div>
        <div class="grid2">
          <div class="field"><label id="wrongPenaltyLabel">答错扣分</label><select id="wrongPenalty"><option value="0">不扣分</option><option value="1" selected>-1</option><option value="2">-2</option></select></div>
          <div class="field"><label id="soundLabel">音效</label><select id="soundSelect"><option value="on">开启</option><option value="off">关闭</option></select></div>
        </div>

        <div class="field">
          <label id="eventSelectLabel">转盘事件设定</label>
          <div class="hint" id="eventHint">请选择要放进转盘的事件。你可以勾选推荐 6 个，或直接全选全部事件。</div>
          <div class="rowBtns">
            <button class="ghost small" id="eventSuggest6Btn">推荐 6 个</button>
            <button class="ghost small" id="eventSelectAllBtn">全选全部</button>
          </div>
          <div class="eventSummary" id="eventSummary">已勾选 6 / 10</div>
          <div class="eventSelector" id="eventSelector"></div>
        </div>

        <div class="field">
          <label id="questionBankLabel">题库</label>
          <textarea id="questionBank"></textarea>
          <div class="hint" id="bankHint">格式：题目,正确答案,错误选项1,错误选项2,错误选项3。只有两栏时为开放题。</div>
          <div class="rowBtns">
            <button class="ghost" id="sampleBtn">载入范例</button>
            <button class="ghost" id="importBtn">汇入 TXT</button>
            <button class="ghost" id="exportBtn">汇出 TXT</button>
            <input id="fileInput" type="file" accept=".txt,text/plain" class="hidden" />
          </div>
        </div>

        <div class="rowBtns">
          <button class="primary" id="startBtn">开始游戏</button>
        </div>
        <div class="hint" id="startHint">开始后老师设定区会隐藏，只保留游戏介面，适合投影使用。</div>
      </div>
    </aside>

    <main class="game" id="gameArea">
      <div class="hud">
        <div class="statusCard">
          <div class="currentTurn" id="turnText">轮到：红队</div>
          <div class="roundInfo" id="roundInfo">请点击转盘按钮。</div>
        </div>
        <div class="timer" id="timer">05:00</div>
        <div class="statusCard goalInfo" id="goalInfo"></div>
      </div>

      <div class="turnPanel" id="turnPanel">
        <div>
          <div class="turnMain" id="turnMain">当前轮到：红队</div>
          <div class="turnSub" id="turnSub">得分：0｜回合：0｜下一队：蓝队</div>
        </div>
        <div class="scoreChange" id="scoreChange">等待答题</div>
      </div>

      <div class="scoreBoard" id="scoreBoard"></div>

      <div class="stage">
        <section class="wheelPanel">
          <div class="pointer"></div>
          <div class="wheelBox" id="wheelBox">
            <div class="wheel" id="wheel"></div>
            <button class="spinBtn" id="spinBtn">转动</button>
          </div>
          <div class="wheelHint" id="wheelHint">轮到的队伍点击转盘，按照抽到的事件完成挑战。</div>
          <div class="resultBadge" id="resultBadge">🎯 准备开始</div>
        </section>
        <section class="sidePanel">
          <div class="sideTitle" id="eventTitle">转盘事件</div>
          <div class="sideText" id="eventDesc">老师可以把题库换成任何科目的复习题。选择题会自动判断，开放题由老师点击答对或答错。</div>
          <div class="eventList" id="eventList"></div>
          <div class="eventLog" id="eventLog">💡 设定完成后点击开始游戏。</div>
        </section>
      </div>
    </main>
  </div>
</div>

<div class="modalBackdrop" id="modalBackdrop">
  <div class="modal" id="modal">
    <div class="modalHead">
      <div class="modalTitle" id="modalTitle">题目</div>
      <button class="small" id="modalClose">×</button>
    </div>
    <div class="modalBody" id="modalBody"></div>
  </div>
</div>

<script>
const I18N = {
  zh:{

const $ = id => document.getElementById(id);

function load(){
  let saved = {};
  try{ saved = JSON.parse(localStorage.getItem(LS) || '{}'); }catch(e){}

function readSettings(updateState=true){
  const data = {
    lang:$('langSelect').value, ratio:$('ratioSelect').value,
    teamCount:$('teamCount').value, gameTime:$('gameTime').value,
    targetScore:$('targetScore').value, questionMode:$('questionMode').value,
    turnAfter:$('turnAfter').value, wrongPenalty:$('wrongPenalty').value,
    soundSelect:$('soundSelect').value, questionBank:$('questionBank').value,

}
function applyLanguage(){
  state.lang = $('langSelect').value;
  document.documentElement.lang = state.lang;
  const map = {
    appTitle:'appTitle', appSub:'appSub', showSettingsBtn:'showSettings', fsBtn:'fullscreen', resetBtn:'reset',
    teacherSettings:'teacherSettings', uiLangLabel:'uiLang', teamCountLabel:'teamCount', gameTimeLabel:'gameTime',

  $('targetScore').options[0].textContent = t('noTarget');
  $('questionMode').options[0].textContent = t('random'); $('questionMode').options[1].textContent = t('order');
  $('turnAfter').options[0].textContent = t('nextTeam'); $('turnAfter').options[1].textContent = t('sameTeam');
  $('wrongPenalty').options[0].textContent = t('noDeduct');
  $('soundSelect').options[0].textContent = t('on'); $('soundSelect').options[1].textContent = t('off');
  if(isSampleBank($('questionBank').value) || !$('questionBank').value.trim()) $('questionBank').value = SAMPLE_BANKS[state.lang] || SAMPLE_BANKS.zh;
  renderEventSelector(getSelectedEventIds());
  renderAll();
}
function setRatio(value){
  state.ratio = value;
  document.body.classList.remove('ratio-169','ratio-43','ratio-34','ratio-916');
  document.body.classList.add(value==='4:3'?'ratio-43':value==='3:4'?'ratio-34':value==='9:16'?'ratio-916':'ratio-169');
}
function isSampleBank(v){ return Object.values(SAMPLE_BANKS).some(x=>String(x).trim()===String(v).trim()); }
function renderEventSelector(selected=RECOMMENDED){
  const set = new Set(selected && selected.length ? selected : RECOMMENDED);
  $('eventSelector').innerHTML = EVENT_DEFS.map(ev=>`
    <label class="eventChoice ${set.has(ev.id)?'active':''}">
      <input class="eventCheck" type="checkbox" value="${ev.id}" ${set.has(ev.id)?'checked':''}>
      <span>${ev.icon}</span><span>${t(ev.labelKey)}</span>
    </label>`).join('');
  document.querySelectorAll('.eventCheck').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      cb.closest('.eventChoice').classList.toggle('active', cb.checked);
      updateEventSummary(); renderWheel(); renderEventList(); save();
    });
  });
  updateEventSummary();
}
function getSelectedEventIds(){ return [...document.querySelectorAll('.eventCheck:checked')].map(x=>x.value); }
function getActiveEvents(){
  const ids = getSelectedEventIds();
  const use = ids.length ? ids : RECOMMENDED;
  return EVENT_DEFS.filter(ev=>use.includes(ev.id));
}
function updateEventSummary(){
  $('eventSummary').textContent = fmt('selected',{n:getSelectedEventIds().length,total:EVENT_DEFS.length});
}
function setupTeams(reset=true){
  const count = Number($('teamCount').value) || 2;
  const old = state.teams;
  state.teams = Array.from({length:count},(_,i)=>({
    key:TEAM_KEYS[i], color:TEAM_COLORS[i],
    score: reset ? 0 : (old[i]?.score || 0),
    rounds: reset ? 0 : (old[i]?.rounds || 0)
  }));
  if(state.currentTeam >= state.teams.length) state.currentTeam = 0;
}
function teamName(i){ return t(state.teams[i]?.key || TEAM_KEYS[i] || 'teamRed'); }
function current(){ return state.teams[state.currentTeam]; }
function nextTeamIndex(){ return (state.currentTeam + 1) % state.teams.length; }
function renderScoreBoard(){
  const target = Number($('targetScore').value) || 0;
  $('scoreBoard').innerHTML = state.teams.map((tm,i)=>{
    const pct = target ? Math.max(0,Math.min(100,tm.score/target*100)) : Math.max(0,Math.min(100,tm.score*10));
    return `<div class="teamCard ${i===state.currentTeam?'active':''}">
      <div class="teamTop"><span><span class="teamDot" style="background:${tm.color}"></span>${teamName(i)}</span>${i===state.currentTeam?`<span class="turnBadge">${t('currentTurn')}</span>`:''}</div>
      <div class="teamScore">${tm.score}</div>
      <div class="teamMeta">${t('rounds')}：${tm.rounds}</div>
      <div class="bar"><div class="barFill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}
function renderHud(){
  if(!state.teams || !state.teams.length) setupTeams(false);
  const tm = current() || {score:0,rounds:0};
  $('turnText').textContent = `${t('turn')}：${teamName(state.currentTeam)}（${t('score')} ${tm.score}）`;
  $('roundInfo').textContent = state.started ? t('spinNow') : t('logReady');
  const target = Number($('targetScore').value) || 0;
  $('goalInfo').innerHTML = `${target ? `${t('targetScore')}：${target}` : t('noTarget')}<small>${t('goalSmall')}</small>`;
  $('timer').textContent = formatTime(state.timeLeft);
  $('turnMain').textContent = `${t('currentTurn')}：${teamName(state.currentTeam)}`;
  $('turnSub').textContent = `${t('score')}：${tm.score}｜${t('rounds')}：${tm.rounds}｜${t('next')}：${teamName(nextTeamIndex())}`;
}
function renderEventList(){
  const list = getActiveEvents();
  $('eventList').innerHTML = list.map((ev,i)=>`
    <div class="eventItem"><span><b>${i+1}.</b> ${ev.icon} ${t(ev.labelKey)}</span><span>${ev.type==='quiz'?t('question'):t('eventTitle')}</span></div>`).join('');
}
function renderWheel(){
  const defs = getActiveEvents();
  const wheel = $('wheel');
  if(!defs.length){ wheel.innerHTML=''; return; }
  const seg = 360 / defs.length;
  wheel.style.background = `conic-gradient(${defs.map((ev,i)=>`${ev.color} ${i*seg}deg ${(i+1)*seg}deg`).join(',')})`;
  wheel.style.transform = `rotate(${state.rotation}deg)`;
  wheel.innerHTML = defs.map((ev,i)=>{
    const angle = i*seg + seg/2;
    return `<div class="wheelLabel" style="transform:rotate(${angle}deg) translateY(-155px) rotate(90deg)">${ev.icon}<br>${t(ev.labelKey)}</div>`;
  }).join('');
}
function renderAll(){ renderScoreBoard(); renderHud(); renderEventList(); renderWheel(); updateEventSummary(); }
function formatTime(sec){ if(!sec) return '∞'; const m=Math.floor(sec/60), s=sec%60; return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
function startGame(){
  readSettings();
  if(!$('questionBank').value.trim()){ $('questionBank').value = SAMPLE_BANKS[state.lang] || SAMPLE_BANKS.zh; }
  setupTeams(true);
  state.started = true; state.spinning = false; state.currentTeam = 0; state.questionIndex = 0; state.rotation = 0; state.answerLocked = false;
  state.timeLeft = Number($('gameTime').value) || 0;
  $('layout').classList.add('playing'); $('layout').classList.remove('showSettings');
  $('scoreChange').className = 'scoreChange'; $('scoreChange').textContent = t('waiting');
  $('eventLog').innerHTML = `🎡 ${t('spinNow')}`;
  $('resultBadge').innerHTML = `🎯 ${t('ready')}`;
  clearInterval(state.timer);
  if(state.timeLeft>0){
    state.timer = setInterval(()=>{
      state.timeLeft--; renderHud();
      if(state.timeLeft<=0) endGame(t('timeUp'));
    },1000);
  }
  save(); renderAll(); playSound('start');
}
function resetGame(){
  clearInterval(state.timer);
  state.started=false; state.spinning=false; state.currentTeam=0; state.rotation=0; state.questionIndex=0; state.answerLocked=false;
  setupTeams(true); state.timeLeft=Number($('gameTime').value)||0;
  $('layout').classList.remove('playing','showSettings');
  $('scoreChange').className='scoreChange'; $('scoreChange').textContent=t('waiting');
  $('eventLog').innerHTML = `💡 ${t('logReady')}`;
  closeModal(); renderAll();
}
function spinWheel(){
  if(!state.started){ flashLog(t('clickStart')); return; }
  if(state.spinning || state.answerLocked) return;
  const defs = getActiveEvents();
  if(!defs.length){ flashLog(t('eventHint')); return; }
  state.spinning = true;
  $('spinBtn').disabled = true;
  $('scoreChange').className='scoreChange'; $('scoreChange').textContent = t('spinning');
  const idx = Math.floor(Math.random()*defs.length);
  const ev = defs[idx];
  const seg = 360 / defs.length;
  const center = idx*seg + seg/2;
  const stopAtPointer = 360 - center;
  const current = state.rotation;
  state.rotation = current + 360*6 + ((stopAtPointer-current)%360+360)%360;
  $('wheel').style.transition = 'none';
  $('wheel').style.transform = `rotate(${current}deg)`;
  $('wheel').getBoundingClientRect();
  $('wheel').style.transition = 'transform 4s cubic-bezier(.12,.72,.12,1)';
  $('wheel').style.transform = `rotate(${state.rotation}deg)`;
  $('resultBadge').innerHTML = `🎡 ${t('spinning')}`;
  $('eventLog').innerHTML = `🎡 ${t('spinning')}`;
  playSound('spin');
  setTimeout(()=>{
    state.spinning = false;
    $('spinBtn').disabled = false;
    $('resultBadge').innerHTML = `${ev.icon} ${t(ev.labelKey)}`;
    handleEvent(ev);
  },4100);
}
function handleEvent(ev){
  current().rounds++;
  state.lastEvent = ev;
  if(ev.type==='quiz'){
    showQuestion(ev);
    return;
  }
  if(ev.type==='bonus'){
    applyScore(ev.score, fmt('bonus',{n:ev.score}), 'good');
    autoAdvance();
  }else if(ev.type==='trap'){
    applyScore(ev.score, fmt('penalty',{n:Math.abs(ev.score)}), 'bad');
    autoAdvance();
  }else if(ev.type==='steal'){
    const msg = stealPoint(ev.score);
    autoAdvance(msg);
  }else if(ev.type==='swap'){
    swapScores();
    applyMessage(t('swap'), 'good');
    autoAdvance();
  }else{
    applyMessage(t('pass'), 'bad');
    autoAdvance();
  }
}
function parseQuestions(){
  let text = $('questionBank').value.trim();
  if(!text){ text = SAMPLE_BANKS[state.lang] || SAMPLE_BANKS.zh; $('questionBank').value = text; }
  return text.split(/\r?\n/).map(line=>line.trim()).filter(Boolean).map(line=>{
    const parts = line.split(/[,，\t|｜]/).map(x=>x.trim()).filter(Boolean);
    if(parts.length<2) return null;
    const q = parts[0], answer = parts[1], options = parts.length>=3 ? shuffle([answer, ...parts.slice(2)]) : [];
    return {q, answer, options};
  }).filter(Boolean);
}
function nextQuestion(){
  const qs = parseQuestions();
  if(!qs.length){ $('questionBank').value = SAMPLE_BANKS[state.lang] || SAMPLE_BANKS.zh; return nextQuestion(); }
  if($('questionMode').value === 'order'){
    const q = qs[state.questionIndex % qs.length]; state.questionIndex++; return q;
  }
  return qs[Math.floor(Math.random()*qs.length)];
}
function showQuestion(ev){
  state.answerLocked = true;
  const q = nextQuestion();
  const score = Math.max(1, Math.abs(ev.score || 1));
  $('modalTitle').textContent = t('question');
  let body = `<div class="bigEvent">${ev.icon}</div><div class="eventText">${t(ev.labelKey)} · ${teamName(state.currentTeam)}</div><div class="question">${esc(q.q)}</div>`;
  if(q.options.length >= 2){
    body += `<div class="options">${q.options.map(opt=>`<button class="option" data-answer="${escAttr(opt)}">${esc(opt)}</button>`).join('')}</div>`;
  }else{
    body += `<div class="answerBox" id="answerBox"><b>${t('correctAnswer')}：</b>${esc(q.answer)}</div>
      <div class="modalActions"><button id="showAnswerBtn">${t('showAnswer')}</button><button class="good" id="correctBtn">${t('correct')}</button><button class="bad" id="wrongBtn">${t('wrong')}</button></div>`;
  }
  $('modalBody').innerHTML = body;
  $('modalBackdrop').classList.add('show');
  if(q.options.length >= 2){
    document.querySelectorAll('.option').forEach(btn=>{
      btn.onclick = ()=>{
        if(!state.answerLocked) return;
        const ok = norm(btn.dataset.answer) === norm(q.answer);
        document.querySelectorAll('.option').forEach(b=>{
          b.disabled=true;
          if(norm(b.dataset.answer)===norm(q.answer)) b.classList.add('correct');
          else if(b===btn) b.classList.add('wrong');
        });
        finishAnswer(ok, score);
      };
    });
  }else{
    $('showAnswerBtn').onclick = ()=> $('answerBox').style.display = 'block';
    $('correctBtn').onclick = ()=> finishAnswer(true, score);
    $('wrongBtn').onclick = ()=> finishAnswer(false, score);
  }
}
function finishAnswer(isCorrect, score){
  if(!state.answerLocked) return;
  state.answerLocked = false;
  const penalty = Number($('wrongPenalty').value) || 0;
  if(isCorrect){
    applyScore(score, fmt('answerCorrect',{n:score}), 'good');
  }else if(penalty > 0){
    applyScore(-penalty, fmt('answerWrongPenalty',{n:penalty}), 'bad');
  }else{
    applyScore(0, t('answerWrong'), 'bad');
  }
  renderAnswerActions();
  setTimeout(()=>autoAdvance(), 850);
}
function renderAnswerActions(){
  const actions = document.querySelector('.modalActions') || document.createElement('div');
  actions.className = 'modalActions';
  actions.innerHTML = `<button class="primary" id="continueBtn">${t('continue')}</button>`;
  if(!actions.parentElement) $('modalBody').appendChild(actions);
  $('continueBtn').onclick = autoAdvance;
}
function applyScore(delta, msg, kind){
  const tm = current();
  tm.score = Math.max(0, tm.score + delta);
  $('scoreChange').className = `scoreChange ${kind||''}`;
  $('scoreChange').textContent = `${teamName(state.currentTeam)} ${delta>=0?'+':''}${delta}`;
  $('eventLog').innerHTML = `❓ <b>${teamName(state.currentTeam)}</b>：${msg}`;
  renderAll();
  if(delta>=0) playSound('good'); else playSound('bad');
}
function applyMessage(msg, kind){
  $('scoreChange').className = `scoreChange ${kind||''}`;
  $('scoreChange').textContent = msg;
  $('eventLog').innerHTML = `${state.lastEvent?.icon || '🎯'} <b>${teamName(state.currentTeam)}</b>：${msg}`;
  renderAll();
}
function stealPoint(n){
  const candidates = state.teams.map((tm,i)=>({tm,i})).filter(x=>x.i!==state.currentTeam && x.tm.score>0).sort((a,b)=>b.tm.score-a.tm.score);
  if(!candidates.length){ applyMessage(t('noSteal'),'bad'); return t('noSteal'); }
  const target = candidates[0];
  const amount = Math.min(n, target.tm.score);
  target.tm.score -= amount; current().score += amount;
  const msg = fmt('steal',{n:amount});
  applyMessage(`${msg}：${teamName(target.i)}`,'good');
  return msg;
}
function swapScores(){
  const candidates = state.teams.map((tm,i)=>({tm,i})).filter(x=>x.i!==state.currentTeam).sort((a,b)=>b.tm.score-a.tm.score);
  if(!candidates.length) return;
  const target = candidates[0];
  const tmp = current().score; current().score = target.tm.score; target.tm.score = tmp;
}
function autoAdvance(customMsg){
  closeModal();
  const same = $('turnAfter').value === 'same';
  if(!same) state.currentTeam = nextTeamIndex();
  $('scoreChange').className = 'scoreChange good';
  $('scoreChange').textContent = customMsg || (same ? t('sameContinue') : t('autoNext'));
  $('eventLog').innerHTML = `✅ ${customMsg || (same ? t('sameContinue') : t('autoNext'))}`;
  state.answerLocked = false; state.spinning = false; $('spinBtn').disabled = false;
  renderAll();
  checkWin();
}
function checkWin(){
  const target = Number($('targetScore').value) || 0;
  if(target && state.teams.some(tm=>tm.score>=target)){
    endGame(t('targetReached'));
    return true;
  }
  return false;
}
function endGame(reason){
  state.started=false; clearInterval(state.timer); $('spinBtn').disabled = true;
  const sorted = [...state.teams].map((tm,i)=>({...tm,i})).sort((a,b)=>b.score-a.score);
  $('modalTitle').textContent = t('gameOver');
  $('modalBody').innerHTML = `<div class="bigEvent">🏁</div><div class="eventText">${reason}</div>
    <div style="display:grid;gap:10px">${sorted.map((tm,idx)=>`<div class="eventItem"><span>${idx+1}. ${teamName(tm.i)}</span><b>${tm.score}</b></div>`).join('')}</div>
    <div class="modalActions"><button class="primary" id="closeEndBtn">${t('close')}</button></div>`;
  $('modalBackdrop').classList.add('show');
  $('closeEndBtn').onclick = closeModal;
}
function closeModal(){ $('modalBackdrop').classList.remove('show'); }
function flashLog(msg){ $('eventLog').innerHTML = `⚠️ ${msg}`; }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function norm(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' '); }
function esc(s){ return String(s).replace(/[&<>"]/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
function escAttr(s){ return esc(s).replace(/'/g,'&#39;'); }
function playSound(type){
  if($('soundSelect').value === 'off') return;
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.frequency.value = type==='good'?880:type==='bad'?180:type==='spin'?520:type==='start'?660:440;
    o.type = type==='bad'?'sawtooth':'sine';
    g.gain.setValueAtTime(.001,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.09,ctx.currentTime+.02);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+(type==='spin'?.35:.18));
    o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+(type==='spin'?.38:.2));
  }catch(e){}
}
function importTxt(e){
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ()=>{ $('questionBank').value = reader.result; save(); };
  reader.readAsText(f,'utf-8'); e.target.value='';
}
function exportTxt(){
  const blob = new Blob([$('questionBank').value], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='S005_lucky_wheel_questions.txt'; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),600);
}
function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}
function bind(){
  $('langSelect').onchange = ()=>{ applyLanguage(); save(); };
  $('ratioSelect').onchange = ()=>{ setRatio($('ratioSelect').value); save(); };
  $('teamCount').onchange = ()=>{ if(!state.started){ setupTeams(true); renderAll(); } save(); };
  ['gameTime','targetScore','questionMode','turnAfter','wrongPenalty','soundSelect'].forEach(id=>$(id).onchange = ()=>{ if(!state.started){ state.timeLeft=Number($('gameTime').value)||0; renderAll(); } save(); });
  $('questionBank').oninput = save;
  $('sampleBtn').onclick = ()=>{ $('questionBank').value = SAMPLE_BANKS[state.lang] || SAMPLE_BANKS.zh; save(); };
  $('importBtn').onclick = ()=>$('fileInput').click();
  $('fileInput').onchange = importTxt;
  $('exportBtn').onclick = exportTxt;
  $('eventSuggest6Btn').onclick = ()=>{ renderEventSelector(RECOMMENDED); renderAll(); save(); };
  $('eventSelectAllBtn').onclick = ()=>{ renderEventSelector(EVENT_DEFS.map(e=>e.id)); renderAll(); save(); };
  $('startBtn').onclick = startGame;
  $('resetBtn').onclick = ()=>{ if(confirm(t('reset')+'?')) resetGame(); };
  $('showSettingsBtn').onclick = ()=>{ $('layout').classList.toggle('showSettings'); };
  $('fsBtn').onclick = toggleFullscreen;
  $('spinBtn').onclick = spinWheel;
  $('wheelBox').onclick = (e)=>{ if(e.target.id !== 'spinBtn') spinWheel(); };
  $('modalClose').onclick = closeModal;
  $('modalBackdrop').onclick = e=>{ if(e.target === $('modalBackdrop')) closeModal(); };
}
function init(){
  load(); bind(); renderAll();
}
init();
</script>

<!-- S005_START_INIT_FIX_V25 -->
<script>
(function(){
  function safe(id){ return document.getElementById(id); }
  function emergencyStart(e){
    if(e){ e.preventDefault(); e.stopPropagation(); }
    try{
      if(!state.teams || !state.teams.length) setupTeams(true);
      startGame();
      const layout=safe('layout');
      if(layout){ layout.classList.add('playing'); layout.classList.remove('showSettings'); }
    }catch(err){
      console.error('[S005 v25 start emergency]', err);
      try{
        if(typeof state !== 'undefined'){
          state.started=true; state.currentTeam=0; state.spinning=false; state.answerLocked=false;
          if(!state.teams || !state.teams.length) setupTeams(true);
        }
        const layout=safe('layout');
        if(layout){ layout.classList.add('playing'); layout.classList.remove('showSettings'); }
        if(typeof renderAll==='function') renderAll();
        if(safe('eventLog')) safe('eventLog').innerHTML='🎡 '+(typeof t==='function'?t('spinNow'):'请点击转盘按钮。');
      }catch(err2){ alert('开始游戏失败：'+(err2.message||err2)); }
    }
  }
  function init(){
    const btn=safe('startBtn');
    if(btn && !btn.dataset.v25Bound){
      btn.dataset.v25Bound='1';
      btn.addEventListener('click', emergencyStart, true);
    }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
</script>

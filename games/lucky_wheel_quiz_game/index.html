const $ = id => document.getElementById(id);
const t = key => (I18N[lang] && I18N[lang][key]) || I18N.zh[key] || key;
const fmt = (key, data={}) => t(key).replace(/\{(\w+)\}/g, (_,k)=> data[k] ?? '');

function getSelectedEventIds(){ return [...document.querySelectorAll('.eventCheck:checked')].map(el=>el.value); }
function syncEventChoiceStates(){
  document.querySelectorAll('.eventChoice').forEach(label=>{
    const cb=label.querySelector('.eventCheck');
    label.classList.toggle('active', !!cb && cb.checked);
  });
}
function updateEventSummary(){
  const el=$('eventSummary');
  if(!el) return;
  const n=getSelectedEventIds().length;
  el.textContent = fmt('selectedCount',{n,total:EVENT_DEFS.length});
}
function getActiveEventDefs(){
  const ids=getSelectedEventIds();
  const selected = ids.length ? ids : RECOMMENDED_EVENT_IDS;
  return EVENT_DEFS.filter(ev=>selected.includes(ev.id));
}
function renderEventSelector(selectedIds){
  const wrap=$('eventSelector');
  if(!wrap) return;
  const set = new Set(selectedIds && selectedIds.length ? selectedIds : RECOMMENDED_EVENT_IDS);
  wrap.innerHTML = EVENT_DEFS.map(ev=>`<label class="eventChoice ${set.has(ev.id)?'active':''}"><input class="eventCheck" type="checkbox" value="${ev.id}" ${set.has(ev.id)?'checked':''}><span class="icon">${ev.icon}</span><span>${t(ev.id)}</span></label>`).join('');
  document.querySelectorAll('.eventCheck').forEach(el=>{
    el.addEventListener('change',()=>{
      syncEventChoiceStates();
      updateEventSummary();
      renderEventList();
      renderWheel();
      saveSettings();
    });
  });
  updateEventSummary();
}
function setSelectedEventIds(ids){
  const set = new Set(ids && ids.length ? ids : RECOMMENDED_EVENT_IDS);
  document.querySelectorAll('.eventCheck').forEach(el=>{ el.checked = set.has(el.value); });
  syncEventChoiceStates();
  updateEventSummary();
  renderEventList();
  renderWheel();
}
function renderEventList(){
  const defs = getActiveEventDefs();
  const list=$('eventList');
  if(!list) return;
  list.innerHTML = defs.map((ev,idx)=>`<div class="eventItem"><span><b>${idx+1}.</b> <b>${ev.icon}</b>${t(ev.id)}</span><span>${ev.quiz ? t('question') : t('wheelEvent')}</span></div>`).join('');
}
function setSettingsVisible(visible){

  layout.classList.toggle('showSettings', !!visible);

}


function init(){

  bindEvents();
  applyI18n();
  parseQuestions();
  setupTeams(false);
  renderTeams();
  renderWheel();
  renderEventList();

function bindEvents(){
  $('langSelect').addEventListener('change',()=>{const useSample = !$('questionBank').value.trim() || isBuiltInSample($('questionBank').value); const selected = (typeof getSelectedEventIds==='function') ? getSelectedEventIds() : RECOMMENDED_EVENT_IDS; lang=$('langSelect').value; if(useSample) $('questionBank').value = getSampleBank(); saveSettings(); applyI18n(); setSelectedEventIds(selected); parseQuestions(); renderTeams(); renderWheel(); renderEventList(); updateHud();});
  ['teamCount','gameTime','targetScore','questionMode','turnAfter','wrongPenalty','soundSelect'].forEach(id=>$(id).addEventListener('change',()=>{saveSettings(); if(!started){setupTeams(false);renderTeams();updateHud();}}));
  $('questionBank').addEventListener('input',()=>{saveSettings(); parseQuestions();});
  $('startBtn').addEventListener('click',startGame);
  $('showSettingsBtn').addEventListener('click',()=>{ if(started){ $('layout').classList.toggle('showSettings'); $('layout').classList.add('playing'); } else { $('layout').classList.remove('playing'); } });
  $('resetBtn').addEventListener('click',()=>{ if(confirm(t('confirmReset'))) resetGame(); });
  $('fsBtn').addEventListener('click',toggleFullscreen);
  $('spinBtn').addEventListener('click',spinWheel);
  $('importBtn').addEventListener('click',()=>$('fileInput').click());
  $('fileInput').addEventListener('change',importTxt);
  $('exportBtn').addEventListener('click',exportTxt);
  $('sampleBtn').addEventListener('click',loadSampleForCurrentLanguage);
  $('eventSuggest6Btn').addEventListener('click',()=>{ setSelectedEventIds(RECOMMENDED_EVENT_IDS); saveSettings(); });
  $('eventSelectAllBtn').addEventListener('click',()=>{ setSelectedEventIds(EVENT_DEFS.map(ev=>ev.id)); saveSettings(); });
  $('modalClose').addEventListener('click',closeModal);
  $('modalBackdrop').addEventListener('click',e=>{ if(e.target === $('modalBackdrop')) closeModal(); });
}

function announceLoaded(){ const el = $('eventLog'); if(el) el.innerHTML = '✅ ' + t('loaded'); }

function loadSettings(){
  let saved = {};
  try{ saved = JSON.parse(localStorage.getItem(LS_KEY)||'{}'); }catch(e){}
  lang = saved.lang || 'zh';
  $('langSelect').value = lang;
  $('teamCount').value = saved.teamCount || '2';
  $('gameTime').value = saved.gameTime || '300';
  $('targetScore').value = saved.targetScore || '10';
  $('questionMode').value = saved.questionMode || 'random';
  $('turnAfter').value = saved.turnAfter || 'next';
  $('wrongPenalty').value = saved.wrongPenalty || '1';
  $('soundSelect').value = saved.soundSelect || 'on';
  $('questionBank').value = saved.questionBank || getSampleBank();
  if(!$('questionBank').value.trim() || isBuiltInSample($('questionBank').value)) $('questionBank').value = getSampleBank();
  renderEventSelector(Array.isArray(saved.selectedEvents) && saved.selectedEvents.length ? saved.selectedEvents : RECOMMENDED_EVENT_IDS);
}

function saveSettings(){
  const data = {lang:$('langSelect').value, teamCount:$('teamCount').value, gameTime:$('gameTime').value, targetScore:$('targetScore').value, questionMode:$('questionMode').value, turnAfter:$('turnAfter').value, wrongPenalty:$('wrongPenalty').value, soundSelect:$('soundSelect').value, questionBank:$('questionBank').value, selectedEvents:getSelectedEventIds()};
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}
function applyI18n(){
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;
  document.title = t('appTitle') + ' Classroom Game';
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  const currentSelected = getSelectedEventIds ? getSelectedEventIds() : RECOMMENDED_EVENT_IDS;
  if($('eventSelector')) renderEventSelector(currentSelected.length ? currentSelected : RECOMMENDED_EVENT_IDS);
  const log = $('eventLog');
  if(log && !started){ log.innerHTML = '💡 <span>' + t('logReady') + '</span>'; }
}

function parseCSVLine(line){
  const out=[]; let cur=''; let quoted=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){ quoted=!quoted; continue; }
    if(ch===',' && !quoted){ out.push(cur.trim()); cur=''; }
    else cur += ch;
  }
  out.push(cur.trim());
  return out.filter(v=>v.length>0);
}
function parseQuestions(){
  questions = $('questionBank').value.split(/\r?\n/).map(s=>s.trim()).filter(Boolean).map(line=>{
    const parts = parseCSVLine(line);
    if(parts.length < 2) return null;
    const q = parts[0], answer = parts[1];
    const options = parts.length >= 3 ? shuffle([answer, ...parts.slice(2)]) : [];
    return {q, answer, options};
  }).filter(Boolean);
  if(questionIndex >= questions.length) questionIndex = 0;
}
function setupTeams(resetScores=true){
  const count = parseInt($('teamCount').value,10) || 2;
  const nameKeys = ['teamRed','teamBlue','teamGreen','teamPurple'];
  const existing = teams;
  teams = Array.from({length:count},(_,i)=>({
    nameKey:nameKeys[i],
    score: resetScores ? 0 : (existing[i]?.score || 0),
    turns: resetScores ? 0 : (existing[i]?.turns || 0),
    color: TEAM_COLORS[i]
  }));
  if(currentTeam >= teams.length) currentTeam = 0;
}
function renderTeams(){
  $('teams').innerHTML = teams.map((team,i)=>{
    const target = parseInt($('targetScore').value,10) || 0;
    const pct = target ? Math.max(0, Math.min(100, team.score/target*100)) : Math.max(0, Math.min(100, team.score*10));
    return `<div class="teamCard ${i===currentTeam?'active':''}">
      <div class="teamName"><span class="teamDot" style="background:${team.color}"></span>${t(team.nameKey)}</div>
      <div class="teamScore">${team.score}</div>
      <div class="teamMeta">${t('rounds')}：${team.turns}</div>
      <div class="bar"><div class="barFill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}
function updateHud(){
  if(!teams.length) setupTeams(false);
  $('turnText').textContent = `${t('turn')}：${t(teams[currentTeam].nameKey)}`;
  $('roundInfo').textContent = started ? t('spinNow') : t('logReady');
  const target = parseInt($('targetScore').value,10)||0;
  $('goalInfo').innerHTML = `${target ? `${t('goal')}：${target}` : t('noGoal')}<small>${t('goalSmall')}</small>`;
  timeLeft = started ? timeLeft : parseInt($('gameTime').value,10)||0;
  $('timer').textContent = formatTime(timeLeft);
}
function formatTime(sec){
  if(!sec) return '∞';
  const m=Math.floor(sec/60), s=sec%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function renderWheel(){
  const defs = getActiveEventDefs();
  const wheel = $('wheel');
  if(!defs.length){ wheel.innerHTML=''; return; }
  const seg = 360 / defs.length;
  const gradient = defs.map((ev,i)=>`${ev.color} ${i*seg}deg ${(i+1)*seg}deg`).join(',');
  wheel.style.background = `conic-gradient(${gradient})`;
  wheel.style.transform = `rotate(${rotation}deg)`;
  wheel.innerHTML = defs.map((ev,i)=>{
    const angle = i*seg + seg/2;
    return `<div class="wheelLabel" style="transform:rotate(${angle}deg) translateY(-158px) rotate(90deg)">${ev.icon}<br>${t(ev.id)}</div>`;
  }).join('');
}

function startGame(){
  parseQuestions();
  if(!questions.length){ alert(t('bankEmpty')); return; }
  saveSettings();
  started = true; spinning = false; currentTeam = 0; questionIndex = 0; rotation = 0;
  setupTeams(true);
  timeLeft = parseInt($('gameTime').value,10) || 0;
  $('layout').classList.remove('showSettings');
  $('layout').classList.add('playing');
  $('resultBadge').innerHTML = `🎯 ${t('ready')}`;
  $('eventLog').innerHTML = `🎡 ${t('spinNow')}`;
  $('spinBtn').disabled = false;
  clearInterval(timerId);
  if(timeLeft>0){ timerId = setInterval(()=>{timeLeft--; $('timer').textContent=formatTime(timeLeft); if(timeLeft<=0) endGame(t('timeUp'));},1000); }
  renderTeams(); renderWheel(); updateHud(); playSound('start');
}
function resetGame(){
  started=false; spinning=false; currentTeam=0; clearInterval(timerId); timeLeft=parseInt($('gameTime').value,10)||0; setupTeams(true); rotation=0;
  $('layout').classList.remove('playing','showSettings'); $('spinBtn').disabled=false; $('resultBadge').innerHTML=`🎯 ${t('ready')}`; $('eventLog').innerHTML=`💡 ${t('logReady')}`;
  closeModal(); renderTeams(); renderWheel(); updateHud();
}
function spinWheel(){
  if(!started){ alert(t('pleaseStart')); return; }
  if(spinning) return;
  const defs = getActiveEventDefs();
  if(!defs.length){ alert(t('eventSelectHint')); return; }
  spinning = true; $('spinBtn').disabled = true;
  playSound('spin');
  const idx = Math.floor(Math.random()*defs.length);
  selectedEvent = defs[idx];
  const seg = 360 / defs.length;
  const center = idx*seg + seg/2;
  const base = 360 - center;
  rotation += 360*5 + ((base - rotation) % 360 + 360) % 360;
  $('wheel').style.transform = `rotate(${rotation}deg)`;
  $('resultBadge').innerHTML = `🎡 ${t('wheelEvent')}...`;
  setTimeout(()=>{
    $('resultBadge').innerHTML = `${selectedEvent.icon} ${t(selectedEvent.id)}`;
    spinning = false;
    handleEvent(selectedEvent);
  },4100);
}
function handleEvent(ev){
  teams[currentTeam].turns++;
  if(ev.quiz){ currentQuizScore = ev.score; showQuestion(ev); return; }
  let msg = '';
  if(ev.id.startsWith('bonus')){ updateScore(currentTeam, ev.score); msg = fmt('gotPoints',{n:ev.score}); playSound('good'); }
  else if(ev.id.startsWith('trap')){ updateScore(currentTeam, ev.score); msg = fmt('lostPoints',{n:Math.abs(ev.score)}); playSound('bad'); }
  else if(ev.id==='steal'){ msg = doSteal(ev.score); }
  else if(ev.id==='swap'){ msg = doSwap(); }
  else if(ev.id==='pass'){ msg = t('passTurn'); playSound('bad'); }
  renderTeams();
  $('eventLog').innerHTML = `${ev.icon} <b>${t(teams[currentTeam].nameKey)}</b>：${t(ev.id)}，${msg}`;
  showEventModal(ev, msg);
  checkWin();
}
function doSteal(n){
  const candidates = teams.map((tm,i)=>({tm,i})).filter(x=>x.i!==currentTeam && x.tm.score>0).sort((a,b)=>b.tm.score-a.tm.score);
  if(!candidates.length){ playSound('bad'); return t('noSteal'); }
  const target = candidates[0];
  const amount = Math.min(n, target.tm.score);
  target.tm.score -= amount; teams[currentTeam].score += amount; playSound('good');
  return fmt('stole',{n:amount, team:t(target.tm.nameKey)});
}
function doSwap(){
  const candidates = teams.map((tm,i)=>({tm,i})).filter(x=>x.i!==currentTeam).sort((a,b)=>b.tm.score-a.tm.score);
  const target = candidates[0];
  if(!target){ return t('passTurn'); }
  const tmp = teams[currentTeam].score; teams[currentTeam].score = target.tm.score; target.tm.score = tmp; playSound('start');
  return fmt('swapped',{team:t(target.tm.nameKey)});
}
function updateScore(i,delta){
  teams[i].score += delta;
  if(teams[i].score < 0) teams[i].score = 0;
}
function nextTurn(){
  if($('turnAfter').value==='next') currentTeam = (currentTeam+1)%teams.length;
  renderTeams(); updateHud(); $('spinBtn').disabled = !started;
}
function finishTurn(){
  if(!started) return;
  nextTurn();
}

function getNextQuestion(){
  parseQuestions();
  if(!questions.length) return null;
  if($('questionMode').value==='random') return questions[Math.floor(Math.random()*questions.length)];
  const q = questions[questionIndex % questions.length]; questionIndex++; return q;
}
function showQuestion(ev){
  currentQuestion = getNextQuestion();
  if(!currentQuestion){ alert(t('bankEmpty')); finishTurn(); return; }
  const isMC = currentQuestion.options.length >= 2;
  let body = `<div class="bigEvent">${ev.icon}</div><div class="eventText">${t(ev.id)} · ${t(teams[currentTeam].nameKey)}</div><hr style="border:none;border-top:1px solid #e5e7eb;margin:18px 0"><div class="question">${escapeHtml(currentQuestion.q)}</div>`;
  if(isMC){
    body += `<div class="options">${currentQuestion.options.map(opt=>`<button class="option" data-answer="${escapeAttr(opt)}">${escapeHtml(opt)}</button>`).join('')}</div><div class="hint">${t('chooseOption')}</div>`;
  }else{
    body += `<div class="answerBox" id="answerBox"><b>${t('correctAnswer')}：</b>${escapeHtml(currentQuestion.answer)}</div><div class="modalActions"><button id="showAnswerBtn">${t('showAnswer')}</button><button class="good" id="correctBtn">${t('correct')}</button><button class="bad" id="wrongBtn">${t('wrong')}</button></div>`;
  }
  openModal(t('question'), body);
  if(isMC){
    document.querySelectorAll('.option').forEach(btn=>btn.addEventListener('click',()=>judgeMC(btn)));
  }else{
    $('showAnswerBtn').addEventListener('click',()=>{$('answerBox').style.display='block';});
    $('correctBtn').addEventListener('click',()=>judgeOpen(true));
    $('wrongBtn').addEventListener('click',()=>judgeOpen(false));
  }
}
function judgeMC(btn){
  const chosen = btn.dataset.answer;
  const correct = normalize(chosen) === normalize(currentQuestion.answer);
  document.querySelectorAll('.option').forEach(b=>{
    b.disabled=true;
    if(normalize(b.dataset.answer)===normalize(currentQuestion.answer)) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
  });
  applyQuizResult(correct);
}
function judgeOpen(isCorrect){ applyQuizResult(isCorrect); }
function applyQuizResult(isCorrect){
  const penalty = parseInt($('wrongPenalty').value,10)||0;
  let msg='';
  if(isCorrect){ updateScore(currentTeam, currentQuizScore); msg = fmt('answerRight',{n:currentQuizScore}); playSound('good'); }
  else if(penalty>0){ updateScore(currentTeam, -penalty); msg = fmt('answerWrongPenalty',{n:penalty}); playSound('bad'); }
  else { msg = t('answerWrong'); playSound('bad'); }
  renderTeams();
  $('eventLog').innerHTML = `❓ <b>${t(teams[currentTeam].nameKey)}</b>：${msg}`;
  const existing = document.querySelector('.modalActions');
  const actions = existing || document.createElement('div');
  actions.className = 'modalActions';
  actions.innerHTML = `<button class="primary" id="continueBtn">${t('continue')}</button>`;
  if(!existing) $('modalBody').appendChild(actions);
  $('continueBtn').addEventListener('click',()=>{ closeModal(); if(!checkWin()) finishTurn(); });
  checkWin(false);
}
function showEventModal(ev,msg){
  const body = `<div class="bigEvent">${ev.icon}</div><div class="eventText">${t(teams[currentTeam].nameKey)}<br>${t(ev.id)}<br><span style="font-size:.72em;color:#4b5563">${msg}</span></div><div class="modalActions"><button class="primary" id="continueBtn">${t('continue')}</button></div>`;
  openModal(t('wheelEvent'), body);
  $('continueBtn').addEventListener('click',()=>{ closeModal(); if(!checkWin()) finishTurn(); });
}
function checkWin(showEnd=true){
  const target = parseInt($('targetScore').value,10)||0;
  if(target && teams.some(t=>t.score>=target)){
    if(showEnd) endGame(t('targetReached'));
    return true;
  }
  return false;
}
function endGame(reason){
  if(!started) return;
  started=false; spinning=false; clearInterval(timerId); $('spinBtn').disabled = true; renderTeams(); updateHud(); playSound('end');
  const sorted = teams.map((tm,i)=>({...tm,idx:i})).sort((a,b)=>b.score-a.score || b.turns-a.turns);
  const medals = ['🥇','🥈','🥉','🏅'];
  const body = `<div class="bigEvent">🏁</div><div class="eventText">${reason}</div><div class="rankList">${sorted.map((tm,i)=>`<div class="rankItem"><span><span class="rankMedal">${medals[i]||'🏅'}</span> ${t(tm.nameKey)}</span><span>${tm.score} ${t('score')} · ${tm.turns} ${t('rounds')}</span></div>`).join('')}</div><div class="modalActions"><button class="primary" id="closeEndBtn">${t('close')}</button></div>`;
  openModal(t('gameOver'), body);
  $('closeEndBtn').addEventListener('click',closeModal);
}

function openModal(title,body){ $('modalTitle').textContent=title; $('modalBody').innerHTML=body; $('modalBackdrop').classList.add('show'); }
function closeModal(){ $('modalBackdrop').classList.remove('show'); }
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function normalize(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' '); }
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
function escapeAttr(s){ return escapeHtml(s).replace(/'/g,'&#39;'); }

function importTxt(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => { $('questionBank').value = ev.target.result; saveSettings(); parseQuestions(); };
  reader.readAsText(file,'utf-8'); e.target.value='';
}
function exportTxt(){
  const blob = new Blob([$('questionBank').value],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='S005_lucky_wheel_quiz_questions.txt'; a.click(); URL.revokeObjectURL(a.href);
}
function toggleFullscreen(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}
function playSound(type){
  if($('soundSelect').value==='off') return;
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    const freq = type==='good'?880:type==='bad'?180:type==='spin'?520:type==='end'?660:440;
    o.frequency.value = freq; o.type = type==='bad'?'sawtooth':'sine';
    g.gain.setValueAtTime(.001,ctx.currentTime); g.gain.exponentialRampToValueAtTime(.10,ctx.currentTime+.02); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+(type==='spin'?.35:.18));
    o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+(type==='spin'?.38:.20));
  }catch(e){}
}

init();
</script>

  const RECOMMENDED = ['quiz1','quiz2','doubleQuiz','bonus1','trap1','steal'];
  function $(id){ return document.getElementById(id); }
  function label(id){ try{ if(typeof t === 'function') return t(id); }catch(e){} return id; }

    wheel.style.background = `conic-gradient(${defs.map((ev,i)=>`${ev.color} ${i*seg}deg ${(i+1)*seg}deg`).join(',')})`;

      const angle = i*seg + seg/2;

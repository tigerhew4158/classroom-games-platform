<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>平台闯关问答小游戏</title>
<style>
  :root{
    --bg:#101827;
    --panel:#172033;
    --panel2:#202b43;
    --text:#f8fafc;
    --muted:#aeb7c8;
    --accent:#fbbf24;
    --good:#22c55e;
    --bad:#ef4444;
    --blue:#38bdf8;
    --red:#fb7185;
    --green:#34d399;
    --purple:#a78bfa;
    --border:rgba(255,255,255,.13);
    --shadow:0 18px 60px rgba(0,0,0,.35);
    --radius:22px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    background: radial-gradient(circle at top, #243656 0%, var(--bg) 50%, #070b14 100%);
    color:var(--text);
    min-height:100vh;
  }
  button,input,select,textarea{font:inherit}
  .app{width:min(1380px,96vw); margin:0 auto; padding:18px 0 28px}
  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding:14px 18px; border:1px solid var(--border); background:rgba(23,32,51,.72);
    border-radius:var(--radius); box-shadow:var(--shadow); backdrop-filter: blur(10px);
    margin-bottom:14px;
  }
  .brand{display:flex; align-items:center; gap:12px}
  .logo{width:48px; height:48px; border-radius:16px; background:linear-gradient(135deg,#fbbf24,#f97316); display:grid; place-items:center; font-size:29px; box-shadow:0 8px 22px rgba(251,191,36,.28)}
  h1{font-size:clamp(20px,2.4vw,32px); margin:0; line-height:1.15}
  .subtitle{color:var(--muted); font-size:14px; margin-top:4px}
  .topActions{display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end}
  .pill{border:1px solid var(--border); background:rgba(255,255,255,.06); color:var(--text); padding:9px 12px; border-radius:999px}
  .btn{
    border:0; color:#111827; background:var(--accent); border-radius:14px; padding:10px 15px;
    font-weight:800; cursor:pointer; transition:.15s transform,.15s filter; box-shadow:0 8px 22px rgba(251,191,36,.22);
  }
  .btn:hover{transform:translateY(-1px); filter:brightness(1.04)}
  .btn.secondary{background:#334155; color:var(--text); box-shadow:none; border:1px solid var(--border)}
  .btn.good{background:var(--good); color:#052e16}
  .btn.bad{background:var(--bad); color:white}
  .btn.blue{background:var(--blue); color:#062033}
  .btn.small{padding:7px 10px; border-radius:11px; font-size:13px}
  .layout{display:grid; grid-template-columns:390px 1fr; gap:14px; align-items:start}
  .layout.playing{grid-template-columns:1fr}
  .panel{
    border:1px solid var(--border); background:rgba(23,32,51,.82); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;
  }
  .panelHeader{padding:15px 16px; background:rgba(255,255,255,.05); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:12px}
  .panelHeader h2{font-size:18px; margin:0}
  .panelBody{padding:16px}
  .formGrid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .field{display:flex; flex-direction:column; gap:7px; margin-bottom:12px}
  label{font-size:13px; color:var(--muted); font-weight:700}
  input,select,textarea{
    width:100%; border:1px solid var(--border); background:#0f172a; color:var(--text); border-radius:14px; padding:10px 11px; outline:none;
  }
  textarea{min-height:220px; resize:vertical; line-height:1.42; font-size:14px}
  .hint{font-size:12px; color:var(--muted); line-height:1.5}
  .fileRow{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  input[type="file"]{font-size:12px; padding:8px}
  .settingsPanel.hidden{display:none}

  .gamePanel{min-width:0}
  .hud{display:grid; grid-template-columns:1fr auto; gap:12px; padding:13px 14px; border-bottom:1px solid var(--border); background:rgba(255,255,255,.04)}
  .scoreboard{display:flex; gap:9px; align-items:center; flex-wrap:wrap}
  .teamCard{border:1px solid var(--border); background:rgba(255,255,255,.06); border-radius:16px; padding:8px 10px; min-width:128px; position:relative; overflow:hidden}
  .teamCard.active{outline:3px solid var(--accent); background:rgba(251,191,36,.13)}
  .teamCard.finished{opacity:.72}
  .teamName{font-weight:900; display:flex; align-items:center; gap:7px}
  .teamStats{font-size:12px; color:var(--muted); margin-top:4px; display:flex; gap:8px; flex-wrap:wrap}
  .teamColor{width:10px; height:10px; border-radius:999px; background:var(--blue); display:inline-block}
  .hudActions{display:flex; gap:8px; align-items:center; justify-content:flex-end; flex-wrap:wrap}
  .statusLine{padding:12px 14px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; background:rgba(15,23,42,.55); border-bottom:1px solid var(--border)}
  .bigStatus{font-weight:900; font-size:18px}
  .miniStatus{color:var(--muted); font-size:14px}
  .canvasWrap{position:relative; padding:14px; background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02))}
  canvas{display:block; width:100%; height:auto; max-height:66vh; border-radius:20px; background:#8bd3ff; border:1px solid rgba(255,255,255,.18); box-shadow: inset 0 0 0 1px rgba(255,255,255,.08)}
  .controlsHint{position:absolute; left:28px; bottom:28px; background:rgba(15,23,42,.76); border:1px solid rgba(255,255,255,.16); border-radius:16px; padding:9px 12px; color:#e5e7eb; font-size:13px; backdrop-filter: blur(8px)}
  .mobileControls{display:none; position:absolute; right:26px; bottom:24px; gap:8px; align-items:center}
  .padBtn{width:52px;height:52px;border-radius:18px;border:1px solid rgba(255,255,255,.18);background:rgba(15,23,42,.76);color:white;font-weight:900;font-size:20px;box-shadow:0 9px 22px rgba(0,0,0,.22)}
  .questionModal,.endModal{position:fixed; inset:0; display:none; place-items:center; background:rgba(2,6,23,.72); z-index:50; padding:18px; backdrop-filter: blur(7px)}
  .questionModal.show,.endModal.show{display:grid}
  .modalCard{width:min(760px,96vw); border:1px solid var(--border); background:linear-gradient(180deg,#1e293b,#101827); border-radius:28px; box-shadow:0 24px 90px rgba(0,0,0,.5); overflow:hidden}
  .modalTop{padding:18px 20px; background:rgba(251,191,36,.12); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; gap:10px; align-items:center}
  .modalTop h3{font-size:22px; margin:0}
  .modalBody{padding:20px}
  .questionText{font-size:clamp(24px,4vw,42px); font-weight:950; line-height:1.18; margin:8px 0 16px; text-align:center}
  .answerHint{background:rgba(255,255,255,.06); border:1px dashed var(--border); border-radius:16px; padding:10px 12px; color:var(--muted); margin-bottom:12px; text-align:center}
  .options{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px}
  .optionBtn{border:1px solid var(--border); background:#0f172a; color:white; border-radius:18px; padding:15px; font-weight:900; cursor:pointer; min-height:64px; font-size:18px}
  .optionBtn:hover{background:#1e293b}
  .openAnswer{display:flex; gap:9px; margin-top:12px; flex-wrap:wrap}
  .openAnswer input{flex:1; min-width:220px; font-size:20px; padding:14px}
  .judgeRow{display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; margin-top:14px}
  .resultMsg{margin-top:14px; text-align:center; font-size:18px; font-weight:900; min-height:28px}
  .rankList{display:grid; gap:10px; margin:12px 0}
  .rankItem{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:13px 14px; border:1px solid var(--border); background:rgba(255,255,255,.06); border-radius:16px}
  .rankLeft{font-weight:900; font-size:18px}
  .rankRight{color:var(--muted); font-weight:800}
  .footerNote{font-size:12px; color:var(--muted); text-align:center; padding:10px 14px 14px}
  .kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.16); padding:2px 6px; border-radius:7px; color:white}
  .toast{position:fixed; left:50%; bottom:22px; transform:translateX(-50%); background:rgba(15,23,42,.94); border:1px solid var(--border); border-radius:999px; padding:10px 16px; z-index:70; display:none; box-shadow:var(--shadow); font-weight:800}
  .toast.show{display:block}
  @media (max-width:980px){
    .layout{grid-template-columns:1fr}
    .hud{grid-template-columns:1fr}
    .hudActions{justify-content:flex-start}
    .options{grid-template-columns:1fr}
    .mobileControls{display:flex}
    canvas{max-height:none}
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo">🏰</div>
      <div>
        <h1 data-i18n="title">平台闯关问答小游戏</h1>
        <div class="subtitle" data-i18n="subtitle">键盘控制角色闯关，到达关卡门口后回答问题，答对才能继续前进。</div>
      </div>
    </div>
    <div class="topActions">
      <select id="langSelect" class="pill" aria-label="language">
        <option value="zh">简体中文</option>
        <option value="en">English</option>
        <option value="ms">Bahasa Melayu</option>
      </select>
      <button class="btn secondary" id="fullscreenBtn" data-i18n="fullscreen">全屏</button>
    </div>
  </div>

  <div id="layout" class="layout">
    <section id="settingsPanel" class="panel settingsPanel">
      <div class="panelHeader">
        <h2 data-i18n="teacherSettings">老师设定</h2>
        <button class="btn small secondary" id="loadDemoBtn" data-i18n="loadDemo">载入示例</button>
      </div>
      <div class="panelBody">
        <div class="formGrid">
          <div class="field">
            <label data-i18n="teamCount">队伍数量</label>
            <select id="teamCount">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>
            </select>
          </div>
          <div class="field">
            <label data-i18n="levelCount">关卡数量</label>
            <input id="levelCount" type="number" min="1" max="30" value="6" />
          </div>
          <div class="field">
            <label data-i18n="timeLimit">游戏总时间</label>
            <select id="timeLimit">
              <option value="0" data-i18n="noLimit">不限时</option>
              <option value="300">5 分钟</option>
              <option value="600" selected>10 分钟</option>
              <option value="900">15 分钟</option>
              <option value="1200">20 分钟</option>
            </select>
          </div>
          <div class="field">
            <label data-i18n="questionSeconds">每题倒数</label>
            <select id="questionSeconds">
              <option value="0" data-i18n="noLimit">不限时</option>
              <option value="20">20 秒</option>
              <option value="30" selected>30 秒</option>
              <option value="45">45 秒</option>
              <option value="60">60 秒</option>
            </select>
          </div>
          <div class="field">
            <label data-i18n="hearts">每队生命</label>
            <input id="hearts" type="number" min="1" max="10" value="3" />
          </div>
          <div class="field">
            <label data-i18n="difficulty">闯关难度</label>
            <select id="difficulty">
              <option value="easy" data-i18n="easy">简单</option>
              <option value="normal" selected data-i18n="normal">普通</option>
              <option value="hard" data-i18n="hard">挑战</option>
            </select>
          </div>
          <div class="field">
            <label data-i18n="correctPolicy">答对后</label>
            <select id="correctPolicy">
              <option value="switch" selected data-i18n="switchTeam">换下一队</option>
              <option value="continue" data-i18n="sameTeam">本队继续</option>
            </select>
          </div>
          <div class="field">
            <label data-i18n="wrongPolicy">答错后</label>
            <select id="wrongPolicy">
              <option value="switch" selected data-i18n="switchTeam">换下一队</option>
              <option value="continue" data-i18n="sameTeam">本队继续</option>
            </select>
          </div>
          <div class="field">
            <label data-i18n="wrongPenalty">答错扣分</label>
            <select id="wrongPenalty">
              <option value="0" data-i18n="no">否</option>
              <option value="1" selected data-i18n="yes">是</option>
            </select>
          </div>
          <div class="field">
            <label data-i18n="sound">音效</label>
            <select id="soundOn">
              <option value="1" selected data-i18n="on">开启</option>
              <option value="0" data-i18n="off">关闭</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label data-i18n="questionBank">题库</label>
          <textarea id="questionBank" spellcheck="false"></textarea>
          <div class="hint" data-i18n="bankHint">格式：题目,正确答案,错误选项1,错误选项2,错误选项3。只有两栏时为开放题，可自动判断，也可由老师判对/判错。</div>
        </div>
        <div class="fileRow">
          <input id="importFile" type="file" accept=".txt,.csv" />
          <button class="btn small secondary" id="exportBtn" data-i18n="exportTxt">导出 TXT</button>
          <button class="btn small secondary" id="clearBtn" data-i18n="clear">清空</button>
        </div>
        <div style="height:12px"></div>
        <button class="btn good" id="startBtn" style="width:100%;font-size:18px;padding:14px" data-i18n="startGame">开始游戏</button>
        <div class="footerNote" data-i18n="settingsNote">开始后会隐藏老师设定区，只保留闯关画面，方便投影给学生。</div>
      </div>
    </section>

    <section class="panel gamePanel">
      <div class="hud">
        <div id="scoreboard" class="scoreboard"></div>
        <div class="hudActions">
          <button class="btn small secondary" id="showSettingsBtn" data-i18n="showSettings">显示老师设定</button>
          <button class="btn small secondary" id="restartBtn" data-i18n="restart">重新开始</button>
          <button class="btn small bad" id="endBtn" data-i18n="endGame">结束游戏</button>
        </div>
      </div>
      <div class="statusLine">
        <div>
          <div id="bigStatus" class="bigStatus" data-i18n="readyStatus">请先完成老师设定，然后点击开始游戏。</div>
          <div id="miniStatus" class="miniStatus" data-i18n="controlHint">操作：← → 或 A/D 移动，空白键 / ↑ / W 跳跃。</div>
        </div>
        <div class="miniStatus">
          <span data-i18n="time">时间</span>：<strong id="timerText">--:--</strong>　
          <span data-i18n="level">关卡</span>：<strong id="levelText">-</strong>
        </div>
      </div>
      <div class="canvasWrap">
        <canvas id="gameCanvas" width="960" height="540"></canvas>
        <div class="controlsHint" id="canvasHint"><span class="kbd">←</span> <span class="kbd">→</span> / <span class="kbd">A</span> <span class="kbd">D</span>　<span class="kbd">Space</span> <span data-i18n="doubleJump">双跳</span></div>
        <div class="mobileControls" aria-hidden="true">
          <button class="padBtn" data-pad="left">◀</button>
          <button class="padBtn" data-pad="jump">▲</button>
          <button class="padBtn" data-pad="right">▶</button>
        </div>
      </div>
    </section>
  </div>
</div>

<div id="questionModal" class="questionModal">
  <div class="modalCard">
    <div class="modalTop">
      <h3 id="questionTitle">关卡问题</h3>
      <div><span data-i18n="questionTime">答题倒数</span>：<strong id="questionTimer">--</strong></div>
    </div>
    <div class="modalBody">
      <div class="answerHint" id="questionMeta"></div>
      <div class="questionText" id="questionText"></div>
      <div id="options" class="options"></div>
      <div id="openAnswer" class="openAnswer" style="display:none">
        <input id="answerInput" autocomplete="off" />
        <button class="btn blue" id="submitAnswerBtn" data-i18n="submitAnswer">提交答案</button>
      </div>
      <div id="teacherJudge" class="judgeRow" style="display:none">
        <button class="btn good" id="judgeCorrectBtn" data-i18n="teacherCorrect">老师判对</button>
        <button class="btn bad" id="judgeWrongBtn" data-i18n="teacherWrong">老师判错</button>
        <button class="btn secondary" id="showAnswerBtn" data-i18n="showAnswer">显示答案</button>
      </div>
      <div id="resultMsg" class="resultMsg"></div>
    </div>
  </div>
</div>

<div id="endModal" class="endModal">
  <div class="modalCard">
    <div class="modalTop">
      <h3 data-i18n="gameOver">游戏结束</h3>
      <button class="btn small secondary" id="closeEndBtn" data-i18n="close">关闭</button>
    </div>
    <div class="modalBody">
      <div id="winnerText" class="questionText"></div>
      <div id="rankList" class="rankList"></div>
      <div class="judgeRow">
        <button class="btn good" id="playAgainBtn" data-i18n="playAgain">再玩一次</button>
        <button class="btn secondary" id="editSettingsBtn" data-i18n="editSettings">回到老师设定</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>

  function parseCSVLine(line){
    const out=[]; let cur=''; let quoted=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){
        if(quoted && line[i+1]==='"'){cur+='"'; i++;}
        else quoted=!quoted;
      } else if((ch===',' || ch==='，') && !quoted){ out.push(cur.trim()); cur=''; }
      else cur += ch;
    }
    out.push(cur.trim());
    return out;
  }

      if(parts.length < 2) return null;
      return { id: idx+1, question: parts[0], answer: parts[1], options: parts.slice(1), open: parts.length <= 2 };
    }).filter(Boolean);
  }

        o.frequency.setValueAtTime(220, now); o.frequency.exponentialRampToValueAtTime(120, now+.16);
      }else if(type==='jump'){

    }catch(e){}
  }

  function createLevel(levelIndex){
    const w = 1720 + levelIndex * 95;
    seed = (levelIndex+1) * 7919 + settings.difficulty.length * 101;
    const groundY = 470;
    const platforms = [{x:0,y:groundY,w:w,h:80,type:'ground'}];
    const difficultyMap = {easy:0, normal:1, hard:2};
    const d = difficultyMap[settings.difficulty] || 1;
    const platformCount = 5 + levelIndex + d*2;
    let x = 240;
    for(let i=0;i<platformCount;i++){
      const pw = 130 + Math.floor(rand()*120) - d*10;
      const py = 360 - Math.floor(rand()*150) + (i%2)*30;
      platforms.push({x:x,y:clamp(py,220,405),w:clamp(pw,90,220),h:22,type:'platform'});
      x += 180 + Math.floor(rand()*135) + d*15;
      if(x > w-360) break;
    }
    const spikes = [];
    const spikeCount = 3 + d*2 + Math.floor(levelIndex/2);
    for(let i=0;i<spikeCount;i++){
      const sx = 360 + Math.floor(rand()*(w-700));
      spikes.push({x:sx,y:groundY-24,w:46,h:24});
    }
    const coins = [];
    for(let i=0;i<6+levelIndex;i++){
      coins.push({x:220 + Math.floor(rand()*(w-500)), y:250+Math.floor(rand()*150), r:10, taken:false});
    }
    level = {
      index:levelIndex,
      width:w, height:540,
      groundY,
      platforms,
      spikes,
      coins,
      gate:{x:w-130,y:groundY-96,w:70,h:96,opened:false},
      checkpoint:{x:Math.floor(w*.55), y:groundY-70, hit:false}

  }

  function resetPlayer(toCheckpoint=false){
    const startX = toCheckpoint && level?.checkpoint?.hit ? level.checkpoint.x : 50;

  function update(dt){
    if(!running || paused || !level || !player) return;
    const left = keys.left || mobileKeys.left;
    const right = keys.right || mobileKeys.right;
    const doJump = jumpQueued;
    jumpQueued = false;
    const speed = settings.difficulty === 'hard' ? 245 : settings.difficulty === 'easy' ? 215 : 230;
    const gravity = 1250;
    const jumpV = settings.difficulty === 'hard' ? -535 : settings.difficulty === 'easy' ? -520 : -530;
    const secondJumpV = settings.difficulty === 'hard' ? -505 : -500;
    player.vx = 0;
    if(left){ player.vx = -speed; player.face = -1; }
    if(right){ player.vx = speed; player.face = 1; }
    if(doJump){
      if(player.onGround){
        player.vy = jumpV;
        player.onGround = false;
        player.jumpsUsed = 1;
        beep('jump');
      }else if(player.jumpsUsed < 2){
        player.vy = secondJumpV;
        player.jumpsUsed = 2;
        beep('jump');
      }
    }
    player.vy += gravity * dt;
    player.x += player.vx * dt;
    collideX();
    player.y += player.vy * dt;
    collideY();
    player.x = clamp(player.x, 0, level.width - player.w);
    if(player.y > 700){ damagePlayer('fall'); }
    for(const coin of level.coins){
      if(!coin.taken && rectCircle(player,coin)){ coin.taken=true; player.coins++; activeTeam().score += 1; beep('ok'); renderScoreboard(); }
    }
    if(!level.checkpoint.hit && rects(player,{x:level.checkpoint.x,y:level.checkpoint.y,w:26,h:70})){ level.checkpoint.hit=true; flash(t('checkpoint')); beep('ok'); }
    for(const sp of level.spikes){ if(player.inv<=0 && rects(player,sp)){ damagePlayer('spike'); break; } }
    if(player.inv>0) player.inv -= dt;
    if(rects(player, level.gate)){ openQuestion(); }
    cameraX = clamp(player.x - 300, 0, Math.max(0, level.width - 960));
  }

  function collideX(){
    for(const p of level.platforms){
      if(rects(player,p)){
        if(player.vx > 0) player.x = p.x - player.w;
        if(player.vx < 0) player.x = p.x + p.w;
      }
    }
  }
  function collideY(){
    player.onGround = false;
    for(const p of level.platforms){
      if(rects(player,p)){
        if(player.vy > 0){ player.y = p.y - player.h; player.vy = 0; player.onGround=true; player.jumpsUsed=0; }

    const cx = clamp(c.x, r.x, r.x+r.w), cy = clamp(c.y, r.y, r.y+r.h);
    const dx=c.x-cx, dy=c.y-cy;
    return dx*dx+dy*dy < c.r*c.r;
  }

    for(let i=0;i<16;i++){ ctx.beginPath(); ctx.arc((i*81)%W,80+(i*47)%360,20+(i%4)*9,0,Math.PI*2); ctx.fill(); }
    ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='900 42px system-ui'; ctx.fillText(t('title'), W/2, 220);
    ctx.font='500 20px system-ui'; ctx.fillStyle='rgba(255,255,255,.78)'; ctx.fillText(t('subtitle'), W/2, 265);
    ctx.font='800 18px system-ui'; ctx.fillStyle='#fbbf24'; ctx.fillText(t('controlHint'), W/2, 320);
  }
  function drawCloud(x,y){
    ctx.fillStyle='rgba(255,255,255,.8)';
    ctx.beginPath(); ctx.arc(x,y,22,0,Math.PI*2); ctx.arc(x+22,y-10,28,0,Math.PI*2); ctx.arc(x+54,y,24,0,Math.PI*2); ctx.arc(x+30,y+8,25,0,Math.PI*2); ctx.fill();
  }
  function drawPlatform(p){
    if(p.type==='ground'){
      ctx.fillStyle='#3f8f46'; ctx.fillRect(p.x,p.y,p.w,p.h);
      ctx.fillStyle='#60b15c'; ctx.fillRect(p.x,p.y,p.w,18);
      ctx.fillStyle='rgba(0,0,0,.12)';
      for(let x=p.x; x<p.x+p.w; x+=42) ctx.fillRect(x,p.y+18,22,8);
    }else{
      ctx.fillStyle='#92400e'; roundRect(ctx,p.x,p.y,p.w,p.h,8); ctx.fill();
      ctx.fillStyle='#f59e0b'; roundRect(ctx,p.x,p.y,p.w,8,5); ctx.fill();
    }
  }
  function drawCoin(c){
    ctx.fillStyle='#fbbf24'; ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(146,64,14,.4)'; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle='#fff7'; ctx.beginPath(); ctx.arc(c.x-3,c.y-4,3,0,Math.PI*2); ctx.fill();
  }
  function drawSpike(s){
    ctx.fillStyle='#475569';
    ctx.beginPath(); ctx.moveTo(s.x,s.y+s.h); ctx.lineTo(s.x+s.w/2,s.y); ctx.lineTo(s.x+s.w,s.y+s.h); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#0f172a55'; ctx.stroke();
  }
  function drawCheckpoint(cp){
    ctx.fillStyle=cp.hit?'#22c55e':'#f97316'; ctx.fillRect(cp.x, cp.y, 7, 70);
    ctx.beginPath(); ctx.moveTo(cp.x+7,cp.y); ctx.lineTo(cp.x+55,cp.y+14); ctx.lineTo(cp.x+7,cp.y+28); ctx.closePath(); ctx.fill();
  }
  function drawGate(g){
    ctx.fillStyle='#7c2d12'; roundRect(ctx,g.x,g.y,g.w,g.h,12); ctx.fill();
    ctx.fillStyle='#fbbf24'; roundRect(ctx,g.x+9,g.y+12,g.w-18,g.h-18,10); ctx.fill();
    ctx.fillStyle='#7c2d12'; ctx.fillRect(g.x+16,g.y+24,g.w-32,g.h-30);
    ctx.fillStyle='#fff'; ctx.font='900 18px system-ui'; ctx.textAlign='center'; ctx.fillText('?', g.x+g.w/2, g.y+58);
    ctx.fillStyle='#f8fafc'; ctx.font='800 12px system-ui'; ctx.fillText(t('door'), g.x+g.w/2, g.y-8);
  }
  function drawPlayer(p,color){
    if(!p) return;
    ctx.save();
    ctx.globalAlpha = p.inv>0 && Math.floor(performance.now()/90)%2 ? .45 : 1;
    const x=p.x,y=p.y;
    // shadow
    ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(x+p.w/2,y+p.h+5,22,7,0,0,Math.PI*2); ctx.fill();
    // body
    ctx.fillStyle=color; roundRect(ctx,x+4,y+16,26,28,10); ctx.fill();
    // head
    ctx.fillStyle='#fed7aa'; ctx.beginPath(); ctx.arc(x+17,y+12,14,0,Math.PI*2); ctx.fill();
    // cap
    ctx.fillStyle=color; ctx.beginPath(); ctx.arc(x+17,y+7,14,Math.PI,0); ctx.fill(); ctx.fillRect(x+7,y+6,25,6);
    // eye
    ctx.fillStyle='#111827'; ctx.beginPath(); ctx.arc(x+(p.face>0?22:12),y+12,2.4,0,Math.PI*2); ctx.fill();
    // legs
    ctx.fillStyle='#1e293b'; ctx.fillRect(x+8,y+40,8,8); ctx.fillRect(x+20,y+40,8,8);
    ctx.restore();
  }
  function drawMiniMap(){
    if(!level || !player) return;
    const x=24,y=20,w=220,h=12;
    ctx.fillStyle='rgba(15,23,42,.55)'; roundRect(ctx,x-8,y-8,w+16,30,13); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.35)'; roundRect(ctx,x,y,w,h,8); ctx.fill();
    const px = x + (player.x / level.width) * w;
    const gx = x + (level.gate.x / level.width) * w;
    ctx.fillStyle=activeTeam()?.color || '#fbbf24'; ctx.beginPath(); ctx.arc(px,y+h/2,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fbbf24'; ctx.fillRect(gx-2,y-6,4,h+12);
  }
  function roundRect(ctx,x,y,w,h,r){
    r=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }

  function openQuestion(){
    if(paused || !running) return;
    paused = true;
    const team = activeTeam();
    currentQuestion = getQuestionForLevel(team.levelIndex);
    els.questionModal.classList.add('show');
    els.questionTitle.textContent = t('openQuestion');
    els.questionMeta.textContent = `${team.name} · ${t('level')} ${team.levelIndex+1}/${settings.levelCount}`;
    els.questionText.textContent = currentQuestion.question;
    els.resultMsg.textContent = '';
    els.options.innerHTML = '';
    els.openAnswer.style.display = 'none';
    els.teacherJudge.style.display = 'none';
    updateStatus(t('pausedForQuestion'));

    if(currentQuestion.open){
      els.openAnswer.style.display = 'flex';
      els.teacherJudge.style.display = 'flex';
      els.answerInput.placeholder = t('typeAnswer');
      els.answerInput.value = '';
      setTimeout(()=>els.answerInput.focus(),80);
    } else {
      els.questionMeta.textContent += ' · ' + t('chooseAnswer');
      const opts = shuffle(currentQuestion.options);
      els.options.innerHTML = opts.map(opt=>`<button class="optionBtn" data-answer="${escapeHtml(opt)}">${escapeHtml(opt)}</button>`).join('');
      $$('.optionBtn').forEach(btn => btn.addEventListener('click', () => checkAnswer(btn.getAttribute('data-answer'))));
    }
    startQuestionTimer();
  }

  function startQuestionTimer(){
    clearInterval(qTimer);
    qRemaining = settings.questionSeconds;
    els.questionTimer.textContent = qRemaining ? qRemaining + 's' : '--';
    if(!qRemaining) return;
    qTimer = setInterval(()=>{
      qRemaining--;
      els.questionTimer.textContent = qRemaining + 's';
      if(qRemaining <= 0){ clearInterval(qTimer); handleWrong(true); }
    },1000);
  }
  function checkAnswer(answer){
    if(!currentQuestion) return;
    if(normalize(answer) === normalize(currentQuestion.answer)) handleCorrect();
    else handleWrong(false);
  }
  function submitOpenAnswer(){
    const ans = els.answerInput.value;
    if(normalize(ans) === normalize(currentQuestion.answer)) handleCorrect();
    else {
      els.resultMsg.textContent = `${t('wrong')} ${t('answerIs')}：${currentQuestion.answer}`;
      // Do not immediately close, allow teacher to override if needed.
      beep('bad');
    }
  }
  function handleCorrect(){
    clearInterval(qTimer);
    const team = activeTeam();
    team.score += 10;
    team.levelIndex += 1;
    els.resultMsg.textContent = t('correct');
    beep('ok');
    renderScoreboard();
    setTimeout(()=>{
      els.questionModal.classList.remove('show');
      if(team.levelIndex >= settings.levelCount){
        team.finished = true; team.score += 20; flash(t('completed')); beep('ok'); renderScoreboard();
        if(!teams.some(tm=>!tm.finished && !tm.defeated)){ endGame(t('completed')); return; }
        if(settings.correctPolicy === 'continue'){
          const idx = nextActiveTeam(currentTeamIndex);
          if(idx>=0) currentTeamIndex = idx;
          beginTurn(false);
        } else switchTeam();
      } else {
        if(settings.correctPolicy === 'continue') beginTurn(false);
        else switchTeam();
      }
    }, 900);
  }
  function handleWrong(isTime=false){
    clearInterval(qTimer);
    const team = activeTeam();
    if(settings.wrongPenalty) team.score = Math.max(0, team.score - 2);
    team.hearts = Math.max(0, team.hearts - 1);
    els.resultMsg.textContent = isTime ? t('timeUp') : t('wrong');
    beep('bad');
    renderScoreboard();
    setTimeout(()=>{
      els.questionModal.classList.remove('show');
      if(team.hearts <= 0){ team.defeated = true; renderScoreboard(); }
      if(!teams.some(tm=>!tm.finished && !tm.defeated)){ endGame(t('noActiveTeam')); return; }
      if(settings.wrongPolicy === 'continue' && !team.defeated) beginTurn(false);
      else switchTeam();
    }, 900);
  }

  function endGame(reason=''){
    running = false; paused = true;
    clearInterval(totalTimer); clearInterval(qTimer);
    els.questionModal.classList.remove('show');
    const sorted = teams.slice().sort((a,b)=> (b.finished-a.finished) || b.levelIndex-a.levelIndex || b.score-a.score || b.hearts-a.hearts);
    const winner = sorted[0];
    els.winnerText.textContent = `${t('finalWinner')}：${winner ? winner.name : '-'}${reason ? ' · ' + reason : ''}`;
    els.rankList.innerHTML = sorted.map((team,i)=>`<div class="rankItem">
      <div class="rankLeft">${i+1}. <span style="color:${team.color}">●</span> ${escapeHtml(team.name)}</div>
      <div class="rankRight">${t('score')}: ${team.score} · ${t('progress')}: ${Math.min(team.levelIndex,settings.levelCount)}/${settings.levelCount} · ${t('hp')}: ${team.hearts}</div>
    </div>`).join('');
    els.endModal.classList.add('show');
    renderScoreboard();
    draw();
  }

  function restartGame(){ startGame(); }

  function gameLoop(ts){
    const dt = Math.min(.033, (ts - lastTimestamp) / 1000 || .016);
    lastTimestamp = ts;
    update(dt);
    draw();
    requestAnimationFrame(gameLoop);
  }

  // Events
  els.langSelect.addEventListener('change', e=>{ lang=e.target.value; localStorage.setItem('platformQuizLang',lang); applyI18n(); });
  els.startBtn.addEventListener('click', startGame);
  els.restartBtn.addEventListener('click', () => { if(confirm(t('restart')+'?')) restartGame(); });
  els.endBtn.addEventListener('click', () => { if(running) endGame(t('gameOver')); });
  els.showSettingsBtn.addEventListener('click', () => { els.settingsPanel.classList.toggle('hidden'); els.layout.classList.toggle('playing', els.settingsPanel.classList.contains('hidden')); });
  els.loadDemoBtn.addEventListener('click', () => { els.questionBank.value = DEFAULT_BANK; saveSettings(); showToast(t('demoLoaded')); });
  els.clearBtn.addEventListener('click', () => { els.questionBank.value=''; saveSettings(); });
  els.exportBtn.addEventListener('click', () => {
    const blob = new Blob([els.questionBank.value], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'platform_quiz_questions.txt'; a.click(); URL.revokeObjectURL(a.href);
  });
  els.importFile.addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader(); reader.onload = () => { els.questionBank.value = String(reader.result||''); saveSettings(); showToast(t('imported')); }; reader.readAsText(file);
  });
  els.fullscreenBtn.addEventListener('click', () => {
    if(!document.fullscreenElement) document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.();
  });
  ['teamCount','levelCount','timeLimit','questionSeconds','hearts','difficulty','correctPolicy','wrongPolicy','wrongPenalty','soundOn','questionBank'].forEach(id => els[id].addEventListener('change', saveSettings));
  els.submitAnswerBtn.addEventListener('click', submitOpenAnswer);
  els.answerInput.addEventListener('keydown', e=>{ if(e.key==='Enter') submitOpenAnswer(); });
  els.judgeCorrectBtn.addEventListener('click', handleCorrect);
  els.judgeWrongBtn.addEventListener('click', () => handleWrong(false));
  els.showAnswerBtn.addEventListener('click', () => { els.resultMsg.textContent = `${t('answerIs')}：${currentQuestion?.answer || ''}`; });
  els.closeEndBtn.addEventListener('click', ()=>els.endModal.classList.remove('show'));
  els.playAgainBtn.addEventListener('click', startGame);
  els.editSettingsBtn.addEventListener('click', ()=>{ els.endModal.classList.remove('show'); els.settingsPanel.classList.remove('hidden'); els.layout.classList.remove('playing'); });

  document.addEventListener('keydown', e=>{
    if(['ArrowLeft','ArrowRight','ArrowUp','Space'].includes(e.code)) e.preventDefault();
    if(e.code==='ArrowLeft' || e.code==='KeyA') keys.left=true;
    if(e.code==='ArrowRight' || e.code==='KeyD') keys.right=true;
    if(e.code==='Space' || e.code==='ArrowUp' || e.code==='KeyW'){
      if(!keys.jump && !e.repeat) jumpQueued = true;
      keys.jump=true;
    }
  }, {passive:false});
  document.addEventListener('keyup', e=>{
    if(e.code==='ArrowLeft' || e.code==='KeyA') keys.left=false;
    if(e.code==='ArrowRight' || e.code==='KeyD') keys.right=false;
    if(e.code==='Space' || e.code==='ArrowUp' || e.code==='KeyW') keys.jump=false;
  });
  $$('.padBtn').forEach(btn=>{
    const key=btn.dataset.pad;
    const on=ev=>{ev.preventDefault(); if(key==='jump' && !mobileKeys[key]) jumpQueued = true; mobileKeys[key]=true;};
    const off=ev=>{ev.preventDefault(); mobileKeys[key]=false;};
    btn.addEventListener('pointerdown',on); btn.addEventListener('pointerup',off); btn.addEventListener('pointerleave',off); btn.addEventListener('pointercancel',off);
  });

  loadSaved();
  applyI18n();
  renderScoreboard();
  requestAnimationFrame(gameLoop);
})();
</script>

<script>
(function(){

  const TARGET_TEXTAREA_IDS = ["questionBank"];
  const SAMPLE_BUTTON_IDS = ["loadDemoBtn"];
  const SAMPLE_URL = 'question-bank-example.txt?v=sample-loader-fixed-20260627';
  function $(id){ return document.getElementById(id); }
  function cleanSampleText(text){
    return String(text || '')
      .replace(/
/g,'
')
      .split('
')
      .map(line => line.trim())
      .filter(line => line && !line.startsWith('#'))
      .join('
');
  }
  function findBankField(){
    for (const id of TARGET_TEXTAREA_IDS){
      const el = $(id);
      if (el && ('value' in el)) return el;
    }
    return document.querySelector('textarea');
  }
  async function getBuiltInSampleText(){
    try {
      const res = await fetch(SAMPLE_URL, { cache:'no-store' });
      if (res && res.ok) {
        const text = await res.text();
        if (cleanSampleText(text)) return text;
      }
    } catch(e) {}
    return SAMPLE_TEXT;
  }
  function afterFill(field){
    try { field.dispatchEvent(new Event('input', { bubbles:true })); } catch(e) {}
    try { field.dispatchEvent(new Event('change', { bubbles:true })); } catch(e) {}
    try {
      if (field.id === 'textItems') {
        const mode = $('mode'); if (mode) mode.value = 'text';
        const lines = cleanSampleText(field.value).split('
');
        const categories = [];
        lines.forEach(line => {
          const parts = line.split('|').map(x => x.trim()).filter(Boolean);
          if (parts[1] && !categories.includes(parts[1])) categories.push(parts[1]);
        });
        if (categories.length) {
          try { cats = categories; } catch(e) {}
          const catCount = $('catCount'); if (catCount) catCount.value = String(Math.min(Math.max(categories.length,2),5));
          try { if (typeof renderCats === 'function') renderCats(); } catch(e) {}
        }
        try { if (typeof buildItems === 'function') buildItems(false); } catch(e) {}
        try { if (typeof renderPreview === 'function') renderPreview(); } catch(e) {}
      }
      if (field.id === 'wordBank') { try { if (typeof applyBank === 'function') applyBank(true); } catch(e) {} }
      try { if (typeof saveSettings === 'function') saveSettings(); } catch(e) {}
      try { if (typeof renderPreview === 'function') renderPreview(); } catch(e) {}
      try { if (typeof renderItems === 'function') renderItems(); } catch(e) {}
      try { if (typeof setMessage === 'function') setMessage('已载入内置题库范例 / Built-in sample loaded / Contoh terbina telah dimuat'); } catch(e) {}
      try { if (typeof toast === 'function') toast('已载入内置题库范例'); } catch(e) {}
    } catch(e) { console.warn('Sample after-fill warning:', e); }
  }
  async function loadBuiltInSampleQuestionBank(event){
    if (event) { event.preventDefault(); event.stopPropagation(); event.stopImmediatePropagation(); }
    const field = findBankField();
    if (!field) return;
    const sampleText = cleanSampleText(await getBuiltInSampleText());
    if (!sampleText) return;
    field.value = sampleText;
    afterFill(field);
  }
  window.loadBuiltInSampleQuestionBank = loadBuiltInSampleQuestionBank;
  SAMPLE_BUTTON_IDS.forEach(id => {
    const btn = $(id);
    if (btn && !btn.dataset.sampleLoaderFixed) {
      btn.dataset.sampleLoaderFixed = '1';
      btn.addEventListener('click', loadBuiltInSampleQuestionBank, true);

  });
})();
</script>

function setupTeams(reset=true){let n=Number($('teamCount').value)||2, old=state.teams;state.teams=Array.from({length:n},(_,i)=>({key:TEAM_KEYS[i],color:COLORS[i],pos:reset?0:(old[i]?.pos||0),score:reset?0:(old[i]?.score||0),rounds:reset?0:(old[i]?.rounds||0)}));if(state.current>=state.teams.length)state.current=0} function teamName(i){return t(state.teams[i]?.key||TEAM_KEYS[i])} function current(){return state.teams[state.current]} function nextIdx(){return (state.current+1)%state.teams.length}

function renderMap(){let total=Number($('stageCount').value)||10,map=$('map');map.querySelectorAll('.node,.teamRobot').forEach(x=>x.remove());let vertical=document.body.classList.contains('ratio-34')||document.body.classList.contains('ratio-916')||innerWidth<640;for(let i=0;i<total;i++){let n=document.createElement('div');n.className='node';n.textContent=i+1;let x,y;if(vertical){x=50;y=8+i*(84/(total-1))}else{x=7+i*(86/(total-1));y=50 + (i%2?12:-12)}n.style.left=x+'%';n.style.top=y+'%';if(state.teams.some(tm=>tm.pos>i))n.classList.add('done');if(current()&&current().pos===i)n.classList.add('current');map.appendChild(n)}state.teams.forEach((tm,i)=>{let r=document.createElement('div');r.className='teamRobot';r.textContent=['🤖','🚀','🛡️','⭐'][i]||'🤖';r.style.background=tm.color;let p=tm.pos,x,y;if(vertical){x=50+(i-1.5)*7;y=8+p*(84/(total-1))}else{x=7+p*(86/(total-1));y=50+(p%2?12:-12)+(i-1.5)*7}r.style.left=x+'%';r.style.top=y+'%';map.appendChild(r)})}

function startGame(){save();parseQuestions();setupTeams(true);state.started=true;state.locked=false;state.current=0;state.qIndex=0;state.timeLeft=Number($('timeLimit').value)||0;$('layout').classList.add('playing');$('layout').classList.remove('showSettings');clearInterval(state.timer);if(state.timeLeft>0){state.timer=setInterval(()=>{state.timeLeft--;renderHud();if(state.timeLeft<=0)endGame(t('timeUp'))},1000)}newTurn();playSound('start')}

function bind(){$('langSelect').onchange=()=>{applyLanguage();save()};$('ratioSelect').onchange=()=>{setRatio($('ratioSelect').value);renderMap();save()};['teamCount','timeLimit','stageCount','questionMode','wrongPolicy','turnAfter','soundSelect'].forEach(id=>$(id).onchange=()=>{if(!state.started){setupTeams(true);state.timeLeft=Number($('timeLimit').value)||0;renderAll()}save()});$('questionBank').oninput=save;$('sampleBtn').onclick=()=>{$('questionBank').value=SAMPLE[state.lang]||SAMPLE.zh;save()};$('importBtn').onclick=()=>$('fileInput').click();$('fileInput').onchange=importTxt;$('exportBtn').onclick=exportTxt;$('startBtn').onclick=startGame;$('resetBtn').onclick=()=>{if(confirm(t('reset')+'?'))resetGame()};$('showSettingsBtn').onclick=()=>$('layout').classList.toggle('showSettings');$('fsBtn').onclick=fs;$('modalClose').onclick=closeModal;$('modalBackdrop').onclick=e=>{if(e.target===$('modalBackdrop'))closeModal()};window.addEventListener('resize',renderMap)}

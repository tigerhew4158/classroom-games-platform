<style>
:root{--bg:#07111f;--bg2:#0f766e;--panel:rgba(15,23,42,.84);--line:rgba(255,255,255,.14);--text:#f8fafc;--muted:#cbd5e1;--accent:#facc15;--good:#22c55e;--bad:#ef4444;--blue:#38bdf8}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 20% 12%,rgba(45,212,191,.25),transparent 28%),linear-gradient(135deg,#031525,#064e3b 58%,#0f766e)}
button,input,textarea,select{font:inherit}.app{height:100vh;width:min(1520px,98vw);margin:0 auto;padding:12px;display:grid;grid-template-rows:auto 1fr;gap:10px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--line);background:rgba(15,23,42,.74);border-radius:20px;box-shadow:0 14px 34px rgba(0,0,0,.28)}
.brand{display:flex;align-items:center;gap:12px}.logo{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;font-size:30px;background:linear-gradient(135deg,#22c55e,#38bdf8,#facc15)}
h1{margin:0;font-size:clamp(22px,2.5vw,36px);line-height:1.05}.sub{font-size:13px;color:var(--muted);margin-top:4px}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{border:0;border-radius:13px;padding:9px 12px;font-weight:900;cursor:pointer;background:var(--accent);color:#111827;box-shadow:0 8px 18px rgba(0,0,0,.18)}.btn.secondary{background:#334155;color:#fff;border:1px solid var(--line);box-shadow:none}.btn.good{background:var(--good);color:#052e16}.btn.bad{background:var(--bad);color:#fff}.btn.blue{background:var(--blue);color:#062033}
.input,.select{border:1px solid rgba(255,255,255,.15);background:#08111f;color:#fff;border-radius:12px;padding:9px 10px;width:100%}
.main{min-height:0;display:grid;grid-template-columns:300px 1fr 310px;gap:10px}.panel{min-height:0;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:12px;box-shadow:0 14px 34px rgba(0,0,0,.22);overflow:hidden}
.section{padding:10px;border-radius:15px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);margin-bottom:10px}.section-title{font-size:14px;color:#e2e8f0;font-weight:900;margin-bottom:8px}.help{font-size:13px;line-height:1.55;color:var(--muted)}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.score-card{padding:10px;border-radius:15px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08)}.score-card b{font-size:26px;display:block}.score-card span{font-size:12px;color:var(--muted)}
.game{min-height:0;display:grid;grid-template-rows:auto 1fr auto;gap:10px}.statusbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;border-radius:16px;background:rgba(15,23,42,.72);border:1px solid var(--line)}.timer{font-size:28px;font-weight:950;color:var(--accent)}.round{font-weight:950}.hint{font-size:13px;color:var(--muted)}
.conveyor-wrap{position:relative;min-height:0;border-radius:24px;border:1px solid rgba(255,255,255,.14);overflow:hidden;background:linear-gradient(180deg,rgba(15,23,42,.66),rgba(3,7,18,.25)),repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 18px,rgba(255,255,255,.02) 18px 36px)}
.conveyor-line{position:absolute;left:24px;right:24px;top:50%;height:112px;transform:translateY(-50%);border-radius:24px;background:repeating-linear-gradient(90deg,#334155 0 36px,#1e293b 36px 72px);border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 0 20px rgba(0,0,0,.35);animation:belt 1.8s linear infinite}@keyframes belt{from{background-position:0 0}to{background-position:72px 0}}

.dropzones{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(145px,1fr))}
.dropzone{
  min-height:96px;border-radius:20px;
  background:linear-gradient(180deg,rgba(15,23,42,.92),rgba(30,41,59,.96));
  border:2px solid rgba(255,255,255,.18);
  display:grid;place-items:center;text-align:center;padding:12px 10px;
  font-weight:950;font-size:clamp(20px,2.1vw,30px);line-height:1.15;
  color:#f8fafc;text-shadow:0 2px 6px rgba(0,0,0,.45);
  cursor:pointer;transition:.15s transform,.15s background,.15s box-shadow,.15s border-color;
  box-shadow:0 10px 22px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.05);
}
.dropzone:hover{
  transform:translateY(-3px);
  background:linear-gradient(180deg,rgba(8,47,73,.96),rgba(14,116,144,.8));
  border-color:rgba(125,211,252,.72);
  box-shadow:0 14px 28px rgba(0,0,0,.32), 0 0 0 3px rgba(56,189,248,.12);
}
.dropzone:active{transform:translateY(0) scale(.985)}
.dropzone.good{border-color:rgba(34,197,94,.92);background:linear-gradient(180deg,rgba(20,83,45,.96),rgba(34,197,94,.34));color:#ecfdf5}
.dropzone.bad{border-color:rgba(239,68,68,.92);background:linear-gradient(180deg,rgba(127,29,29,.96),rgba(239,68,68,.28));color:#fff1f2}
.item-list{height:100%;display:grid;grid-template-rows:auto 1fr;gap:10px}

.mini{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:14px;
  background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.1);font-size:13px;color:#e2e8f0;
}
.mini b{display:block;color:#f8fafc;font-size:14px;line-height:1.2;margin-bottom:2px}
.mini span{color:#cbd5e1}
.thumb{width:46px;height:36px;background:#020617 center/cover no-repeat;border-radius:9px;flex:0 0 auto;border:1px solid rgba(255,255,255,.1);color:#f8fafc;font-weight:900}
.setup{position:fixed;inset:0;background:rgba(2,6,23,.92);z-index:20;display:grid;place-items:center;padding:18px}.setup-card{width:min(1180px,96vw);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 28px 80px rgba(0,0,0,.5)}.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.wide{grid-column:1/-1}.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}.cat-box{padding:10px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}.cat-box label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}.preview-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:8px;max-height:190px;overflow:auto}.preview{border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:6px;font-size:11px}.preview-img{height:62px;border-radius:8px;background:#020617 center/cover no-repeat;margin-bottom:5px;display:grid;place-items:center;font-weight:900}
.win{position:fixed;inset:0;background:rgba(2,6,23,.88);z-index:40;display:grid;place-items:center;text-align:center;padding:20px}.win-card{width:min(760px,94vw);background:linear-gradient(135deg,rgba(34,197,94,.22),rgba(56,189,248,.16));border:1px solid rgba(34,197,94,.38);border-radius:28px;padding:28px}.win h2{font-size:42px;margin:0 0 8px}.hidden{display:none!important}
@media(max-width:1100px){.main{grid-template-columns:270px 1fr}.panel.right{display:none}.item-card{width:min(420px,70vw)}}@media(max-width:760px){html,body{overflow:auto}.app{height:auto}.main{grid-template-columns:1fr}.setup-grid{grid-template-columns:1fr}.wide{grid-column:auto}.conveyor-wrap{height:360px}}
</style>
</head>

<script>

 zh:{title:"图片分类运输带",subtitle:"老师上传图片题目，学生把运输带上的图片分类到正确区域。",setup:"设置题库",fullscreen:"全屏",restart:"重开",setupTitle:"图片分类运输带｜老师设置",setupHelp:"老师可以设定分类名称，然后按分类顺序上传图片。学生看到运输带上的图片后，点击正确的分类区域。也可以切换成文字分类模式。",scoreTitle:"成绩",score:"分数",left:"剩余",correct:"正确",wrong:"错误",ruleTitle:"玩法说明",ruleText:"图片会一张一张出现在运输带上。学生需要判断图片属于哪一个类别，并点击下方正确分类区。答对加分，答错扣分。",round:"题目",hint:"请选择下方正确的分类区域。",listTitle:"题目清单",buildCats:"生成分类上传区",loadSample:"载入示范",start:"开始游戏",preview:"预览题目",category:"分类",upload:"上传图片",catName:"分类名称",again:"再玩一次",finish:"完成！",finalScore:"最终得分",noItems:"请先上传图片，或载入示范题目。",textPlaceholder:"文字分类格式：题目 | 正确分类\\n例如：苹果 | 水果",imageMode:"图片分类",textMode:"文字分类"},
 en:{title:"Image Classification Conveyor",subtitle:"Teachers upload images. Students classify each conveyor image into the correct category.",setup:"Question settings",fullscreen:"Fullscreen",restart:"Restart",setupTitle:"Image Classification Conveyor | Teacher Settings",setupHelp:"Set category names, then upload images under each category in order. Students see one image at a time on the conveyor and click the correct category. Text classification is also supported.",scoreTitle:"Score",score:"Score",left:"Left",correct:"Correct",wrong:"Wrong",ruleTitle:"How to play",ruleText:"Images appear on the conveyor one by one. Students choose the correct category zone. Correct answers add points; wrong answers deduct points.",round:"Item",hint:"Choose the correct category below.",listTitle:"Item list",buildCats:"Build upload boxes",loadSample:"Load sample",start:"Start game",preview:"Item preview",category:"Category",upload:"Upload images",catName:"Category name",again:"Play again",finish:"Finished!",finalScore:"Final score",noItems:"Please upload images or load sample items first.",textPlaceholder:"Text format: Item | Correct category\\nExample: Apple | Fruit",imageMode:"Image classification",textMode:"Text classification"},
 ms:{title:"Tali Sawat Klasifikasi Gambar",subtitle:"Guru memuat naik gambar. Murid mengelaskan gambar pada tali sawat ke kategori yang betul.",setup:"Tetapan soalan",fullscreen:"Skrin penuh",restart:"Mula semula",setupTitle:"Tali Sawat Klasifikasi Gambar | Tetapan Guru",setupHelp:"Tetapkan nama kategori, kemudian muat naik gambar mengikut kategori. Murid melihat satu gambar pada tali sawat dan klik kategori yang betul. Mod teks juga disokong.",scoreTitle:"Markah",score:"Markah",left:"Baki",correct:"Betul",wrong:"Salah",ruleTitle:"Cara bermain",ruleText:"Gambar muncul satu demi satu pada tali sawat. Murid klik zon kategori yang betul. Jawapan betul tambah markah; jawapan salah tolak markah.",round:"Item",hint:"Pilih kategori yang betul di bawah.",listTitle:"Senarai item",buildCats:"Bina ruang muat naik",loadSample:"Muat contoh",start:"Mula permainan",preview:"Pratonton item",category:"Kategori",upload:"Muat naik gambar",catName:"Nama kategori",again:"Main lagi",finish:"Selesai!",finalScore:"Markah akhir",noItems:"Sila muat naik gambar atau muat item contoh dahulu.",textPlaceholder:"Format teks: Item | Kategori betul\\nContoh: Epal | Buah",imageMode:"Klasifikasi gambar",textMode:"Klasifikasi teks"}
};
let lang=new URLSearchParams(location.search).get("lang")||localStorage.getItem("classify_lang")||"zh";
let items=[],queue=[],current=null,cats=[],score=0,correct=0,wrong=0,index=0,timerId=null,endAt=0,started=false;
const $=s=>document.querySelector(s);function T(k){return(I18N[lang]||I18N.zh)[k]||k}
function applyLang(){document.documentElement.lang=lang==="zh"?"zh-Hans":lang;document.title=T("title");["title","subtitle","setupTitle","setupHelp","scoreTitle","ruleTitle","ruleText","listTitle"].forEach(id=>$("#"+id).textContent=T(id));$("#previewTitle").textContent=T("preview");$("#setupBtn").textContent=T("setup");$("#fullBtn").textContent=T("fullscreen");$("#resetBtn").textContent=T("restart");$("#buildCatsBtn").textContent=T("buildCats");$("#loadSampleBtn").textContent=T("loadSample");$("#startBtn").textContent=T("start");$("#againBtn").textContent=T("again");$("#scoreLabel").textContent=T("score");$("#leftLabel").textContent=T("left");$("#correctLabel").textContent=T("correct");$("#wrongLabel").textContent=T("wrong");$("#hintText").textContent=T("hint");$("#textItems").placeholder=T("textPlaceholder");$("#lang").value=lang;$("#setupLang").value=lang;renderCats();updateScore();}
function renderCats(){const n=Number($("#catCount").value||3),grid=$("#catGrid");const old=[...grid.querySelectorAll(".cat-name")].map(x=>x.value);grid.innerHTML="";for(let i=0;i<n;i++){const name=old[i]||defaultCat(i);const box=document.createElement("div");box.className="cat-box";box.innerHTML=`<label>${T("catName")} ${i+1}</label><input class="input cat-name" value="${name}"><label style="margin-top:8px">${T("upload")}</label><input class="input cat-file" type="file" accept="image/*" multiple>`;grid.appendChild(box)}[...grid.querySelectorAll(".cat-file")].forEach(input=>input.onchange=()=>{buildItems(false);renderPreview();});}
function defaultCat(i){const zh=["水果","动物","交通","人物","其他"],en=["Fruit","Animal","Transport","People","Others"],ms=["Buah","Haiwan","Pengangkutan","Manusia","Lain-lain"];return (lang==="en"?en:lang==="ms"?ms:zh)[i]||`${T("category")} ${i+1}`}
function buildItems(showAlert=true){const mode=$("#mode").value;cats=[...document.querySelectorAll(".cat-name")].map(x=>x.value.trim()).filter(Boolean);let out=[];if(mode==="image"){[...document.querySelectorAll(".cat-box")].forEach((box,i)=>{const cat=box.querySelector(".cat-name").value.trim()||defaultCat(i);[...box.querySelector(".cat-file").files].forEach(f=>out.push({type:"image",name:f.name,cat,url:URL.createObjectURL(f)}));});}else{const rows=$("#textItems").value.split("\\n").map(x=>x.trim()).filter(Boolean);rows.forEach(row=>{const p=row.split("|").map(x=>x.trim());if(p.length>=2)out.push({type:"text",name:p[0],cat:p[1],url:""});});cats=[...new Set(out.map(x=>x.cat))];}items=out;if(showAlert&&!items.length)alert(T("noItems"));return items;}
function renderPreview(){const list=$("#previewList");list.innerHTML="";items.forEach(it=>{const div=document.createElement("div");div.className="preview";div.innerHTML=`<div class="preview-img" style="${it.type==="image"?`background-image:url('${it.url}')`:""}">${it.type==="text"?it.name:""}</div><b>${it.cat}</b><br><span>${it.name}</span>`;list.appendChild(div);});}
function loadSample(){cats=lang==="en"?["Fruit","Animal","Transport"]:lang==="ms"?["Buah","Haiwan","Pengangkutan"]:["水果","动物","交通"];$("#catCount").value="3";renderCats();$("#mode").value="text";$("#textItems").value=lang==="en"?"Apple | Fruit\\nCat | Animal\\nBus | Transport\\nBanana | Fruit\\nDog | Animal":lang==="ms"?"Epal | Buah\\nKucing | Haiwan\\nBas | Pengangkutan\\nPisang | Buah\\nAnjing | Haiwan":"苹果 | 水果\\n小猫 | 动物\\n巴士 | 交通\\n香蕉 | 水果\\n小狗 | 动物";buildItems(false);renderPreview();}
function start(){buildItems(true);if(!items.length)return;queue=$("#shuffleMode").value==="yes"?[...items].sort(()=>Math.random()-.5):[...items];score=0;correct=0;wrong=0;index=0;started=true;endAt=Date.now()+Number($("#timeLimit").value||180)*1000;$("#setup").classList.add("hidden");renderDropzones();renderMiniList();nextItem();timerId=setInterval(tick,200);updateScore();}
function tick(){const left=Math.max(0,endAt-Date.now());const s=Math.ceil(left/1000);$("#timer").textContent=`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;if(left<=0)finish();}
function renderDropzones(){$("#dropzones").innerHTML=cats.map(c=>`<button class="dropzone" data-cat="${c}">${c}</button>`).join("");document.querySelectorAll(".dropzone").forEach(btn=>btn.onclick=()=>answer(btn.dataset.cat,btn));}
function renderMiniList(){$("#miniList").innerHTML=queue.map(it=>`<div class="mini"><div class="thumb" style="${it.type==="image"?`background-image:url('${it.url}')`:"display:grid;place-items:center"}">${it.type==="text"?"T":""}</div><div><b>${it.name}</b><br><span>${it.cat}</span></div></div>`).join("")}
function nextItem(){if(index>=queue.length){finish();return;}current=queue[index];$("#roundText").textContent=`${T("round")} ${index+1}/${queue.length}`;$("#itemCard").classList.remove("hidden");$("#itemLabel").textContent=current.name;const img=$("#itemImg");img.style.backgroundImage=current.type==="image"?`url('${current.url}')`:"";img.textContent=current.type==="text"?current.name:"";}
function answer(cat,btn){if(!current)return;const ok=cat===current.cat;btn.classList.add(ok?"good":"bad");setTimeout(()=>btn.classList.remove("good","bad"),450);if(ok){score+=10;correct++;}else{score=Math.max(0,score-5);wrong++;}index++;updateScore();nextItem();}
function updateScore(){$("#score").textContent=score;$("#correctCount").textContent=correct;$("#wrongCount").textContent=wrong;$("#leftCount").textContent=queue.length?Math.max(0,queue.length-index):items.length;}
function finish(){clearInterval(timerId);current=null;$("#itemCard").classList.add("hidden");$("#winTitle").textContent=T("finish");$("#winDesc").textContent=`${T("finalScore")}：${score}｜${T("correct")}：${correct}｜${T("wrong")}：${wrong}`;$("#win").classList.remove("hidden");}
$("#lang").onchange=e=>{lang=e.target.value;localStorage.setItem("classify_lang",lang);applyLang()};$("#setupLang").onchange=e=>{lang=e.target.value;localStorage.setItem("classify_lang",lang);applyLang()};$("#catCount").onchange=renderCats;$("#mode").onchange=()=>{renderCats();};$("#buildCatsBtn").onclick=renderCats;$("#loadSampleBtn").onclick=loadSample;$("#startBtn").onclick=start;$("#setupBtn").onclick=()=>$("#setup").classList.remove("hidden");$("#resetBtn").onclick=()=>location.reload();$("#fullBtn").onclick=()=>document.documentElement.requestFullscreen?.();applyLang();
</script>

')
      .map(line => line.trim())
      .filter(line => line && !line.startsWith('#'))
      .join('
');
  }
  function findBankField(){
    for (const id of TARGET_TEXTAREA_IDS){
      const el = $(id);
      if (el && ('value' in el)) return el;
    }
    return document.querySelector('textarea');
  }
  async function getBuiltInSampleText(){
    try {
      const res = await fetch(SAMPLE_URL, { cache:'no-store' });
      if (res && res.ok) {
        const text = await res.text();
        if (cleanSampleText(text)) return text;
      }
    } catch(e) {}
    return SAMPLE_TEXT;
  }
  function afterFill(field){
    try { field.dispatchEvent(new Event('input', { bubbles:true })); } catch(e) {}
    try { field.dispatchEvent(new Event('change', { bubbles:true })); } catch(e) {}
    try {
      if (field.id === 'textItems') {
        const mode = $('mode'); if (mode) mode.value = 'text';
        const lines = cleanSampleText(field.value).split('
');
        const categories = [];
        lines.forEach(line => {
          const parts = line.split('|').map(x => x.trim()).filter(Boolean);
          if (parts[1] && !categories.includes(parts[1])) categories.push(parts[1]);
        });
        if (categories.length) {
          try { cats = categories; } catch(e) {}
          const catCount = $('catCount'); if (catCount) catCount.value = String(Math.min(Math.max(categories.length,2),5));
          try { if (typeof renderCats === 'function') renderCats(); } catch(e) {}
        }
        try { if (typeof buildItems === 'function') buildItems(false); } catch(e) {}
        try { if (typeof renderPreview === 'function') renderPreview(); } catch(e) {}
      }
      if (field.id === 'wordBank') { try { if (typeof applyBank === 'function') applyBank(true); } catch(e) {} }
      try { if (typeof saveSettings === 'function') saveSettings(); } catch(e) {}
      try { if (typeof renderPreview === 'function') renderPreview(); } catch(e) {}
      try { if (typeof renderItems === 'function') renderItems(); } catch(e) {}
      try { if (typeof setMessage === 'function') setMessage('已载入内置题库范例 / Built-in sample loaded / Contoh terbina telah dimuat'); } catch(e) {}
      try { if (typeof toast === 'function') toast('已载入内置题库范例'); } catch(e) {}
    } catch(e) { console.warn('Sample after-fill warning:', e); }
  }
  async function loadBuiltInSampleQuestionBank(event){
    if (event) { event.preventDefault(); event.stopPropagation(); event.stopImmediatePropagation(); }
    const field = findBankField();
    if (!field) return;
    const sampleText = cleanSampleText(await getBuiltInSampleText());
    if (!sampleText) return;
    field.value = sampleText;
    afterFill(field);
  }
  window.loadBuiltInSampleQuestionBank = loadBuiltInSampleQuestionBank;
  SAMPLE_BUTTON_IDS.forEach(id => {
    const btn = $(id);
    if (btn && !btn.dataset.sampleLoaderFixed) {
      btn.dataset.sampleLoaderFixed = '1';
      btn.addEventListener('click', loadBuiltInSampleQuestionBank, true);
    }
  });
})();
</script>
<!-- /built-in-sample-loader-fix -->
</body>

<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>課堂游戲模板平台｜可愛風三語白板版</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>
  <div id="playerOverlay" class="player-overlay hidden" aria-hidden="true">
    <div class="player-topbar">
      <div>
        <div id="playerGameTitle" class="player-title">遊戲播放器</div>
        <div id="playerSubtitle" class="player-subtitle">白板專用｜中央安全區｜無上下軸｜三語切換</div>
      </div>
      <div class="player-actions">
        <button id="fit169Btn" class="btn secondary small">16:9 安全區</button>
        <button id="fit43Btn" class="btn secondary small">4:3 安全區</button>
        <button id="fitAutoBtn" class="btn secondary small">自動</button>
        <button id="fullscreenBtn" class="btn small">瀏覽器全屏</button>
        <button id="closePlayerBtn" class="btn danger small">關閉</button>
      </div>
    </div>
    <div id="playerStage" class="player-stage">
      <div class="stage-safe-area"></div>
      <div id="frameShell" class="frame-shell">
        <iframe id="gameFrame" title="課堂游戲播放器" scrolling="no" allowfullscreen></iframe>
      </div>
    </div>
  </div>
  <script src="./app.js?v=vercel-final-cute-ui-20260627"></script>
  <script>
    window.addEventListener('error', function(e){
      console.error('Page script error:', e.message, e.filename, e.lineno, e.colno);
    });
    setTimeout(function(){
      var app = document.getElementById('app');
      if(app && app.innerHTML.trim().length === 0){
        app.innerHTML = '<div style="min-height:100vh;display:grid;place-items:center;background:#071426;color:white;font-family:Microsoft YaHei,Arial,sans-serif;padding:24px"><div style="max-width:720px;background:#10233f;border:1px solid rgba(255,255,255,.18);border-radius:22px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.35)"><h1 style="margin:0 0 12px;font-size:34px">Website failed to load</h1><p style="line-height:1.7;color:#dbeafe">Please confirm that <b>app.js</b>, <b>styles.css</b> and <b>index.html</b> exist in the GitHub root, then redeploy on Vercel. You may also press Ctrl + F5 to force refresh.</p><p style="color:#fde68a">If this screen remains, app.js was not loaded successfully or the browser is using an old cache.</p></div></div>';
      }
    }, 1200);
  </script>
</body>
</html>
